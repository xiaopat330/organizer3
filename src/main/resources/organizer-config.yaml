appName: "JAV Helper"

# AI Picker Assist — Phase 3 auto-apply (agreed suggestions auto-resolve after delay).
enrichment:
  assist:
    mode: auto
    primaryModel: phi4
    secondaryModel: gemma3:12b
    sweeperIntervalSeconds: 60
    autoApplyDelaySeconds: 600
    promptVersion: v7-kanji-bridge
    # Max consecutive auto-apply failures before a row drops from the sweeper's
    # Phase B queue and waits for human resolution. Must be > 0 — Jackson populates
    # the primitive int as 0 when omitted, which makes the `attempts < N` SQL filter
    # match no rows and the sweeper reports "no work" even with eligible rows.
    maxAutoApplyAttempts: 3
    # Java-side post-processing rules run before/after the LLM ensemble. Omitting
    # this falls back to `false` (primitive boolean) — keep it explicit.
    postProcessingEnabled: true
    # Backfill task batch size — chunk size for batched ensemble calls (Phase 5 Track A).
    backfillBatchSize: 20
    # chunk size for the continuous sweeper's 2-pass batched evaluation
    sweeperBatchSize: 10

# Local LLM translation pipeline (Ollama). All keys are optional and default to
# the values shown here (see TranslationConfig.DEFAULTS); pinned explicitly so the
# model choice is visible in config rather than buried in code.
#   primaryModel  — tier-1 model, used for every title first. The health gate
#                   pauses the worker if this model is absent from `ollama list`.
#                   Update with `ollama pull gemma4:e4b`.
#   fallbackModel — tier-2 model, used when tier-1 refuses/garbles an explicit
#                   title. Update with `ollama pull qwen2.5:14b`.
# After changing a model here (or pulling a new version), restart the app so the
# worker re-checks health and re-warms; on a 26 GB Mac the first call cold-loads.
translation:
  ollamaBaseUrl: http://localhost:11434
  timeoutSeconds: 120
  primaryModel: gemma4:e4b
  fallbackModel: qwen2.5:14b

backup:
  autoBackupIntervalMinutes: 10080
  snapshotCount: 10
dataDir: ./data
maxBrowseTitles: 1500
maxRandomTitles: 500
maxRandomActresses: 500
thumbnailInterval: 8
thumbnailColumns: 5
coverCropPercent: 47
# Age-at-release filter — upper bound of the UI age-range slider. Real data tops
# out at 43; 45 gives slight headroom. The lower bound is fixed at 18.
ageFilterMaxAge: 45

# Background thumbnail sync — see spec/PROPOSAL_BACKGROUND_THUMBNAILS.md.
# Pre-generates thumbnails for titles with attention signal (favorites, bookmarks,
# recent visits). Opt-in; runtime toggle: `background-thumbs on|off|status`.
backgroundThumbnails:
  enabled: false
  quietThresholdSec: 30        # wait this long after user activity before running
  maxCandidatesPerCycle: 200
  idleSleepSec: 300
  startupDelaySec: 600         # delay first cycle after boot
  generationTimeoutSec: 300    # per-video hard timeout (hang protection)
  evictionDays: 30             # evict cold non-sticky thumbnails after N days; 0 disables

servers:
  - id: athena
    username: patri
    password: "!&Xiaobeibei328&!"
    domain: athena
    trash: _trash
    sandbox: _sandbox

  - id: pandora
    username: patri
    password: "!&Xiaobeibei328&!"
    domain: pandora
    trash: _trash
    sandbox: _sandbox

  - id: qnap2
    username: pyoung
    password: xiaobeibei328
    trash: _trash
    sandbox: _sandbox

volumes:
  - id: a
    smbPath: //pandora.local/jav_A
    structureType: conventional
    server: pandora
    letters: [A]

  - id: bg
    smbPath: //pandora.local/jav_BG
    structureType: conventional
    server: pandora
    letters: [B, C, D, E, F, G]

  - id: hj
    smbPath: //pandora.local/jav_HJ
    structureType: conventional
    server: pandora
    letters: [H, I, J]

  # "k" also holds L-prefixed actresses — L has no dedicated volume and is folded into k by convention.
  - id: k
    smbPath: //pandora.local/jav_K
    structureType: conventional
    server: pandora
    letters: [K, L]

  # "ma" holds Ma-prefixed actresses only (most-specific match).
  # "m" holds the rest of M (Mb-Mz) — the plain "M" prefix still matches Ma-names
  # too, but sort only flags actual LETTER mismatches (not sub-optimal volume
  # placement), so no conflict.
  - id: m
    smbPath: //pandora.local/jav_M
    structureType: conventional
    server: pandora
    letters: [M]

  - id: ma
    smbPath: //pandora.local/jav_MA
    structureType: conventional
    server: pandora
    letters: [Ma]

  - id: n
    smbPath: //pandora.local/jav_N
    structureType: conventional
    server: pandora
    letters: [N]

  - id: r
    smbPath: //pandora.local/jav_OR
    structureType: conventional
    server: pandora
    letters: [O, P, Q, R]

  - id: s
    smbPath: //pandora.local/jav_S
    structureType: conventional
    server: pandora
    letters: [S]

  - id: tz
    smbPath: //pandora.local/jav_TZ
    structureType: conventional
    server: pandora
    letters: [T, U, V, W, X, Y, Z]

  - id: unsorted
    smbPath: //pandora.local/jav_unsorted
    structureType: queue
    server: pandora

  - id: qnap
    smbPath: //qnap2.local/jav
    structureType: exhibition
    server: qnap2
    group: exhibition

  - id: qnap_archive
    smbPath: //pandora.local/qnap_archive
    structureType: exhibition
    server: pandora
    group: archive

  - id: classic
    smbPath: //qnap2.local/JAV/classic
    structureType: exhibition
    server: qnap2
    group: archive

  - id: pool
    smbPath: //pandora.local/jav_unsorted/_done
    structureType: sort_pool
    server: pandora

  - id: classic_pool
    smbPath: //qnap2.local/JAV/classic/new
    structureType: sort_pool
    server: qnap2

  # Archival intake queue — structural twin of `unsorted`, for fresh disorganized
  # classic rips awaiting curation via the Unprocessed tool. No `group` (like
  # `unsorted`): it is a pre-curation intake, not an archive-browse volume. The
  # archive association belongs with the deferred filing work.
  - id: classic_fresh
    smbPath: //qnap2.local/JAV/classic/fresh
    structureType: queue_flat
    server: qnap2

  - id: collections
    smbPath: //pandora.local/jav_collections
    structureType: collections
    server: pandora

  - id: qnap_av
    smbPath: //qnap2.local/AV/stars
    structureType: avstars
    server: qnap2

  - id: athena_av
    smbPath: //athena.local/AV/stars
    structureType: avstars
    server: athena

structures:
  - id: conventional
    unstructuredPartitions:
      - { id: archive,    path: archive    }
      - { id: attention,  path: attention  }
      - { id: converted,  path: converted  }
      - { id: duplicates, path: duplicates }
      - { id: favorites,  path: favorites  }
      - { id: queue,      path: queue      }
      - { id: recent,     path: recent     }
      - { id: minor,      path: minor      }
    structuredPartition:
      path: stars
      partitions:
        - { id: library,    path: library    }
        - { id: minor,      path: minor      }
        - { id: popular,    path: popular    }
        - { id: superstar,  path: superstar  }
        - { id: goddess,    path: goddess    }
        - { id: favorites,  path: favorites  }
        - { id: archive,    path: archive    }

  - id: queue
    unstructuredPartitions:
      - { id: queue, path: fresh }

  # Queue-family structure whose intake partition IS the share root (path "") rather than
  # a `fresh/` subfolder. Used by classic_fresh, whose share is dedicated entirely to fresh
  # intake. Scanned by the same QueueScanner; serviced by the Unprocessed tool.
  - id: queue_flat
    unstructuredPartitions:
      - { id: queue, path: "" }

  - id: exhibition
    unstructuredPartitions: []
    structuredPartition:
      path: stars
      partitions: []

  - id: sort_pool
    unstructuredPartitions: []

  - id: collections
    unstructuredPartitions:
      - { id: archive,   path: archive   }
      - { id: converted, path: converted }
      - { id: duos,      path: duos      }
      - { id: favorites, path: favorites }
      - { id: new,       path: new       }
      - { id: omnibus,   path: omnibus   }
      - { id: recent,    path: recent    }

  - id: avstars
    unstructuredPartitions: []
    ignoredSubfolders:
      - trash
      - .Trashes
      - incomplete

# SMB timeout settings — see spec/PROPOSAL_SMB_TIMEOUT_HARDENING.md §3.1–3.3.
# All timeouts have conservative defaults; tune only if you see false-positive
# timeouts on a genuinely slow NAS. A per-volume coherent sync of a large
# letter volume can take 30–60 min over slow SMB; the default 120 min budget
# gives 2x headroom.
#
# dialTimeoutSeconds is intentionally short: TCP-connect + SMB session-setup on a
# LAN should take well under a second; 10 s is a generous backstop that prevents
# Jetty thread saturation when the NAS host pings fine but its SMB service is wedged.
#
# smb:
#   readTimeoutMinutes: 5         # single SMB call read timeout (default 5)
#   writeTimeoutMinutes: 5        # single SMB call write timeout (default 5)
#   transactTimeoutMinutes: 5     # overall SMB request timeout (default 5)
#   perVolumeTimeoutMinutes: 120  # watchdog: max time per volume in coherent sync (default 120)
#   unmountTimeoutSeconds: 30     # max time to wait for unmount before abandoning (default 30)
#   dialTimeoutSeconds: 10        # TCP-connect + SMB auth timeout per dial attempt (default 10)

# Sync reconciliation — see spec/PROPOSAL_SYNC_RECONCILIATION.md.
# A title_locations row not observed during a sync is marked stale rather than
# deleted. Rows past the grace window are swept; titles with zero live and no
# in-grace stale rows are pruned (subject to the catastrophic-delete guard).
sync:
  staleGraceDays: 90

syncConfig:
  - structureType: conventional
    commands:
      - term: sync queue
        operation: partition
        partitions: [queue]
      - term: sync all
        operation: full

  - structureType: exhibition
    commands:
      - term: sync all
        operation: full

  - structureType: queue
    commands:
      - term: sync
        operation: full
      - term: sync all
        operation: full

  - structureType: queue_flat
    commands:
      - term: sync
        operation: full
      - term: sync all
        operation: full

  - structureType: sort_pool
    commands:
      - term: sync
        operation: full
      - term: sync all
        operation: full

  - structureType: collections
    commands:
      - term: sync all
        operation: full

# Library tier thresholds — see spec/PROPOSAL_ORGANIZE_PIPELINE.md §5.1.
# Actress with n titles goes to:
#   n <  star       → pool     (no tier folder; titles stay in volume queue)
#   n <  minor      → library
#   n <  popular    → minor
#   n <  superstar  → popular
#   n <  goddess    → superstar
#   n >= goddess    → goddess
library:
  star:      3
  minor:     5
  popular:   20
  superstar: 50
  goddess:   100

