appName: "JAV Helper"

backup:
  autoBackupIntervalMinutes: 10080
  snapshotCount: 10
dataDir: ./data
maxBrowseTitles: 500
maxRandomTitles: 500
maxRandomActresses: 500
thumbnailInterval: 8
thumbnailColumns: 5
coverCropPercent: 47

# Background thumbnail sync — see spec/PROPOSAL_BACKGROUND_THUMBNAILS.md.
# Pre-generates thumbnails for titles with attention signal (favorites, bookmarks,
# recent visits). Opt-in; runtime toggle: `background-thumbs on|off|status`.
backgroundThumbnails:
  enabled: false
  quietThresholdSec: 30        # wait this long after user activity before running
  maxCandidatesPerCycle: 200
  idleSleepSec: 300
  startupDelaySec: 600         # delay first cycle after boot
  generationTimeoutSec: 300    # per-video hard timeout (hang protection)
  evictionDays: 30             # evict cold non-sticky thumbnails after N days; 0 disables

servers:
  - id: athena
    username: patri
    password: "!&Xiaobeibei328&!"
    domain: athena
    trash: _trash
    sandbox: _sandbox

  - id: pandora
    username: patri
    password: "!&Xiaobeibei328&!"
    domain: pandora
    trash: _trash
    sandbox: _sandbox

  - id: qnap2
    username: pyoung
    password: xiaobeibei328
    trash: _trash
    sandbox: _sandbox

volumes:
  - id: a
    smbPath: //pandora.local/jav_A
    structureType: conventional
    server: pandora
    letters: [A]

  - id: bg
    smbPath: //pandora.local/jav_BG
    structureType: conventional
    server: pandora
    letters: [B, C, D, E, F, G]

  - id: hj
    smbPath: //pandora.local/jav_HJ
    structureType: conventional
    server: pandora
    letters: [H, I, J]

  - id: k
    smbPath: //pandora.local/jav_K
    structureType: conventional
    server: pandora
    letters: [K]

  # "ma" holds Ma-prefixed actresses only (most-specific match).
  # "m" holds the rest of M (Mb-Mz) — the plain "M" prefix still matches Ma-names
  # too, but sort only flags actual LETTER mismatches (not sub-optimal volume
  # placement), so no conflict.
  - id: m
    smbPath: //pandora.local/jav_M
    structureType: conventional
    server: pandora
    letters: [M]

  - id: ma
    smbPath: //pandora.local/jav_MA
    structureType: conventional
    server: pandora
    letters: [Ma]

  - id: n
    smbPath: //pandora.local/jav_N
    structureType: conventional
    server: pandora
    letters: [N]

  - id: r
    smbPath: //pandora.local/jav_OR
    structureType: conventional
    server: pandora
    letters: [O, P, Q, R]

  - id: s
    smbPath: //pandora.local/jav_S
    structureType: conventional
    server: pandora
    letters: [S]

  - id: tz
    smbPath: //pandora.local/jav_TZ
    structureType: conventional
    server: pandora
    letters: [T, U, V, W, X, Y, Z]

  - id: unsorted
    smbPath: //pandora.local/jav_unsorted
    structureType: queue
    server: pandora

  - id: qnap
    smbPath: //qnap2.local/jav
    structureType: exhibition
    server: qnap2
    group: exhibition

  - id: qnap_archive
    smbPath: //pandora.local/qnap_archive
    structureType: exhibition
    server: pandora
    group: archive

  - id: classic
    smbPath: //qnap2.local/JAV/classic
    structureType: exhibition
    server: qnap2
    group: archive

  - id: pool
    smbPath: //pandora.local/jav_unsorted/_done
    structureType: sort_pool
    server: pandora

  - id: classic_pool
    smbPath: //qnap2.local/JAV/classic/new
    structureType: sort_pool
    server: qnap2

  - id: collections
    smbPath: //pandora.local/jav_collections
    structureType: collections
    server: pandora

  - id: qnap_av
    smbPath: //qnap2.local/AV/stars
    structureType: avstars
    server: qnap2

  - id: athena_av
    smbPath: //athena.local/AV/stars
    structureType: avstars
    server: athena

structures:
  - id: conventional
    unstructuredPartitions:
      - { id: archive,    path: archive    }
      - { id: attention,  path: attention  }
      - { id: converted,  path: converted  }
      - { id: duplicates, path: duplicates }
      - { id: favorites,  path: favorites  }
      - { id: queue,      path: queue      }
      - { id: recent,     path: recent     }
      - { id: minor,      path: minor      }
    structuredPartition:
      path: stars
      partitions:
        - { id: library,    path: library    }
        - { id: minor,      path: minor      }
        - { id: popular,    path: popular    }
        - { id: superstar,  path: superstar  }
        - { id: goddess,    path: goddess    }
        - { id: favorites,  path: favorites  }
        - { id: archive,    path: archive    }

  - id: queue
    unstructuredPartitions:
      - { id: queue, path: fresh }

  - id: exhibition
    unstructuredPartitions: []
    structuredPartition:
      path: stars
      partitions: []

  - id: sort_pool
    unstructuredPartitions: []

  - id: collections
    unstructuredPartitions:
      - { id: archive,   path: archive   }
      - { id: converted, path: converted }
      - { id: duos,      path: duos      }
      - { id: favorites, path: favorites }
      - { id: new,       path: new       }
      - { id: omnibus,   path: omnibus   }
      - { id: recent,    path: recent    }

  - id: avstars
    unstructuredPartitions: []
    ignoredSubfolders:
      - trash
      - .Trashes
      - incomplete

syncConfig:
  - structureType: conventional
    commands:
      - term: sync queue
        operation: partition
        partitions: [queue]
      - term: sync all
        operation: full

  - structureType: exhibition
    commands:
      - term: sync all
        operation: full

  - structureType: queue
    commands:
      - term: sync
        operation: full
      - term: sync all
        operation: full

  - structureType: sort_pool
    commands:
      - term: sync
        operation: full
      - term: sync all
        operation: full

  - structureType: collections
    commands:
      - term: sync all
        operation: full

# Library tier thresholds — see spec/PROPOSAL_ORGANIZE_PIPELINE.md §5.1.
# Actress with n titles goes to:
#   n <  star       → pool     (no tier folder; titles stay in volume queue)
#   n <  minor      → library
#   n <  popular    → minor
#   n <  superstar  → popular
#   n <  goddess    → superstar
#   n >= goddess    → goddess
library:
  star:      3
  minor:     5
  popular:   20
  superstar: 50
  goddess:   100

