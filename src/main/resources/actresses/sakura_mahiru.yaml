  biography: "Mahiru Sakura (櫻茉日, さくら まひる) is a Japanese AV actress and former gravure idol who debuted in gravure in 2021 under the name 櫻まひる with the agency e-2 dive Entertainment, then transitioned to AV in July 2022 as an exclusive actress at OPPAI with the same reading but using the kanji form 茉日. Her AV debut title referenced her J-cup figure and was released on 2022-07-19. In September 2023 she transferred to Bambi Promotion and renamed herself 堀北実来 (ほりきた みくる), working across multiple labels; she returned to the name 櫻茉日 in September 2024 via SNS announcement. In December 2024 she starred in the non-AV theatrical release 'エツコ・ブランニュー・デイ'. She left Bambi Promotion in June 2025 and began using the hiragana name さくらまひる. Her birth year is not publicly disclosed; an early AV-debut profile listed 2000-03-03 but Wikipedia marks the birth year as undisclosed."
