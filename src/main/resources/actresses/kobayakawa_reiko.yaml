  biography: "Reiko Kobayakawa is a Japanese AV actress born in Tokyo on November 17, 1982, who debuted in adult video in April 2012 after years of work as a race queen and campaign girl under the name 杏華. She quickly became one of Japan's most prolific and internationally recognized mature-genre performers, known for her tall frame, I-cup bust, and commanding screen presence across a vast range of studios. Her career spans Madonna, Prestige, Attackers, Fitch, Gloria Quest, and many others, with no exclusive contract — instead working across the industry as a sought-after free agent. She was previously affiliated with リーズプロモーション and is currently represented by Capsule Agency. In 2022 she walked the runway at the Asia Pacific Collection fashion event in Kanda Myojin Hall as a representative of sex workers. Her hobbies include photography, and she lists Japanese sweets-making (和菓子作り) as a special skill."
