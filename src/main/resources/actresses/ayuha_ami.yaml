  biography: "Ami Ayuha (阿由葉あみ) is a Japanese AV actress affiliated with the Mines (マインズ) talent agency. She debuted on April 13, 2018 as an exclusive actress for S1 No.1 Style, releasing her debut title SSNI-176 (新人 NO.1 STYLE 阿由葉あみ AVデビュー). In July 2018 she left the S1 exclusive contract and became a freelance single-title (企画単体) actress, working across multiple labels including MOODYZ, DOC, Wands, and various smaller producers. Her publicly stated measurements (as of 2018) are 165 cm tall with a 89-56-85 cm figure; her birth year has not been publicly disclosed. She has cited Yua Mikami (三上悠亜) and Moe Tenshi (天使もえ) as major personal favorites."
