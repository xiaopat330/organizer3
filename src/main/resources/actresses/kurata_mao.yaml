  biography: "Mao Kurata is a Japanese AV actress from Akita Prefecture who debuted on August 7, 2012 with S1 NO.1 STYLE under the new-face banner, signing as an exclusive contract actress. After completing her S1 exclusive stint through 2013, she transitioned to a prolific freelance career spanning an exceptionally wide range of studios — including MOODYZ, kira☆kira, Wanz Factory, Madonna, E-BODY, Fitch, MaxA, KMP, OPPAI, Attackers, SOD, and Dasutte! — sustaining output across more than a decade without re-signing as an exclusive. Known for an H-cup bust and large-hip physique, she is particularly associated with paizuri and slow-technique titles, and critics note her skill at gentle, slow-build scenes. She won the SKY PerfecTV! Adult Broadcasting Award for On-Demand Actress in 2018, marking formal recognition of her sustained popularity across digital platforms."
