  biography: "Jessica Kizaki (希崎ジェシカ) is a Japanese talent and retired AV actress, a quarter-Italian Tokyo native and one of Idea Pocket's flagship actresses of the late 2000s and 2010s. After a 2008 gravure debut she made her AV debut on 1 September 2008 with 「FIRST IMPRESSION 38」 on an initial 12-title Idea Pocket contract, and quickly topped the maker's monthly rankings. She became a second-generation member of the Ebisu Muscats idol unit (appearing on the Onee-Mas TV franchise from 2009) and won the Livedoor Award at the 2011 SKY PerfecTV! Adult Broadcasting Awards. In 2016 she transferred to S1, and in 2018 marked her 10th-anniversary year with a DMM R-18 Adult Award nomination and her 100th title. Born 10 June 1989 (O blood type, 160 cm, D-cup), she announced a year-end retirement on turning 30 and retired at the end of 2019, afterward taking a front-desk job at a beauty clinic."
