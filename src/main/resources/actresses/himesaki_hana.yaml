  biography: "Hana Himesaki (姫咲はな; prior name 佐野みな実), born 21 May 1999 in Hokkaido, is a Japanese AV actress and gravure model known for her exceptionally large natural bust (I-cup, 100 cm) and clean-cut idol image. She debuted on 9 June 2020 as an exclusive of SODcreate's 'Seishun Jidai' label (SDAB-132), having chosen AV as her first sexual experience. After five titles with SOD she became a freelance kikaku tantai actress from early 2021, rapidly accumulating credits across dozens of labels in a single year. She ranked 2nd in FANZA's H1 2021 actress sales ranking and topped multiple subsequent charts, establishing herself as one of the top-selling actresses of the 2020s generation. In July 2025 she announced a triple exclusive contract commencing August 2025 with 無垢 (Muku), Fitch, and ダスッ! (Dass!). Away from AV she is active as a gravure model, has published five major photobooks between 2022 and 2026, and runs a YouTube channel with nearly 20,000 subscribers."
