  biography: "Nozomi Aso is a Japanese AV actress of Filipino-Japanese heritage (母はフィリピン人), born December 20, 1984 in Tokyo. Standing 170 cm with a proportional figure, she was dubbed \"Japan's most beautiful nude\" at her June 2012 debut with SOD Create, with her debut title topping Amazon and DMM annual rankings and making her a million-selling actress. Praised for her ojou-sama (refined lady) image and likened in Chinese-speaking markets to Taiwanese actress Lin Chiling, she became a major star under SOD before a brief announced retirement in 2014; she returned the same year as a MAXING exclusive. In June 2016 she was arrested under the Narcotics and Psychotropics Control Act, received a suspended sentence, and MAXING subsequently ended her contract; she continued as a freelance performer. In March 2018 she was arrested again for stimulant possession and received a sentence of 1 year 8 months at Yokohama District Court. She has remained active in AV as a freelance performer."
