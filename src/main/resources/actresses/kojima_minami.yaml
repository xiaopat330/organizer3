  legacy: "小島みなみ is recognized as a long-running industry veteran who sustained a career of over a decade across three major studios — Alice Japan, S1 NO.1 STYLE, and Madonna — demonstrating consistent commercial appeal. Known for combining a childlike voice with a curvaceous figure, she became a reliable top-tier performer at S1 and earned recognition in fan popularity polls approximately ten years after her debut."

