  biography: "小島みなみ (Kojima Minami) is a Japanese AV actress born December 14, 1992 in Kanagawa Prefecture. She debuted on July 8, 2011 as an exclusive actress for Alice Japan with the title 真★美少女 (True Beauty Girl), signing an indefinite exclusive contract before releasing any works — an unusual expression of confidence from the studio. After approximately three years with Alice Japan, she transferred to S1 NO.1 STYLE in March 2014, where her career gained wider recognition over the following decade. She was a member of the AV idol unit SEXY-J and the prominent group 恵比寿★マスカッツ (Ebisu Muscats) from September 2015 to October 2017. In September 2024 she completed her long tenure with S1, and from November 2024 she became an exclusive actress for Madonna."
