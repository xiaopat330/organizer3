  biography: "Rika Aimi is a Japanese AV actress from Gifu Prefecture born on December 30, 1999. She debuted on April 19, 2019, as an exclusive with S1 No.1 Style under the concept of a 'minimum big-bust girl' — 145 cm tall with a natural H-cup, a combination that made her an immediate standout. After nine S1 solo titles, she transferred to Madonna in January 2020 for three titles before going freelance in April 2020, subsequently working with a wide range of studios including MOODYZ, E-BODY, DASS!, MAX-A, kira☆kira, and many others. Known by her nickname 'Rika-tan,' she is recognized for her petite frame and disproportionately large bust, her versatility across drama-heavy and fetish genres, and her image transformation from black-haired debut look to a gyaru style around 2022. In 2024 she made her strip-theatre debut at Asakusa Rockza, and in 2026 she returned to exclusive status by signing with DAHLIA (a FALENO label) for releases beginning July 2026."
