  biography: "Ai Uehara is a former Japanese AV actress born November 12, 1992 in Fukuoka Prefecture who grew up in Tokyo. She was scouted while a university student and debuted in April 2011, initially working under the aliases 下原舞 and 鮎川翔子 on omnibus releases before establishing herself under her own name. Working primarily as a freelance 企画単体 actress across multiple studios — most prominently MOODYZ, Crystal Eizo, 本中, SODクリエイト, kawaii, and ワンズファクトリー — she became one of the most prolific and popular AV actresses of the early 2010s, winning the DMM Adult Award 2014 Most Outstanding Actress (Platinum) and ranking first in DMM's annual actress popularity survey for 2013. She joined the idol group Ebisu Muscats in September 2015 and announced her AV retirement at Japan Adult Expo 2015 in November of that year, giving her final stage performance at Asakusa Rockza from May 1–20, 2016. After retirement she became active as a YouTuber, influencer, and entrepreneur, and as of 2025 operates multiple businesses in Japan and internationally."
