  legacy: "Ai Uehara was one of the defining figures of the 企画単体 (non-exclusive) actress boom of the early 2010s, demonstrating that freelance performers could rival exclusive-contract stars in popularity and output. Her #1 DMM annual ranking in 2013 and Platinum actress award in 2014 were landmark achievements for non-exclusive performers, and her prolific body of work across dozens of studios remains a reference point for the era."

