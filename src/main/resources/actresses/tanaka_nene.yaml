  biography: "Tanaka Nene (田中ねね) is a Japanese AV actress born September 20, 1999, who debuted in March 2020 as a streaming exclusive under SOD Create. Her physical proportions — 151 cm height with an I-cup bust — became her signature, and within months of debut she was ranking in FANZA monthly charts (2nd place in October 2020). She quickly became one of the most prolific performers of her generation, shooting five to twenty titles per month in her first year across dozens of labels. She is represented by the talent agency クローネ (Krone) and has maintained an exclusive contract with SOD Create throughout her career while appearing as a guest performer on a wide range of third-party labels including MOODYZ, E-BODY, Glory Quest, and Attackers."
