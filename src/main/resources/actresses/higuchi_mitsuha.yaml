  biography: "Higuchi Mitsuha (樋口みつは) was born on January 27, 1997 in Kanagawa Prefecture and debuted on July 13, 2020 under the name 'Mitsuha' through MOODYZ, one of Japan's largest AV studios. Her debut title — which highlighted her then-130,000 Instagram followers and her work as an assistant to a well-known entertainment photographer — performed well on FANZA's daily and weekly sales charts in July 2020, establishing her as a commercially notable new entrant. From her second release (July 25, 2020) onward she used her full stage name 樋口みつは, and she went on to produce a substantial catalog exclusively under MOODYZ across her three-year career. Alongside AV work she expanded into gravure modeling and photo books, and on May 1, 2021 she made her debut as a stripper at Kawasaki Rock-za. She retired from adult video with a release dated September 12, 2023 and has continued working as a stripper and model through her agency, Model Production Mines."
