  legacy: "Higuchi Mitsuha leveraged a significant pre-debut social media following to generate strong first-week FANZA chart performance at debut, an approach that became increasingly common for MOODYZ signings in the early 2020s. After retiring from AV she transitioned to a continued public career as a stripper and model, representing one of the more visible post-retirement paths among actresses of her cohort."

