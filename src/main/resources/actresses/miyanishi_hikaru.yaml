  biography: "Hikaru Miyanishi (宮西ひかる) is a Japanese AV actress born August 22, 1999, affiliated with the talent agency LIGHT. She made her AV debut in January 2022 as an exclusive actress with Idea Pocket (FIRST IMPRESSION 152), quickly earning praise from industry observers for her natural appeal and expressive performances. In May 2023 she transferred to Attackers as an exclusive, and in December 2023 she transitioned to non-exclusive freelance status, thereafter appearing across a wide range of labels including MAXING, VENUS, Madonna, S-Cute, SOD Create, and many others. She maintains an active presence across both regular and VR productions and has been ranked in FANZA monthly actress charts multiple times from 2024 onward. Her inspirational figure for entering the industry was actress Arina Hashimoto (now Arina Shin)."
