  biography: "Yuria Yoshine (吉根ゆりあ) is a Japanese AV actress born 1996-05-26 in Shizuoka
    Prefecture, affiliated with B-DASH Promotion (ビーダッシュプロモーション). She debuted in June
    2019 under OPPAI with the character hook of being a legendary Yoshiwara soapland
    hostess, a premise she later revealed in 月刊FANZA (April 2022) was a debut-era
    promotional framing. Known professionally as the \"queen of manga adaptations\"
    (実写化の女王) for her frequent casting in live-action AV versions of adult manga,
    her signature M-cup bust has made her one of FANZA's most-followed performers.
    She became a double exclusive for Fitch and MOODYZ from November 2024, and in
    March 2026 received the BEST BEAUTIFUL BUST award at the ADULTOPIA adult expo
    in Taiwan."
