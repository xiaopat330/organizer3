  legacy: 'One of the most internationally recognized JAV actresses of the mid-2000s, Maria Ozawa achieved significant fame outside Japan — particularly in Southeast Asia — due to her Eurasian appearance and high-profile non-exclusive cross-studio output. Her S1 debut work and the AV Open 2006 winning ensemble title remain notable; her 2009 AV GrandPrix wins with DAS! mark the peak of her AV-era recognition.'

