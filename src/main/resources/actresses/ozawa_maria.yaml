  biography: "Maria Ozawa (小澤マリア) is a Japanese model, actress, and retired AV actress of mixed Canadian and Japanese heritage — her mother is Japanese and her father is a French Canadian missionary. Born 8 January 1986 in Hokkaido, she was not scouted but entered the industry through a personal connection, first modeling under the name Miyabi for the site Shirouto-Teien.com from June 2005. She debuted on October 7, 2005, under her stage name as a S1 No.1 Style exclusive, releasing approximately one original video per month through early 2007, including S1's winning entry in the 2006 AV Open. She subsequently moved to DAS! (2007), then worked non-exclusively with Attackers, Moodyz, SOD, and other studios through 2010, during which three of her titles were entered into the 2009 AV GrandPrix — the DAS compilation winning Best Violence Video Award. In 2015 she confirmed she had left the AV industry around 2010 to pursue a mainstream career, appearing in films in Taiwan, Indonesia, and the Philippines and building an entrepreneurial career in Japan and the Philippines."
