  biography: "Momona Koibuchi (恋渕ももな) was born on March 3, 1999 in Akita Prefecture and raised in Yamagata Prefecture. She made her gravure debut in February 2022 in Kobunsha's FLASH magazine, and debuted as an AV actress on April 21, 2022 under the SOD Star label (SOD Create), with which she holds an exclusive contract. She is affiliated with talent agency Life Promotion (ライフプロモーション). She also performs music under the alias こいもも. Her stage surname 恋渕 (Koibuchi) is derived from a classical waka poem by Emperor Yōzei in the Hyakunin Isshu, evoking the image of love accumulating into a deep pool. Prior to entering the entertainment industry she worked as a local government employee (税務課) in Yamagata City. Her measurements grew substantially after debut; she announced on her YouTube channel in March 2023 that her bust had reached O cup."
