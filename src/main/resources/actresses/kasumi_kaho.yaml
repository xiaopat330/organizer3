  biography: "Kaho Kasumi (かすみ果穂) was born on October 14, 1984 in Chiba Prefecture and made her AV debut on April 7, 2005 under an exclusive 12-title contract with SOD Create, winning the 4th SOD Excellent Actress Award in her debut year. She transferred to Idea Pocket in October 2009 and went on to become one of the label's most prominent exclusive actresses over the following years, also gaining mainstream entertainment exposure as a 3rd-generation member of the popular variety group Ebisu Muscats from 2009 to 2013. She announced her retirement on February 25, 2016, with her final work released by Idea Pocket on April 19, 2016 marking the close of an 11-year career; after retirement she closed all social media accounts and stepped away from public life entirely, though a YouTube appearance in late 2024 indicated she had since married and given birth to a child."
