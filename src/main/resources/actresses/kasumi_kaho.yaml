  legacy: "Kaho Kasumi was one of the defining exclusive actresses of Idea Pocket during its peak era in the early 2010s, and her decade-long career spanning SOD Create and Idea Pocket established her as a fan favourite with broad crossover appeal through her Ebisu Muscats work on mainstream variety television. Her combination of consistent output, award recognition, and public persona made her among the most recognizable names in Japanese adult video during the period 2005–2016."

