  biography: "Shion Yumi (夕美しおん) is a Japanese AV actress born on April 7, 1999, in Gifu Prefecture. She debuted in October 2018 as an exclusive with S1 No.1 Style, quickly gaining attention for her petite 149 cm frame paired with a natural J-cup bust — a combination that made her a standout even among S1's roster of volumptuous exclusives. Her S1 run produced a large body of solo works under the SSNI and SSIS codes before she transferred exclusive status to OPPAI (a sister S1 group label specialising in large-bust content) in October 2021. In October 2022 she concluded her OPPAI exclusive and transitioned to freelance/企画単体女優 status, subsequently working with Prestige (PPPE), MAXING, MOODYZ, and other studios. Off-screen she runs two YouTube channels — a personal gaming channel ('ゲームする夕美しおん') and an agency-backed variety channel ('しおんチャンネル') — and is a self-described avid BL manga enthusiast."
