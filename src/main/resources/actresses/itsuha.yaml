  legacy: "Itsuha is one of MOODYZ's breakout exclusive actresses of the early 2020s, whose pronounced sensitivity and expressive reactions established a devoted fanbase within her debut year. Her 2024 Attackers output charted consistently on FANZA weekly rankings, and her 2025 transition to non-exclusive work broadened her reach across mainstream and theatrical productions."

