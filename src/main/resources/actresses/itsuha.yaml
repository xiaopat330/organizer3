  biography: "Itsuha (五芭, born May 8, 2003, Nagano Prefecture) is a Japanese AV actress represented by talent agency NAX. She debuted in October 2022 as an exclusive actress at MOODYZ, promoted with the catchphrase \"10年に1度のビンカン\" (the most sensitive woman in a decade), a reference to her highly reactive on-screen responses that quickly became her signature. In December 2023 she transferred her exclusive contract to Attackers, where she released a consistent stream of drama-focused titles through 2024. In May 2025 she announced a transition to non-exclusive (企画単体) work, beginning her second career chapter with appearances across a wide range of studios. She has also appeared in mainstream film and television, including a role in the Netflix series \"デスキスゲーム\" (2025) and several theatrical releases from OPP Films."
