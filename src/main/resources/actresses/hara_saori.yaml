  legacy: 'A landmark SOD Star debut-era actress whose 2009 AV debut sold over 100,000 copies — one of the best-selling AV debuts of the late 2000s. After retiring from AV in 2011, she rebuilt a mainstream acting career under the name Matsunoi Miyabi and appeared in the GARO franchise and multiple television dramas.'

