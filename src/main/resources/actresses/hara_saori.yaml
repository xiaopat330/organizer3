  biography: "Saori Hara (原紗央莉) is a Japanese actress, former gravure idol, and retired AV actress who debuted as idol 七海まい (Nanaumi Mai) in April 2004. Born 1 January 1988 in Hiroshima City, she moved to Tokyo in junior high school, graduated from Horikoshi High School, and re-debuted under the name 原紗央莉 before entering AV with SOD Create on 22 January 2009. Her debut work 『芸能人 原紗央莉 奇跡のAVデビュー』 became an industry-wide hit, selling over 100,000 copies and topping AV rankings nationally. She was an exclusive SOD Star actress throughout her AV career (2009–2011), winning the SOD Grand Prize for Best Actress in 2009 and the SKY PerfecTV! Adult Broadcasting Award for Best Actress in 2010. In March 2011 she terminated her SOD contract for health and personal reasons following the Tohoku earthquake, and in April 2014 re-emerged as actress 松野井雅 (Matsunoi Miyabi) under talent agency Geiei, subsequently appearing in mainstream TV dramas and films. She married in October 2012 and gave birth to twin daughters in February 2023."
