  biography: "Waka Misono is a Japanese AV actress from Kagawa Prefecture who debuted in February 2018 as a Seishun-Jidai (SOD Create) exclusive before going on hiatus after three releases. She returned in March 2019 as a freelance performer and shot to attention in February 2020 with a single-work record of 242 cum-swallowing scenes, breaking a decade-old record. Since 2023 she has been one of FANZA's highest-ranked kikaku-tantai actresses, hitting #1 on the FANZA monthly women's ranking in June 2024 and snapping Ichika Matsumoto's 15-month streak. She is also a member of the SOD-affiliated idol group mumk and from May 2025 began holding three-way exclusive contracts with MOODYZ, Das! and Attackers."
