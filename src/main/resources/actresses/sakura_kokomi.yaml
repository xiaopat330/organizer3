  biography: "Kokomi Sakura (桜ここみ) is a Japanese AV actress born on December 18, 1988 in Shimane Prefecture. She debuted in April 2009 as an exclusive actress at S1 No.1 Style and quickly ranked seventh in the studio's annual bestselling titles for that year. In February 2012 she co-founded the five-member AV idol unit 'me-me' (ミーム) alongside Kokomi Naruse, Meguri (Megu Fujiura), Shiori Kanzaki, and Maika. She transferred to Idea Pocket in May 2012, then to Prestige in June 2013, and finally to 美 (Chijyo Heaven) in March 2014. She announced her retirement on her blog on May 21, 2014, concluding a five-year career."
