  legacy: "One of the most versatile and longest-active AV actresses of her era, Yuria Satomi built back-to-back exclusive contracts at nearly every major studio over a career spanning two decades. Her dual identity as Aya Koizumi then 里美ゆりあ, combined with her 恵比寿マスカッツ mainstream crossover and a high-profile tax evasion case in 2014, made her one of the most recognizable names in Japanese AV culture."

