  biography: "Yuria Satomi (里美ゆりあ) is a prolific Japanese AV actress born December 17, 1984, in Tsurumi, Yokohama. She originally debuted in December 2003 under the name Aya Koizumi (小泉彩) and worked for studios including Max-A, Idea Pocket, and Attackers before re-debuting in December 2008 as 里美ゆりあ with studio 美 (later Chijo Heaven), deliberately concealing her earlier career. As Yuria Satomi she built an extensive multi-studio exclusive career spanning MOODYZ (from December 2010), Idea Pocket (2011, dual exclusive), PREMIUM/Glamorous (from August 2014), Idea Pocket again (from December 2016), Prestige (from September 2017), Madonna (from July 2019), and WANZ Factory (from January 2020). She is known for her long tongue and pale complexion, and specializes in chijo (seductress) and sex-service content; she is particularly noted for acrobatic cowgirl riding. In 2011 she joined the idol group 恵比寿マスカッツ (Ebisu Muscats) as a 6th-generation member, appearing on the variety show 'Onedari Mascot DX!' until the group's dissolution concert in April 2013. In 2012 she was ranked 12th in the AV 30th Anniversary all-time actress popularity vote."
