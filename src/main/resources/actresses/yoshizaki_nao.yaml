  biography: "Nao Yoshizaki (吉崎直緒) is a Japanese AV actress born on 20 December 1985 in Kanagawa Prefecture. She debuted in May 2005 under KUKI, with two early titles credited to the alias 小林ゆき (Yuki Kobayashi) predating her named debut. After an active first career period primarily with KUKI and MAX-A, she retired in December 2009 with the title 最終花～吉崎直緒、引退～ released by PREMIUM. She made a comeback in July 2012 with 吉崎直緒 復活 via PREMIUM and has been active since. Her cell-disc career was centered on PREMIUM (PGD/Glamorous label), where she built a substantial solo catalog across multiple genres."
