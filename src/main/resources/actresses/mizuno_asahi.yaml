  biography: "Asahi Mizuno (水野朝陽) is a Japanese AV actress and nail artist from Tokyo, born November 12, 1990, known for her tall stature (165 cm), H-cup figure, and short-haired clean-cut (清楚系) image. She debuted in February 2013 after applying to her agency herself, initially working without showing her face and intending to quit quietly, but became fully media-active after bonding with fans at events. Throughout her pre-retirement career (2013–2019) she worked as a freelance actress across dozens of labels including Moodyz, E-BODY, Attackers, Wanz Factory, and many others, all while maintaining a part-time retail job. She announced retirement via Twitter on December 1, 2018, with her final activity in February 2019. On November 17, 2020, she announced her comeback on YouTube and signed an exclusive contract with Madonna, where she has worked since December 2020, balancing AV work with her career as a nail artist. As of 2025 she is on an activity hiatus."
