  - name: "Madonna (マドンナ)"
    company: Madonna
    from: 2020-12-26
    to: null
    role: "Exclusive contract actress (comeback exclusive)"
  awards: []
  legacy: "Asahi Mizuno is regarded as one of the most prolific and versatile AV actresses of the 2013–2019 generation, notable for her H-cup figure combined with a tall, lean build and distinctive short-hair presentation. Her comeback and Madonna exclusive career from 2020 extended her profile into the married-woman (人妻) genre, where she achieved renewed popularity ranked in annual Asahi Geino polls."

