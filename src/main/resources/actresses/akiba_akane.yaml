  biography: "Akane Akiba (秋葉あかね) is a former Japanese AV actress born November 1, 1992. She attended the prestigious Takarazuka Music School (宝塚音楽学校), an elite institution that feeds into the Takarazuka Revue, but was expelled in late 2008 after being falsely accused of shoplifting by classmates — a case she described as bullying. She challenged the expulsion in court, and in July 2010 won reinstatement and graduated. Despite completing her studies, she was unable to join the Takarazuka Revue, and returned to her hometown in the Tohoku region. She later moved to Tokyo and was scouted by SOD Create. In December 2013 she was briefly announced under the name Takazuka Rena (高塚れな) for a debut that was cancelled within a week, reportedly following protests from Takarazuka-related parties. She ultimately debuted in January 2016 as Akane Akiba through the SOD star label, releasing five titles directed by Nishikajima Nanpo, and retired in May 2016 after her final creampie-themed title."
