  biography: "Anri Okita (沖田杏梨) was born October 28, 1986, in Birmingham, England, to a Japanese family; she moved back to Japan at age eight. She studied art in England during her college years and began gravure modelling before her AV debut. She debuted on February 7, 2011, under S1 No.1 Style with the title *1,000,000 Yen Body Best of All*, famously promoted with a one-billion-yen insurance policy on her body. She remained an S1 exclusive through 2012, briefly moved to SOD under the name Akane Mizuki (観月あかね), then became a freelance actress from early 2013, working across MOODYZ, OPPAI, Prestige, HMJM, Fitch, Wanz Factory, and many other labels. In January 2014 she signed as a MOODYZ exclusive. Okita announced her AV retirement on April 13, 2016, with her final title released in May 2016. During her career she gained exceptional international popularity across Southeast Asia, Australia, Europe, and North America. Post-retirement she appeared in mainstream Japanese films (including *Scoop!* 2016 and *Diamond Dogs* 2017), briefly joined the idol group Ebisu Muscats (2016–2017), and released the solo album *Gorilla* in October 2017. She is of British and Japanese heritage and is widely regarded as one of the most internationally recognised Japanese AV actresses of the 2010s. She married a Japanese businessman in December 2017 and has a daughter born in 2018. Following her AV retirement she later underwent extensive breast augmentation, with her measurements reaching approximately B130-W64-H110 cm (S cup) as documented in 2023 and 2025."
