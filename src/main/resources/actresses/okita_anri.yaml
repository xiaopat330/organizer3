  legacy: "One of the defining AV performers of the early 2010s, known for an extremely large bust (referred to as K cup / L cup during her active years, later S cup), half-British heritage, and crossover appeal in Southeast Asian and Western markets. Her international fame preceded that of most contemporaries; she was ranked #3 among Asian adult performers globally by Western streaming metrics ca. 2013. Post-career she successfully pivoted to mainstream acting, music, and art creation, maintaining a large social media following. Her works were voluntarily withdrawn from official platforms at her request in 2021."

