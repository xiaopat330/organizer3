  biography: "Riho Hasegawa (長谷川リホ) is a Japanese AV actress, gravure idol, and talent born on March 19, 1991 in Tokyo. She debuted in gravure while still a high school student in 2008, becoming a finalist in the Miss FLASH 2008 contest. After appearing in weekly magazines and releasing a hair-nude photobook in 2012, she made her AV debut in May 2012 through MUTEKI, followed swiftly by an exclusive contract with S1 NO.1 STYLE. During her time at S1, she appeared in multiple releases highlighting her notable F-cup figure and became known for high-production-value titles. She later worked with other studios including Idea Pocket, Attackers, MOODYZ, and E-BODY."
