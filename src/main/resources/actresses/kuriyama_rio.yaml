  biography: "Rio Kuriyama (栗山莉緒) is a Japanese AV actress from Tokyo, born August 2, 1998. She debuted as an exclusive actress at Idea Pocket on October 13, 2020, gaining quick recognition for her petite 148 cm frame paired with an E-cup figure and energetic screen presence. In November 2021 she graduated from Idea Pocket and transferred to Madonna (マドンナ) as an exclusive actress, remaining there from December 2021 through April 2025. In May 2025 she announced her graduation from Madonna and debuted as an exclusive actress at Attackers (アタッカーズ) from June 2025 onward. She is managed by Mines (マインズ) talent agency and also maintains a YouTube channel under the name くりチューブ. In 2026 she received the BEST PERFORMANCE ACTRESS award at the ADULTOPIA adult expo in Taiwan."
