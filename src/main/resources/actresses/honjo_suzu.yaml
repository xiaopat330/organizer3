  biography: "Suzu Honjo (本庄 鈴) is a Japanese AV actress and nude model born on January 12, 1997, in Yamanashi Prefecture. Inspired by Asuka Kirara, she approached an AV production company hoping to become famous, but hesitated to debut; SODクリエイト launched a crowdfunding-style campaign in January 2018 requiring 10,000 pre-orders within two months to greenlight her debut, which she cleared by February 28. Her debut work was released on April 26, 2018, and was notable for elaborate CG wing effects on the cover. She won the SOD AWARD 2019 Best New Actress award and took the FANZA Adult Award 2019 Best Work (mail-order division) for her debut title. She has maintained an exclusive contract with SODstar (SODクリエイト) throughout her career and is affiliated with C-more Entertainment."
