  legacy: "Suzu Honjo is one of SODstar's flagship exclusive actresses, having debuted through an unprecedented fan-driven crowdfunding campaign and quickly rising to become one of the label's most prolific and popular performers. Her long-running exclusive contract, high output rate, and crossover appearances in mainstream media — including an・an magazine, solo live music performances, and a nomination in TC Candler's 100 Most Beautiful Faces of 2023 — cement her status as one of the defining faces of the SOD STARS era."

