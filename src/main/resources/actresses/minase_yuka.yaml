  biography: "Yuka Minase (みなせ優夏) is a Japanese AV actress from Kanagawa Prefecture, born September 10, 1990. She debuted in July 2011 with MOODYZ under the title \"抱きたいHカップ98cm極上ボディ 新人デビュー\", quickly establishing herself as a high-demand talent thanks to her 98 cm H-cup figure. Over a concentrated active period from 2011 to 2014 she appeared across a wide range of major studios including MOODYZ, OPPAI, Attackers, Prestige, E-BODY, Madonna, SOD Create, kira☆kira, Peach Taro, V&R, HMJM, Crystal Eizo, and Gloria Quest. She has also been credited under the alias 上原実花 (Mika Uehara) in some works. Her hobbies include cooking and volleyball."
