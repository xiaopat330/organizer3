  legacy: "One of the most prolific and commercially successful free-agent actresses of the early 2020s, Yayoi Mizuki built a remarkable career through sheer volume and genre range before being recognised with a top FANZA ranking (4th, 2023 first-half) and the Asa-Gei AV Grand Prize. Her pivot from M-submissive to chijo-dominant content, informed by intensive self-study of Kurea Hasumi's performances, is widely cited as a template for actress reinvention."

