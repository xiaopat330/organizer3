  biography: "Mizuki Yayoi (弥生みづき) is a Japanese AV actress from Kitakyushu, Fukuoka Prefecture, born December 7, 1998, affiliated with the LIGHT talent agency. She debuted in August 2019 with MOODYZ under the (self-described fictional) persona of a well-bred university student, though she later disclosed she was a NEET at the time. For the first two years she worked as a prolific free agent across dozens of labels, initially in M-oriented and submissive roles before a fetish-domination title by director Sawagani in 2020 reshaped her career toward S/chijo (nymphomaniac) content. Her breakthrough came around 2022 when she broke out as a chijo actress; she ranked 4th on FANZA's 2023 first-half actress ranking and 8th for the full year, and won the Asa-Gei AV Grand Prize for Most Versatile Actress in December 2023. In September 2025 she announced an exclusive contract with KMP's new IROKE label under the million brand, effective October 2025."
