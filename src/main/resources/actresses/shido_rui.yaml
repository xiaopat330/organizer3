  biography: "Rui Shido (born May 29, 1999 in Tokyo) began her career as a child actress at age 8 under the name Yukawa Yuuri, appearing as a regular on the NHK E-Tele educational programme Himitsu no Chikarandō from 2010 and winning the Shogakukan 4th-grade model audition grand prix. She paused all entertainment activities for high school and university, working as a cram school tutor before re-entering the industry as gravure idol Shidō Rui in November 2023, debuting in Kodansha's FRIDAY magazine and releasing her first semi-nude photobook Purpura in January 2025. In May 2025 she announced her AV debut under the current stage name 紫堂るい, releasing her debut title through MUTEKI in June 2025; her FANZA Blu-ray version debuted at number one, and she ranked 10th in Asahi Geino's 2025 annual AV sales chart. From August 2025 she became an exclusive contract actress for S1 NO.1 STYLE (エスワン), with multiple titles charting in FANZA weekly rankings. In March 2026 she won Best Performance Actress at the ADULTOPIA adult entertainment expo in Taiwan."
