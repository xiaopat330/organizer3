  legacy: "Momozono is best known for popularizing the 'reverse-bunny' (逆バニー) AV subgenre, with her 2021 Fitch title becoming that label's best-selling release of the year. Her two-year industry hiatus followed by a high-profile comeback, combined with her Kansai University graduate background, made her a widely covered figure in the genre press during the early 2020s."

