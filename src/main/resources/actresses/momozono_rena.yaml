  biography: "Rena Momozono (桃園怜奈) is a Japanese AV actress and talent from Hyogo Prefecture, born July 27, 1996. She debuted in January 2016 as a Fitch exclusive while attending Kansai University, but retired after only three releases that March, intending it as a short stint. After graduating she worked for two years as an accountant at a major Kansai real-estate developer before discovering online fan demand for her return. She made a widely anticipated comeback in September 2020 with Fitch and rapidly became one of the label's top sellers, credited with pioneering the 'reverse-bunny' (逆バニー) costume trend in the industry. In 2025 she added Madonna as a second exclusive studio, and in 2026 further expanded to a dual exclusive with ダスッ!."
