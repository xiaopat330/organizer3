  biography: "Miyu Aizawa (逢沢みゆ; real DOB 2001-01-25, Tokyo) is a Japanese AV actress and former idol who debuted at S1 NO.1 STYLE on 12 December 2023. As a child she joined idol group フラップガールズスクール under the name 坂本マリア (Sakamoto Maria) in August 2013 at age 12, appearing on major-label releases and terrestrial TV before graduating with the full group in April 2018; she subsequently obtained a childcare qualification and worked in childcare for two years. After being approached about AV work she enrolled with agency BBT, debuted exclusively with S1, and quickly charted highly on FANZA ranking, placing in the top 25 of Asahi Geino's 2024 sexy actress poll as the highest-ranked newcomer. In November 2024 she declined S1's contract renewal in favour of becoming a freelance (企画単体) actress in order to broaden her range, moving to NAX management from December 2024; she subsequently dominated FANZA monthly rankings throughout 2025, ranking #1 in multiple rental, sales, and streaming categories and finishing #2 in FANZA's H1 2025 overall actress rankings (#1 among freelance actresses). She has published three photobooks and a nude pose book."
