  biography: "Kaori Maeda (前田かおり) is a Japanese AV actress born on 8 September 1990 in Kagoshima Prefecture. She debuted in February 2011 with SOD Create, releasing nine titles over the course of the year before a brief retirement with her October 2011 final SOD work. She returned to the industry in April 2012 as an exclusive actress for Idea Pocket, where she maintained a consistent monthly release schedule through 2014. From mid-2014 she also appeared under Attackers, and later had a period as a SOD Star exclusive actress. Wikipedia's active stint listing remains open-ended, indicating she has not formally announced retirement."
