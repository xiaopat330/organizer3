  biography: "Chihiro Hara was born May 22, 1984 in Tokyo and debuted in adult video in November 2004 with S1 No. 1 Style. She won the Special Actress Award at the 2004 Moodyz Awards within months of her debut, and rose rapidly in the industry's semi-annual popularity rankings, reaching #14 in the first half of 2006 and #3 in the first half of 2007. By August 2005 she had expanded to work with Moodyz alongside S1. After peaking around 2007, she took an extended hiatus from AV work of approximately three years. She returned to the industry in March 2011 under the new stage name Reira Aisaki (愛咲れいら), working with Idea Pocket and other studios under that name."
