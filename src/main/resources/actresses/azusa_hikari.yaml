  biography: "Hikari Azusa (梓ヒカリ, born November 30, 1999 in Tokyo) debuted as an exclusive actress for IdeaPocket in March 2020 at the age of 20. She quickly gained attention for her large bust — initially promoted as F-cup and later as G-cup — and her high-energy on-screen presence, which earned her coverage in publications such as Sankei Sports and Shukan Playboy. Throughout the 2020s she became one of IdeaPocket's most prolific releases, building a catalog of over 60 solo and featured titles with the label. In February 2025 she transferred to Attackers, continuing as an exclusive contract actress. She is known for her otaku interests and active social media engagement, and was notably cited for publicly confronting a groper on the subway in August 2023."
