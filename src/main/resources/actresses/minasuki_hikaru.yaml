  biography: "Hikaru Minatsuki (皆月ひかる) is a Japanese AV actress from Akita Prefecture, affiliated with Bambi Promotion. She debuted in July 2018 as an exclusive amateur for DEEP'S under the name 'Hikaru,' with her formal debut title released on July 7, 2018; a DEEP'S 20th-anniversary compilation in which she appeared was released the previous month. During her DEEP'S period she was marketed as a current music-college student (音大生) and demonstrated trumpet performance in her debut work. Her exclusive contract ended in September 2018, after which she became a prolific freelance actress working across a wide range of makers. She resumed activity in March 2020 after a health-related hiatus from November 2019. Characterized by a petite frame (148 cm) and a girl-next-door image, she has achieved repeated FANZA weekly floor rankings from 2024 onward across titles from REAL, Natural High, and First Star."
