  biography: "Sora Aoi is one of the most internationally recognized AV actresses in history, achieving unprecedented fame in China where she became a cultural phenomenon with over 15 million Weibo followers. She debuted in July 2002 simultaneously at Alice Japan and MAX-A's Samantha label, breaking out with her combination of a youthful face and G-cup bust. In November 2004 she became one of the founding exclusive actresses of S1 No.1 Style, where her debut 'セル初 ギリギリモザイク' sold a record-breaking 100,000 copies. She was the original leader of idol group 恵比寿マスカッツ and crossed over into mainstream entertainment through TV dramas (嬢王, ガリレオ), film, and music. Her last original AV title was released in July 2011, and in 2019 all her AV works were removed from distribution. She married DJ NON in 2018 and gave birth to twin boys in 2019."
