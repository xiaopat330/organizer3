  biography: "Azusa Itagaki (板垣あずさ) is a Japanese talent and retired AV actress from Niigata Prefecture. She first came to public attention in 2004 as a nominee in the Weekly Young Jump-sponsored Seifuku Collection (制コレ) school uniform contest, and released her debut gravure DVD Cotton Candy in September 2005 before pausing activities in 2006. She re-entered the industry as an AV actress, debuting on 8 November 2007 with SOD Create (SOD Star label) under her real name — the first former Seifuku Collection nominee to appear in adult video. She remained an SOD exclusive until her first retirement in March 2010, then returned to AV in December 2012 and worked across numerous labels until a second, permanent retirement around 2015 after discovering she was pregnant. She has been active on YouTube since 2021 under the SOD HANAYA division."
