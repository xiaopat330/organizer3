  biography: "Aimi Yoshikawa is a former Japanese AV actress and gravure idol from
    Kanagawa Prefecture, known for her natural H-cup figure. She debuted in AV in
    January 2013 with SOD Create, where her debut work ranked fifth in DMM's monthly
    DVD charts and earned her the SOD Grand Prize for Outstanding Actress and a 10,000-unit
    sales award the same year. Over five years she held exclusive contracts with five
    studios — SOD Create, team ZERO, S1, Wands Factory, and MOODYZ — before transitioning
    to freelance work across a wide range of labels in February 2016. On November 9,
    2018, she announced via Instagram that she would retire effective December 31,
    2018, also revealing she had not completed high school. After retiring from AV
    she entered the cabaret industry in Tokyo."
