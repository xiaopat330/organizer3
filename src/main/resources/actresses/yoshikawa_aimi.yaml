  legacy: "Yoshikawa was among the most commercially successful big-bust debuts of
    the early 2010s, with her 2013 SOD debut charting in the top 5 on DMM in its first
    month. Her willingness to move across five major studios in rapid succession made
    her one of the more prolific exclusive-to-freelance transitions of her generation."

