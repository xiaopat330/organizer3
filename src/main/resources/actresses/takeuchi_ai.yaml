  biography: "Ai Takeuchi (竹内あい) is a Japanese retired AV actress represented by Tea Powers (ティーパワーズ), known for her large bust (F-cup, 88 cm) and high-volume output under MOODYZ. She debuted on 21 July 2006 with the h.m.p exclusive title 『メロメロいちご恋乳』 and transitioned to cell-video with a MOODYZ debut on 1 September 2007 (『初セルの女神さま』), where she remained the primary exclusive for the following four years. Over her career she appeared in several dozen MOODYZ titles spanning solo and multi-actress productions, as well as sporadic releases on Attackers, E-BODY, h.m.p, and minor labels. She retired on 1 September 2011 with the MOODYZ graduation title 『ムーディーズ卒業24時間』, having built a reputation for glamorous-body (美巨乳) content. Her hobbies are travel and reading; special skills include aromatherapy and basketball."
