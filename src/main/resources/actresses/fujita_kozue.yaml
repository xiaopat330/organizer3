  biography: "Kozue Fujita (藤田こずえ), later known as Yuzu Fujita (藤田ゆず), is a Japanese AV actress and idol born on May 20, 2001, in Kanagawa Prefecture. She began idol and YouTube activities in 2020 before making her AV debut on March 7, 2021, through S1 No.1 Style (SSIS series) under the name Fujita Kozue. She has worked prolifically across numerous studios including S1, Attackers, SOD, Aroma, TMA, Sadistic Village, S-Cute, and others as a free actress. She is represented by GG (formerly Prime Agency) and maintains an active presence on social media under the Yuzu Fujita name."
