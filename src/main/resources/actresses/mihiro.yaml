  biography: "Mihiro (born Yamase Hiromi, May 19, 1982, Kashiwazaki, Niigata — stage name an anagram of her given name) entered entertainment in May 2001 as a gravure/softcore model and released her debut photobook in August 2002. Her J-pop debut single 'ヒマワリ' followed in October 2004. AV debut came in January 2005 with Alice Japan's title 『リトルエンジェル』, and she simultaneously held a co-exclusive arrangement with MAX-A from February 2005, producing roughly one title per month across both labels for approximately 2.5 years. She broke into mainstream television in early 2006 with the role of Chiba Kasumi in the TV Tokyo drama 『2ndハウス』 (drama 24 timeslot). In mid-2007 she transitioned to Maxing (MXGS label) and S1 No.1 Style; her S1 debut 4-hour title 『ハイパーギリギリモザイク みひろ』 won Best Title at the 2007 Moodyz year-end awards. From April 2008 through March 2010 she was a regular cast member of the TV Osaka variety show 『おねがい！マスカット』 alongside S1 actresses Sora Aoi, Yuma Asami, and Rio, and became a member of the idol group Ebisu Muscats (恵比寿★マスカッツ) that emerged from the show. She published an autobiographical novel 『NUDE』 in 2009, adapted into the 2010 biopic film 『ヌード』 starring Naoko Watanabe. She retired from AV on June 19, 2010, with simultaneous final works from Maxing and S1. She married actor Shinya Shimokawa in May 2015 and divorced in 2018. Continuing as a mainstream actress and YouTuber, she formally adopted the acting name 金子みひろ in May 2021 and appeared in Netflix's The Naked Director season 2."
