  legacy: "One of the most prominent AV-to-mainstream crossover actresses of the 2000s, bridging AV production, J-pop, television drama, and variety through a single coherent public persona. Her Ebisu Muscats membership brought her to prime-time variety television, and her autobiographical novel and its film adaptation gave her an unusual literary/cinematic legacy. Continues as an active mainstream actress under 金子みひろ."

