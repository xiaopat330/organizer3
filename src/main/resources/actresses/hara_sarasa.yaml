  biography: "原更紗 (Sarasa Hara), born June 20, 1984 in Tokyo, debuted in March 2007 with Max-A (debut title XV-514) and became a shared exclusive between Max-A and Alice Japan from April 2007. She transferred to IdeaPocket in 2008 and retired from AV at the end of 2010. In July 2013 she made a comeback under the new stage name 夏目彩春 (Iroha Natsume) and joined Attackers, debuting there with ADN-033 in September 2014. She has remained active under the Natsume Iroha name, pursuing a more mature dramatic style with labels such as Attackers."
