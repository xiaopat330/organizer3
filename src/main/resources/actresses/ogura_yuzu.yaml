  legacy: "Yuzu Ogura demonstrates that brief but high-quality catalogue output can
    generate lasting fan recognition. A sub-year career of ~30 titles yielded a top-10
    placement in a 30th-anniversary industry retrospective poll, making her a recurring
    reference point in fan discussions about 'lost' or prematurely retired talent.
    Her retirement framing — debt repayment — became a cultural reference point for
    the economic conditions that shaped entry and exit patterns in 2010s AV."

