  biography: "Yuzu Ogura (小倉ゆず, born June 23, 1993 in Shizuoka Prefecture) is a Japanese former AV actress who was active from late 2011 through September 2012, represented by Unity Promotion. She debuted on October 29, 2011 under the shortened name 'Yuzu' before adopting her full stage name from her fourth title onward. Despite being active for less than a year, she built a strong following for her combination of a slim frame with a notably large bust and her willingness to appear in hardcore productions for studios including Prestige, Glory Quest, Crystal Eizou, and HMJM. She placed 6th in the AV industry's 30th anniversary all-time best actress fan poll in 2012, a remarkable result for an actress with such a brief career. Her hobbies were listed as watching films and cooking."
