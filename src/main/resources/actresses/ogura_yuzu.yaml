  biography: "Yuzu Ogura (小倉ゆず; born June 23, 1993 in Shizuoka Prefecture) had
    one of the most condensed yet high-impact careers in AV history, active from
    October 2011 to September 2012 — fewer than twelve months. She debuted on October
    29, 2011 with the title 'Hazukashii Karada 18-sai Debut Yuzu' (恥ずかしい体 18歳debut
    ゆず) and appeared in approximately 30 works distributed through Glory Quest,
    Crystal Eizo, and Prestige. Her stated reason for retirement was that she had
    repaid debts. Despite working less than a year, the strength of her debut impact
    proved enduring: she was ranked 6th in the 'Adult Video 30th Anniversary All-Time
    Best Actress' public poll, placing alongside actresses with careers many times
    longer."
  primary_studios:
