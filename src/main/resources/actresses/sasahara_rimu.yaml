  biography: "Rimu Sasahara (笹原りむ) is a Japanese former AV actress and former softcore idol born on April 30, 1990, in Chiba Prefecture. Before her AV debut, she was active as a gravure/softcore idol (着エロアイドル), appearing in numerous image DVDs from 2010 onward. She debuted as an exclusive actress for S1 NO.1 STYLE in June 2013, known for her loli-type image. Her hobbies included cooking, and she had a special skill in Chinese. She released nine solo AV titles under S1 before her final compilation release in April 2014, after which she retired."
