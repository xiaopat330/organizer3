  biography: "Marina Shiraishi (白石茉莉奈) is a Japanese AV actress, talent, singer, and DJ born August 10, 1986 in Tokyo. Before her AV debut she worked as a junior talent appearing in commercials and teen fashion magazines. She debuted with SOD Create in June 2013 and rapidly rose to prominence, winning multiple major industry awards in her first two years including the DMMアダルトアワード 2014 最優秀新人女優賞 and スカパー!アダルト放送大賞 2014 新人女優賞. After over six years with SOD Star she transferred to Madonna in March 2020, expanding into the married-woman and mature-woman genre for which Madonna is known. Outside of AV she has been a member of the idol group 恵比寿マスカッツ and runs a YouTube channel (まりりんといっしょ) launched in 2020."
