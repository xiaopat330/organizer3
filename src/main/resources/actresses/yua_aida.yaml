  legacy: "A defining actress of the mid-2000s era, known for her slender figure, natural beauty, and prolific output across multiple top-tier studios. Her S1 ギリギリモザイク series ran for 24 solo installments over 27 months, making her one of the label's most consistent performers. Renowned for passionate cowgirl performances and considered a legend of the 2000s AV era alongside Sora Aoi, Yuma Asami, and Honoka."

