  biography: "Yua Aida debuted in January 2004 simultaneously under Max-A (Karen and Samantha labels) and KUKI (TANK label) as a 10-title contract newcomer marketed as a 'slender AV actress.' In May 2005 she joined S1 No.1 Style, anchoring the long-running ギリギリモザイク (Barely Mosaic) series with monthly releases, while also recording for Style Art in parallel until mid-2006. She won the 2005 Japan Adult Broadcasting Award (日本アダルト放送大賞) for Best Actress. In April 2007 she appeared in four MOODYZ titles before announcing her retirement via blog on July 12, 2007. Her final video work, the image DVD 'ETERNAL,' was released in November 2007, followed by a farewell photo book 'YUA' event on February 16, 2008. She placed 15th in the AV30 all-time popularity poll in 2012."
