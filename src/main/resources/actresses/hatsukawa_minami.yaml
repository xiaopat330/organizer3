  biography: "Minami Hatsukawa (初川みなみ) is a Japanese retired AV actress from Fukuoka Prefecture, born 19 January 1995. She debuted in March 2014 as an exclusive actress for MOODYZ (label Moody's Diva, code MIDE), releasing her debut title MIDE-074 at age 18 while enrolled in university. She remained an exclusive MOODYZ actress for the majority of her career, establishing herself as one of the studio's top performers of the mid-2010s and winning the DMM.R18 Adult Award 2015 rental division best-title award for her debut work. In May 2021 she announced her retirement via Twitter, then spent approximately one year as a non-exclusive actress appearing across many studios before releasing her final retirement work MIDV-104 on 3 May 2022. She received the 週プレアダルトアワード2021 Special Award and was consistently ranked in major reader polls. After retirement she returned to private life while retaining agency registration and fan-club channels."
