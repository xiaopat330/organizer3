  legacy: "One of the few Japanese AV actresses to simultaneously sustain a career
    in mainstream idol music, 桜もこ was a member of both the long-running variety
    unit Ebisu★Muscats and Honey Popcorn — the AV-actress-fronted K-pop group that
    held regular live performances in Japan and Korea — bringing cross-industry visibility
    unusual for her generation."

