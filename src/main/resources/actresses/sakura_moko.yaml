  biography: "桜もこ (Sakura Moko) is a Japanese former AV actress born March 19,
    1991, in Saitama Prefecture. Previously known as Ito Yuu, she debuted as an AV
    actress on November 1, 2017, with MUTEKI and worked across multiple labels during
    her six-year career. Alongside her AV work she was a member of the Japanese idol
    variety unit Ebisu★Muscats, the AV-actress-fronted K-pop/idol fusion group Honey
    Popcorn, and the former idol group Bakusute Sotokanda Icchome. She retired from
    AV work on March 20, 2024. Post-retirement she operates as a brand producer for
    the apparel label mococo and brand owner for amule."
