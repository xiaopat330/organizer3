  biography: "Nana Miho (未歩なな) is a Japanese AV actress, singer, guitarist, and talent born on August 12, 2002 in Kanagawa Prefecture. She debuted on June 28, 2022 under S1 NO.1 STYLE with the catchphrase 'The new era of cute is made by Nana!' and prior to her AV career had been a member of an idol band. Throughout her career she maintained an active parallel music career, performing solo live shows, releasing original songs such as 'Koakuma Darling,' and appearing on television programs including the TV Tokyo variety series 'Tsuki to Mogura.' On July 29, 2025, she announced her retirement from AV to take effect at the end of December 2025, performing her final solo concert 'Last One Man ~Saigo no Wagamama Live~' on December 30, 2025, while continuing talent activities thereafter. The stage name 未歩なな was inspired by the character 'Hachi' (Konatsu Nana) from Ai Yazawa's manga NANA."
