  legacy: "Nana Miho was among the standout S1 NO.1 STYLE actresses of the early 2020s, combining a warm, idol-adjacent persona with strong sales performance, including debut-year and subsequent releases ranking in FANZA's annual and weekly charts. Her active cross-over into live music and television made her one of the more publicly visible S1 actresses of her generation."

