  biography: "Aine Maria built an online following before her industry debut as a cosplay streamer under the name 'まりあ' on Niconico Douga and Niconico Live, frequently changing costumes during broadcasts. Recruited from this fan base, she debuted on January 6, 2017, as an exclusive actress for PRESTIGE (BGN-041, 新人 プレステージ専属デビュー), represented by T-Powers (ティーパワーズ). She remained exclusively with PRESTIGE across its ABP and related sub-labels for her entire career of approximately four years and eight months. She was nominated for Best New Actress at the 2018 FANZA Adult Award and received an Excellent Actress Award at the 2019 FANZA Adult Award. She also made appearances on the Sun Television late-night variety program ケンコバのバコバコテレビ and published four photo books through GRAPHIS and REbecca. On August 6, 2021, she announced her retirement on Twitter, citing personal circumstances causing difficulties for those around her, with her final work ABP-772 released September 7, 2021."
