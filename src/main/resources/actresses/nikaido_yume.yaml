  legacy: "Yume Nikaido / Ai Hongo is notable as a second-generation social-media-native AV actress who consciously modeled her career on Eimi Fukada — trilingual, streamer-adjacent, and cross-media active. Her mid-career rename is one of the more prominent identity pivots in recent AV history, and her triple スカパー win in 2022 came in the same award cycle that established her as one of S1's marquee performers."

