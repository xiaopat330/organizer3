  biography: "Yume Nikaido (二階堂夢), later renamed Ai Hongo (本郷愛) in November 2021, is a Japanese AV actress born in Minato, Tokyo who spent her formative years in the United States and Canada before returning to Japan and briefly enrolling in nursing school. She debuted with FALENO in March 2020, citing Eimi Fukada as her inspiration, and built a distinctive public profile through trilingual fluency (Japanese, English, Korean), Twitch streaming, and a guest appearance in the video game 龍が如く (Yakuza). She renamed mid-career upon moving to S1 No.1 Style in 2023, and won three スカパー!アダルト放送大賞 prizes and a 週刊プレイボーイ エロデミー賞 in 2022. Her S1 activity was suspended in September 2024 following a personal scandal; her retirement was announced via a commemorative box set in November 2025 with a final release date of December 2025."
