  legacy: "A prolific 'kikatan' (non-exclusive) actress of the late 2010s–early 2020s known for her G-cup figure and wide genre range, Tsubasa Hachino compiled one of the larger freelance catalogs of her era, working with virtually every major label in the industry over her seven-year career before retiring in October 2024."

