  biography: "Tsubasa Hachino (八乃つばさ) is a retired Japanese AV actress who debuted in December 2017 as an exclusive with MOODYZ, her debut title billing her as a current female university student who had placed first in a swimsuit contest. She left the MOODYZ exclusive contract in April 2018 and transitioned to a freelance 'kikatan' (non-exclusive) career, working extensively with MOODYZ, Madonna, Fitch, PREMIUM, Attackers, Celeb no Tomo, and numerous other labels. Her freelance period produced a prolific catalog spanning NTR, femdom, incest-scenario, soap, and lesbian genres, and a VR title she appeared in won the 'Kono Ero VR ga Sugoi! 2018 second-half work' award in 2019. She was affiliated with All Pro talent agency but departed the agency before her retirement. She announced her retirement on 2024-08-31 with a planned final event, which was postponed to October 14, 2024 due to Typhoon 10 (Shanshan), and she formally retired at the Osaka event on that date."
