  biography: "Yuki Takeuchi (竹内有紀, born February 12, 1995 in Yamanashi Prefecture) is a Japanese AV actress represented by Life Promotion. She debuted in July 2019 as an exclusive actress with PREMIUM, initially under the character framing of a former local-station TV announcer, though she later revealed this was a fictional role — her actual background was as a yoga and strength-training personal trainer. She graduated from PREMIUM exclusivity in July 2023 and transferred to Madonna (マドンナ) in September 2023, gaining weight for the married-woman role specialization that label is known for. In January 2025 she announced retirement effective December 31, 2025, but in July 2025 she reversed the decision after falling victim to a phone-fraud scam that cost her several million yen in savings, citing the need to continue working; she extended her active career by approximately one year and simultaneously launched a wellness business (Hotness) combining her personal-trainer experience with sexual health knowledge, operating under the name NAO."
