  legacy: "One of PREMIUM's prominent exclusive actresses of the early 2020s, Takeuchi distinguished herself through an athletic physique developed from years of kickboxing and competitive body-contest training. Her 2023 transition to Madonna — where she deliberately gained weight to embody the married-woman genre — and her candid public persona (including sharing a high-profile fraud victimization in 2025) made her a notable and unusually transparent figure within the contemporary JAV industry."

