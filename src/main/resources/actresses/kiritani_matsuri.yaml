  biography: "Matsuri Kiritani (桐谷まつり) is a Japanese AV actress born on August 15, 1996, in Akita Prefecture. She was discovered on the famous Magic Mirror van (マジックミラー号) while wearing only hand covers, after which SOD staff partnered with Weekly Playboy magazine to pursue her all the way to Akita for an exclusive interview; she debuted in gravure before her AV debut in December 2016 under SOD Star. After a successful exclusive run with SOD Create (2016–2019), she moved simultaneously to OPPAI (February 2019–July 2020) and WANZ Factory (March 2019–August 2020), then transitioned to Tameike Goro's label in August 2020. She was selected as a trainee for the idol unit Ebisu Muscats 1.5 in 2018 and co-founded the three-person idol unit 'un panopticon girl' that same year, releasing a CD that charted at #20 on the Oricon Indies ranking. On February 20, 2023, she announced her de facto retirement via Twitter, stating that the works already in release would be her last."
