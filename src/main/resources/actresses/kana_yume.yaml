  biography: "Kana Yume (Yume Kana) is a former Japanese AV actress and gravure idol from Shizuoka who debuted at age 18 in July 2011 with MAXING after being scouted as a high-school gravure model. Her 2011 debut topped major retailers' BD charts and earned her the 2012 SkyPerfecTV! New Actress Grand Prize. She remained MAXING-exclusive for a remarkable eight years through 2019, then cycled through MOODYZ, Attackers, Madonna, and Wanz Factory before re-debuting under the new name Mizukawa Jun at FALENO's DAHLIA label in August 2022. After leaving DAHLIA in January 2024 she became a freelance kikaku-tantai performer, and on 18 June 2025 she announced her retirement, with her final works released later that year."
