  biography: "Nako Hoshi (星なこ), later known as Azu Amatsuki (天月あず), is a Japanese AV actress from Kanagawa Prefecture who debuted in September 2020 as an exclusive at Million under the star-themed persona 星なこ (STAR CHILD). She released approximately ten titles for Million before announcing a surprise retirement in October 2021, citing no dissatisfaction with AV but a desire to explore other directions. In August 2022 she reopened a social media presence under the new name 天月あず and returned to AV in March 2023, taking a dual exclusive contract with E-BODY and Fitch simultaneously. She quickly re-established herself, achieving multiple top-ten FANZA rental chart placements in 2023 and reaching the FANZA monthly female actress ranking top-two in November 2023. After her dual exclusive period ended in early 2024 she transitioned to a freelance (企画単体) career with numerous labels. She announced the conclusion of her AV activity via X post on 20 December 2025, with final releases expected through summer 2026."
