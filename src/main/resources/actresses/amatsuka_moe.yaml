  biography: "Moe Amatsuka (天使もえ) is a Japanese AV actress, gravure idol, and singer from Tokyo who debuted in image videos in May 2014 before making her AV debut in July 2014 as an exclusive actress for S1 No.1 Style. Over nearly six years at S1 she accumulated an extensive catalogue and won multiple industry awards, establishing herself as one of the label's most recognised faces. In March 2020 she graduated from S1 and moved to FALENO as an exclusive actress from April 2020, continuing to produce work praised for its production quality. Alongside her adult career she pursued mainstream entertainment, debuting as a singer with the sexy idol group SEXY-J in January 2015 and serving as a member of Ebisu Muscats from September 2015 to February 2017. On July 28, 2024 she announced via YouTube Live that she would retire from the AV industry by the end of June 2025, completing filming of her retirement works by December 2024."
