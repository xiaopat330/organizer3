  legacy: "Moe Amatsuka is regarded as one of the standout exclusive actresses of the 2010s, known for a girl-next-door image combined with consistent commercial performance across both S1 and FALENO over an eleven-year career. Her mainstream crossover work — music activity with SEXY-J, membership in the Ebisu Muscats idol group, and a role in the Super Sentai spin-off Mashin Sentai Kiramager Spin-Off: Yodonna — made her one of the more widely visible AV personalities of her generation."

