  biography: "Arisu Nanase (七瀬アリス) is a Japanese AV actress born on February 25, 1997 in Saitama Prefecture. She previously performed under the name Ami Ichishima (市島亜美) before her official re-debut on September 13, 2020 as an exclusive actress with Idea Pocket; after five titles she transitioned to a freelance planning-actress role. In July 2022 she joined KMP as the de facto PR director of their president's office while simultaneously becoming an exclusive actress for the Million label. From December 2023 she held a triple exclusive contract with Honnaka, Das!, and E-BODY, marking her return to regular AV work after a period of limited activity. In September 2025 she became an exclusive actress for MOODYZ, and by December 2025 she had joined the talent agency Mines. She is known for ranking highly on FANZA charts and was dubbed the 'digital photo book queen' in 2023 for being the only real-model consistently placing in Amazon's adult photo book rankings alongside AI-generated content."
