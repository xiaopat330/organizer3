  biography: "Rin Sakuragi (桜木凛) debuted in October 2007 as a KUKI exclusive, born March 3, 1989 in Hyogo Prefecture. After establishing herself at KUKI through 2008–2009 she moved primarily to Premium (プレミアム), where she worked as a regular exclusive actress from 2009 through early 2013, building a large catalogue of solo titles. Following health-related hiatuses in 2011 and 2012, she made a comeback in April 2013 as an exclusive for the label Bi (美), and also worked with Attackers (アタッカーズ) on several titles. In parallel with her AV career, she became widely known as a member of the idol/variety group Ebichu Mascats (恵比寿マスカッツ), appearing on the TV show Onedari!! Mascot from April 2009 and taking part in drama and music activities. She formed the music duo P*cherry with Yura Sakura in 2014. She retired from AV on April 22, 2017, and in July 2019 made a limited talent comeback following the retirement of co-member Jyessica Kisaki, during which she publicly confirmed she had married and had a son."
