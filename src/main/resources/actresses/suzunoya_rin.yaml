  biography: "Rin Suzunoya (鈴の家りん) is a Japanese AV actress from Hyogo Prefecture who debuted on February 24, 2023 as an exclusive actress at Prestige (プレステージ). Known for her petite 151 cm frame, she established herself quickly with a high release cadence through Prestige across 2023 and 2024. From November 2024 she became a double exclusive, signing simultaneously with Ones Factory (ワンズファクトリー) and Honchū (本中) while maintaining her Prestige affiliation. She is represented by T-Powers (ティーパワーズ) talent agency and is noted for her nickname 'Rinrin' and Kansai dialect."
