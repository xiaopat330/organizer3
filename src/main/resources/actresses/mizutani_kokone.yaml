  legacy: "Mizutani Kokone is notable for her dual-identity career spanning more than a decade, transitioning from the fresh-faced idol persona of Rio Fujisaki to the darker, more versatile Mizutani Kokone brand. Her prolific freelance phase from 2015 onward, crossing drama labels (Attackers, Madonna), planning labels (Wands Factory, Glory Quest), and VR, reflects a sustained relevance rare among actresses of her generation."

