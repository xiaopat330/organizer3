  biography: "Kokone Mizutani (水谷心音) is a Japanese AV actress from Kanagawa Prefecture, born December 29, 1988. She debuted in 2009 under the stage name Rio Fujisaki (藤崎りお) at MAX-A, then moved to IDEA POCKET in late 2010 before transitioning to Prestige in mid-2011 under her current name Mizutani Kokone. At Prestige she held an exclusive contract through 2012, followed by a prolific run at MOODYZ (2013–2014) and kira☆kira (2014), where she was known for the 'BLACK GAL' tanned gyaru series. She subsequently worked across numerous labels including Attackers, Wands Factory, and Glory Quest, demonstrating a long and varied freelance career that continued through at least 2023. Her hobbies include watching movies, playing piano, reading manga, and playing Reversi."
