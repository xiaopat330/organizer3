  biography: "Hina Nitori (似鳥日菜) is a Japanese AV actress born February 20, 2000 in Tokyo. She worked approximately one year as a gravure idol before making her AV debut on September 13, 2022 with S1 No. 1 Style, marketing herself as a confident self-promoter with a gravure background. She subsequently held exclusive contracts with OPPAI (from December 2023), Fitch (from May 2024), and a dual exclusive with Fitch and ROYAL (from March 2025). In June 2025 she left exclusive contracts to work as a freelance single-title actress. In March 2026 she moved agencies from Bambi Promotion to ACT Entertainment and adopted the simplified stage name 似鳥."
