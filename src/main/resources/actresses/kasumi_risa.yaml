  biography: "Risa Kasumi (かすみりさ) is a Japanese actress and AV actress, a tall (170 cm), G-cup big-bust performer from Hokkaido. She debuted in June 2007 as an S1 exclusive with 「新人×ギリギリモザイク NO.1 STYLE」 and released roughly monthly for S1 through November 2010, becoming widely known as a member of the Ebisu Muscats idol unit and a fixture of the Onee-Mas / Muscats TV franchise (2008-2011). After leaving S1 she had brief exclusive stints with Attackers (Dec 2010 - Jan 2011) and SOD Create / SOD ACE (Jul 2011 - Jan 2012), winning the Excellent Actress award at the 2011 SOD Awards. Managed by Testa Inc. (T-Powers), she increasingly moved into mainstream talent work — TV, drama, radio and film. Born 31 May 1984, she has not issued a formal retirement and as of the mid-2020s focuses on talent work, with no newly-shot AV for several years."
