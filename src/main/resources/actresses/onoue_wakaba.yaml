  biography: "Wakaba Onoue (尾上若葉, born April 15, 1992 in Fujimi, Saitama) debuted as a kawaii* exclusive actress in July 2012, working concurrently as a nurse during her entire exclusive contract period without publicly disclosing this. In 2013 she moved to MOODYZ as an exclusive and appeared in five titles before retiring in September 2013 to study abroad in Canada. She returned to the industry in December 2015 as a freelance actress and worked prolifically across dozens of labels. She also joined the AV idol group SEXY-J in May 2016, remaining a member until its disbandment in December 2017. Her final retirement was announced on April 15, 2018 — her own birthday — via Twitter."
