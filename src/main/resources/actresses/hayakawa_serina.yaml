  biography: "Serina Hayakawa (born February 4, 1986, Ibaraki Prefecture) debuted as an h.m.p exclusive actress in December 2005 with the title お願いされるとムラムラしちゃう, reportedly recruited directly from a career as a top-ranked hostess in Roppongi. In May 2006 she transitioned to MOODYZ as a commercial exclusive, building a well-received four-year career until her graduation from MOODYZ in October 2008 and subsequent freelance period. She announced and carried out retirement on April 1, 2010 with a four-hour farewell special. On March 13, 2015, she made a surprise comeback with a new release, resuming activity under the management of Allure (later Harvesters)."
