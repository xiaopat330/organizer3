  biography: "Nana Konishi (小西那奈) is a retired Japanese AV actress born 7 July 1987 in Chiba Prefecture. She debuted in April 2007 with KUKI under the title 初花 and worked primarily as a KUKI exclusive through 2008, building a prolific single-label catalog. From September 2008 she added MAX-A releases in parallel, expanding her reach across the WILL/JHV group. In July 2009 she made her premium-label cell debut with PREMIUM (Glamorous), producing a steady monthly series of high-production-value titles through to retirement. She retired from the industry in October 2010 after approximately three and a half years of activity. Her hobbies included yoga and she was known for a party trick of guessing people's ages."
