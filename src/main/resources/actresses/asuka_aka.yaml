  biography: "Aka Asuka (有栖花あか) is a Japanese AV actress who debuted on October 3, 2020 with S1 No.1 Style's new-actress series (SSNI) and quickly became an exclusive performer for S1, releasing titles under the SSNI, SSIS, SONE, and OFJE labels. She renamed herself 汐世 (Shiose) in December 2021 and then adopted her current name 凪ひかる (Nagi Hikaru) in November 2022 after moving to Eightman Production. Under all three names she has remained active exclusively within the S1 No.1 Style label ecosystem, accumulating over 56 owned titles as of mid-2026. She is known for her J-cup figure and is currently (2026) appearing in S1 compilation and feature releases under the name 凪ひかる."
