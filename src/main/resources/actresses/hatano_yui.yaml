  legacy: "Yui Hatano stands as one of the defining figures of the mid-career freelance
    AV model — an actress who outlasted a major-label exclusive contract to build
    a decade-plus freelance portfolio spanning virtually every significant studio.
    Her over-3,000-title catalogue, consistent chart performance, international crossover
    appeal, and two consecutive wins of the SKY PerfecTV! Most Appearances Actress
    Award place her among the most statistically significant performers in the industry's
    history. The nickname 'Sekai no Hatano' is a genuine reflection of her reach
    across Japanese, Chinese, and Western fan communities."

