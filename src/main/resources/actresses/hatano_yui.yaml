  biography: "Yui Hatano (波多野結衣; born May 24, 1988 in Kyoto, raised in Okayama)
    is one of the most prolific and internationally recognized AV actresses in Japanese
    adult video history. A cosmetology school graduate who had initially considered
    a gravure idol career, she was scouted at age 19 and made her AV debut on July
    3, 2008 under the ZERO label of Prestige. She left her Prestige exclusive contract
    in October 2009 and worked as a freelance actress across dozens of major studios —
    including Prestige, h.m.p., Befree, Attackers, MOODYZ, and Soft on Demand —
    eventually amassing over 3,000 titles and earning the nickname 'Sekai no Hatano'
    (世界の波多野, 'The World's Hatano') for her global fan base. She has been a member
    of the idol group T♡Project and has been represented by talent agency T-Powers
    since at least 2019. Her mainstream crossover work includes appearances in theatrical
    films, and she has consistently ranked among the top performers on annual DMM sales
    charts. As of early 2026 no retirement has been announced."
