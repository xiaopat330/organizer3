  biography: "Mio Sakura (桜みお) is a Japanese AV actress born on June 30, 2001 in Shiga Prefecture. After high school she entered a four-year nursing program and worked as a nurse for approximately two years before leaving the profession. She debuted under S1 NO.1 STYLE in November 2025, marketed as an active nurse, with her debut work taking a mockumentary documentary format; she later clarified in interviews that she had already retired from nursing and the hospital setting was a studio set. Her debut title charted repeatedly on the FANZA rental floor weekly ranking, reaching as high as 2nd place for multiple consecutive weeks in early 2026. All seven of her S1 titles carried a nurse motif across mockumentary and drama formats. From July 2026 she transferred exclusively to Attackers."
