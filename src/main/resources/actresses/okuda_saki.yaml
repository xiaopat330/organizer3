  biography: "Saki Okuda (奥田咲) is a Japanese AV actress from Chiba Prefecture, born June 15, 1992, known for her petite 148 cm frame combined with an exceptionally large H-cup bust. She entered the industry at 19 and made her AV debut in June 2011 as an exclusive for Alice Japan, where she was also a member of the label's idol unit アリスた～ず★. After graduating from Alice Japan in January 2013 she briefly joined E-BODY (February–July 2013), then signed as an exclusive with S1 No.1 Style from August 2013 — a tenure that reached its 10th anniversary in 2023, making her only the third S1 actress in history to achieve that milestone. Alongside her AV career she has appeared in mainstream pink films, stage productions (including founding and producing the theater group どんどんチェリー in 2018), and various mainstream media appearances. She has maintained consistent top-100 placements in FANZA annual rental rankings every year from 2014 through 2025."
