  biography: "Risa Tachibana (橘梨紗) is a former Japanese AV actress, active for a single high-profile year in 2013 as an exclusive performer for SOD Create. Billed as a former national idol and ex-idol-group member, she debuted on 7 February 2013 with 「橘梨紗 AV debut」, which topped DMM's monthly DVD ranking and put her at No. 1 on DMM's monthly actress ranking; a first photobook, Growing, was released the same day. Known for her looks, full hips and an air of innocence (F-cup), she won the Best Actress award at the 64th SOD Awards for 2013. A planned June title (「橘梨紗 緊縛中出し」) was cancelled by the maker, and she retired in August 2013 with the release 「橘梨紗 引退」. Born 18 May 1993 in Yamanashi Prefecture, she stands 162 cm; as of 2024 all of her titles are out of distribution."
