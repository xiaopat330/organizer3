  biography: "Noa Araki (新木希空) is a Japanese AV actress and gravure idol born October 10, 2004 in Yamanashi Prefecture. She made her gravure debut in the February 11, 2025 issue of Weekly FLASH magazine, then made her AV debut with S1 NO.1 STYLE on March 25, 2025 while still an active university student. Her debut title 'Diamond Newcomer NO.1 STYLE' charted #1 on the FANZA video floor ranking in its third week and became a consistent top-10 performer throughout 2025. She is affiliated with the talent agency Esflaart and is close friends with fellow 2025 S1 debutantes Yuka Miyoshi and Sakura Kawaguchi, the three being nicknamed 'Esflaart Three Sisters.'"
