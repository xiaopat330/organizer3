  biography: "Hoshino Miyu (ほしのみゆ) is a retired Japanese AV actress active from 2006 to 2011. She began as a prolific kikaku-tanpai (planning-solo) actress appearing across many makers, became an exclusive actress for Max-A in August 2008, then moved to PREMIUM (its Glamorous line) in April 2009. Petite at 155 cm with an E-cup, she was a fixture of the idol photo-session circuit — nicknamed the Photo-Session Queen (撮影会女王) for her near-monthly studio events — and was nominated for Best Actress at the 2009 SKY PerfecTV! Adult Broadcasting Awards. She retired with her final PREMIUM release on 7 September 2011. She was born 5 May 1987 in Aomori Prefecture."
