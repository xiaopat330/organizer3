  biography: "Sumire Kurokawa is a Japanese AV actress from Shiga Prefecture who debuted in AV in October 2010, initially working under multiple stage names before settling on 稲川なつめ (Natsume Inagawa) from 2011 to 2013. After a brief period as a stripper at Shinjuku New Art in late 2013 she took a hiatus from AV work. She returned to AV in 2018 under her current stage name 黒川すみれ, signed with the agency Mines (マインズ), and has remained prolific across a wide range of labels including DASS, MIAA, MEYD, and many others. In 2020 she briefly used the name 西田那津 (Nishita Natsu) after moving to Life Promotion, but returned to 黒川すみれ later the same year. She ranked 15th in the FANZA 2023 annual AV actress ranking and 16th in the 2023 first-half ranking."
