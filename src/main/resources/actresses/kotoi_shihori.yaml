  biography: "Shihori Kotoi (born April 7, 1992, Mie Prefecture) made an unusually late AV debut at age 27 on August 19, 2019, with S1 No.1 Style while reportedly continuing to work a regular day job in parallel. In April 2020 she transferred to Attackers as an exclusive, where a 2020 release became a major hit later featured on TV Asahi's 'Midnight Ravers' programme. In May 2022 she announced her retirement via Twitter, with her final release following in June 2022. Her roughly three-year career spanned two of the industry's most prominent studios."
