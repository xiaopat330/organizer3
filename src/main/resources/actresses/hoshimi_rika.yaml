  biography: "Rika Hoshimi (星美りか) is a Japanese former AV actress and gravure idol born on September 20, 1990, in Numazu, Shizuoka. She began her career as a gravure model, debuting on video in May 2010 with the non-nude release Emanechio filmed in Bali, before switching to the adult video industry in September 2011 with her AV debut through MUTEKI. She became an exclusive actress for Idea Pocket from 2012 to 2014, then transferred to K.M. Produce (Million label) where she remained until her retirement in December 2016; she also appeared in mainstream films and on TV variety programs during her active years."
