  legacy: "仁科百華 was notable in the early 2010s for combining a statuesque 166 cm
    frame with a J-cup figure, and for an unusually diverse side-career spanning idol
    group membership, flute performance, and stunt training. Her subsequent appearances
    in pink film and mainstream Japanese cinema after retirement demonstrated a broader
    range than most of her contemporaries."

