  biography: "仁科百華 (Nishina Momoka) is a Japanese former AV actress born May 24,
    1991, in Tokyo. She debuted in the AV industry in October 2010, building a following
    for her J-cup bust and 166 cm height — an unusually tall figure that distinguished
    her among contemporaries. Beyond AV, she was a singer and member of the idol units
    OFA☆21 and BRW108. Her special skills include playing the flute and stunt acting;
    her hobbies are cooking, listening to music, and playing games. She is a fan of
    L'Arc〜en〜Ciel, X JAPAN, and VAMPS. She announced her retirement from AV on
    May 28, 2013. She subsequently appeared in the January 2013 pink film Hitozuma
    sekando bājin watashi o osotte kudasai (co-starring Nana Nanami, directed by Hideo
    Jōjō) and the November 2013 feature film Sunk into the Womb."
