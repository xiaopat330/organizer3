  biography: "Kizuna Sakura (佐倉絆) is a retired Japanese AV actress and former gravure idol born on May 30, 1989 in Ashikaga, Tochigi. She began her entertainment career at the Akihabara maid café @ほぉ〜むカフェ before transitioning to idol activities as a member of SIR (サンスポアイドルリポーター) from late 2011. After graduating from SIR in January 2014, she announced her AV debut in July 2014, signing an exclusive contract with million (ケイ・エム・プロデュース) and joining the AV unit ミリオンガールズZ alongside Rika Hoshimi and others. Over her six-year AV career she received numerous industry awards including the スカパー!アダルト放送大賞 Saizō Prize (2015), the 30th Pink Prize New Actress Award (2018), the 31st Pink Prize Supporting Actress Award (2019), and the スカパー!アダルト放送大賞 Actress Award (2020). She formally retired on March 31, 2020 and subsequently launched a ramen restaurant business."
