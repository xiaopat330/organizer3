  legacy: "One of million/KMP's signature exclusive actresses of the mid-2010s, Kizuna Sakura was known for her genuine enthusiasm for the industry and her distinctive oral skills (dubbed '国宝級舌技'). Her transition from Akihabara maid café worker and idol to AV actress, and later to entrepreneur, made her an unusual multi-phase public figure."

