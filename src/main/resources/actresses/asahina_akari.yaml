  biography: "Akari Asahina (朝日奈あかり), born May 30, 1988 in Gunma Prefecture, debuted on December 12, 2008 under Alice JAPAN with the title 「純白の果実」 after being scouted. She became one of Alice JAPAN's flagship exclusive actresses for over five years, releasing titles primarily under that label while also appearing on Max-A. In February 2014 she transferred to Idea Pocket. She retired in March 2015 following the release of「タイトスカート塾講師 朝日奈あかり」. Her nickname was ひなっち, and her special skill was basketball. She was affiliated with the talent agency ティーパワーズ (T-Powers). Beyond AV, she appeared in the TV drama Jōō Virgin (テレビ東京, 2009) and Ushijima the Loan Shark Season 2 (MBS, 2014)."
