  biography: "Sora Amakawa (born October 10, 1998, Tokyo) debuted as an S1 No.1 Style exclusive actress in November 2019 under the SSNI label, entering the industry at age 21. Her tall frame (165 cm) and F-cup figure made her an immediate standout among the S1 newcomer class. In July 2020 she transferred to FALENO (Faleno Star — FSDSS), which was then one of the fastest-rising premium labels in the industry, having launched in 2018 under SOD. Her hobbies are listed as shopping and cooking, and she is noted for her flexibility. She has remained active at FALENO through the mid-2020s."
