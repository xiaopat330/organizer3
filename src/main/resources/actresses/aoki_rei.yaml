  biography: "Rei Aoki (青木玲) debuted in October 2003 as a KUKI exclusive actress with 'Natural Beauty', and in January 2004 made her sell-through debut under MOODYZ. She briefly retired in 2005, returned in September 2007 for MOODYZ, and announced full retirement in April 2008 before resuming activity again in winter 2008. She worked across a wide range of labels for over a decade — including Attackers, Madonna, VENUS, and many others — before becoming a Madonna exclusive in January 2019. Her hobbies and specialties include cooking, napping, and badminton. She was affiliated with Prime Agency (プライムエージェンシー)."
