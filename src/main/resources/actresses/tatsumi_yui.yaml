  biography: "Yui Tatsumi (辰巳ゆい) is a Japanese actress and talent, and a former AV actress and race queen from Gifu Prefecture. She debuted in adult video in January 2008 as an exclusive actress for Alice JAPAN and, unusually, remained a single-studio Alice exclusive for her entire AV career, releasing roughly monthly through to 2015 (managed by At Honeys). Tall at 168 cm, she announced her retirement on her blog on 4 November 2014 and bowed out with a January 2015 DVD. After retiring she continued as a mainstream actress and talent, appearing in films, V-Cinema, stage plays, TV dramas and pink films (notably a long run with OP Pictures). Born 8 June 1984, she returned to image-video nude work in 2025 to mark her 40th birthday."
