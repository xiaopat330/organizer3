  biography: "Airi Kijima (希島あいり) is a Japanese AV actress, model, and singer from
    Tokyo who spent over a decade as one of Idea Pocket's most prominent exclusive
    talents. Before her AV debut she worked as a model and hair designer. She made
    her AV debut in August 2013 as an Idea Pocket exclusive, and prior to that had
    already joined the entertainment idol group Ebisu Muscats on October 6, 2012. On
    February 4, 2015 she debuted as a singer with Milky Pop Generation. In 2021 she
    was elevated to Premium Exclusive status at Idea Pocket, recognizing her seniority
    and consistent popularity within the label. Her outside interests include reading,
    cooking, and dance, and she is skilled at guitar, songwriting, and basketball.
    On December 20, 2024 she announced via social media her retirement from AV, with
    her final work scheduled for August 2025."
