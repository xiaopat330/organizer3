  awards: []
  legacy: "Kijima Airi's twelve-year run as an Idea Pocket exclusive made her one
    of the label's longest-tenured performers, a rare example of actress and studio
    growing together over an extended arc. Her multi-disciplinary presence — spanning
    AV, idol group membership (Ebisu Muscats), and a singer debut — positioned her
    as a versatile entertainment figure at a time when cross-genre activity was expanding
    for AV actresses."

