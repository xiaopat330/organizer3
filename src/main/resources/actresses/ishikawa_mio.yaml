  biography: "Mio Ishikawa (石川澪) is a Japanese AV actress born on March 20, 2002, signed to talent agency Production ALIVE. She debuted in October 2021 under the tagline 'an ordinary college student' with MOODYZ as her exclusive studio, and her debut title immediately topped the FANZA weekly and monthly digital video rankings. Her debut work was later cited by Shūkan Playboy as the best-selling MOODYZ title of 2021. In 2022 she served as campaign girl for FANZA's spring campaign, released her first image video and photobook ('unusual'), and won the Grand Prix at the Asahi Geinō AV Awards 2022. She has remained an exclusive actress at MOODYZ continuously since her debut and is one of the studio's most prominent current talents."
