  biography: "Iga Mako chose her stage name from two fictional sources she loved — the 伊賀 ninja of the manga Basilisk: Kouga Ninpo Chou, and the character Mako Mori from the film Pacific Rim. Before her AV debut she appeared in Shogakukan's Weekly Post (January 11, 2019 issue) in its 'First Nude' (初脱ぎ) feature. She debuted in March 2019 as an exclusive actress for S1 NO.1 STYLE with the title 『新人NO.1STYLE 伊賀まこAVデビュー』, directed by うさぴょん。, represented throughout her career by Prime Agency (プライムエージェンシー). She released a 1-year anniversary best compilation in March 2020 and published a printed photo book 『I feel good』 (G-Walk, 2020) along with a three-part autobiographical digital series. In November 2021 she transferred her exclusivity to Attackers (アタッカーズ), retiring on March 1, 2022, with her final title released the same day: 『引退 地味な医学部の女子大生と四畳半の狭い部屋でヤリまくった。』."
