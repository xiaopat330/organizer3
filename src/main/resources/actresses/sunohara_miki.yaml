  biography: "春原未来 (Sunohara Miki), born November 23, 1991 in Tokyo, made her AV debut as a kawaii* exclusive on January 25, 2012 under the PRESTIGE label with the title 新人!kawaii*専属デビュ→spring has come♪. She graduated from kawaii* in July 2012 and continued as a freelance planning actress across multiple labels, building a fanbase that placed her in the top 20 of the DMM annual AV actress rankings in 2013. She was nominated for the DMM Adult Award in 2014 and the SKY PerfecTV! Adult Broadcasting Award in 2015. On May 29, 2015 she joined the AV idol unit SEXY-J, remaining until the group's disbandment. Signed to Luminous Promotion (ルミナスプロモーション), she remained active into the 2020s, celebrating her 10th debut anniversary with a photo collection and opening a YouTube channel in February 2023."
