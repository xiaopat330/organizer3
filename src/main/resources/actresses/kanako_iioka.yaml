  biography: "Kanako Iioka is a Japanese AV actress who debuted on July 13, 2012 under the stage name 飯岡かなこ. She placed 10th in DMM's 2015 annual actress ranking before changing agencies later that year and relaunching from February 2016 under the new stage name 森沢かな (Morisawa Kana). Affiliated with T-Powers, she has built a career as a 'beautiful older sister' archetype performer specializing in mature wife, NTR, and OL roles across labels including Madonna, Attackers, Glory Quest, Celeb-no-Tomo, MOODYZ, and VENUS. She topped FANZA's 2024 first-half actress ranking and placed 4th for 2023 overall, an unusual achievement for a non-exclusive performer. She also runs two YouTube channels (sex-education and personal vlog) and was selected to the EX Girls unit (successor to the Sky PerfecTV! Adult Awards lineage) from May 2024 to March 2025."
