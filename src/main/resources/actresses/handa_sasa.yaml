  biography: "Sasa Handa (範田紗々) is a Japanese actress and talent and a former AV actress, born in Okinawa Prefecture and raised in Yokohama. She started as a gravure idol in 2002 under the name Chieri Haruyama (春山ちえり), renamed herself 範田紗々 in 2005, and gained attention as an I-cup big-bust gravure model. In July 2006 she moved to adult video as an exclusive actress for SOD Create — her releases always carried the \"芸能人\" (celebrity) tagline — and became one of SOD's most decorated stars, winning Best New Actress and multiple SOD Award acting prizes. By her retirement in July 2010 she had appeared in 52 titles, the most ever for an SOD exclusive at the time (later surpassed by Mana Sakura). Since retiring she has worked broadly as an actress and talent across film, V-Cinema, stage, radio and variety TV. Born 18 April 1985, she stands 158 cm."
