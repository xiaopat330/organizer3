  legacy: "Kaoru Yasui (安位カヲル) rose to prominence as one of the leading gravure-to-AV crossover talents of her era, achieving recognition as a 'next-generation' H-cup gravure idol before a successful AV career that spanned S1, OPPAI, and Attackers. Her SSIS series at S1 established her as a high-demand exclusive through 18 consecutive monthly releases."

