  biography: "Kaoru Yasui (安位カヲル, born December 1, 1999 in Gunma Prefecture) is a Japanese AV actress and former gravure idol who debuted in gravure in 2017 under the agency e2dive entertainment, self-applying after aspiring to become an idol. She quickly built a following through weekly Shūkan Playboy features and was selected as the 'East Yokozuna' of the magazine's 'Next Generation Gravure Body Rankings 2019'. She renamed herself from 安位薫 to 安位カヲル in September 2020 when going freelance, and made her AV debut in February 2021 via MUTEKI before joining S1 No.1 Style as an exclusive actress from April 2021 through September 2022. In September 2022 she reverted to her original name 安位薫 upon joining Bambi Promotion, then moved to OPPAI in 2023 and subsequently signed an exclusive contract with Attackers in June 2024. Outside AV she is also active as a DJ."
