  biography: "Yu Shiraishi (白石悠) is a Japanese AV actress born on December 10, 1993 in Tokyo. She debuted in June 2014 as an exclusive contract actress for S1 NO.1 STYLE, releasing her debut title 'Shinjin NO.1STYLE Shiraishi Yu AV Debut' on June 7, 2014. During her approximately one-year exclusive contract with S1 she released seven solo titles across various genres. In October 2015 she renamed herself Imamiya Nana (今宮なな) and moved agencies, continuing to appear in releases from various labels including Prestige, Glory Quest, and others through 2016. On December 7, 2016 she announced via Twitter that she had already ceased AV activity, describing her exit as a fade-out rather than a formal retirement. She closed all social media accounts in March 2017."
