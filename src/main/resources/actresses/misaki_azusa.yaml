  biography: "Azusa Misaki (岬あずさ, born August 7, 1998, Tokyo) is a retired Japanese AV actress who debuted in December 2018 on MOODYZ and kawaii*, later becoming affiliated with the talent agency アトラクティブ (Attractive). Active across numerous labels as a freelance actress, she appeared in titles for MOODYZ, SODクリエイト, Alice Japan, Dogma, Attackers, E-BODY, E-Kiss, Hunter, and many others over a prolific five-year career. She achieved mainstream AV recognition through her 2019 Rookie title 性格の天才 岬あずさ and was described by AV writer Higashikaze Katsutoshi as a 'genius of personality.' In addition to her AV work she formed the idol unit あわびスプラッシュ～in the sky～ with fellow actresses, performed solo live concerts, and became an image girl for Men's Cyzo in June 2020. She announced her retirement on November 13, 2023 via Twitter/X, staged her final industry event on March 31, 2024, and simultaneously dissolved the idol unit at a concert in Akabane; after retirement she has spoken publicly about working in production (AD) roles."
