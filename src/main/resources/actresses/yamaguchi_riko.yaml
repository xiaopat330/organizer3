  biography: >
    やまぐちりこ (stage name) is a retired Japanese AV actress, known outside the
    industry as Rina Nakanishi (中西里菜), an original founding member of AKB48's
    Team A who debuted with the idol group on December 8, 2005, and graduated in
    November 2008. After leaving AKB48 she worked briefly as a gravure idol before
    announcing her AV debut in June 2010; her debut title (DV-1184, Alice JAPAN,
    August 27, 2010) sold over 80,000 copies in its first month, an exceptional
    figure in the industry. She subsequently signed exclusively with SOD Create
    (STAR series, 2011-2012), releasing seven solo titles before retiring in
    March 2012 with a farewell work. Rights to her catalogue are held by her
    management company BELLTECH. She has a younger sister, やまぐちりく, who also
    appeared in AV. She married in November 2012 and announced the birth of a
    child in February 2013.
