  biography: "Kaname Momojiri (桃尻かなめ) is a Japanese AV actress and gravure idol born on 8 August 2000 in Kyoto Prefecture, represented by the talent agency Eightman. She debuted as a gravure model in October 2019 in Weekly Playboy and made her AV debut in May 2020 as a FALENO Star exclusive (code FSDSS-043), one of the most prominent new labels of the late 2010s under the SOD group. She rose quickly to commercial prominence: her co-starring title with Yume Nikaido (FSDSS-169) ranked third in FANZA's 2021 first-half sales ranking and was cited as FALENO's top-selling title of 2021 by Weekly Playboy. She ranked 24th in Kobunsha FLASH magazine's 2021 sexy actress rankings. After concluding her FALENO exclusive run in early 2023, she moved to the Fitch label under WILL, continuing to release titles through the JUFE code."
