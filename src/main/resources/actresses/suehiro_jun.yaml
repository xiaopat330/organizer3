  biography: "Jun Suehiro (末広純), born January 10, 2000 in Yamanashi Prefecture, is a Japanese AV actress who debuted on April 12, 2022 as an exclusive with Madonna. Her stage name was suggested because staff told her she resembled actress Ryoko Hirosue (広末涼子), a connection that was also noted when she appeared on variety programs. Prior to her AV career she worked as a cook (調理師) but left because the wages were too low to afford living independently. After five months at Madonna — during which she built a reputation for drama roles, particularly as a young wife — she moved to a non-exclusive (企画単体) career from August 9, 2022, subsequently appearing across dozens of labels including MOODYZ, Attackers, Alice Japan, h.m.p, and many others. She rose rapidly in FANZA rankings, placing first in the rental floor monthly actress ranking for April 2023, and finished 11th in FANZA's annual actress ranking for 2023. She is a passionate Yokohama DeNA BayStars fan and is managed by the talent agency LIGHT."
