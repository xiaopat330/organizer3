  legacy: "Jun Suehiro is one of the fastest-rising freelance actresses of the mid-2020s, known for her petite physique, prominent figure (especially hips), and versatility across drama, NTR, and comedy genres. Her rapid ascent to top-10 FANZA rankings within a year of leaving her exclusive contract marks her as one of the most commercially successful non-exclusive actresses of her generation."

