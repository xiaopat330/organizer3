  biography: "Koharu Suzuki (鈴木心春) is a retired Japanese AV actress born on December 1, 1993 in Kanagawa Prefecture. She debuted in March 2013 with Candy, where she was promoted alongside three other actresses under the 'Suzuki sisters' (鈴木心4姉妹) campaign. After passing through D☆Collection and MOODYZ, she returned to kawaii* in October 2015 and later signed an exclusive contract with S1 (エスワン) from December 2017. She retired in July 2018, having been managed throughout her career by Capsule Agency (カプセルエージェンシー). Off-screen, she was known for her flexibility from rhythmic gymnastics training, her love of modern Japanese literature (favouring Osamu Dazai), and a meticulous approach to physical conditioning."
