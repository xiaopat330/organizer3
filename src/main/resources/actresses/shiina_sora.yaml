  biography: "Sora Shiina (real name Natsuki Asano, born July 7, 1994) is a Japanese
    AV actress from Aichi Prefecture who studied photography at a vocational school
    and worked as a camera assistant before her industry debut. She made her AV debut
    as an exclusive with ナンパJAPAN on October 25, 2015, transitioning to prolific
    multi-label planning work across 2016–2018 before signing a double exclusive with
    MOODYZ and ワンズファクトリー in December 2018. In May 2020 she transferred to FALENO
    as an exclusive, with her last known new release in August 2021; as of late 2023
    she had not formally announced retirement or hiatus, and has channelled creative
    energy into a new-generation AV production project (そらプロ) and her apparel
    design career under the name natsuki asano. Openly bisexual and known for genuine
    lesbian content alongside her heterosexual work, she was nominated for DMM/FANZA
    best actress awards three consecutive years (2016–2018) — a first at the time —
    and won the AV OPEN 2017 fan-vote actress award."
