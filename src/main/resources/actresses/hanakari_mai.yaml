  biography: "Mai Hanakari (花狩まい, reading: かがり まい) is a Japanese AV actress and illustrator born on November 20, 2000 in Aomori Prefecture. She debuted in April 2021 with MOODYZ and gained rapid attention when her second release became a long-running hit, launching her career as a prolific solo and ensemble performer. Known for her fair skin and versatile screen presence, she has appeared across a wide range of genres from schoolgirl roles to married-woman scenarios, cementing her status as a leading enterprise-single actress. Outside of AV, she operates a YouTube channel covering gambling (pachinko, pachislot, mahjong) and also works as an illustrator. In 2022 she placed 49th in Asahi Geino's annual AV actress ranking, rising to 31st in 2023, reflecting growing fan recognition driven by her high output and range."
