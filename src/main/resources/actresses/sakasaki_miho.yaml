    exclusive contracts with S1 (from October 2013) and Million (July–December 2014),
    she continued as a freelancer under the name "Mihono" before announcing retirement
    in March 2016 and subsequently becoming active as a cosplayer under the name Sakura
    Mei (桜めい). She returned to AV in September 2017 under her current stage name 坂咲みほ.
