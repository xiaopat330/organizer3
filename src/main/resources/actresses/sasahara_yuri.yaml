  biography: "Yuri Sasahara (born August 15, 1992 in Tokyo) is a Japanese AV actress who debuted in April 2016 as an Idea Pocket exclusive, promoted with the hook of being an active voice actress. Her debut title FIRST IMPRESSION 95 highlighted this background, and she continued releasing exclusive content through Idea Pocket before branching out to a wide range of studios including Attackers, Madonna, Prestige, and many others. She is affiliated with talent agency Prime Agency (later GG). In December 2022 she entered a DMM GAMES voice actress audition (Crimson Youma Taisen new character VA public audition), underscoring her ongoing interest in voice performance. Her hobby is drawing."
