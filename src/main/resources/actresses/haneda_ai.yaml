  biography: "Ai Haneda (羽田あい) is a Japanese AV actress and former gravure idol born 22 September 1989 in Tokyo. She debuted in image DVDs in April 2008 under SOD Create's Glamorous Candy label, releasing eight gravure DVDs over two years before transitioning to adult video. Her AV debut came on 18 February 2010 with SOD Create (STAR label), where she quickly earned recognition — winning the 9th SOD Grand Prize Best Actress award in 2010 and the SKY PerfecTV! Adult Broadcasting Grand Prize Rookie Actress award in 2011. In mid-2012 she moved to Idea Pocket (IPZ/IPTD labels) as an exclusive contract actress, continuing through 2014. After a hiatus she returned to SOD Create in July 2018 for a re-debut. She is known for her tall (170 cm), slender figure and wide-ranging performance style across scenario and concept-driven works."
