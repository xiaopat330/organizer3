  biography: "Meguri Minoshima (美ノ嶋めぐり) is a Japanese AV actress born on December 8, 2001 in Nara Prefecture, affiliated with the talent agency LINX. She debuted on May 21, 2021 as a Prestige exclusive under the ABW flagship line, making her industry entry at age 19. Throughout the ABW era (2020–2023) and its successor ABF label (from July 2023), she established herself as one of Prestige's prominent exclusive actresses, known for her slim 156 cm figure, E-cup bust, and natural, photogenic appeal. Following her Prestige exclusive period she has appeared across multiple labels including Madonna (JUR), Das! (DASS), and various independents, demonstrating a successful transition to a broader multi-label career. She remains active as of 2026, with over 70 titles in her catalog."
