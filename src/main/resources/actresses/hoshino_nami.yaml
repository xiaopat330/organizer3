  biography: "星野ナミ (Hoshino Nami) is a Japanese AV actress born July 3, 1992,
    in Fukuoka Prefecture. She began her career as a model before debuting as an exclusive
    AV actress with h.m.p in August 2012. She received a nomination for the Skyperfect
    Adult Broadcasting Awards 2013 Newcomer Actress Award. In August 2013, she transferred
    to S1 No.1 Style as an exclusive actress, one of the most prominent labels in
    the industry. Alongside her AV career she has been a member of the idol variety
    unit Ebisu★Muscats and the group BRW108. Her special skill is juggling; her
    hobbies include cooking."
