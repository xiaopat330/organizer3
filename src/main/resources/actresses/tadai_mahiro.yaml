  biography: "Tadai Mahiro debuted in gravure on April 16, 2018, appearing in a nude spread in Shueisha's Weekly Playboy No. 18 under the name 'まひろ'. She transitioned to AV on May 14, 2018, adopting the stage name 唯井まひろ and signing exclusively with SOD Create under the SODstar label; her debut title 'SODstar 唯井まひろ 18歳 AV DEBUT' was the first SOD Blu-ray debut release since September 2014. She swept the newcomer awards season: she won Best Newcomer at the スカパー!アダルト放送大賞 2019 (March 12, 2019), shared the 最優秀新人賞 at SOD AWARD 2019 with 本庄鈴 (March 21, 2019), and received the 話題賞 at the FANZA Adult Award 2019 (May 12, 2019). Alongside her AV career she built a substantial presence as a YouTube gaming streamer, operating the channel 'まひろにあ帝国' with a focus on League of Legends; she reached top ranking among Japanese LoL streamers while disabling donation features. She has continued releasing titles exclusively with SODstar through at least 2025, holding anniversary events annually in Tokyo."
