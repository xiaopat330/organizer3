  biography: "Honoka Tsujii is a Japanese AV actress from Tokyo who debuted in March 2019 with Prestige after leaving a six-year career as a hairstylist. Standing 172 cm tall with a notably large bust, she became known as a 'tall big-breasted' actress and quickly built a prolific cross-label filmography spanning Prestige, MOODYZ, Attackers, Madonna, Alice Japan, and many other studios. She placed second in the FANZA monthly actress ranking in October 2020 and was named Valuable Actress of the Playboy Channel at the Skyperfect Adult Broadcasting Awards 2022. In February 2023 she sustained serious facial injuries in a traffic accident requiring three months of recovery. She received additional recognition at the Adultopia adult entertainment awards in Taiwan in March 2026, winning Best Adult Actress. In May 2026 she suffered a serious left knee injury (complete tears of the MCL and ACL plus a meniscus injury) while playing basketball, leaving her acting schedule indefinite."
