  biography: "Suzu Matsuoka (松岡すず) is a Japanese AV actress born on August 11, 1995 in Kyoto Prefecture. She is a graduate of a well-known private university in the Kansai region (literature faculty) and prior to her AV debut worked at a steel trading company in a specialized division handling molybdenum and forged products — an experience that inspired her stage name (鈴/すず, read as tin or bell). She debuted at Prestige in May 2020 under an exclusive contract, quickly establishing herself as one of the studio's flagship ABW-label performers. In July 2022 she moved to the boutique label KANBi, where she has remained one of its primary exclusive actresses. She holds certifications in English, French, and Korean, as well as secretarial and real estate qualifications. She ranked 13th in Asahi Geino's 2023 AV Actress Sexy Election and 17th in the 2024 edition."
