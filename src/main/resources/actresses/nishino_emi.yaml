  biography: "Emi Nishino (西野絵美, にしの えみ) is a Japanese AV actress born on September 6, 1999, in Tokyo, represented by the Attractive (アトラクティブ) talent agency. She debuted in August 2022 as an exclusive actress at PREMIUM, where she released several titles under the character concept of a former regional TV announcer (元地方局アナウンサー). In late 2023 she began releasing titles for Attackers (アタッカーズ), and has since expanded across a wide range of independent and major labels, establishing herself as one of the most prolific and highly-ranked freelance actresses active in the mid-2020s. Her G-cup figure, acting ability, and consistent high performance on FANZA rental charts — including a No. 1 weekly ranking in November 2024 — have driven rapid recognition. She has also branched into adult film acting and live performance, appearing in the 2023 film 変態の季節 and performing as a singer at a live event in June 2024."
