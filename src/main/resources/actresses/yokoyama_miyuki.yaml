  legacy: "Miyuki Yokoyama was one of kawaii*'s standout exclusive actresses of the late 2000s, known for her energetic personality and mainstream crossover appeal through television appearances (嬢王 Virgin, 闇金ウシジマくん, ゴッドタン) and membership in 恵比寿マスカッツ."

