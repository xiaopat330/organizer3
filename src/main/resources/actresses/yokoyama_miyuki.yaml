  biography: "Miyuki Yokoyama (横山美雪) is a retired Japanese AV actress and talent from Tokyo, born November 15, 1989. She debuted in August 2008 as a kawaii* exclusive under a 24-title contract, quickly building a following for her slender figure and outgoing personality; she was a 5th-generation regular member of the idol group 恵比寿マスカッツ from October 2010. After graduating from kawaii* in July 2010 she moved to Idea Pocket, then to SOD Create in June 2011, and finally to Maxing in July 2012. She announced her AV retirement on her blog on November 30, 2014, and held a final fan event in Akihabara on March 29, 2015. She received the 23rd Pink Grand Prix Best New Actress Award. After retirement she continued talent and DJ activities under the name 'DJミー a.k.a. Miyuki Yokoyama' before announcing the full end of her public activities on February 19, 2017."
