  biography: "Tachibana Kurara debuted on June 15, 2007, with the title 'New Comer' on the MAX-A label, entering the industry with an F-cup bust as her primary marketing hook — the follow-up title 『超美乳』 (Super Beautiful Breasts) released on Alice Japan in July 2007 emphasising the same appeal. All documented AV work falls within a six-month window: MAX-A released five solo or group titles between June and October 2007, while Alice Japan ran three parallel exclusive-level titles from July through November 2007 — a dual-label arrangement common for MAX-A actresses of the era given the close relationship between the two imprints. Her last known AV release, 『高速ピストンとカメラ目線』 on Alice Japan, appeared on November 23, 2007. No retirement announcement was found, and no AV releases have been traced beyond that date. She surfaced again in April 2021 as the subject of a gravure digital photo book, 『DokkiriQueen 橘くらら』, published by TIM Corp. and available on Sony Reader Store, honto, and other e-book platforms."
