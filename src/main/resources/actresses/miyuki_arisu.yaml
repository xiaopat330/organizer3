  biography: "Arisu Miyuki (美雪ありす) is a retired Japanese AV actress from Hokkaido, born 25 April 1987 (A blood type, 167 cm tall, E-cup). Before AV she worked five years as a local Hokkaido model, with a three-and-a-half-year regular slot on an information TV program plus CM and corporate-poster work (including the 「白い恋人」 confection). She made her AV debut in December 2010 with Alice Japan's 『White Love』, becoming the first actress Alice Japan signed exclusively to carry the company's own 'Alice' name. In November 2012 she transferred to Idea Pocket as an exclusive actress, where she spent the rest of her career. She announced her retirement on her personal blog on 31 July 2015, with final releases running through late 2015, and is affiliated with the Fantasista agency."
