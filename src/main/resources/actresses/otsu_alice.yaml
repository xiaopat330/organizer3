  biography: "Otsu Alice is a Japanese AV actress from Chiba Prefecture who debuted in May 2013 under the name Seina Arisa as a lori-type performer with Five Promotion. She renamed to Mizushima Arisu in July 2016 after joining agency DINO, and became active in the idol group Marshmallow 3D+ (as Marshmallow Soda) from October 2016, eventually becoming group leader in 2019. Following a second agency change, she debuted her current name Otsu Alice at a renaming party in Shinjuku on September 26, 2020, simultaneously joining El Promotion. Beginning in 2021 she underwent a physical transformation — blonde hair and surgical breast augmentation — that preceded a major commercial breakthrough in 2022, during which she shot over 200 titles in a single year and entered FANZA's top-10 actress rankings. From August 2025 she became an exclusive actress for the IROKE label under million (KM Produce), while publicly affirming she has no plans to retire."
