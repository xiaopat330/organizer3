  legacy: "Otsu Alice is notable as a late-blooming actress who reinvented herself three times across a 12-year freelance career — cycling through three stage names and two dramatic persona overhauls — before her blonde gyaru persona and augmented figure drove a mainstream breakthrough in 2022 and a first exclusive studio contract in 2025."

