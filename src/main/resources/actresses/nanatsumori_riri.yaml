  biography: "Riri Nanatsumori (born November 11, 1995 in Tokyo) is a Japanese AV actress of Japanese-Filipino heritage, represented by T-Powers. Before her AV debut she worked as a fashion reader model under the name Matsumoto Suzuka, appearing as a CHOKi CHOKi girls exclusive model and co-hosting the TV Asahi music program Musicる TV. She debuted with S1 NO.1 STYLE on August 19, 2020; pre-orders for her debut title immediately topped FANZA's weekly physical AV ranking, and her debut work went on to rank first in Asahi Geinō's 2020 annual AV sales chart. She has remained an S1 exclusive across the SSNI, SSIS, and SONE label eras and continues to release titles as of 2026."
