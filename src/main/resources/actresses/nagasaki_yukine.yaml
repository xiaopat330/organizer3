  biography: "那賀崎ゆきね (Yukine Nagasaki) is a Japanese AV actress born on June 27, 1998, who debuted in April 2024 at age 25 under the agency LINX. Her debut title, 'Shinjin Nagasaki Yukine AV Debut,' marked her entry into the industry, and she quickly built a catalog spanning multiple labels including ADN, JUQ, NGOD, and PRED. Known for her slim build and mature persona, she has appeared in NTR, married-woman (hitozuma), and drama-themed productions. Outside of performing, her stated hobbies include bouldering, watching films, and traveling. She is active on X (Twitter) as @nakasakiyukine and maintains an official profile through the LINX agency."
