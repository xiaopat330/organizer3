  biography: "Tia (ティア), born September 23, 1991 in the United States, is a Japanese–American half-actress, gravure idol, talent, and YouTuber who was active as an AV actress from 2010 to 2018. She debuted in April 2010 under the image name Meisa Kurokawa (黒川メイサ), and made her AV debut in September 2010 under the same name through Natural High. From 2011 she also worked under the name Arisu Asama (浅間アリス) for various planning labels. In June 2012 she re-debuted under the stage name 'Tia' as an E-BODY exclusive, gaining wide recognition for her exotic H-cup figure and pronounced waist-to-hip ratio. She became an S1 exclusive from May 2013 to September 2015, one of that label's flagship performers during the period. After her S1 contract ended she returned to E-BODY before moving to Idea Pocket (November 2016), then briefly to Attackers, Das!, Rookie, and finally Madonna, where her final AV title released in January 2018. She was also a member of the gravure unit Ebisu Muscats from September 2015, graduating in December 2017. Post-retirement she has continued as a talent, model, and entrepreneur (RedDragon bar, Roppongi), and runs a YouTube channel (THIS IS TIA)."
