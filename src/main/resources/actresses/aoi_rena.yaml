  biography: "Rena Aoi (born March 19, 1996, Saitama Prefecture) debuted on July 25, 2015 under kawaii label using only the name 'Rena', presenting herself as an amateur. After a brief hiatus in mid-2017, she returned in September 2017 under the stage name 'あおいれな' after joining talent agency Mine'S. Between April 2019 and January 2020 she operated a second persona 'くろいれな' (Rena Kuroi), a deliberately raunchier alter ego with its own AV credits, while also performing as herself. She won the SOD AWARD 2019 Best Actress prize and was nominated for the スカパー!アダルト放送大賞 2020. On July 18, 2021 she announced her retirement from AV acting by year-end, subsequently transitioning to work as an AV director under the Mine'S umbrella."
