  biography: "Miyuki Arisaka (有坂深雪) is a former Japanese AV actress born January 7, 1998 in Tokyo. She debuted in November 2017 as an exclusive actress under the Premium label, marketed as a legendary 19-year-old newcomer. In July 2018 she left her exclusive contract and became a freelance actress. In late 2019 she announced a hiatus from new filming (while continuing event appearances), then returned on June 11, 2021 with a new exclusive double contract under E-BODY and Das! (ダスッ!). On April 1, 2022 she announced via Twitter that she would retire from AV acting and leave her agency Attractive (アトラクティブ) effective May 31, 2022."
