  biography: "Suzume Mino (美乃すずめ) is a Japanese AV actress and gravure idol from
    Hyogo Prefecture, affiliated with talent agency Eightman. She made her gravure
    debut in August 2019 in the Weekly Post nude gravure series 'なを。', then transitioned
    to exclusive AV work with FALENOstar — the star label of streaming-focused AV
    maker FALENO (distributed via U-NEXT) — debuting in October 2019. Her measurements
    (B93G–W60–H89 at 163 cm) quickly established her as a 'goddess' archetype within
    the premium streaming AV market, and FALENOstar released approximately 15 exclusive
    titles during her tenure. In February 2021 she transferred to DAHLIA, a new streaming-focused
    maker launched with the concept of 'refined women' (淑女). A licensed dietitian
    outside the industry, her hobbies include cooking, and her athletic skills include
    double jump rope and track and field."
