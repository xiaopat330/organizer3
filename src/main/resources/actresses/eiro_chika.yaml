  biography: "Chika Eiro (絵色千佳) is a retired Japanese AV actress from Akita Prefecture, active from 2010 to 2012. In May 2010 she debuted as the first exclusive actress for the EROTICA label (Japan Home Video); her stage name was chosen through a public fan naming campaign as a play on the label name, reading as 'E(i)ro-chika.' Before her debut she had been active online under the name Erika. After her initial exclusive run she also worked as a freelance kikitan (planning-single) actress across many studios including Prestige, MOODYZ, Peters, K.M.Produce, and Dogma. She won the Cyzo Award at the 2012 Skyperfect TV Adult Broadcasting Awards and placed 9th in the AV30 30th-anniversary popularity poll. She stopped appearing publicly after February 2012 and quietly went into retirement with no formal announcement from her agency or label."
