  legacy: "Eimi Fukada is the defining figure of the social-media-native generation of AV actresses, demonstrating that an AV career could serve as a platform for genuine influencer fame rather than the reverse. Her combination of viral Twitter persona, YouTube audience of over 1.2 million, and massive Chinese-market following made her the most globally recognizable Japanese AV actress of the 2020s."

