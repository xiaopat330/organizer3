  biography: "Eimi Fukada is a Japanese AV actress, entrepreneur, and YouTuber from Tochigi Prefecture who initially debuted under the idol name Amami Kokoro (天海こころ) with SOD Create in February 2017, then reinvented herself as Eimi Fukada in November 2018 following a surgery hiatus. She built one of the largest social media followings of any AV actress — over 1.2 million YouTube subscribers, 37.4 million Twitter followers, and 1.34 million Weibo followers — gaining particular traction in Chinese-speaking markets. During a peak freelance period around 2021 she worked under a WILL Group contract reportedly covering 144 titles annually, before moving to exclusive contracts with MOODYZ (2021–2022) and FALENO (2023–2024). Beyond AV she opened a medical aesthetics clinic in 2020 and published a book through Kodansha; her FALENO contract concluded in late 2024 and as of early 2026 no new titles or retirement announcement has been made."
