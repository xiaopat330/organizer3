  legacy: "Fuyutsuki Kaede was one of the few AV actresses of her generation to sustain exclusive contracts across four major studios over a decade-long career, demonstrating lasting appeal and professional longevity unusual in the industry. Her debut's immediate recognition at AV Grand Prix 2008 marked her as a standout newcomer, and her participation in SEXY-J reflected the broader trend of AV actresses crossing into idol music culture during the mid-2010s. Though she left the industry without a formal retirement announcement, her extensive catalog with Premium, Idea Pocket, Prestige, and MOODYZ ensures her continued presence in the archival record of 2000s–2010s Japanese adult video."

