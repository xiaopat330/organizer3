  biography: "Kaede Fuyutsuki (冬月かえで) is a retired Japanese AV actress from Osaka and a former race queen. She debuted in December 2007 as a PREMIUM exclusive with 「現役レースクイーン絶頂潮吹きAVデビュー!!」 — a debut work that won the actress-division and package-design prizes at AV Grand Prix 2008 — and her early output leaned on race-queen themes. After leaving the PREMIUM exclusive in January 2012 she appeared on Idea Pocket and Attackers (same CA/Outvision group), became a Prestige exclusive in June 2014, and finally a MOODYZ exclusive from November 2016. She was a singer-side member (No. 4) of the AV-idol group SEXY-J from late 2014 and was nominated for Best Actress at the 2015 DMM Adult Award. Born 14 September 1988 (A blood type, 163 cm, C-cup), she was managed by At Honeys then T-Powers; her new releases ceased after March 2017."
