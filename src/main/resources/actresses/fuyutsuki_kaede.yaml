    category: 最優秀女優賞 (Best Actress — nominated)
  legacy: 'A prolific GODDESS-tier former-race-queen actress (2007-2017) with a 10-year career spanning PREMIUM/Glamorous, Idea Pocket/Attackers, Prestige and MOODYZ exclusives; an AV Grand Prix 2008 winner and SEXY-J idol-group member.'

