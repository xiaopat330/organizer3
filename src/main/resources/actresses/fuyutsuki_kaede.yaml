  biography: "Kaede Fuyutsuki (冬月かえで) was born on September 14, 1988 in Osaka, Japan and made her AV debut in December 2007 as an exclusive actress for the Premium label, with her debut title earning both the Actress Award and Package Design Excellence Award at AV Grand Prix 2008. She built a long career across several major studios, progressing from Premium (2007–2011) to Idea Pocket (2012–2013), Prestige (2014–2016), and finally MOODYZ (November 2016 onward), establishing herself as a recognizable exclusive performer at each label. In December 2014 she joined SEXY-J, an idol music group composed of AV actresses, as member number 4, expanding her profile into the music sphere before her profile was quietly removed from the group in 2016. New releases ceased appearing after approximately August 2017, and while no official retirement announcement has been confirmed, she has not been publicly active in the industry since that time."
