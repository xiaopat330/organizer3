  biography: "Natsuki Maron debuted on August 13, 2019, as an exclusive actress for Idea Pocket (IPX), with her debut title tagline describing her as 'the former dancer member who caused a sensation in clubs across Japan' — widely interpreted by fans as a reference to the CYBERJAPAN DANCERS troupe, though no official confirmation has been made. She transitioned from exclusive to non-exclusive (企画単体) status in June 2020 while remaining represented by T-Powers agency. In March 2021 she moved to Clowne agency, and in May 2023 she joined Arrows, simultaneously adopting the stage name 夏夜える (Natsuyo Eru). She returned to the Natsuki Maron name in March 2024 upon joining NAX agency, then departed NAX in August 2024 to become freelance. She has not announced retirement and remained active through at least 2025, maintaining social media presence on Instagram and X and a YouTube channel 'なつきまろん♡'."
