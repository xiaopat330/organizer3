  biography: "Momoka Kagura (神楽ももか, born May 1, 1999) is a Japanese AV actress who debuted as an exclusive contract actress with S1 NO.1 STYLE in November 2023. She is known for her K-cup bust combined with a pronounced waist, a figure she describes as having developed rapidly from middle school age. Inspired by Kirara Asuka—whom she cited as her 'most desired face' role model—she sought to debut with the same studio. Since her debut, she has charted multiple titles on FANZA weekly rankings and appeared in S1's flagship anniversary ensemble productions. Outside AV, she has performed live music at industry events, singing J-pop standards. She is represented by the talent agency LIGHT (LIGHT promotion)."
