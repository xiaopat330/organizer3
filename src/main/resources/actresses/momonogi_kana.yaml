  biography: "Kana Momonogi was born on December 24, 1996, in Tokyo, Japan, and made her professional AV debut on October 19, 2015, as an exclusive actress under Idea Pocket after a brief period of amateur gravure work as Maasa Matsushima earlier that year. She quickly rose to prominence as one of the most recognizable faces in the Japanese adult video industry, known for her natural charm, athletic background as a former volleyball captain, and the idol-like persona she cultivated through Ebisu Muscats 1.5, the AV idol group she co-founded in September 2015. She expanded her activities into music, releasing a solo single debut in August 2017, and maintained an exclusive contract with Idea Pocket for her entire ten-year career. On September 28, 2025, she announced her retirement from the industry, with her final work released on October 7, 2025, concluding a decade-long career."
