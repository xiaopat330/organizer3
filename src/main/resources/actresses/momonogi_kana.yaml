    year: 2017
    category: "Best Newcomer Actress"
  legacy: "Kana Momonogi is widely regarded as one of the defining actresses of the mid-2010s through mid-2020s era of Japanese adult video, maintaining top-tier popularity throughout an unbroken ten-year exclusive contract with Idea Pocket — a rare achievement in the industry. Her crossover activities as a member of Ebisu Muscats 1.5, her solo music career, and her extensive media presence helped bridge the gap between the AV world and mainstream idol culture in Japan. Her retirement in 2025 was marked by significant fan attention and media coverage, reflecting her sustained cultural impact over the course of her career."

