  biography: "紗倉まな (Sakura Mana) is a Japanese AV actress, novelist, essayist, and media personality born March 23, 1993 in Funabashi, Chiba Prefecture. She attended the Kisarazu National College of Technology (engineering program) before debuting with a gravure image video in November 2011 and making her AV debut with SOD Create in February 2012 — her debut title exceeded 30,000 copies sold and immediately established her as one of SOD's top performers. Over the following decade she built one of the most diversified careers in the industry: her debut essay (2015) hit #1 on Amazon Japan in the talent biography category, her debut novel 最低。 (2016) was adapted into a film selected for the competition section of the Tokyo International Film Festival, and she has twice been nominated for the Noma Literary New Author Prize. She has served as a commentator on AbemaTV's prime political news program and as a Japanese sake cultural ambassador, while remaining a SOD exclusive actress and consistently placing in the top positions of major industry popularity polls."
