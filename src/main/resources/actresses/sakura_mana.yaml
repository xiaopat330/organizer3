  legacy: "紗倉まな is widely regarded as the most culturally prominent AV actress of the 2010s generation — the rare performer who achieved simultaneous elite status within the AV industry and genuine mainstream literary credibility. Her novels have been nominated for Japan's Noma Literary New Author Prize and her film adaptation screened at the Tokyo International Film Festival in competition. Her self-coined identity as 'えろ屋' (ero-ya, purveyor of the erotic) reflects her deliberate positioning at the intersection of sexuality and serious cultural commentary."

