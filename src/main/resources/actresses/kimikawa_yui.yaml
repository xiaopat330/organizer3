  biography: "きみかわ結衣 (Yui Kimikawa) is a Japanese AV actress who made her debut with Idea Pocket in January 2017 (IPZ-872, the studio's FIRST IMPRESSION debut series). Born on April 22, 1997 in Tokyo, she stood out for her tall, slender figure (171 cm) and athletic build, with basketball listed as her special skill. Her Idea Pocket career was brief but prolific, spanning roughly eight solo or semi-solo titles across 2017 under the IPZ and SUPD labels. She retired from the industry after approximately one year of activity. NOTE: DB record 5589 conflates her titles with those of Reina Kashima (ABP series, Prestige, debut 2018-05-18), who is a different person — the two records should be separated."
