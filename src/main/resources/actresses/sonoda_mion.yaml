  legacy: "Sonoda Mion was among the most prominent Prestige exclusives of the late 2010s,
    distinguished by a combination of petite stature and a full G-cup figure that made
    her a recurring subject of flagship releases and cross-label compilations. After
    retiring in 2019 and reinventing herself as the influencer ai., she became one of
    the more publicly visible post-AV career transitions of her generation."

