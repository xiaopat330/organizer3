  biography: "Mion Sonoda (園田みおん, born November 11, 1995) is a former Japanese AV actress
    from Kanagawa Prefecture who debuted in August 2015 as an exclusive actress for S1 No.1
    Style. In April 2016 she made a high-profile transfer to Prestige, where she remained
    as an exclusive throughout the peak years of her career. Known for her G-cup figure
    and petite 150 cm frame, she became one of the most visible Prestige exclusives of
    the late 2010s, appearing in numerous flagship releases and fan events including an
    AV fan appreciation festival in 2017. She announced her retirement on September 2,
    2019, citing health reasons, and held her final fan event on October 14, 2019. On
    February 5, 2021 she announced a name change to ai. (あい) and transitioned to working
    as a social media influencer."
