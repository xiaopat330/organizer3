  legacy: "Unpai is notable as a cross-platform personality who built a social media
    following of over 340,000 TikTok followers and 355,000 YouTube subscribers before
    her AV debut, translating online fame into one of S1's top-selling debuts of 2022.
    Her H-cup figure and established influencer brand made her one of the more prominent
    SUPERSTAR-tier actresses of the early 2020s."

