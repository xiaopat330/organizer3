  biography: "Unpai (born August 1, year undisclosed, Tokyo) is a Japanese AV actress,
    live-streamer, influencer, TikToker, and gravure idol. She studied classical piano
    at Senzoku Gakuen College of Music and became a popular live streamer on 17LIVE
    under the name Itou Aya, reaching the world #2 ranking. After a gravure debut
    in 2019, she announced her AV debut on January 25, 2022 under the mononym うんぱい
    and signed as an exclusive actress with S1 NO.1 STYLE (February 2022), with her
    debut work becoming S1's biggest hit of that year. She transferred to MOODYZ in
    December 2024. For AV work she is managed by the talent agency Mines (マインズ)."
