  biography: "Jun Kusanagi (草凪純) is a Japanese AV actress, nude model, actress, and talent born 5 June 1978 in Tochigi Prefecture. She debuted in AV in October 1996 under the name 加納瑞穂 (Kano Mizuho) with her first release on the Karen label, then moved to Alice JAPAN; she briefly retired from AV in 1997 before returning in 1998, accumulating nearly 30 titles before retiring again in 1999. Alongside her AV work, she gained mainstream recognition as 草凪純 from 1998 onward — her signature waist-and-underbreast physique earned her the nickname 'くびれ女王' (Queen of the Defined Waist), and she appeared on multiple national TV programs including Gilgamesh Night (TV Tokyo), Tonight 2 (TV Asahi), and Super Jockey (NTV). After her first AV retirement she continued as a gravure model, Vシネマ actress, and strip performer, and participated in FMW and WEW pro-wrestling events (2000–2003) as a manager and occasional wrestler. She staged an AV comeback in January 2006 under her established 草凪純 name, signing with GRACE/Crystal Eizo before moving to Madonna, Moodyz, Gloria Quest, Attackers, and dogma; she was recognised as one of the defining busty actresses of the 1990s at the 2012 AV30 thirtieth-anniversary retrospective."
