  biography: "Aoi Kururugi is a Japanese AV actress, singer, and talent from Kyoto Prefecture who debuted on May 14, 2017 with Candy label under the concept of 'a refined Kyoto-born beauty who works at a high-class restaurant.' Before her AV career she was active as an underground solo idol in the Kansai region. After two exclusive works each with Candy and Muku she transitioned to a freelance multi-maker career, becoming one of the most decorated actresses of her era — ranked 7th in FANZA's 2019 annual AV actress rankings and winning the SOD Award 2019 Outstanding Actress prize. She was particularly acclaimed for her VR work, ranking number one in S-cute's annual girls ranking for three consecutive years (2017–2019) and achieving multiple chart-topping VR releases. On April 14, 2023 she announced she would join S-Cute as an exclusive and retire from AV within one year; her final AV filming was completed on November 10, 2023 and she held a retirement live event 'eternally' on May 25, 2024. Post-retirement she continues as a singer and pachinko/pachislot entertainer under LIGHT talent agency."
