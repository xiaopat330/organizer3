  legacy: "Aoi Kururugi is regarded as one of the standout actresses of the late 2010s, distinguished by exceptional VR performance, genuine Kyoto accent appeal, and unusually broad multi-maker range spanning hardcore through soft romance. Her consistent chart presence across six-plus years of freelance work — without a major exclusive contract until her final year — makes her career a rare example of independent longevity at top-tier popularity."

