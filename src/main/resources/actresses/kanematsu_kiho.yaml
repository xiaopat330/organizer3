  biography: "Kiho Kanematsu (born December 22, 1989 in Toyohashi, Aichi) is a Japanese AV actress and former gravure idol. She passed the first AKB48 4th-generation research student audition in 2007 but withdrew before appearing on stage, later pivoting to gravure work under the name Kaneko Satomi (later Kaneko Tomomi) from around 2014. After formally retiring from gravure in June 2023, she reinvented herself under the new name Kanematsu Kiho and made her AV debut in April 2024 with MUTEKI, then signed an exclusive contract with S1 NO.1 STYLE in June 2024. She quickly rose to prominence, ranking 2nd in FANZA's November 2024 monthly actress ranking and 3rd in a January 2025 reader poll, praised for her combination of glamour idol pedigree and uninhibited on-screen presence."
