  legacy: "One of the most successful former gravure idols to transition to AV in the 2020s, Kanematsu debuted at age 34 and quickly became one of S1 NO.1 STYLE's highest-profile exclusive actresses, demonstrating sustained commercial momentum through her gravure background and fan following."

