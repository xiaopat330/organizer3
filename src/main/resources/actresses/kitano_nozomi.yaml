  biography: "Nozomi Kitano (北野のぞみ) was born on April 4, 1993 in Hokkaido and debuted as a Prestige exclusive actress in December 2014, affiliated with the ARM Promotion agency. Her fifth debut work, 'Ippai Kosutte Moete Ikou,' accumulated 24,000 favorites on DMM R-18, setting a record for Prestige exclusive solo releases at the time of release. She continued releasing titles through October 2016, after which no new works appeared; as of March 2018 she was officially noted to be on a long-term break, with no formal retirement announcement ever made."
