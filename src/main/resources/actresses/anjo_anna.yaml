  biography: "Anna Anjo (安城アンナ) is a Tokyo-born AV actress and one-quarter Russian,
    who debuted with Idea Pocket in November 2011 while still a university student,
    a dual identity she leaned into as a 'model-type college girl' talent. Her debut
    title IPTD-816 topped Idea Pocket's own December 2011 sales ranking. She was
    active as an exclusive Idea Pocket performer from late 2011 through 2013, releasing
    roughly a title a month, then briefly retired before returning in 2015 with
    Prestige and other labels. During her first run she was also a member of Ebisu
    Muscats (8th generation, April 2012 – March 2013), appearing on TV Tokyo's
    Onedari Mascot SP!. Her trademark was waist-length straight long hair, later
    cut short; she played basketball from elementary school through high school."
