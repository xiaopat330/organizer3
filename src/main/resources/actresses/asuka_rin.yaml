  biography: "Rin Asuka (飛鳥りん) is a Japanese AV actress born January 8, 1997 in Kyoto Prefecture.\
    \ A self-described idol enthusiast, she applied to SOD's project to produce its own idol and\
    \ debuted as a SOD exclusive idol in March 2016; she had previously passed an audition for an\
    \ unnamed idol group but declined it. She made her AV debut in September 2016 under SOD Create,\
    \ placing second in the actress division of AV OPEN 2016 with her debut title. She remained an\
    \ SOD Create exclusive until November 2018, after which she continued to work for multiple labels\
    \ including S1 (STAR/STARS series), Maxing (MXGS), and Madonna (JUY/JUFE). On December 30, 2019\
    \ she announced her retirement from AV, effective March 2020. Outside AV she was affiliated with\
    \ Eightman Production and pursued idol activities."
