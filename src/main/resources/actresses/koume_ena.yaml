  legacy: "Ena Koume is among the most prominent large-bust actresses of her generation, building a prolific catalog across dozens of labels in the years following her MOODYZ exclusive debut. Her candid public disclosure of health issues in 2024 — and her documented recovery and return — was notable for its transparency and earned her considerable goodwill from fans."

