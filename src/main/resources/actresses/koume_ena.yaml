  biography: "Ena Koume (小梅えな) was born on November 30, 1999, in Tokyo and debuted as an exclusive actress with MOODYZ in August 2019. She had previously worked as a model at photography sessions before being recruited to try adult video; after some hesitation she agreed, drawn by the prospect of a major life change. Her dramatically large bust (105 cm, K-cup) combined with an otherwise slender frame immediately made her one of the most-discussed new actresses of the year. In January 2020 she transitioned from her MOODYZ exclusive to a freelance arrangement, subsequently appearing across a wide range of labels including E-BODY, Fitch, Prestige, and many others. In February 2024 she announced an activity suspension, disclosing that she had been suffering from iron deficiency anemia and Ménière's disease that had been developing for approximately two years; she resumed activities on August 1, 2024. As of early 2026 she remains active under the ALIVE agency with no retirement announced."
