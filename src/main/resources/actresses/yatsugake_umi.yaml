  biography: "Umi Yatsugake (八掛うみ; born September 2, 2000 in Tokyo) is a Japanese
    AV actress and YouTuber affiliated with talent agency T-Powers and exclusive to
    Prestige. Before entering adult entertainment she operated the YouTube channel
    'うみの大冒険' (Umi's Great Adventure), through which she was scouted by Prestige.
    She undertook an 8 kg weight-loss program before her debut, arriving at her debut
    weight of 44 kg (as of December 2020). She made her exclusive debut on November
    6, 2020. An A-cup actress at a slender B80–W57–H85 and 160 cm, she is also noted
    for her proportionally small face: 18.7 cm in length versus the Japanese female
    average of 21.73 cm, and 12.2 cm in width versus the 13.83 cm average. Her debut
    year was commercially strong — at least one 2021 release reached the #1 position
    on the MGS Video first-half DVD sales ranking. She disclosed her A-cup size in
    the October 2021 issue of Weekly Playboy. Outside work she plays the flute, a
    skill shared with her mother and sister."
