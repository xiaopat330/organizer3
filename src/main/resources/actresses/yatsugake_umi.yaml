  legacy: "Umi Yatsugake is notable as an example of the YouTuber-to-AV-actress pipeline,
    building an audience through accessible vlog content before being scouted for
    exclusive contract work. Her combination of a slender A-cup physique, documented
    small-face metrics, and strong first-year commercial performance made her one of
    Prestige's standout exclusive signings of the early 2020s."

