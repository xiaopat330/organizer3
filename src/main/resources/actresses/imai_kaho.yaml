  biography: "Kaho Imai is a Japanese former AV actress from Nichinan, Miyazaki Prefecture who debuted in January 2019 as an exclusive with SOD Create's 'Seishun Jidai' (青春時代) label. After leaving that exclusive contract in April 2019 she became a freelance actress, quickly breaking through as a prominent gal-type performer known for her tan complexion, G-cup bust, and energetic on-screen presence. She appeared across a wide range of studios including MOODYZ, kira☆kira, E-BODY, Attackers, and many others, and in August 2020 ranked eleventh in the FANZA first-half AV actress rankings. In September 2021 and 2022 she was appointed campaign girl for HHH Group's Triple Happy Campaign. She announced a hiatus from AV activity at end of January 2023 via her fan club; her X (Twitter) account subsequently became a support account and new original content effectively ceased."
