  biography: "Misaki Enomoto (榎本美咲, えのさん) is a Japanese adult video actress born on May 3, 1988 in Tokyo. She grew up attending all-girls schools from middle school through university and had long harbored a desire to enter the industry, but marriage delayed her debut. She entered AV in January 2017 at age 28 as an exclusive talent of SODクリエイト's \"本物人妻\" (Real Housewife) label, making a strong impression as a married woman with a striking contrast between her respectable appearance and on-screen uninhibited sexuality. In August 2017 she moved to SOD's higher-profile \"SOD star\" label and continued releasing solo titles. She was also active as a member of the Bstar-affiliated idol unit 原宿☆バンビーナ from 2018. After ending her SOD star contract in November 2018 she signed simultaneously with Attackers and 溜池ゴロー in January 2019, but announced an indefinite activity hiatus on January 25, 2019, and formally left 原宿☆バンビーナ in August 2019."
