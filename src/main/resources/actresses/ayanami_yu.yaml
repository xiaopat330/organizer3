  biography: "Yu Ayanami (綾波優) is a former Japanese AV actress born 1 April 1989 in Miyagi Prefecture. She debuted in November 2007 with the title 純真 完全版 as an exclusive actress for Uchu Kikaku (Media Station), a label under KM Produce, and released a steady stream of solo titles throughout 2008. In January 2009 she transferred to the Million label (also KM Produce), and retired in April 2009 with the release of 電撃引退 イカセチャレンジ 綾波優. Her hobbies were karaoke, cooking, and confectionery-making. Post-retirement compilations under her name continued through June 2009."
