  biography: "Momo Shiraishi (白石もも) is a Japanese AV actress born on October 26, 2002, and affiliated with ACT ENTERTAINMENT. She made her AV debut on September 5, 2023, via MOODYZ, with her debut title topping the FANZA rental floor ranking for two consecutive weeks (late December 2023 and early January 2024). Since then she has maintained an extremely prolific pace, shooting up to 15 titles per month and reaching 100 releases by June 2025. She is frequently cast in student and ojou-sama (young lady) roles, and her screen work has evolved from passive scenarios toward more assertive nympho (痴女) portrayals, a style she has described as channeling her agency senior Himari Kinoshita. She is an only child and known off-screen for being outgoing and talkative, a contrast to the subdued roles she often plays. Note: she is a different person from the 1987-born actress also named Momo Shiraishi (白石もも) who debuted via Cosmos Project (宇宙企画)."
