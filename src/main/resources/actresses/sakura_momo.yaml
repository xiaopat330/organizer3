  biography: "桜空もも (Sakurasora Momo) is a Japanese AV actress from Akita Prefecture, born December 3, 1996. A former gravure idol, she pursued a singing career in her teens before pivoting to gravure after encouragement from friends. She debuted as an IDEA POCKET exclusive actress in May 2017 with FIRST IMPRESSION 115, and quickly rose to prominence for her G-cup figure and the distinctive waist-to-bust ratio that critics noted was among the most striking in the industry. She won the DMM.R18 Adult Award 2018 Best New Actress prize in her first full year, cementing her status as one of IDEA POCKET's flagship performers. Now in her ninth year of exclusive work with the label, she remains one of their most consistently ranked and commercially successful actresses."
