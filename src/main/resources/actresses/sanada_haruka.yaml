  biography: "Haruka Sanada (真田春香) was born on June 6, 1988, and debuted in the adult video industry in December 2006 with 'LOVE & HONEY', distributed by Crystal Eizo (クリスタル映像). She made her commercial sell-through debut in July 2007 with 'SELL☆DEBUT' through the gal-focused kira☆kira label (a WILL Group imprint), becoming one of the label's featured actresses. She was affiliated with talent agency Five Promotion. After a prolific initial career, she retired on November 7, 2009, following a final appearance at a Hot Burning fan event. She returned to the industry on February 25, 2011, with the release of 'Revival Transcendent BODY: Hot Kiss and Embrace' (復活 超越BODY 熱い接吻と抱擁 真田春香) and subsequently resumed releasing titles across multiple studios. Her listed hobbies include drawing, and her noted special skills are knitting and cleaning."
