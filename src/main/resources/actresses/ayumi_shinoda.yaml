  biography: "Ayumi Shinoda is a former Japanese AV actress known for her I-cup mature-woman (jukujo) work and prolific 2014-2016 comeback run. She first debuted in March 2010 as Miwako Ikeda but retired four months later. In April 2014 she returned under the new stage name Shinoda Ayumi and quickly became one of the most-booked freelance jukujo and big-bust performers across labels including Madonna, Tameike Goro, Glory Quest, Crystal Eizo, and E-BODY. In 2015 she won both the Mature Actress Award and Yukan Fuji Award at the SkyPerfecTV! Adult Broadcast Awards. She announced her retirement on Twitter on 16 June 2016."
