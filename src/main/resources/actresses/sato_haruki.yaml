  biography: "Haruki Sato (さとう遥希) was born December 1, 1991 in Kumamoto Prefecture and was scouted while working part-time at a crepe shop, making her AV debut on April 21, 2011 with SOD Create in the title 'Do You Like Girls Dressed as Boys? 5.' Affiliated with Lotus Group (ロータスグループ) as her talent agency, she built a top-tier reputation at SOD as a kikaku-tansoku actress across the early 2010s. In 2013 she received the SKY PerfecTV! Adult Broadcast Award for both Best Actress and the Cyzo Award, recognizing her broad commercial popularity. She retired from the AV industry at the end of November 2014 after approximately three and a half years of activity."
