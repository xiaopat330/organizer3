  biography: "Wakana Sakura (さくらわかな) is a Japanese AV actress born March 21, 2002 in Ishikawa Prefecture (described as from Kanazawa, nicknamed 'the sheltered daughter of Kanazawa'). She debuted in June 2023 exclusively with Idea Pocket, with her first title being FIRST IMPRESSION 159. She is signed to the Bstar talent agency. Her early releases performed strongly on FANZA rental charts, with her second exclusive title reaching #1 in the week of December 4, 2023. She has hobbies of solo travel and piano, and played percussion in her middle school brass band."
