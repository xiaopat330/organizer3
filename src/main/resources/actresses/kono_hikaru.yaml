  biography: "Hikaru Kono (紺野ひかる) is a Japanese AV actress born January 16, 1994 in Hokkaido. She made her debut on June 25, 2013 as an exclusive actress for kawaii* (WILL Co., Ltd.), launching her career as a slender, long-legged performer praised by industry writers for a fashion-model physique that earned her the informal title 'National Living Treasure of Adult.' After her exclusive kawaii* contract ended, she transitioned to freelance (企画単体) status and has maintained a prolific output across dozens of labels for over a decade. She is affiliated with Lotus Tokyo, later reorganized under Fan Star Promotion. Her nickname こんぴか became the title of her recurring fan talk events 'こんぴかのスケベ専門学校ッス,' held irregularly from 2022 onward."
