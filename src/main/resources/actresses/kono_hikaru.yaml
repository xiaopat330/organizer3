  legacy: "A versatile performer active since 2013, Hikaru Kono has built a reputation spanning dominant femme fatale (痴女) roles through submissive characters, earning the 'national treasure' descriptor from AV critics for her ability to excel across the full dramatic range. Her decade-plus career without retirement makes her one of the more durable performers of her debut cohort."

