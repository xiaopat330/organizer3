  biography: "Saryu Usui (born December 25, 1985, Tokyo) is a Japanese AV actress, talent, and model who originally entered entertainment under the name Moriyama Ayano, winning the Performance Prize at the 31st Clarion Girl contest in 2006 while affiliated with Oscar Promotion. She appeared in TV drama Kamen Rider Den-O (2007-2008) before transitioning to AV, making her debut on February 1, 2013 under MUTEKI with the title Sokkenmijin. From mid-2013 she worked exclusively with Idea Pocket (IPZ series), and from late 2014 also with Attackers, before expanding to a wide range of labels from 2015 onward including RBD, MEYD, Madonna, and many others. A self-described anime otaku whose motto is 'life is otaku,' she also has skills in ikebana and trumpet playing; she played trumpet at the Clarion Girl contest. In October 2018 she was crowned the 24th Queen at the Jukujo Queen Contest in Shinjuku, and she placed 99th in FANZA's 2018 annual actress ranking."
