  biography: "Sui Tsukinoe (月野江すい) is a Japanese AV actress born on June 15, 2001 in Osaka Prefecture. She debuted in November 2023 as an exclusive actress under PREMIUM's newly launched sub-label Premium Stage, with the debut catchphrase 'A woman who loves sex and is loved by sex.' After four exclusive releases, she transitioned to a non-exclusive single-actress format. In late 2024, she rose rapidly in popularity; her ROYAL title charting #1 on the FANZA rental floor weekly ranking in September 2024, and she achieved #1 on the FANZA rental floor monthly actress ranking for October 2024. She is affiliated with the talent agency T-POWERS and is active across multiple major studios including MOODYZ, IdeaPocket, and Madonna."
