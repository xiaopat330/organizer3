  biography: "Erika Kitagawa (born December 9, 1986, Tokyo) is a former Japanese AV actress who debuted in 2009 under the name Yuria Sonoda while affiliated with talent agency DINO (名東). She began receiving full-name credits as Sonoda Yuria in 2010, then renamed to Kitagawa Erika in 2011 following an agency change. Known for her distinctive G-cup figure and commanding screen presence, she became one of the more prolific and recognisable performers of the 2010s, placing in the FANZA annual ranking multiple times (36th in 2014, 19th in 2016). She received the Shukan Taishu Award at the Skyperfect Adult Broadcasting Grand Prix 2015. On March 31, 2019, she announced on Twitter that filming would conclude on April 30, 2019."
