  biography: "Hikaru Wakana (若菜ひかる) is a Japanese former AV actress, gravure idol, and talent born on 6 March 1985 in Kanagawa Prefecture. Before her adult video debut she was active as a general talent, and in February 2006 she debuted in AV with the film 'Shine' (シャイン) as a dual exclusive for Alice JAPAN and MAX-A. In August 2007 she moved to a cell-debut exclusive contract with kawaii*, releasing several solo titles under that label. In mid-2008 she appeared in two titles for MOODYZ (淫らな女教師 and チンポを鍛える大人の励まし淫語トレーニング), marking her last new solo works. Alongside her AV career she appeared in television programmes and non-adult films, including a lead role in the Hong Kong–Japanese co-production 金瓶梅 (2010). She has since focused primarily on mainstream acting work."
