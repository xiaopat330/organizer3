  biography: "Kaede Matsushima (松島かえで) is a retired Japanese AV actress from Fukuoka, known as a quintessential \"beautiful onee-san\" (綺麗なお姉さん) type and a signature actress of Alice JAPAN. She debuted in 2002 with Uchu Kikaku (Media Station), and after a brief release gap revived her career at Alice JAPAN in December 2003, where her work became consistently popular and made her the label's flagship actress. She first retired in November 2007 with the Alice JAPAN work 「SMILE ～Last Message～」, then returned to AV in October 2008 with an S1 cell debut, later moving to Idea Pocket. She retired for good at an event on 29 July 2010. Born 7 November 1982 (O blood type, 160 cm, D-cup), she was managed by Office Old Crew and was close friends with fellow actress Hitomi Hayasaka."
