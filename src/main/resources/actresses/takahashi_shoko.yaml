  biography: "Shoko Takahashi (born May 13, 1993, Aichi Prefecture) worked as a gravure idol under the name 高崎聖子 before relaunching as 高橋しょう子 in April 2016, debuting as an AV actress with MUTEKI on May 1, 2016 with the title グラビア四天王たかしょーMUTEKI Debut 高橋しょう子. Her debut year was an immediate triumph — she swept the 2016 AV OPEN taking seven prizes including the Grand Prix, establishing her as one of the defining new exclusives of the mid-2010s. She subsequently transferred to MOODYZ, where she continued as a top exclusive actress, reportedly earning a substantial income while working only a few days per month. In April 2022, she announced retirement after celebrating six years in the industry."
