  biography: "Karen Ishida (石田佳蓮) was born on August 6, 1996 in Fukuoka Prefecture and moved to Tokyo at age one. She began her entertainment career in 2006, passing the avex audition alongside Yurika Tachibana and others, then retired briefly in 2008. Returning in 2009, she became an exclusive model for fashion magazine ラブベリー and later joined idol group アイドリング!!! (5th generation, member #28) from March 2012 to October 2015. After graduating from the idol group she worked as a talent, actress, model, and design producer until August 2024. In September 2024 she debuted in AV with MUTEKI, then moved to an exclusive contract with S1 NO.1 STYLE (November 2024 – March 2026), before transitioning to Attackers from April 2026."
