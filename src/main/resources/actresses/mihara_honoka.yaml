  biography: "Honoka Mihara (三原ほのか) was born May 1, 1994 in Saitama Prefecture and made her AV debut in February 2015 as an exclusive actress for Maxing, with hobbies including shopping and a talent for cooking. She transferred to Attackers as an exclusive actress in August 2015 and was released from exclusive status in March 2016, thereafter working independently across multiple studios. She placed second in the mania and fetish category of AV OPEN 2016, one of the industry's major annual competition events. She announced her retirement on December 13, 2021 via Twitter, with her final active date being January 30, 2022, concluding approximately seven years in the industry."
