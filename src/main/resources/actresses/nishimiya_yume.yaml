  biography: "Yume Nishimiya is a Japanese AV actress who has been an exclusive performer for Idea Pocket (アイデアポケット) since her debut in September 2016 at age 19, where she was introduced under the concept of a current idol candidate. She quickly became one of Idea Pocket's flagship performers, appearing in the studio's flagship IPZ and IPX series before transitioning to the IPZZ series in 2023. By January 2025 she released her 100th title, and milestone best-of compilations have been released on her first, third, fifth, seventh, and eighth anniversaries. As of 2026 she remains one of Idea Pocket's most prolific active exclusive actresses with over 100 solo titles across a decade-long career."
