  biography: "Asuna Kawai was born March 21, 1998 in Kanagawa Prefecture. She worked as a gravure idol through T-POWERS agency in 2017 before making her AV debut on February 23, 2018 as a Prestige exclusive actress, billed under the catchphrase '奇跡の天然神乳Hカップ' (Miraculous Natural H-Cup). Her other marketing taglines — 'スマイルボイン' (Smile Boyne) and '平成最後の神乳' (Last Divine Breasts of the Heisei Era) — tied her debut identity to the approaching end of the Heisei imperial era. She has cited AV actresses Kirara Asuka and Kaname Oi as the inspiration for entering the industry. She remained active with Prestige as of 2025, with a title ranking on FANZA rental charts in August 2025."
