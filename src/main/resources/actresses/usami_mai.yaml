  biography: "Mai Usami (宇佐美まい) is a former Japanese AV actress born on March 15, 1995, in Kanagawa Prefecture. She debuted in December 2013 as an exclusive contract actress for S1 NO.1 STYLE, motivated by a desire to turn her passion for sex into a career. She maintained her exclusive S1 contract until early 2015, releasing a steady stream of works including debut, theme, and special productions. From February 2015 she transitioned to freelance work, collaborating with multiple studios including SOD Create, Prestige, MOODYZ, and others. Her final new release appeared in April 2016, after which she retired from the industry. She was nominated in a 2020 Cyzo all-time favourite AV actress survey."
