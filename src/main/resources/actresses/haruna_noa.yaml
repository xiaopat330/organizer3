  biography: "Noa Haruna is a Japanese AV actress from Tokyo who debuted on June 20, 2023 with E-BODY under a masked, 'amateur college student' debut concept designed to protect her identity — the debut work sold exceptionally well and was cited as among the top-performing masked-debut titles of the COVID era. After her debut she transitioned to fully revealed appearances but initially found it difficult to stand out from her busty physique alone; a turning point came in June 2024 when she adopted a plain, bespectacled character archetype that allowed her to foreground her I-cup figure more effectively, and the millionfactory title 'いつでもどこでも呼びつけたらすぐに駆け付ける 抱き心地最高の都合のいい地味セフレ' became a major hit. She placed 40th in FANZA's second-half 2025 actress ranking, marking her entry into the top-tier freelance actress pool. She is represented by the talent agency T-Powers and works across a wide range of studios."
