  biography: "Mitani Akari (美谷朱里) is a Japanese former AV actress and current burlesque dancer who debuted on July 19, 2017 with Candy under the 'current female university student' framing she later admitted was a marketing setup. She built her early career as a prolific kikaku-tan ('planning solo') performer, appearing in over 400 titles in roughly three years and earning the nicknames 'Kikatan Monster' and later 'Chameleon Actress' for her range. In May 2020 she became a double exclusive across Honnaka (本中) and Das! (ダスッ!), where she remained until her July 2025 retirement. With longtime co-star Yamagishi Aika she formed the duo 'Gishitani' in 2022, launching a YouTube channel, a weekly Asahi Geino column, and TV appearances that broadened her mainstream profile. After retiring she rebranded as Mitani Akane (美谷朱音) and now performs as a burlesque dancer with 63ANGEL from November 2025."
