  biography: "Rei Kuruki (久留木玲) is a Japanese AV actress born December 12, 1999 in Sendai, Miyagi. She debuted in July 2019 as an exclusive actress for SOD's 青春時代 label, releasing seven titles through February 2020 before transitioning to freelance work in March 2020. Though her debut persona was a loli-style schoolgirl, she quickly expanded into hard play, housewife scenarios, and a wide range of genres as a freelance actress. She ranked 9th in FANZA's 2020 annual actress ranking and 8th in the Monthly FANZA 2021 first-half ranking, establishing herself as one of the more popular freelance actresses of her era. She served as campaign girl for the Triple HAPPY 2021 campaign and was affiliated with talent agency ティーパワーズ throughout her active career, which wound down around early 2023."
