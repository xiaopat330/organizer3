  legacy: "Kuruki Rei debuted during the surge of young SOD-affiliated talent in 2019 and quickly became one of the more prolific freelance performers of 2020–2022, appearing across nearly every major label. Her FANZA top-10 rankings in both 2020 and 2021 reflect genuine fan enthusiasm for her versatility."

