  legacy: "Yuna Shiina occupies a rare position in the industry as a major actress who successfully staged a full-scale comeback more than eight years after retirement, joining Madonna's prestigious exclusive roster in 2023 and sustaining a monthly release pace comparable to her peak years. Her first career (2009–2015) produced one of the most voluminous freelance catalogs of her era, spanning virtually every major label; her second career has focused exclusively on Madonna's married-woman and NTR drama format, where she has become one of the label's most visible headliners."

