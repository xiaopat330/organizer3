  biography: "Yuna Shiina is a Japanese AV actress from Tokyo who debuted in May 2009 as a MAX-A exclusive under Lotus Group management, quickly moving to PREMIUM in December 2009 for her sell-through debut. After roughly two years of exclusive work across PREMIUM and guest appearances for Attackers, she transitioned in late 2011 to freelance status, releasing an exceptionally prolific catalog across dozens of labels through 2015 before retiring. Known for her tall, full-figured glamour body and versatile screen presence spanning teacher, wife, and femme-fatale roles, she became a sought-after performer across Moodyz, Prestige, Attackers, Madonna, and many smaller labels during her peak years. She announced her AV comeback on Twitter on February 16, 2023, joining Madonna as an exclusive the following month — her return was received as a major event, with multiple comeback titles charting on FANZA weekly rankings. As of 2025 she remains an active Madonna exclusive with a steady monthly release schedule."
