  legacy: "Mizukawa Sumire is noted for sustaining a high-output freelance career across virtually every major Japanese AV label throughout her mid-career, then pivoting to a Madonna exclusive in her later years. Her three-name career arc — debut as Mizuki Miri at Prestige, brief rebranding as Mizuki Rei, and full reinvention as Mizukawa Sumire — is one of the more documented identity-evolution cases in contemporary JAV."

