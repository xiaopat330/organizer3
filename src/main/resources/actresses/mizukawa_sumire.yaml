  biography: "Sumire Mizukawa (水川スミレ), born February 3, 1994 in Sakai, Osaka Prefecture, debuted in AV in April 2016 under the name Mizuki Miri (水稀みり) as a Prestige exclusive, bringing a gyaru image and a reputation for dominant, femdom-oriented performance styles. After a brief transitional name period as Mizuki Rei in late 2017, she relaunched as Mizukawa Sumire in January 2018, joining the LINX talent agency and transitioning to freelance work across a wide range of labels including MOODYZ, Madonna, kira☆kira, Attackers, OPPAI, and many others. From 2018 she also worked internationally and moved to the United States in 2021. In November 2023 she signed as a Madonna exclusive, a partnership that continued through 2025. In January 2026 it was reported she was withdrawing from Japan's domestic AV market to shift her base overseas, with a Taiwan adult expo appearance and award in March 2026 marking her final high-profile domestic engagement. She is known for femdom, teasing, and kissing-specialist content, and published a photobook titled 'Amai Mitsu to Amai Wana' (甘い密と甘い罠) in 2020."
