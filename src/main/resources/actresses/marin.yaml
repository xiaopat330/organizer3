  biography: "Marin (まりん, born 20 July 1987 in Kyoto Prefecture) is a Japanese retired AV actress who debuted in 2005, initially appearing across multiple labels including GLAY'z, LEO, and Prestige. She rose to prominence after the January 2006 Prestige release 'Tokyo Ryuugi-11/MARIN', which sparked a bidding war among studios. She became an exclusive actress for Warp Entertainment from 5 April 2006, recording a prolific run of releases through 2008. During and after her Warp contract she appeared as a guest performer for Idea Pocket, Premium (WILL), and kira☆kira. She retired in 2008 and made a single-title comeback in October 2015 for Attackers (SHKD-646), retiring again shortly thereafter. She had previously worked as a gravure idol under the name 'Junna' (じゅんな)."
