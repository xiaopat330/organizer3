  biography: "Himari Kinoshita (木下ひまり) is a Japanese AV actress from Tokyo, born 21 May 1996 (blood type A), standing 169 cm tall with a slender, long-legged build that quickly became her trademark appeal. She was scouted and made her official debut on 17 April 2020 through Prestige (プレステージ), appearing under the alias 花沢ひまり in her earliest releases before establishing herself under her current stage name. Over her first five years she worked as a free-agent actress across dozens of labels simultaneously — including MOODYZ, Maxing, Fitch, Attackers, PREMIUM, SOD Create, and many others — building one of the most prolific non-exclusive catalogues in her generation. She appeared in the weekly Playboy 'next-generation big-butt AV actress Top 10' ranking in May 2021, ranked fifth in FANZA's 2021 second-half AV actress chart, and has repeatedly placed in FANZA's monthly actress rankings (5th–10th range) through 2024–2025. She is also recognised as one of the industry's leading lesbian performers, having expanded into lesbian content from October 2020. On 9 December 2025 she announced her first-ever exclusive contract — a triple exclusive with ダスッ!, Fitch, and ROYAL, beginning January 2026, marking her sixth year in the industry."
