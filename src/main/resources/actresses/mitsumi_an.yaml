  biography: "An Mitsumi (born November 15, 2000 in Tokyo) debuted in May 2020 as a Prestige exclusive actress under the stage name 蜜美杏 (Mitsumi An). She developed a reputation for her tall, voluptuous figure and became a FANZA rental chart-topper, ranking #1 on the weekly rental floor in August 2022 and earning the monthly AV actress ranking #1 in September 2022. She announced retirement in March 2022 and formally retired in May 2022, then relaunched in March 2023 under the new name 藤井蘭々 (Fujii Ranran), making a gravure debut in Shukan Post before joining FALENO as an exclusive actress from April 2023. Under the FALENO label she has released prolific content through 2025 and beyond, appearing at the FALENO FES event (February 2024) as a runway model."
