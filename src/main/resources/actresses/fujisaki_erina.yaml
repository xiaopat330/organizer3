  biography: "Erina Fujisaki (藤崎エリナ) is a Japanese AV actress from Shizuoka Prefecture, born 16 May 1988. She debuted in October 2008 under the stage name 喜多嶋未来 (Kitajima Mirai) with Aurora Project, working for smaller labels including Big Morkal and Aroma Kikaku through 2011. In 2012 she transitioned through the names 北島みらい and 本上まさみ before settling on her current stage name 藤崎エリナ. Under the Fujisaki Erina name she became an exclusive contract actress for Idea Pocket from early 2013, appearing in their flagship IPZ line, and subsequently worked extensively with Attackers (RBD and ATID labels) in drama and SM-adjacent productions. She has also appeared for Madonna (JUX) and HMGL (Glamour). As of the available record she has not announced retirement (active_to left null; last known activity circa 2015 per Wikipedia filmography)."
