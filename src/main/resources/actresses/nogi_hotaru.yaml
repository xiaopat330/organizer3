  biography: "Hotaru Nogi (乃木蛍) was born June 2, 1999 in Shimonoseki, Yamaguchi Prefecture, and was an active cosplayer before entering the AV industry at the suggestion of a friend who worked as an AV director. She made her debut in February 2019 as an exclusive S1 No.1 Style actress, earning notice for her tall, G-cup figure and fresh collegiate image, and was still a student at the time of her debut. In January 2021 she announced a transfer to SODstar, where she continued as an exclusive actress, before graduating from exclusive status in August 2021. She subsequently worked as a freelance actress affiliated with the agency DINO."
