  biography: "Hamabe Kaho (浜辺栞帆) is a Japanese AV actress born April 15, 1997, affiliated with C-more Entertainment. Before her AV debut she worked as a wedding planner, a career she continued in parallel after debuting, and was open about her AV work with colleagues. She debuted in May 2022 as an exclusive actress on SOD Create's SODstar label, quickly establishing herself as a popular busty (G-cup) performer known for an earnest, approachable onscreen presence. In January 2024 she transferred exclusively to Madonna (マドンナ), where she appeared in the label's flagship NTR and married-woman titles; she left exclusive status in September 2024 and has since worked as a project actress across numerous studios. By 2025 she ranked in FANZA's weekly sales charts and participated in the high-profile MOODYZ バコバコバスツアー ensemble event release."
