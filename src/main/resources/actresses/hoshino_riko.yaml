  biography: "Riko Hoshino (星乃莉子) is a Japanese AV actress born April 20, 1999 in Hokkaido. After graduating from a confectionery vocational school and working as a certified pastry chef, she made her gravure debut in FLASH magazine in May 2022 and her AV debut with SOD Star in September 2022. Her debut title immediately topped FANZA rankings and accumulated over 70,000 favorites within six months — among the highest ever recorded on the platform at the time — establishing her as one of the most commercially impactful debuts of the era. Known for her dynamic riding technique, which she attributes to childhood horseback riding in Hokkaido, she brings an athletic physicality and expressive screen presence that critics have compared to SOD icons Mana Sakura and Kurumi Morishita. After leaving talent agency JETSTREAM in July 2023 to join SOD's in-house HANAYA PROJECT, she departed that agency in March 2026 and continues as a freelance exclusive SOD Star actress."
