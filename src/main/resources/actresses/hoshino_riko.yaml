  legacy: "Hoshino is among the most commercially successful SOD Star debuts of the 2020s, with multiple FANZA #1-ranked titles and record-breaking favorite counts across her first three years. She has become one of SOD Star's flagship exclusive actresses, with a consistent release cadence and sustained fan following that extends well beyond her debut cycle."

