  biography: "Tsumugi Akari is a Japanese AV actress from Kanagawa Prefecture who debuted on March 19, 2017 with IdeaPocket as an exclusive under the 'miracle beauty' concept, quickly establishing herself as one of the studio's top performers. In October 2018 she transferred exclusively to Attackers, then from May 2019 returned to IdeaPocket in a dual-exclusive arrangement, a W-contract she maintained for several years. Her range across genre — femdom / chiijo roles at IdeaPocket and violation / drama roles at Attackers — drew critical praise for her acting versatility, and she expanded into further dual contracts with Madonna (from late 2022) and PREMIUM (from May 2025). In late 2025 she announced a move to the FALENOstar label, capping an eight-year tenure at IdeaPocket commemorated by a 12-disc complete-best release. She has released multiple photobooks and maintains an active fanbase across Japan and internationally."
