  legacy: "Tsumugi Akari is regarded as one of IdeaPocket's defining stars of the late 2010s and 2020s, known for her slender build, cool and composed screen persona, and exceptional range across femdom and drama genres. Her eight-year tenure at IdeaPocket — commemorated by a 87-title complete-best set — and simultaneous dual contracts at multiple top labels mark her as one of the most consistently prominent exclusive actresses of her generation."

