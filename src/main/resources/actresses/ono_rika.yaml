  biography: "Rika Ono (小野六花, おの りっか) is a Japanese AV actress born February 14, 2002 in Shiga Prefecture and raised in Osaka. She debuted on May 13, 2020 with MOODYZ under the catchphrase 'still developing in body and technique,' with her debut work reaching #1 on the FANZA daily ranking for three consecutive days and placing fifth in the FANZA 2020 annual sales ranking. Signed as a MOODYZ exclusive, she went on to become one of the studio's most prominent faces of the 2020s, working across MIDE, MIDV, and MIDA codes. In 2022 she expanded her career as a singer, debuting with the single 'Seishun JUMP!' In 2023 she was cast in the lead heroine role of the live-action カラミざかり series, with the first entry debuting at #1 on the FANZA video floor ranking. Her stage name 六花 (rikka) means snow."
