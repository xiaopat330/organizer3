  legacy: "One of MOODYZ's defining exclusive actresses of the early 2020s, Rika Ono built a loyal following through a combination of girl-next-door charm and strong performance output. Her debut broke records on FANZA within days of release, and she sustained chart presence across five-plus years, becoming recognizable enough to headline the live-action カラミざかり drama series and expand into music."

