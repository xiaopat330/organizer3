  awards: []
  legacy: "Suzumura Airi's decade-plus run at a single studio — anchored by genuine
    shyness, a slim 152 cm frame, and a modest D-cup that attracted fans of natural
    beauty — is a rarity in an industry marked by frequent label-hopping. Her status
    as a member of the '2013 Troika' at Prestige helped define that studio's identity
    in the mid-2010s, and her exceptional Korean-market popularity made her one of
    the most internationally recognized Prestige actresses of her era."

