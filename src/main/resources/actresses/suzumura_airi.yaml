  biography: "Airi Suzumura (鈴村あいり) is a Japanese AV actress from Kanagawa Prefecture
    whose quiet, neat beauty and genuine on-camera shyness earned her an unusually
    devoted following in both Japan and South Korea. She debuted in February 2013 as
    an exclusive actress for Prestige, with her stated motivation for entering AV being
    the practical need to cover moving expenses. Alongside Erika Momotani and Shion
    Utsunomiya, she became part of the celebrated '2013 Troika,' a group of Prestige
    debuts that generated a sustained wave of popularity — especially in Korea, where
    her popularity reached S-grade while remaining A-grade in Japan. She remained loyal
    to the Prestige label throughout her career: in December 2017, amid transfer rumors
    to Idea Pocket, she confirmed she would stay at Prestige while only her agency
    moved to NAX Promotion. In July 2021 her 100th work since debut was released; following
    a period of inactivity in 2022 she returned with new releases in July 2022 and
    has continued releasing titles into the mid-2020s."
