  biography: "Meguri (めぐり), formerly known as Megu Fujiura (藤浦めぐ), is a Japanese gravure idol and AV actress from Tokyo who debuted in gravure in 2007 under the agency Pinky Net, quickly becoming the top idol of the agency's \"Fuji-gundан\" roster through an extraordinary pace of monthly image video releases. She entered AV on January 1, 2009 with MUTEKI (a Kitō Entertainment in-house label) before becoming an exclusive actress at S1 No.1 Style; concurrently she was a member of the idol group 恵比寿マスカッツ (November 2008 to March 2010). In September 2010 she announced a hiatus, followed by a retirement announcement in December 2010. She returned in May 2011 under the new name めぐり with T-Powers talent agency and re-debuted at SOD ACE, later moving through MOODYZ, OPPAI, and a long-running period at 溜池ゴロー. She announced a second retirement in September 2017, then made a comeback in December 2019. In October 2024 she returned once again as an exclusive actress at Madonna (マドンナ), releasing what Shūkan Playboy reported as Madonna's best-selling title of 2024 and continuing to release prolifically into 2025–2026."
