  biography: "Yume Takeda (stage name at debut; now Mahiro Ichiki / 市来まひろ) is a Japanese AV actress, manga artist, and YouTuber originally from Minami-Alps City, Yamanashi Prefecture. She debuted on October 5, 2017 under SOD star as the first of a three-consecutive-month debut campaign and quickly became an exclusive contract actress for the label. She won the Newcomer Award at SODAWARD 2018 and the Exclusive Actress Award at SODAWARD 2019. In October 2020 she renamed herself Mahiro Ichiki, joined talent agency LINX, and returned to the screen on November 23, 2020. She signed an exclusive contract with Madonna in March 2024 and has continued releasing work through 2025."
