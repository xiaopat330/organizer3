  biography: "Hibiki Natsume is a Japanese AV actress from Iwate Prefecture, born June 22, 1998. She made an unusual debut: a pre-release bonus DVD produced by SODクリエイト in early 2020 under the anonymous name '名前はまだない。' ('No name yet.') drew strong viewer demand, leading to an official first release on April 23, 2020 still without a stage name. She was formally named Natsume Hibiki on May 1, 2020, with her official debut title released May 21, 2020. An exclusive contract actress under SODstar throughout her career, she rose quickly — her debut content reached #1 on FANZA daily rankings during pre-sale. In March 2023 she won the スカパー!アダルト放送大賞2023 新EXガールズセンター grand prize. She announced her retirement from AV on January 13, 2026, with her retirement title planned for August 2026."
