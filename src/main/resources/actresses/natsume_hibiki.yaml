  legacy: "Natsume Hibiki's unconventional anonymous debut — a bonus DVD that generated enough demand to become a full commercial release — made her one of SOD's most distinctive debut stories. Her consistent exclusive output across six years under SODstar labels (START, STARS, SSHN) and her crossover into mainstream film acting under the name 大河響 mark her as one of SOD's standout contract actresses of the 2020s era."

