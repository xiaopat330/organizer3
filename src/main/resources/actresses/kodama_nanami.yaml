  biography: "Nanami Kodama (兒玉七海), born June 22, 2002, debuted in September 2021 under the stage name Nanami Ogura (小倉七海) with S1 NO.1 STYLE. After a hiatus from late 2022, she returned to activity in 2023–2024 under her current stage name 兒玉七海, the traditional kanji form of 児玉七海. She was affiliated with talent agency Life Promotion (ライフプロモーション) until October 2022, then joined T-POWERS (ティーパワーズ) in September 2023. She holds an exclusive contract with S1 NO.1 STYLE and is active across its label. Her hobbies include photography (camera) and Rubik's cube. Nicknames: こなみん, ぐらちゃん, ぐらたん."
