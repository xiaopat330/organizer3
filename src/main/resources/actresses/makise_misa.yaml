  biography: "Misa Makise (牧瀬みさ) is a Japanese AV actress born on 1 April 1993 in Hokkaido. She debuted in March 2012 as an exclusive actress for SOD Create, having drawn attention prior to her debut when her first shoot was live-streamed on Niconico to an audience of 150,000 viewers and she appeared on the TBS variety programme 'Arita to Matsuko to Otoko to Onna'. A G-cup busty actress, she released six solo titles under SOD Star (STAR) during her exclusive contract (March–August 2012), then continued as a freelance actress across labels including Maxing, Madonna, Moodyz, and E-BODY. In 2016 she re-debuted under the name 倉木ひな affiliated with office BLITZ, extending her career into the late 2010s."
