  legacy: "One of the most commercially successful AV debuts of the 2005–2006 era, Amami Rei's early Shy Kikaku releases set decade-best sales records for that label and reignited mainstream interest in the glasses-girl archetype in Japanese AV. Her crossover activities — photographic work with Ryuichi Sakamoto, lead roles in indie films, and television hosting — made her a rare example of an AV actress who built a parallel presence in mainstream entertainment during her active years."

