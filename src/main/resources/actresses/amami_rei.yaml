  biography: "Amami Rei debuted on February 25, 2005 with 'Natural 天海麗' on the Shy Kikaku label, her first release selling 26,000 copies on initial shipment — a rare figure for a debut. Her fifth title, 'Frame Graffiti,' sold 30,000 copies and helped spark a mainstream 'megane-ko' (glasses-girl) boom that drew coverage in weekly magazines and evening newspapers. Following Shy Kikaku's eight-title contract, a fierce bidding war among studios concluded when veteran label Alice Japan (JHV/WILL Group) secured her exclusive contract; she released titles across Alice Japan and its sister labels Calen and Samantha through early 2007. In mid-2007 SOD Create won a subsequent bidding contest for her sell-through rights, and she held an exclusive SOD contract until her graduation event on February 24, 2008. Beyond AV she appeared in mainstream films, a TV Osaka talk show, and worked as a production-side actress with Attackers; she also served as a photoshoot model for musician Ryuichi Sakamoto's photography debut."
