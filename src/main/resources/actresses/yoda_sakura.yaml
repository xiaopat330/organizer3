  biography: "Erika Ozaki (born March 30, 2000), known at debut as Sakura Yoda, is a Japanese AV actress affiliated with the LIGHT talent agency. She entered the industry in August 2021 as a PREMIUM exclusive under the name 与田さくら, completing five exclusive titles before fulfilling her contract in September 2022. She adopted her current stage name 尾崎えりか in August 2022 and transitioned to freelance (企画単体) work from October 2022, quickly attracting offers from numerous studios with her natural eroticism and versatile performance style. From 2024 onward her VR output became particularly acclaimed and she gained the nickname 'New VR Queen' (新・VRの女王). In September 2025 she announced an exclusive contract with the Million label (KM Produce), beginning in October 2025."
