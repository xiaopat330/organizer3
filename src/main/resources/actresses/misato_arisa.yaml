  biography: "Arisa Misato (美里有紗) is a retired Japanese AV actress born July 4, 1992 in Hokkaido. She debuted in September 2013 as an exclusive actress for Alice Japan, earning attention for her fair complexion and voluptuous figure. In late 2013 she traveled to Australia for a location shoot alongside fellow Alice Japan actress JULIA, producing a photobook and image DVDs. From 2015 she moved to an exclusive contract with S1 No.1 Style, continuing to work primarily from Hokkaido and traveling to Tokyo for shoots and events. She retired on May 13, 2016."
