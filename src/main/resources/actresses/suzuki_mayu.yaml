  biography: "Mayu Suzuki (鈴木真夕) is a Japanese AV actress and former gravure idol from Chiba Prefecture, born 16 March 1994 (A blood type, 159 cm, F-cup). She debuted as a gravure idol in October 2011 with the title 「純粋少女〜17歳、初めてのTバック〜」, working under the agency RUSH, and in November 2014 unveiled her first hair-nude shoot in Weekly Playboy. She made her AV debut in May 2015 with E-BODY under the concept 「現役グラビアアイドルAV解禁」, immediately becoming an E-BODY exclusive. Known for her F-cup bust and distinctive body type, she built a prolific catalog spanning dozens of studios as a freelance multi-label actress after her initial E-BODY exclusive period. She celebrated her AV 10th anniversary in 2025 with a commemorative interview in Weekly Playboy and made her mainstream film debut in the same year in 『この恋は拡張現実?』, and in March 2026 won Best Popular Actress (XCITY最優秀人気女優賞) at the ADULTOPIA expo in Taiwan. She is represented by ML agency."
