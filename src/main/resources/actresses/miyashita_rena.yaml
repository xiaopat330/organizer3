  biography: "Rena Miyashita (宮下玲奈) is a Japanese AV actress from Miyagi Prefecture who debuted on April 5, 2022 as an exclusive actress at MOODYZ, affiliated with the talent agency Luminous Promotion (ルミナスプロモーション). Her debut title '新人 専属 宮下玲奈 19歳 AV Debut!' reached #1 on the FANZA single-actress weekly ranking in the week of April 2, 2022 and became MOODYZ's biggest-selling title of 2022, also placing 15th in Asahi Geino's '2022 AV Annual Sales Ranking.' She was ranked 3rd in the 'This AV Actress is Amazing! 2022 Summer' newcomer edition by Monthly FANZA, and has since maintained strong chart presence across multiple MOODYZ releases. Beyond AV work she has participated in overseas fan events in Taiwan (July and August 2023), staged a first theatrical performance in October 2023, and won a promotional campaign competition ('Viking Rise Sexy Cup') in June 2023 that earned her a large-format billboard advertisement in Shibuya."
