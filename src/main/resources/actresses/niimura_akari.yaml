  biography: "Niimura Akari (新村あかり) is a Japanese AV actress from Kyoto Prefecture who debuted in September 2016, initially appearing in dark-haired refined character roles before transitioning to the aggressive femdom (痴女) style for which she became best known. She built a prolific career across a wide range of labels without a long-term exclusive contract for her first eight years, working frequently with MOODYZ, Fitch, Attackers, Glory Quest, MILK, Million, and dozens of indie labels. Her versatility earned her the nickname 'Niimura-sensei' and a reputation as a reliable supporting and solo performer alike. In May 2019 she formed the punk band 'たちまち。' with fellow AV actresses, and in May 2024 was appointed to the EXガールズ promotional unit (successor to the SKAPA Adult Broadcast Grand Prize legacy group), serving until March 2025. In September 2024 she became an exclusive contract actress with Fitch, a contract that ran through August 2025, after which she returned to non-exclusive freelance activity. She has released multiple photobooks through Prestige Publishing and remains active as of 2026."
