  biography: "Asami Nagase (長瀬麻美, born June 6, 1992 in Aomori Prefecture) is a Japanese AV actress and former gravure idol. She began her career in 2009 under the gravure name Mizutani Sayaka (水谷彩也加), working under Aquas Entertainment before retiring from that agency in January 2012. She relaunched as Nagase Asami in April 2012 and made her AV debut in September 2014 under Alice Japan. She subsequently became an exclusive actress for MAX-A (October 2015), with a hiatus from June 2019 to July 2022 before returning to the MAX-A roster. She is known for her naturalistic performance style and appeared in FANZA floor rankings as recently as 2025."
