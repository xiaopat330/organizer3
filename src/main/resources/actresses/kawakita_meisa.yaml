  biography: "Miyu Otori (鳳みゆ), born December 5, 2000 in Gunma Prefecture, debuted on December 12, 2020 under the stage name Kawakita Meisa as a FALENO exclusive actress. After leaving FALENO in late 2021 she transitioned to general planning work across multiple labels, briefly changing her name to Minami Sawakita from July 2022 before reverting to Kawakita Meisa in early 2023. She announced retirement in April 2023 but returned to the industry in July 2024 under the new stage name Miyu Otori (鳳みゆ), affiliated with talent agency SO MODEL AGENT. In November 2025 she entered a dual exclusive contract with ROYAL and Attackers simultaneously, marking a prominent comeback. As of 2026, several of her titles have topped FANZA weekly rental and video floor rankings."
