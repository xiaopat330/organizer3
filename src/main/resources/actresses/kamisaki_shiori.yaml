  biography: "Shiori Kamisaki is a former Japanese AV actress from Kyoto Prefecture who was raised in Sakai, Osaka, and debuted with million (KM Produce) in March 2011 at age 20, winning スカパー!アダルト放送大賞 作品賞 for her debut title. Over an eight-year career she held exclusive contracts with five studios — million, MOODYZ, OPPAI, Idea Pocket, and Attackers — before a final run with the WILL group, building a reputation for busty big-sister (お姉さん系) performances. A music university graduate, she was a founding member of AV idol unit me-me* and a regular in Ebisu Muscats (2015–2018). She announced her retirement in April 2019, with her final MOODYZ title released December 13, 2019. Post-retirement she married pro wrestler Iwasaki Takaki in March 2021, had two children, and relaunched as musician 'Koara-chan' in February 2023."
