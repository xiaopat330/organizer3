  biography: "東凛 (Rin Azuma), born July 21, 1986 in Meguro, Tokyo, began working as a child model at age 3 and continued in mainstream entertainment through adulthood and after marriage. She made her gravure AV debut on July 21, 2014 (her birthday) and her full AV debut on September 13, 2014, both with Tameike Gorou. In January 2020 she transferred to ATTACKERS while maintaining a tie with Tameike Gorou, later moved to Madonna and VENUS, and from March 2021 has been an exclusive under DAHLIA, the boutique label within FALENO. She was nominated for Best New Actress at the DMM.R18 Adult Award 2015 and placed second in the middleweight division at AV OPEN 2014."
