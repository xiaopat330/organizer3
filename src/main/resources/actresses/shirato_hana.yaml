  biography: "Hana Shirato (白桃 はな) is a former Japanese AV actress born on May 12, 2000, in Yamagata Prefecture. Inspired by AV actress Momono Kana while in high school, she debuted in October 2020 under Moodyz at age 20, having chosen the stage name 白桃 (Shirato / white peach) as a tribute to her idol. She quickly rose to prominence in the industry, placing 4th in FANZA's 2021 second-half actress ranking and 3rd in the 2022 annual ranking. In March 2022, she won the 透明感賞 (Transparency Award) at the prestigious Miss iD 2022 competition organized by Kodansha, becoming notable as an AV actress crossing into mainstream idol circles. After a prolific two-year career across major studios including Moodyz, Wands Factory, Honnaka, and kawaii*, she withdrew from public activity in late 2022; as of April 2024, her agency Mines no longer lists her on their website."
