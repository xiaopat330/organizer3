  legacy: "Shirato Hana was one of the most commercially successful AV actresses of her debut year cohort (2020), ranking in FANZA's top 5 for both the 2021 and 2022 annual polls and earning a mainstream media crossover via Miss iD 2022. Known as the 'sweet sadist queen' (甘サドの女王), her career — though only about two years in duration — produced over 80 titles across nearly every major studio."

