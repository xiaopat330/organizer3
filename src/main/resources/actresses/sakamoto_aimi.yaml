  biography: "Aimi Sakamoto (坂本愛海, born 18 January 1989 in Tokyo) is a Japanese AV actress who debuted in October 2007 across multiple labels simultaneously, quickly becoming a prolific performer through 2008–2009. Standing 148 cm with an E-cup bust (later described as F/G-cup in multi-actress compilation titles), she appeared in a wide range of productions from kawaii*, E-BODY, Natural High, and many other labels during her active period. She retired around 2011 but returned to adult video in December 2013, notably appearing while ten months pregnant — a fact highlighted in her comeback title. Her post-comeback appearances concluded in early 2014."
