  legacy: "Aki Sasaki is regarded as one of the most productive and acclaimed actresses of the 2010s married-woman (人妻) AV genre, known for high-volume output across premium labels and a distinctive elegant style. Her return to the industry in December 2025 after more than six years away — as a MOODYZ exclusive — was commercially successful, achieving multiple top-10 FANZA chart placements and immediate industry recognition."

