  biography: "Aki Sasaki (佐々木あき) is a Japanese AV actress from Saitama Prefecture who debuted in October 2015 with SOD Create's wife label, marketed as 'the best woman in her 30s in SOD wife label history.' Her debut work framed her as a married mother of two, and she quickly became one of the most prolific married-woman genre actresses of the 2010s, appearing in over 400 titles across dozens of labels — notably Madonna (JUY/JUX series), MOODYZ (MIAD/MIAE/MIGD), and Prestige (PRED) — in under four years without holding a studio exclusive. She announced her retirement in December 2018, citing her children's growth and having met her savings target, with her final original work in April 2019; she had said she would 'only return if chased by debt collectors.' She resumed her social media presence in September 2025 and returned as a MOODYZ exclusive in December 2025 with active releases continuing into 2026. For many years she publicly claimed a birth date of December 24, 1979, but corrected this to March 17, 1983 in a December 2025 post on X."
