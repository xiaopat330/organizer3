  biography: "Akari Hoshino (星野あかり) is a Japanese retired AV actress and former stripper born on 24 August 1985 in Kyoto Prefecture. She debuted in adult video in January 2005 through h.m.p and simultaneously began performing as a stripper, retiring from stripping in November 2007. From 2008 she expanded into television dramas, appearing in numerous mainstream productions throughout her career. She worked across a wide range of studios throughout her AV career, including MAX-A, SOD Create, PREMIUM (Glamorous), Tameike Goro, Moodyz/Chijo Heaven, Madonna, and Attackers, becoming particularly associated with the mature-woman (熟女) genre in her later career. She was nominated for the SKY PerfecTV! Adult Broadcast Award for Best Mature Actress in 2013. In June 2016 she announced an indefinite hiatus due to illness; in May 2017 she announced her retirement, with her final work dated 31 May 2017."
