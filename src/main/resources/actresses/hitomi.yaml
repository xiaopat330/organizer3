  biography: "Hitomi (born July 18, 1986 in Kumamoto Prefecture) is a Japanese former AV actress and gravure idol known internationally as one of the most prominent large-bust performers in the industry. She began her career as gravure idol Tanaka Hitomi (田中瞳) in 2007, debuting with the image video Bakunyuu no Shougeki, before announcing her AV debut under the mononym Hitomi via SOD Create in November 2008. Her early career measurements of 97 cm J-cup grew over time to a claimed 113 cm O-cup, making her a flagship performer for the OPPAI label from 2010 onward, where she held an exclusive contract from 2016. She received international recognition through the US-based big-bust site SCORELAND, winning Model of the Year three consecutive times and being named Model of the Decade for 2010-2019. She announced her retirement on February 28, 2022, with her final works released in April 2022."
