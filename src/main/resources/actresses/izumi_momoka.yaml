  biography: "Momoka Izumi (泉ももか) is a Japanese AV actress from Yamagata Prefecture, born October 25, 2002. She made her AV debut on September 3, 2024, with the MOODYZ title '超新人 透明感の女神10年に1人のエロカワイイ美少女 AV DEBUT 泉ももか', where she was promoted as a once-in-a-decade beauty. Prior to her AV career she completed nursing school and obtained her nursing license. She is affiliated with the talent agency T-Powers (ティーパワーズ) and has worked primarily under the MOODYZ label. Several of her titles have ranked in FANZA weekly rental and sales charts, and in March 2026 she placed third in the monthly FANZA rental floor AV actress ranking."
