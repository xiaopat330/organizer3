  legacy: "Yuna Ogura is one of the most prominent SODstar exclusive actresses of her generation, recognized for exceptional VR content and as the leading Japanese AV actress among Korean audiences. Her cross-border appeal — including Korean-language YouTube content, television appearances in South Korea, and awards from Korean entertainment organizations — represents a rare mainstream international profile for a Japanese AV performer."

