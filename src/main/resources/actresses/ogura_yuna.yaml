  biography: "Yuna Ogura (小倉由菜) is a Japanese AV actress and YouTuber from Yokohama, Kanagawa Prefecture, born 5 November 1998, who has been an exclusive SODstar (SODクリエイト) actress since her debut in December 2017. She made her AV debut on 2017-12-07 with STAR-854 '小倉由菜 AV Debut' as the third entry in SODstar's three-month consecutive debut series, going on to win the SOD AWARD 2018 Best New Actress award. She is known for a strong VR catalog — her 2019 VR title '雪山遭難VR' (3DSVR-0382) ranked first in the '2019 upper-half best erotic VR' poll and second in the 2016–2021 all-time best — and has cultivated a large Korean fanbase through active YouTube activity (channel 'OGURA YUNA TV' reached 470,000 subscribers before closure; successor channel 'OGUOGU' launched 2023). She also appeared in the Netflix series 全裸監督 (seasons 1 and 2) and the pink film '濡れた愛情 ふしだらに暖めて' (2019), for which she won the Momo-Kuma Award for Best Actress in 2020. In April 2026 she announced a temporary hiatus from acting to study abroad."
