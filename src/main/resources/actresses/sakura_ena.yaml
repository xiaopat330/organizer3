  biography: "Ena Sakura (さくらえな) is a Japanese AV actress born on February 21, 1995, in Tokyo. She made her AV debut in November 2013 as an exclusive contract actress for S1 NO.1 STYLE, with her debut title released on November 7, 2013. In June 2014, she announced on her official blog that she would be leaving her S1 exclusive contract, after which she appeared in works from numerous other studios. She is affiliated with the talent agency IZBASA. Her hobbies include going to the gym, and her special skills are sports in general."
