  biography: "Hana Haruna (born November 8, 1988 in Tokyo) is a Japanese AV actress and former gravure idol known for her exceptionally large K-cup bust. She entered the entertainment industry in late 2008 through a personal introduction and spent roughly two years as a gravure idol — including a regular slot in Monthly Charger magazine — before making her AV debut on July 1, 2010 with MUTEKI. She moved to S1 NO.1 STYLE in December 2010, where she released monthly titles through September 2014, then transferred to Tameike Goro (Harem), before spreading across numerous labels including Attackers, Fitch, Madonna, and many others as a freelancer. From the 2020s she has embraced a mature/milf niche to complement her naturally abundant figure. She is also known for her YouTube channel activity and was ranked 3rd in GEO TV's 2021 busty AV actress ranking."
