  biography: "Shuri Atomi (跡美しゅり) is a Japanese AV actress and idol born on October 6, 1995 in Tokyo, affiliated with Bambi Promotion. She debuted in September 2015 and quickly carved a niche as an assertive, dominant (S-type) performer, citing a desire to physically dominate men as her motivation for entering the industry. She participated in the idol unit Harajuku Bambina alongside six label-mates from Bambi Promotion, releasing a debut CD in October 2016. After a brief hiatus in the second half of 2017, she resumed AV work in February 2018 and continued producing content through multiple labels including WANZ, ONEZ, MIAD, and HND until announcing her retirement on June 1, 2021 via her YouTube channel. Post-retirement she remained active as a talent under Bambi Promotion, running her YouTube channel, producing idol groups, and holding annual photography exhibitions."
