  biography: "Hazuki Wakamiya (born August 29, 1993 in Nagoya, Aichi) is a Japanese AV actress affiliated with Bambi Promotion. She debuted in January 2015 under the stage name Mizuki Hayakawa via SOD Create's S-Cubic label, then transitioned to working as a freelance planning actress (企画女優) across many makers including E-BODY, Bazooka, Momotaro, and Wands. On July 10, 2020, she announced her rename to Wakamiya Hazuki via Twitter — notably an anagram of her former name. Alongside her AV work, she was a member of the idol unit 原宿☆バンビーナ (Harajuku Bambina), assigned the orange colour and the catchphrase 'Everyone's Sun', debuting with the unit in February 2017 and later reuniting for a performance in June 2024. She has stated she entered the industry to cover university tuition fees, and in a 2019 interview noted she balanced an office job alongside her AV work. Her official public profile listed Tokyo as her birthplace, though she is actually from Nagoya."
