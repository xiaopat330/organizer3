  biography: "Mei Washio (born October 20, 1997 in Kanagawa Prefecture) debuted in
    April 2019 as an exclusive S1 NO.1 STYLE actress under the name 筧ジュン (Jun Kakei),
    appearing in Shuukan Playboy the same summer for her first gravure spread. In
    March 2020 she transferred management to Eightman Production and renamed herself
    鷲尾めい (Mei Washio), simultaneously releasing two digital photo books for Weekly
    Gendai. She has remained an exclusive S1 actress throughout her career, building
    a reputation around a signature J-cup bust and warm, service-oriented screen presence.
    Her FANZA rankings and Asahi Geino poll placements (11th overall in the 2024 survey)
    reflect steady A-list status. Outside adult work she appeared in the Fuji TV anthology
    drama Sekai ni mo Kimyou na Monogatari (2020) and in Netflix's Zenra Kantoku 2 (2021)."
