  biography: "Hinako Mori (森日向子) was born September 9, 2000 in Mie Prefecture and grew up as a fan of actress Yuna Ogura, whose influence inspired her interest in the AV industry. She made her AV debut in June 2020 as an exclusive actress under SOD Create's KMHR (キミホレ) label, affiliated with the agency NAX Promotion; after three exclusive titles she transitioned to working as a kikaku-tansoku actress. Also in June 2020 she entered the Kodansha Miss iD 2021 competition, advancing to the semi-finals. She is also active under the alternate name 朝比奈えみり."
