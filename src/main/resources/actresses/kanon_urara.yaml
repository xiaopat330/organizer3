  biography: "Kanon Urara (花音うらら, born November 11, 2000) is a Japanese AV actress, singer, and dancer affiliated with Life Promotion (ライフプロモーション). She debuted in January 2020 at age 19 after being inspired by a documentary about Italian adult film directors and applying directly to the agency of senpai actress Momono Kana. Despite debuting during the COVID-19 pandemic, she rapidly rose to prominence and was ranked #1 in a Cyzo new-actress view-count ranking by May 2020. She is known for her petite 148 cm frame, her distinctively natural body, and her self-described passionate enthusiasm for her work. Beyond AV, she is a vegan, a singer (debut single 'うららか' in August 2021), and a performer at the Burlesque Tokyo venue ROKUSAN ANGEL, where she performs under the name Urara."
