  biography: "Mai Hagiwara (萩原舞) is a Japanese retired AV actress and former nude model born on 22 March 1982 in Osaka Prefecture. She first became known as a popular okashi-kei (candy-style) idol under the name Watanabe Saki (渡邊 紗希), making her gravure debut in the magazine Cream in August 1997 after narrowly missing selection on the TV Tokyo audition show ASAYAN. In November 2003 her AV debut was announced under an exclusive contract with Japan Home Video, with a dedicated sub-label 'みるくる' created for her debut work released in February 2004; her early Alice Japan output featured simulated rather than actual intercourse, contributing to both controversy and strong sales. From late 2004 she moved to the existing Alice Japan label and produced a consistent catalogue of solo works through 2006, before returning to AV in 2008 under Maxing for two new titles. She is not to be confused with the Hello! Project idol of the same name (born 1996), a fact explicitly noted on her Wikipedia page."
