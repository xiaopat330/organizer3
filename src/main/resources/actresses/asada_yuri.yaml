  biography: "Yuri Asada (浅田結梨) is a Japanese actress and former AV actress born on January 10, 1997, in Niigata Prefecture. She made her AV debut in November 2015 through SOD Create under the concept of a part-time AV actress who was simultaneously working as a maid café staff member at a Akihabara café and active as a TV talent. She quickly became prolific across dozens of labels as a freelance actress, and in March 2020 she joined the idol group 恵比寿マスカッツ. In June 2018 she renamed herself 深田結梨 (Fukada Yuri), and in June 2022 she went freelance under the nickname ゆーりまん before her formal retirement in October 2023 after an eight-year AV career. Following her AV retirement she transitioned to mainstream entertainment activities, adopting the name 澄悠里 (Sumi Yuuri) in February 2024."
