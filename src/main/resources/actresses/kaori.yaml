  biography: "KAORI (born Morishima Kaori, May 8, 1978, Chiba Prefecture) is a former Japanese AV actress, gravure idol, and race queen. She began her entertainment career under her birth name, serving as a race queen for 5ZIGEN (2000) and Sigma Tec Racing (2001), which led to gravure magazine coverage and a formal debut with the photo book 'bé cat' and an image video in September 2001. From 2002 she adopted the mononym KAORI, building a following through sexy gravure shoots and image DVDs throughout the mid-2000s. She made her AV debut in December 2009 through MUTEKI, followed by an exclusive contract period with PREMIUM (Prestige) and Attackers during 2010-2014, establishing herself as a prominent I-cup performer known for her voluptuous figure. She worked as a free-agent actress from 2015 onward across numerous labels under various aliases including 堀美幸 and 月野キラリ, before retiring from AV in May 2019."
