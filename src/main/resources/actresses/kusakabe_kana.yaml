  biography: "Kana Kusakabe is a Japanese AV actress born July 11, 1995 in Tokyo. She joined Soft On Demand (SOD) in April 2018 as a PR department employee and debuted on-screen in March 2019 while still employed there, billed as 'SOD female employee Kana Kusakabe.' After resigning from SOD in July 2019, she signed an exclusive contract with MOODYZ in September 2019, winning their Best New Actress award that December. In January 2021 she moved to Attackers as an exclusive, then in August 2022 transferred to Madonna, where she has remained as an exclusive into 2026. Known for her J-cup bust (she grew from I-cup to J-cup after her debut), she has become one of Madonna's most prominent exclusive actresses."
