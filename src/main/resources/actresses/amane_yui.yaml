  biography: "Yui Amane (天音ゆい) debuted in August 2020 as an exclusive actress for kawaii*, affiliated with talent agency Bstar (バンビプロモーション). Known by the nickname 'yuimero', she built a reputation as a slender, sensitive performer described by critics as the actress 'most suited to a school uniform' at her peak. She released titles consistently for kawaii* throughout her career and also appeared with MOODYZ, Attackers, S-Cute, and other labels. She retired on May 2, 2023 with a farewell title (CAWD-521). Her anthology compilation appeared on the FANZA video floor ranking at #1 in July 2023, months after retirement."
