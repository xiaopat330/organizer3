  biography: "Nanoka Hatsumi (初美なのか) is a Japanese AV actress born on June 7, 2005 in Gifu Prefecture. She debuted with S1 NO.1 STYLE on September 23, 2025 with the title 'Shinjin NO.1 STYLE Hatsumi Nanoka'. She was a university student at the time of her debut and had practiced kyudo (Japanese archery) throughout middle and high school, achieving second-dan rank and placing second in a regional tournament. Her stage given name 'Nanoka' was given to her by S1. She cites admiration for actress Yua Mikami as an inspiration for entering the industry, wanting to become famous. She published her first solo photobook, 'Hatsumi Nanoka', in January 2026."
