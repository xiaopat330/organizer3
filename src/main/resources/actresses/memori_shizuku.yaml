  biography: "Shizuku Memori (stage name 芽森しずく) debuted in AV on October 3, 2013 under agency T-POWERS. She subsequently changed her name to 朝日奈るみな (Asahina Rumina) and later to 宝生リリー (Housei Lily) from January 21, 2018. She announced a sudden retirement from AV on December 4, 2018, but returned in March 2019 under the name 一花琴音 (Ichika Kotone) before reverting to 宝生リリー in October 2019. Her career included exclusive contracts with Prestige (ABP), Attackers (SHKD), Premium (PGD), and Orga. In August 2022 she publicly disclosed that she had suffered extensive burns from a medical laser hair removal procedure at a cosmetic clinic in January 2022, which forced a prolonged hiatus from filming."
