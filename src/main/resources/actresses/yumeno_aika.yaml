  biography: "Aika Yumeno was born on August 26, 1994 in Saitama Prefecture and made her entertainment debut with a gravure image DVD in March 2013 before joining S1 No.1 Style as an exclusive actress in May 2013. Despite her petite 149 cm frame, her debut attracted nationwide attention and her promotion poster was placed in TSUTAYA outlets across Japan. She rose to become S1's longest-tenured exclusive actress following Akiho Yoshizawa's retirement in 2019, completing a decade with the studio by 2023. After a roughly 300-day personal hiatus beginning late 2023, she announced her comeback with SONE-430 (September 2024) and resumed regular releases through 2025."
