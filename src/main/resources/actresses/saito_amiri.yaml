  biography: "Amiri Saito (斎藤あみり), born 8 March 1999 in Shizuoka Prefecture, is a Japanese AV actress who debuted on 20 September 2019 as a Prestige exclusive under the catchphrase 'Japan's most sexy Saito-san,' having previously worked at an Akihabara maid cafe. She remained a Prestige exclusive until November 2021, when she transferred to Idea Pocket as an exclusive; from June 2022 she moved to a freelance model career, working across a wide range of labels including MOODYZ, kira kira, kawaii*, Attackers, MAXING, and many others. Known for her slender build, gyaru image, and high FANZA chart performance — her MOODYZ title '入り浸りギャルにま○こ使わせて貰う話 実写版' reached #1 on the FANZA video floor ranking in March 2024 — she became one of the most frequently charting actresses of the mid-2020s. On 9 March 2025 she announced via social media that she would retire at the end of December 2025."
