  biography: "Konatsu Kashiwagi (柏木こなつ) is a Japanese AV actress from Yamanashi Prefecture who debuted on November 11, 2021 as an exclusive actress for SOD Create under the 青春時代 (Seishun Jidai) label. She is known for her youthful, girl-next-door image combined with an F-cup figure, a combination that earned her the description 'baby-faced with a hidden bombshell body' from industry commentators. In April 2022 she ended her SOD Create exclusive contract and transitioned to working as a 企画単体女優 (freelance single-title actress), quickly expanding across numerous labels and building a prolific catalog. In December 2022 she co-founded the four-member idol group mumk with fellow ビーダッシュプロモーション agency mates 美園和花, 宝田もなみ, and 宇流木さら. By 2024 she had ranked in FANZA's top-10 actress charts and placed 26th in Asahi Geino's 2024 AV Actress Sexy General Election. In March 2026 she received the BEST CREATIVE WORKS award at the ADULTOPIA adult expo in Taiwan."
