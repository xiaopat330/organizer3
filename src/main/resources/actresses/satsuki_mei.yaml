  biography: "Mei Satsuki (さつき芽衣) is a Japanese AV actress born on 16 August 2000 in Shizuoka Prefecture (her agency's official profile listed Yamagata Prefecture, but she publicly stated Hamamatsu, Shizuoka on a Twitcast broadcast; magazine interviews also use Shizuoka Prefecture). She debuted on 7 July 2020 with DEEP'S under the title 'あどけなさとおとなっぽさのちょうど間 19歳新人,' signed as an exclusive. Her exclusive contract with DEEP'S ended on 31 March 2021, after which she worked as a freelance 企画単体 actress across a wide range of labels. In June 2024 she temporarily paused AV filming while continuing public-facing activities, then in September 2025 announced a dual exclusive contract with 無垢 and マドンナ simultaneously from October 2025 — a pairing noted by industry writers as unusual given the studios' contrasting audience profiles (school-girl genre vs. mature-woman genre). She is affiliated with the Mines (マインズ) talent agency and is also a regular at the Roppongi club レッドドラゴン."
