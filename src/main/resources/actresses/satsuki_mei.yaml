  legacy: "Mei Satsuki became one of the most prolific freelance actresses of the early-to-mid 2020s after her DEEP'S exclusive debut, accumulating credits across dozens of labels and ranking 7th in FANZA's 2022 annual AV actress poll. Her 2025 dual exclusive signing with 無垢 (school-girl genre) and マドンナ (mature-woman genre) simultaneously was described by industry commentators as a rare 'achievement' reflecting the breadth of her appeal."

