  biography: "Ran Niyama (新山らん) is a Japanese AV actress and former gravure idol born on September 14, 1991 in Gunma Prefecture. She debuted in December 2010 with a gravure DVD (オルスタックピクチャーズ) before taking a hiatus in 2011 and resuming activity in 2012. In May 2013 she made her AV debut under MUTEKI, and later that year signed an exclusive contract with S1 NO.1 STYLE, where she released a prolific run of titles through 2014. She is best known for her exceptionally large K-cup bust (110 cm), which was covered in Shūkan Playboy and earned her the tagline '霊長類最強の巨乳' ('strongest big breasts among primates'). Her hobbies include film watching, golf, and reading, and her special skill is cooking pasta and sweets."
