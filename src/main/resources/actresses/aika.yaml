  legacy: "Aika is widely regarded as one of the definitive gyaru AV actresses of the
    2010s. Her kurogal persona — combining a deep tan with an athletic, high-energy
    screen presence — became synonymous with a distinct subgenre. Her ability to evolve
    her aesthetic after that peak while sustaining output over more than a decade makes
    her among the most resilient performers of her generation."

