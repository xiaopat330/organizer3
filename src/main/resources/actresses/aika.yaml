  biography: "Aika (愛佳) is a Japanese AV actress from Hyogo Prefecture whose career
    is defined by her signature gyaru/kurogal aesthetic — deep tan, bleached or dyed
    hair, and an athletic build. She debuted on February 1, 2011 with Prestige (debut
    title MMY-011: ダマし撮りじぇねれーしょん 11) while simultaneously working part-time as
    a beautician; she balanced both professions for roughly four years after her debut,
    filming on weekends and holidays while attending to hair clients on weekdays. Affiliated
    with Five Promotion agency, she achieved widespread industry recognition between
    2016 and 2018, winning the Excellent Actress Award at the DMM Adult Awards in 2016
    and Best Actress at the Sky PerfecTV! Adult Broadcasting Awards in 2017. From 2019
    onward she gradually evolved her visual style — reducing tanning for a lighter complexion
    and adopting more subdued makeup and calmer hair colors — while remaining prolific
    into the mid-2020s with particularly strong output in compilation titles."
