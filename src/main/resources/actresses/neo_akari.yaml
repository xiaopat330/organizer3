  biography: "Akari Neo (根尾あかり) is a Japanese AV actress affiliated with Life Promotion (ライフプロモーション) who holds a teaching license and studied musical theater at university. She made a brief AV debut in March 2017 under the name Kojima Ami (小嶋亜美) via kawaii* with a single title, before re-debuting under her current stage name in April 2019, initially through Idea Pocket and then as a prolific freelancer across MOODYZ, Honnaka, Madonna, Attackers, M's Video Group, and numerous other labels. She gained rapid recognition in 2019–2020, earning a FANZA editorial pick for 'most anticipated actress of 2019' and placing 6th in FANZA's 2020 first-half actress rankings. From June to December 2021 she held a limited exclusive contract with VENUS, before signing as an exclusive with M's Video Group (エムズビデオグループ) from 2022 onward. Outside AV she has appeared on テレビ東京's ゴッドタン variety program multiple times, formed the entertainment unit 'いぶりがっこクリームチーズ' with co-actress 二葉エマ, and released multiple photo books including 'NEO World' (2020) and 'ことぼし' (2024)."
