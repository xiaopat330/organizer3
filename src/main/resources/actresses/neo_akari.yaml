  legacy: "Akari Neo is one of the most prolific and consistently ranked AV actresses of the early 2020s, recognized for her acting ability — unusual in the genre — as demonstrated by mainstream television variety appearances on ゴッドタン. Her multi-label freelance peak (2019–2021) resulted in an exceptionally broad catalog across virtually all major JAV studios before she settled into a long-term exclusive with M's Video Group."

