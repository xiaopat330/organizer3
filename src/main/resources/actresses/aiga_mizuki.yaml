  biography: "Aiga Mizuki (藍芽みずき) is a Japanese AV actress from Nagano Prefecture, born June 28, 2000, who debuted exclusively with MOODYZ in October 2019 under the catchphrase \"べっぴんキュート\" (Pretty Cute). Signed to Bambi Promotion talent agency, she became a prominent MOODYZ exclusive, appearing in the flagship MIDE series across 24 titles between 2019 and 2022 alongside appearances in MIDV and other MOODYZ sub-labels. In August 2022 she moved to SOD Creative as an exclusive actress before transitioning to freelance from 2023 onward, working across a wide range of labels including Alice Japan, Max-A, and SOD. She has also appeared in several VR titles, an AV-game adaptation, and a published photobook (藍い鍵盤, G-Walk, November 2023). Her hobbies include piano and swimming."
