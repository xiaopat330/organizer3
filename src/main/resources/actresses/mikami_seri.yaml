  biography: "Seri Mikami (美上セリ) is a Japanese retired AV actress who debuted in November 2006 as a dual exclusive for MAX-A and Japan Home Video (Alice Japan), making her first appearance in the Alice Japan title 'Coolな女神' (2006-11-30). She released solo works under the Karen/MAX-A label before transitioning to a cell-distribution deal with Maxing in December 2007 ('美上セリ 解禁'). In early 2008 she appeared in several Idea Pocket titles, including two solo releases. No formal retirement announcement was made; new releases ceased after June 2008."
