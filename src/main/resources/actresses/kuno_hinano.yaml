  biography: "Hinano Kuno (九野ひなの) is a Japanese AV actress from Fukuoka Prefecture who debuted in September 2022 as an exclusive performer for MOODYZ, marketed at debut as a current female university student. Managed by talent agency T-POWERS (ティーパワーズ), she is known for her G-cup figure and quickly became a prominent face in the MOODYZ lineup. In November 2022 she was selected as a MOODYZ campaign girl (桃組 member), and in March 2024 she was again named a MOODYZ campaign girl. That same April she was chosen alongside several other performers for the FANZA Golden Week campaign 'GW大感謝祭2024'. She has also participated in industry photo events, including the 'TREND GIRLS' fashion show at Shirakobato Water Park, Saitama, in 2024 and 2025."
