  biography: "Kana Narimiya (成宮カナ, born September 13, 1988 in Tokyo) is a Japanese AV actress who debuted briefly in 2008 under the label ZERO, then relaunched her career in earnest in 2011, primarily with Idea Pocket (IPTD/MIAD series) and Attackers. She is managed by Lotus Tokyo and has also worked under the alternate name Awano Shizuku (泡乃しずく). Over a catalog of more than 30 titles she appeared in solo features, costume-play compilations, and SM/bondage themed works with Attackers. Her hobbies are listed as basketball and the abacus."
