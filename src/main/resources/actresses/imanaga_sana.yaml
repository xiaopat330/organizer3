  biography: "Sana Imanaga (今永さな) is a former Japanese AV actress from Nagano Prefecture, born February 9, 1996. She debuted in June 2016 as a Prestige exclusive, noted for her short hair and G-cup bust, and released more than a dozen titles under the Prestige ABP flagship line through 2017. In 2018 she moved agencies to SF-FRATE and adopted the stage name Matsunaga Sana (松永さな), signing a dual exclusive contract with IdeaPocket and Attackers. Later in 2018 she transitioned to a Tameike Gorō exclusive while maintaining her Attackers affiliation, before leaving exclusive contracts in February 2019 to work as a freelance actress across multiple labels. Her active career spanned approximately 2016 to 2020."
