  biography: "Mitsuha Ashitaba (明日葉みつは) is a Japanese AV actress born on January 30, 2000, who debuted with S1 NO.1 STYLE on July 11, 2023 with the title 'Shinjin NO.1 STYLE Ashitaba Mitsuha AV Debut.' She grew up in the Tohoku region and moved to Tokyo, where she was inspired to enter the industry after admiring actress Yua Mikami. Originally aspiring to be a model due to her striking 175 cm height, she struggled to break into mainstream modeling partly due to her Tohoku dialect, but found that her tall, slender physique became an asset in AV work. Known for her dynamic body, beautiful legs, and the charming contrast between her poised appearance and her lingering Tohoku accent, she has quickly built a following since debut, landing multiple titles in FANZA weekly rental and sales rankings. She remains exclusively contracted to S1 NO.1 STYLE."
