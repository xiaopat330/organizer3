  legacy: "Mayuki Ito is one of the defining kawaii* exclusive actresses of the late 2010s and 2020s, known for her distinctive hourglass figure, prolific VR output, and exceptional international fanbase reach across Asia. Her longevity as an exclusive since 2018 and continued top-charting placement in FANZA popularity rankings make her one of the most commercially prominent kawaii* talents."

