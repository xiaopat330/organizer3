  biography: "Mayuki Ito (伊藤舞雪) is a Japanese AV actress from Kanagawa Prefecture born on November 30, 1997. She debuted with kawaii* on March 7, 2018, at age 20, marketed under the catchphrase 'overwhelming waist' (圧倒的くびれ) highlighting her F-cup bust and 54 cm waist. Prior to her AV debut she released a soft-focus title under the '未満' label in January 2018. She has remained an exclusive kawaii* contract actress since debut and is also an exclusive model for the fashion magazine 小悪魔ageha. Known as a pioneer of AV VR content — dubbed 'the VR queen of the Reiwa era' — she has produced one of the largest VR filmographies of any exclusive actress. Alongside her AV career she has appeared on ABEMA variety programs and has held fan events across Japan, Taiwan, South Korea, Hong Kong, and Thailand, with a combined social media following exceeding one million on X (formerly Twitter) as of 2024."
