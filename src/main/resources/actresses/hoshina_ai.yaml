  biography: "Ai Hoshina is a Japanese former AV actress from Tokyo, known as the 'chameleon actress' for her ability to portray roles ranging from high school girls to housewives. Prior to entering the industry she worked as a dental hygienist. She debuted in September 2017 with kawaii* and quickly became prolific, filming up to 15 titles per month at her peak while working across dozens of independent labels. In March 2019 she was nominated for the FANZA Adult Award Best Actress of the Year. She announced a hiatus in September 2019 for personal recharging, returning in November 2020 as an exclusive actress for PREMIUM, where she shifted focus to quality over volume. She ended her PREMIUM exclusive contract in September 2022, releasing occasional titles thereafter before announcing her full retirement on Fantia in September 2024."
