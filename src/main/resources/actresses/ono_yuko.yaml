  biography: "Ono Yuko is a Japanese AV actress from Akita Prefecture who debuted in October 2014 under the mononym Aoi (葵) as an exclusive at S1 NO.1 STYLE, motivated by a friend's introduction and with no initial intent to build a long-term career. Over five years at S1, releasing approximately monthly under the SNIS and then SSNI series, she became one of the studio's top draws, known for her H-cup figure. In December 2019 she renamed herself Ono Yuko and joined FALENO star as an exclusive, continuing with the FSDSS series. She announced a retirement in mid-2020 but returned to the industry in April 2021, and has remained active at FALENO and its sister label DAHLIA (DLDSS series) through at least early 2025. A 2021 FLASH magazine poll ranked her 28th among Japanese AV actresses."
