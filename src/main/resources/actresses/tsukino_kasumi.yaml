  biography: "Kasumi Tsukino (月野かすみ) is a Japanese AV actress from Kamakura, Kanagawa Prefecture, who debuted in October 2020 as an exclusive actress for DEEP'S after being scouted on the street in her hometown. She released seven solo titles under the DEEP'S exclusive contract before graduating to free-agent (企画単体) status in May 2021, after which she became one of the most prolific multi-label performers of the early 2020s. Her H-cup figure at just 151 cm made her a distinctive presence across dozens of labels including MAXING, E-BODY, h.m.p, MOODYZ, and many others. She has worked consistently through 2026, appearing on FANZA weekly ranking charts multiple times across 2024 and 2025. She is represented by LiStar PRO (リスタープロ) as of July 2023, previously managed by ALL Pro and Arrows."
