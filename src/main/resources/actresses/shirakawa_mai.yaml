  biography: "白川麻衣 (Shirakawa Mai) debuted in June 2016 as Idea Pocket's 100th exclusive actress, making an immediate impression with her refined, elegant looks in the FIRST IMPRESSION 100 debut title IPZ-774. She remained exclusive to Idea Pocket through mid-2017, releasing seven titles in the label's signature style. In August 2017 she announced a move to agency DINO and adopted the name 中村日咲 (Nakamura Hinata), subsequently working across multiple studios as a freelancer. She later renamed again to 白雪麻衣 (Shirayuki Mai) in 2018, continuing to appear in a wide range of productions. Her Idea Pocket era — marked by her 88-61-88 figure, D-cup, and 162 cm frame — established her as a polished, high-production-value performer within the classic IP house style."
