  biography: "Nana Yagi (八木奈々) is a Japanese AV actress born on September 3, 2000 in Nagano Prefecture. She made her debut on December 13, 2019, as a MOODYZ exclusive actress in a title billed as introducing a once-in-a-decade pure and innocent new star. Originally entering the industry to learn techniques to please men after a boyfriend told her she lacked sex appeal, her complete naivety impressed producers who saw raw potential and immediately signed her to an exclusive contract. She rose quickly through the MOODYZ stable, appearing across multiple sub-labels including MIDE, MIDV, MIDA, and MIZD, and became one of the label's most prominent active actresses. Beyond AV, she has appeared in mainstream web dramas, featured in Weekly Post gravure, and was an original member of the idol group Mi LUNA from お月ちゃんのうた (2023–2024). As of 2026, she remains an active MOODYZ exclusive and is signed to the talent agency Mines."
