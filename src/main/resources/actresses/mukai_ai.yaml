  biography: "Ai Mukai (向井藍) is a Japanese AV actress born on October 24, 1993 in Tokyo, of Japanese-Korean heritage. She debuted in July 2015 as a planned-series actress, simultaneously launching an uncensored career under the name Hata Mari (羽田真里); initially media-shy, she lifted her public exposure ban in 2016. Her short-hair, boyish image became a signature trait and drove her popularity, particularly after a pivotal 2015 shoot led her to discover her enthusiasm for the work. After seven years as a freelancer working across dozens of studios, she became an exclusive Madonna actress in May 2022 — her first exclusive contract — releasing roughly one title per month; she commented at the time that she signed to advance to the 'next stage as a sexy actress.' In March 2025 she moved to an Attackers exclusive contract, and in February 2026 she left her long-time agency Everest to become independent. She celebrated her 10th debut anniversary in November 2025."
