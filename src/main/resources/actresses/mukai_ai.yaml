  legacy: "Ai Mukai is recognized as one of the most prolific and consistently active Japanese AV actresses of the 2010s–2020s, with a decade-long career spanning dozens of studios before transitioning to major exclusive contracts. Her androgynous short-hair persona and reputation for oral technique earned her a devoted fan base and the nickname 'Yodare no Majutsushi' (唾液の魔術師 — wizard of saliva) from veteran actor Shimiken."

