  biography: Ren Gojo (born November 18, 1997, in Yamanashi Prefecture) is a Japanese
    AV actress, former gravure idol, and magician. She debuted in March 2014 as a
    high-school gravure idol, releasing a photobook through KADOKAWA under the name
    Yuki Chika (結城ちか), leaving school to pursue the work. She was active in various
    idol units including the 17th generation of Miniskirt Police (2016–2017) and as
    leader of the magic idol unit Kyuubiko-QPICCO (from 2017), and performed in M-1
    Grand Prix comedy competitions. After retiring from gravure activities in December
    2022, she announced her AV debut under the name Gojo Ren in September 2023, signing
    with S1 and MOODYZ.
