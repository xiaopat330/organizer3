  biography: "Natsu Tojo is a Japanese AV actress from Tochigi Prefecture who debuted in February 2020 as an exclusive under FALENO's 'FALENOstar' label, quickly gaining recognition for her bright smile, slender figure, and high sensitivity. After her one-year FALENO exclusive ended in late 2020 she transitioned to working as a non-exclusive actress across many labels, steadily building a large cross-studio filmography. By 2022 she had risen to the top tier of FANZA rankings, placing 6th in the annual actress ranking that year. In March 2023 she became an exclusive of Honnaka, then added a dual exclusive with Dassu! in May 2023. She announced a hiatus in August 2023 but returned to new releases in December 2024 and remained active into 2026. Beyond AV she has appeared in Weekly Playboy, Asahi Geino, and FLASH gravure, hosted the CS TV programme 'Kira☆Sma Natchan' from 2023, and served as a FANZA campaign girl in 2021 and 2022."
