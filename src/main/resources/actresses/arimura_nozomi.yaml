  biography: "Nozomi Arimura (有村のぞみ) was born on February 14, 1997 in Shizuoka Prefecture and debuted as a Prestige exclusive actress on January 5, 2018. Before entering the industry she attended a sewing school while employed as a fashion designer, and later channeled this background into launching the cosplay fashion brand 'nonnonstyle' in December 2022. She left her Prestige exclusive contract in January 2019 to work as a single-work actress across multiple labels, and was nominated for the FANZA Adult Award 2019 Best Newcomer Actress. In March 2023 she joined the New EX Girls collective through jury selection. She is also known for a background in boxing and professional wrestling, bringing a notably athletic physicality to her performances."
