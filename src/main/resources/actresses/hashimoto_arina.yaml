  legacy: "One of S1's most prominent exclusives of the late 2010s, Arina Hashimoto was known for her tall slender build and girl-next-door appeal. Unusually for the genre, she sustained a nine-year career by rebranding across three major studios, concluding with a well-publicized nationwide farewell tour."

