  biography: "Arina Hashimoto was born December 15, 1996 in Tokyo and made her image-video debut in December 2015 before joining S1 No. 1 Style as an exclusive AV actress in March 2016. She became one of S1's flagship performers, winning the grand prize at the DMM.R18 Adult Award 2018. After leaving S1 in early 2020 she moved to FALENO (a SOD Create label). In August–September 2022 she joined Moodyz under the new stage name 新ありな (Arata Arina), marking a deliberate reinvention. She announced her retirement via YouTube live on December 21, 2024, and spent 2025 on farewell fan-meet tours across Japan before her final title was released in December 2025, closing a nine-year career."
