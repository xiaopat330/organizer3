  biography: "黒川サリナ (Sarina Kurokawa), born December 9, 1995, debuted as an exclusive actress for Prestige in September 2017. Her exclusive contract ended in August 2018, after which she became an independent multi-label performer and changed her name to 黒川さりな. On April 12, 2021 she left Prime Agency and joined NAX Promotion, taking the new stage name 百永さりな (Momona Sarina) — a name she chose for its distinctive and searchable quality. In November 2021 she was awarded the Valuable Actress of Rainbow Channel at the SKY PerfecTV! Adult Broadcast Awards."
