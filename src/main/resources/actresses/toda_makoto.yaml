  biography: "Toda Makoto (戸田真琴) is a former AV actress, writer, and filmmaker born October 9, 1996 in Shizuoka Prefecture. She debuted on June 23, 2016 under SOD's 青春時代 label before moving to SOD Star in November 2016, remaining a SOD exclusive for approximately five years. In December 2021 she announced her retirement, transitioning to a year-long FALENO exclusive run in 2022 before formally retiring as an AV actress on January 31, 2023 at a live event in Tokyo. Alongside her AV career she cultivated a parallel identity as an essayist and filmmaker, crowdfunding ¥6 million in 2019 to produce her directorial debut short film anthology 『永遠が通り過ぎていく』. After retirement she continued under the same stage name as an author and filmmaker, releasing her debut novel 『そっちにいかないで』 in May 2023."
