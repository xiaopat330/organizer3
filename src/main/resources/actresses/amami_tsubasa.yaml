  legacy: "Tsubasa Amami is regarded as one of the defining exclusive performers of Idea Pocket's golden era, known for her consistency, longevity, and broad genre range across over 200 solo titles spanning 15 years. Her ability to remain a top-tier draw at a single studio across multiple industry cycles — while also earning recognition at Attackers and other labels — made her one of the most durable GODDESS-tier performers of the 2010s generation."

