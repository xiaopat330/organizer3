  biography: "Tsubasa Amami is a Japanese AV actress from Hiroshima Prefecture who debuted on October 1, 2009 with 'First Impression 44' on Idea Pocket, establishing herself as one of the studio's flagship exclusive performers. She sustained an unbroken exclusive contract with Idea Pocket for over 15 years — a rare feat in the industry — releasing approximately one new solo title per month throughout the 2010s and into the early 2020s. In addition to her Idea Pocket output, she made regular guest appearances on Attackers (RBD, SHKD, SSPD series) and collaborated with MOODYZ, Madonna, and Tameike Gorō labels for notable projects. She moved talent agencies from 名東(DINO) to T-Powers in April 2018 while maintaining her Idea Pocket contract. On October 1, 2024, marking her 15th debut anniversary, she announced via X (Twitter) that she would enter an indefinite hiatus beginning in November 2024."
