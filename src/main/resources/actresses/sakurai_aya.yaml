  biography: "Aya Sakurai (桜井彩) is a Japanese AV actress from Tokyo who first entered the industry not as a performer but as a promotional staff member at SOD Create, appearing from June 2011 on the SOD publicity blog and as MC of the cable television programme 'SOD女子社員のお仕事ですよ'. She made her AV debut in February 2012 while still employed at SOD, becoming a notable figure through a series of releases themed around her employee persona. In April 2014 she left SOD and from June 2014 became an exclusive actress at S1 No.1 Style (エスワン), citing the label's attentive promotion and the way its actresses were made to shine. She left S1 exclusivity in August 2016 and worked as a freelance single-actress talent across multiple labels. On 7 December 2019 she announced her retirement via Twitter at age 30, citing a desire to pursue other dreams, and her final retirement title was released on 8 May 2020 on SOD Star, with a message from Mana Sakura, one of the actresses she had promoted during her staff days."
