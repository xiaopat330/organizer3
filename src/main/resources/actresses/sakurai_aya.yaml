  legacy: "Aya Sakurai is remembered as one of the most prominent \"SOD女子社員\" (SOD female employee) performers, whose natural personality and behind-the-scenes premise attracted a large fanbase during the S1 era. Her career arc — from in-house PR staff to S1 exclusive — was unusual in the industry and gave her a distinctive identity throughout her eight-year active period."

