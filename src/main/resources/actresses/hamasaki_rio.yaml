  biography: "浜崎りお (Rio Hamasaki), born August 11, 1988 in Saitama Prefecture, debuted in October 2006 under the name Erika Morishita (森下えりか) before adopting her stage name Rio Hamasaki. She worked across major labels including SOD, Moodyz, Crystal-Eizou, Wanz Factory, and Dogma, amassing an extensive catalog of over 1,300 titles on DMM, of which approximately 300 were original works. She retired from AV in 2011 and has since been active in modelling and re-releases. In 2012, DMM's poll of customers for the 30th anniversary of adult video in Japan ranked her 26th among all-time favorites."
