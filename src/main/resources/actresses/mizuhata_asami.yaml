  biography: "Asami Mizuhata (水端あさみ) is a Japanese AV actress born on December 9, 1990 in Kanagawa Prefecture. A licensed nurse with practical clinical experience, she had aspired to enter the AV industry since her twenties and made her debut at age 31 in May 2022 as an exclusive actress under Madonna (マドンナ). After seven months as a Madonna exclusive, she announced in January 2023 that she was leaving exclusive status to work as a freelance planning actress across multiple labels. She has since appeared across a wide range of studios and has been invited to international fan events, including the TOP Goddess Taiwan Thanksgiving Festival in May 2026."
