  biography: "Tsubomi Mochizuki (望月つぼみ) is a Japanese AV actress born on November 16, 2002, affiliated with the talent agency LIGHT. She made her AV debut on May 9, 2023 as an exclusive actress at S1 NO.1 STYLE, notably still a university student at the time of her debut. Her stage name was crafted over three days with her manager: the character 望 was borrowed from her idol and S1 senpai Nozomi Ishihara (石原希望), while 月 and つぼみ were chosen based on stroke count and name-reading analysis. In May 2024, marking one year since her debut, she transitioned from exclusive to 企画単体 (multi-label) status and began appearing across a wide variety of studios. She is noted for her petite 150 cm frame, her E-cup bust, and a spirited performance style that directors have described as highly instinctive."
