  biography: "Yuri Oshikawa (推川ゆうり) is a Japanese AV actress and talent born on June 13, 1990 in Suita, Osaka. After working as a pastry apprentice for two years following high school, she was scouted at a gal club event in late 2011 and transitioned to gravure, joining idol unit Ebisu Muscats as a 7th-generation member and appearing on TV Tokyo's variety program. She debuted in AV in July 2013 under MUTEKI, later signed exclusively with S1 NO.1 STYLE (October 2013 to May 2014), and became known for her dominant 'chijo' (sexually aggressive woman) persona after a 2017 career pivot. In 2024 she signed as an exclusive actress with Madonna, continuing her active career through at least 2025."
