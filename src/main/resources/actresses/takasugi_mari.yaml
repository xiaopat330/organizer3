  biography: "Mari Takasugi (高杉麻里) is a former Japanese AV actress from Chiba Prefecture who debuted on November 7, 2017 under MOODYZ, initially styled as a bespectacled college student. She was signed to Forty Four Management (フォーティーフォーマネジメント) and quickly became a prolific presence across multiple labels, surpassing 50 releases within just six months of her debut. In October 2018 she fell ill from stress-induced health issues including alopecia and entered a hiatus; she recovered and returned to filming in 2019. She was ranked 9th in FANZA's 2018 annual AV actress ranking and received the 美少女部門賞 at the キカタン2.0アウォーズ in December 2018. On March 12, 2020 she announced her retirement via Twitter, with her final event originally set for April 26, 2020; the event was postponed indefinitely due to the COVID-19 pandemic. She announced the birth of her first child in September 2022."
