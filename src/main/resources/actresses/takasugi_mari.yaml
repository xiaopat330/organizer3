  legacy: "Mari Takasugi is notable as one of the fastest-rising actresses of her debut year, releasing more than 50 titles in her first six months across a wide range of labels. Despite a health-related hiatus in late 2018, she returned to prominence and ranked in FANZA's top 10 annual actresses for 2018 before retiring in 2020."

