  biography: "Runa Tsukino (月乃ルナ; also romanized Luna Tsukino), born 1 October 1995 in Tokyo, is a Japanese AV actress and gravure idol who debuted in February 2019 at MAXING under the marketing hook of resembling idol Moga Mogami. She achieved early mainstream recognition in 2021–2022, ranking in FANZA, FLASH, and Asahi Geino popularity polls, and broke through to wider fame with a MOODYZ collaboration title that topped FANZA rankings. From August 2022 she held a simultaneous dual exclusive contract with Attackers and Honnaka, before joining the DAHLIA label (a FALENO affiliate) as an exclusive in April 2026. Alongside her AV career she has been active as a singer — founding the music unit 'JC + The Mechanics' in 2018 — and as a gravure model, publishing the photobook 'Tsuki no Mahō' (月の魔法) and appearing on the cover of motorcycle magazine VIBES in 2024. She is managed by SO MODEL AGENT (formerly Eightman Production) as of mid-2025."
