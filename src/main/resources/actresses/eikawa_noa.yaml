  legacy: "Noa Eikawa is credited as the originator of the ロリ痴女 (petite dominatrix) genre in Japanese AV, a niche she opened with her breakthrough title approximately three months after her 2016 debut. Her 2018 スカパー!アダルト放送大賞 Best New Actress win was historic as the first awarded to a 企画単体女優. She remains active as both performer and director at Life Promotion as of 2026."

