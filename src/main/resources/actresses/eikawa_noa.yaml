  biography: "Noa Eikawa (栄川乃亜, born December 25, 1997, Kanagawa Prefecture) is a Japanese AV actress affiliated with Life Promotion (ライフプロモーション), where she also serves as a director. She debuted in July 2016 while working as a clothing sales associate, initially marketed as a petite loli-type actress; a loli-dominant (ロリ痴女) release approximately three months into her career became her breakout title and she self-describes as the originator of that genre. In 2017 she co-founded the AV idol duo ルルディ with 霧島さくら and in March 2018 won the スカパー!アダルト放送大賞 Best New Actress award — the first 企画単体女優 (non-exclusive label actress) to receive it. She held an exclusive contract with アイエナジー from March to August 2019, then joined the idol group 恵比寿マスカッツ in March 2020, graduating in August 2022. In October 2022 she was appointed a director at Life Promotion while continuing her acting career, and from April 2026 she holds an exclusive contract with TAMEIKE (溜池ゴロー)."
