  biography: "Ameri Ichinose (一ノ瀬アメリ) is a Japanese AV actress born September 16, 1987, based in Kanagawa Prefecture (some sources indicate she was born in Jakarta, Indonesia, before her family relocated to Japan). She debuted in the adult video industry on October 21, 2006 under the stage name Erika Kurisu with h.m.p. Following breast augmentation surgery she transitioned to the alias Ayaka Misora before adopting her final and best-known stage name Ameri Ichinose in 2009. Under the Ameri Ichinose name she appeared in notable series including Catwalk Poison, Kirari, and Sky Angel. Her AV career spanned approximately seven years, with her last confirmed release in June 2013, accumulating roughly 40 titles in total."
