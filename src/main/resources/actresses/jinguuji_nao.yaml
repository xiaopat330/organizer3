  biography: "神宮寺ナオ (Jinguuji Nao) is a Japanese AV actress born February 15,
    1997. She entered the AV industry after a part-time job reviewing adult products
    led to her debut in October 2017 with the title Virgin Graduation AV Debut Jinguji
    Nao. Starting as a planning actress working across multiple studios, she signed
    an exclusive contract with Madonna in June 2019 and extended her exclusive roster
    to include MOODYZ in May 2020. As of 2026 she remains highly active across both
    labels. She was ranked 20th in the Asahi Entertainment 2022 Active AV Actress
    SEXY General Election. Her stage name is taken from Jinguuji Ren, a character
    from the otome game and anime Uta no Prince Sama. Her hobbies include reading
    BL manga and watching anime; she was also drawn to K-pop during high school."
