  awards: null
  legacy: "Moka / ERIKA was one of kira☆kira's defining BLACK GAL performers, working across S1, Wanz Factory, and kira☆kira during the peak of the gyaru boom in the late 2000s and early 2010s. Her 2015 comeback following a four-year absence was one of the more notable retired-actress returns of that era, and she sustained an active career for a further three years before her final retirement."

