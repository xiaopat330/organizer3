  biography: "Moka (later ERIKA) debuted in September 2007 as an exclusive actress at S1 No.1 Style, then moved to Wanz Factory in September 2008 where she developed her identity as a tanned gyaru performer with a G-cup figure. She became a signature actress of the kira☆kira BLACK GAL series and also appeared as a regular cast member on TV Tokyo's variety program Onegai! Mascat. In May 2011 she renamed herself ERIKA and moved to the ARROWS agency, retiring from AV that September, then returned in January 2015 as a kira☆kira exclusive before retiring for good on March 31, 2018."
