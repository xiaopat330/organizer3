  biography: "Asami Ogawa (小川あさ美) is a retired Japanese AV actress and talent from Tokyo, known as one of the industry's top-class tall, long-legged performers who stayed on the front line for over a decade. She debuted in September 2005 with MAX-A (「スター誕生。」), made an S1 cell debut in November 2006, then moved to MOODYZ in 2008, and across her career worked with many leading makers including Idea Pocket, Das!, Attackers and PREMIUM (Glamorous). From April 2008 to April 2013 she was a first-generation member of the Ebisu Muscats idol unit and a regular on the Onee-Mas TV franchise. She held a PREMIUM exclusive through 2014 and a final Bi (美) contract into 2015, retiring on 25 February 2015 with 「電撃引退！THE LAST STAGE」. Born 11 April 1985 (A blood type, 167 cm, E-cup), she was managed by Sun Pro then T-Powers and now works as an artist under the name あさみん."
