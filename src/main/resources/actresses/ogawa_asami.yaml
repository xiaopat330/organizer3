  legacy: 'A tall, long-legged SUPERSTAR-tier actress with a rare decade-long front-line career (2005-2015) spanning MAX-A, S1, MOODYZ, Idea Pocket, Das! and PREMIUM/Glamorous, and a founding (1st-generation) Ebisu Muscats idol member who later became an artist as あさみん.'

