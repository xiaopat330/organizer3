  biography: "Rio is a Tokyo-born former AV actress, gravure idol, and singer, born October 29, 1986 to a Japanese father and Portuguese mother — her mixed heritage is visible in her looks, and Portuguese is among her listed special skills. Scouted at Minamikoshigaya Station, she debuted under the name Yuzuki Tina (柚木ティナ) as a MAX-A exclusive in November 2005, then renamed herself Rio in July 2007. She moved to S1 as an exclusive in February 2008 and then to Idea Pocket (alongside MAX-A) in March 2009, where the bulk of her catalog was produced. She was also a member of Ebisu Muscats and made her music debut as RIO in December 2013. She stepped back from AV work around 2016 and was reported in 2023 to be working in visiting-care nursing counselling and accessory design."
