  legacy: "Over an approximately eleven-year career, Rio built an extensive catalog across MAX-A, S1, and Idea Pocket while simultaneously working as a gravure idol and, later, a singer. Her half-Japanese, half-Portuguese look and the dramatic rename from Yuzuki Tina to Rio became key parts of her public identity. She was ranked tenth in the AV 30th Anniversary fan popularity poll, reflecting her enduring appeal across a long career."

