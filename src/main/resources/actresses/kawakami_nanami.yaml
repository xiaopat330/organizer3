  legacy: "川上奈々美 became one of the most prominent examples of an AV actress successfully
    transitioning into mainstream Japanese and international entertainment. Her trajectory
    — AV debut to Netflix series and theatrical international releases within a decade
    — was among the most visible crossover stories of her generation, culminating
    in a Pink Grand Prix Best Actress award and a post-retirement mainstream career
    under the name 川上なな実."

