  biography: "川上奈々美 (Kawakami Nanami) is a Japanese actress born October 14,
    1992, in Fukui Prefecture. She debuted as an AV actress on January 13, 2012,
    with Alice Japan, establishing herself across both AV and mainstream entertainment
    over the following decade. A long-time member of the idol variety unit Ebisu★Muscats,
    she appeared in the internationally distributed films 37 Seconds (2019), Tokyo
    Vice (2022), and Rental Family (2023), and the Netflix/NHK series 全裸監督 (2019).
    She was awarded Best Actress at the 31st Pink Grand Prix in April 2019. In January
    2022 she announced her retirement from AV work. In August 2022 she changed her
    stage name to 川上なな実 and announced her marriage and pregnancy, transitioning
    fully to mainstream acting."
