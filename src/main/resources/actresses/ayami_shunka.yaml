  biography: "Shunka Ayami (real birth date December 1, 1993; public profile date August 15, 1993; Toyama Prefecture) debuted as a Prestige exclusive actress in September 2012 at age 18 under the ABSOLUTE (ABS) label, transitioning to the ABSOLUTELY PERFECT (ABP) label when it launched in June 2013. She quickly rose to the top of the industry: by the end of 2013 she topped the DMM annual AV actress video ranking. Over a seven-year career at Prestige she became one of the studio's defining exclusive stars and a pillar of the idol-unit Ebisu★Muscats, also appearing in PINKEY, SEXY-J, and BRW108. Outside AV she was active in pop music and variety. She revealed her real birthdate and birthplace in a 2019 photo essay/book. On March 31, 2019, she retired from the AV industry."
