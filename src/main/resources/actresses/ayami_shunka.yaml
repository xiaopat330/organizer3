  legacy: "One of Prestige's greatest exclusive stars of the 2010s and a signature member of Ebisu★Muscats. Her 2013 DMM #1 ranking cemented her as a top-tier actress, and her seven-year Prestige tenure made her one of the most prolific and consistent performers of her generation."

