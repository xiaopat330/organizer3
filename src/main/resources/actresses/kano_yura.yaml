  biography: "Kano Yura is a Japanese actress and former AV actress from Okayama Prefecture who debuted exclusively with S1 No.1 Style on November 19, 2017, under the catchphrase 'infinite transparency' at age 18, having begun modeling nude at 18 before her AV debut. She maintained a single S1 exclusive contract for her entire seven-year AV career and was a member of Ebisu Mascats (2018–2021). Praised by industry critics for unusually naturalistic acting and dialogue, particularly in NTR scenarios, she built a reputation for dramatic range rare in the genre. She announced her AV retirement on May 7, 2024, citing a desire to pursue mainstream acting, with her final title releasing in July 2024. Following retirement she appeared in stage productions and the 2025 film 'ナマズのいた夏', continuing to work through her agency LINX."
