  legacy: "Kano Yura was widely recognized as one of S1's most distinctive performers of the late 2010s–early 2020s, valued not for volume but for exceptional acting quality. Her NTR and drama-format works drew unusually high repeat-viewing rates, and she was among the first S1 actresses to self-author serialized release reviews on FANZA News."

