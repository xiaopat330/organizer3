  legacy: "Maki Hojo is regarded as one of the defining actresses of the Japanese mature AV genre, with a career spanning over 19 years and prolific output across nearly every major studio. Her longevity, combined with continued exclusive contract status at Madonna into her late forties, makes her an exceptional figure in the industry."

