  biography: "Maki Hojo (北条麻妃), born December 21, 1976 in Tokyo, is one of Japan's most prominent and long-running AV actresses, specializing in the mature-woman (熟女) genre. She debuted in May 2006 under the stage name Shirishii Sayuri (白石さゆり) as an exclusive actress for Tameike Gorō, quickly gaining recognition and appearing with multiple major studios including Madonna, MOODYZ, and ATTACKERS under her debut name. In April 2009 she joined talent agency Diana Production and rebranded as Maki Hojo (北条麻妃), continuing as a prolific actress across dozens of studios throughout the 2010s. She won the スカパー!アダルト放送大賞 熟女女優賞 (Mature Actress Award) in 2012. In April 2019 she became an exclusive actress at Madonna (マドンナ), the premium mature-genre label where she has remained highly active, continuing to release titles as of 2026 at age 49."
