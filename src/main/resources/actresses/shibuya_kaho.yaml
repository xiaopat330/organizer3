  legacy: "Shibuya Kaho became one of the most prolific and recognizable 'J/K-cup' actresses
    of the mid-2010s, releasing an extraordinary volume of titles across virtually every
    major AV label in Japan during her four-year career. Her post-retirement advocacy
    work, including a high-profile privacy lawsuit and public commentary on performer
    rights, made her one of the most outspoken and widely covered former AV performers
    in Japan."

