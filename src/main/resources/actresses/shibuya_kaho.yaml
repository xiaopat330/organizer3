  biography: "Kaho Shibuya (澁谷果歩, born February 14, 1987 in Tokyo) is a former AV actress,
    now a YouTuber, Twitch streamer, and English interpreter, known for her exceptional
    K-cup bust and her unusual background as a former sports reporter at the Tokyo Sports
    newspaper. She attended Toyo Eiwa Girls' School for middle and high school, then
    graduated from Aoyama Gakuin University (faculty undisclosed), and briefly interned
    at the Yomiuri Shimbun before joining the Tokyo Sports sports desk. She debuted
    in AV in November 2014 under an exclusive contract with Alice Japan, with her journalist
    past generating significant media attention; she moved to Idea Pocket in 2015 before
    going freelance (kikatan) in late 2015, releasing a large volume of titles across
    many labels through her retirement in May 2018. After retirement she became a published
    author, Twitch streamer, and advocate for AV performer rights, filing a landmark
    lawsuit in 2023 against producers over leaked unedited footage and appearing before
    the Foreign Correspondents' Club of Japan in 2024 to speak in English on performer
    rights in the AV industry."
