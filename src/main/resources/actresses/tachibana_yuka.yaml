  biography: "Yuka Tachibana (橘優花) is a Japanese AV actress born December 17, 1992, who debuted in 2013 under the name 橘優花 (Tachibana Yuka) with agency Diva Promotion. She announced retirement via Twitter on October 19, 2015, but returned to the industry on April 13, 2016 under the new name 日向あいり (Hinata Airi), transferring to the agency T-Powers. Active across a wide range of studios including MOODYZ, E-BODY, Glory Quest, Prestige, and many others during her first run, she continued performing under the Hinata Airi name through at least 2025. During the 橘優花 era her published profile listed a falsified birth year of 1985; her confirmed real birth year is 1992."
