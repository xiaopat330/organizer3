  legacy: "Karen Kaede is regarded as one of the defining IdeaPocket exclusive actresses of the late 2010s and early 2020s, celebrated for a refined, near-idol aesthetic that distinguished her from peers in the genre. Her successful comeback after a well-publicized 2022 retirement — including the brief name-change interlude as Tanaka Lemon — demonstrated enduring fan loyalty and cemented her status as a resilient, long-running figure in the Japanese adult video industry. Her return to IdeaPocket exclusivity in 2023 confirmed that her career arc remained far from over, with chart performance and reader polls confirming her place among the industry's top-tier talents well into the mid-2020s."

