  biography: "Karen Kaede (楓カレン) was born on August 25, 1999, in Tokyo, Japan, and debuted as a gravure idol in September 2018 before making her AV debut in December 2018 as an IdeaPocket exclusive actress, chosen to mark the studio's 20th anniversary. Known for her idol-class beauty, slender figure, and expressive performances, she quickly rose to prominence and became one of IdeaPocket's flagship talents, accumulating over 200 titles during her first career phase. She announced her retirement on March 28, 2022, and briefly returned in early 2023 under the alias Tanaka Lemon (田中レモン) for a short run of FALENO titles before publicly reclaiming the Karen Kaede name in June 2023 and resuming as an IdeaPocket exclusive. As of 2026 she remains active, having achieved renewed mainstream recognition following her comeback, including recognition at Asahi Geino's 2024 Active AV Actress rankings."
