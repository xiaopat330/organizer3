  legacy: "Kanna Misaki is recognized as one of the pioneers of adult VR content in Japan, credited with helping establish the format through her landmark 2016 KMPVR debut 生中出しスペシャル!! VRセックスだから、すごくリアルでしょ? — which became a genre-defining hit. Her sustained multi-decade freelance career, mainstream film debut, and own television program demonstrate a rare crossover profile in the industry."

