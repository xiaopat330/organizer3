  biography: "Kanna Misaki (美咲かんな) is a Japanese AV actress from Kanagawa Prefecture, born July 3, 1994. She debuted in December 2014 as an exclusive actress with S1 NO.1 STYLE, then transferred to Honchu (本中) exclusive in December 2015. In 2016 she became strongly associated with VR content through KMPVR (KM Produce), releasing one of the earliest adult VR titles — a massive hit that earned her the nickname 'VR Queen' (ドスケベVRクイーン). After a hiatus from 2021 to mid-2022 due to creative uncertainty, she returned as a freelance actress and joined agency GG (Prime Agency). She has since maintained a highly prolific freelance career across dozens of labels, and in 2023 launched her own CS Sky PerfecTV variety series 美咲かめら and published her first photobook 'Naturale' (Tokuma Shoten). In December 2024 she made her mainstream film debut as lead actress in 離れられない君へ."
