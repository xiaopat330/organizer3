  biography: "Miyu Kiyohara (清原みゆう) debuted on June 13, 2023 under S1 NO.1 STYLE with the title '新人NO.1STYLE 奇跡の乳を持つ最強シロウト 清原みゆう AVデビュー', making an immediate commercial impact — her debut title reached #1 on the FANZA video floor ranking in its release week. Originally affiliated with talent agency Bstar, she is a Tokyo-born actress who was reportedly a nursing school student at the time of her debut shoot. She cited admiration for Yua Mikami as a motivation to enter the industry. In October 2024 she transferred to talent agency T-Powers and simultaneously renamed herself Miyu Kohinata (小日向みゆう), debuting under the new name in November 2024. She remains an exclusive S1 NO.1 STYLE contract actress. She ranked 3rd in FANZA's 2025 first-half actress ranking (月刊FANZA October 2025 issue)."
