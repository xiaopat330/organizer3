  biography: "Misaki Honda (本田 岬) is a retired Japanese AV actress from Hokkaido, born May 24, 1992. She debuted in October 2012 as an exclusive at S1 No.1 Style, appearing in four works, before briefly re-debuting in early 2013 under the alias Tsubasa Yuzuki (柚希つばさ) for KMP's Million label. Returning to her Honda Misaki stage name, she became an exclusive at Attackers (2013–2014), known for dramatic NTR and bondage scenarios, then moved to Madonna (2015), Fitch (2016), and subsequently worked as a freelance single-actress performer across numerous labels including MOODYZ, Tameike Goro, Premium, and Glory Quest. In June 2019 she announced her retirement via Twitter, noting she wanted to commemorate her seven years as an AV actress with a crowdfunded photo book, which met its funding goal before her final release in July 2019."
