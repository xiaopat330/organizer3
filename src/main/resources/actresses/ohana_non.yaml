  biography: "Non Ohana (小花のん; reading おはな のん), born 28 June 2001 in Oita Prefecture, is a Japanese AV actress and gravure model managed by C-more ENTERTAINMENT. She debuted on 7 October 2021 with SOD Create's キミホレ (KMHR) label, and quickly gained traction — her debut work topped FANZA's rental weekly chart in February 2022, and a second title held the top position for three consecutive weeks in May–June 2022. After working prolific non-exclusive across dozens of labels in 2022–2023, she joined Madonna as an exclusive in December 2023, transitioning to the mature-woman (熟女) segment and reaching 7th in FANZA's 2023 annual actress ranking. In October 2025 she transferred to the DAHLIA label (a FALENO group affiliate) as an exclusive. Alongside her AV career she is active as a gravure model, has released multiple photobooks and digital photo collections, and has performed live as a singer. Her special skill is classical ballet, which she studied for eight years."
