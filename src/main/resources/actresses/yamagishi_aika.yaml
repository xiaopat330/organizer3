    role: Premium exclusive contract actress
  awards: []
  legacy: "Yamagishi Aika stands out in her generation for her broadcaster-to-AV-actress
    trajectory, a background that lent her a polished on-camera composure rare among
    debut-era exclusives. Her multi-media output — spanning AV, singing, and live idol
    performance with Ebisu Muscats — exemplified the increasingly blurred boundary
    between AV and mainstream entertainment in the 2020s."

