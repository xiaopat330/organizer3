  biography: "Aika Yamagishi (山岸逢花) is a Japanese AV actress and singer from Kanagawa
    Prefecture who brought an unusually credentialed background to her debut: before
    entering AV she worked as a news announcer at a broadcasting station in the Tokai
    region, developing on-camera presence and public speaking skills that she later
    said she left the role because she could not achieve her professional goals. She
    debuted in July 2017 as a premium exclusive actress for PREMIUM studio, quickly
    distinguishing herself through a neat, mature appearance, slender frame, and voluptuous
    hip line. Beyond AV she expanded into music and live entertainment, joining the
    idol group Ebisu Muscats on March 31, 2020 and remaining a member until the group
    disbanded on August 13, 2022. On September 10, 2025, her agency LiStar Pro officially
    announced her retirement from AV activity, effective at the end of September 2025,
    concluding an eight-year career."
  primary_studios:
