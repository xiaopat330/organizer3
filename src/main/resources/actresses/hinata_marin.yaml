  biography: "Hinata Marin (ひなたまりん) is a retired Japanese AV actress affiliated with T-Powers talent agency. Prior to her AV career she worked as a model and dancer and supplemented her income as a cabaret club hostess from around age 18 to 25, a role she later returned to after retiring. She debuted on 19 July 2019 under S1 NO.1 STYLE with SSNI-528, having been recruited with comparisons to actress Asuka Kirara; at debut, her public age was set three years younger (1997-born) per her agency's wishes, a discrepancy she later disclosed publicly. In September 2022 she graduated from S1 and became an exclusive contract actress for PREMIUM (Elegance label), during which she also publicly revealed she had tattoos removed by laser. She announced her retirement on 2 June 2023, citing the prior retirements of Asuka Kirara and Yua Mikami as contributing factors, with her final work PRED-538 released 21 November 2023; the 2022 AV new law reform petition drew her public support."
