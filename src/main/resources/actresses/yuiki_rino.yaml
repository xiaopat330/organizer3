  biography: "Rino Yuiki (結城りの) is a Japanese adult video actress born on April 30, 1999 in Tokyo. She debuted with Moodyz in July 2021 under the MIFD label, marketed as a fourth-year national university student, before transitioning to the flagship MIAA series. Working as a freelance actress under the Bambi Program agency, she collaborated with numerous studios including Fitch (JUFE), kawaii* (CAWD), Honnaka (HMN), and others, releasing a substantial body of work across diverse genres. In May 2023 she announced an indefinite hiatus after being diagnosed with fibromyalgia following approximately a year of deteriorating health, describing severe full-body joint and muscle pain that left her at times bedridden; she explicitly stated she had no intention of retiring and hoped to return after treatment and recovery."
