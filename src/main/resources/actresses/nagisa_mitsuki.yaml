  biography: "Mitsuki Nagisa is a Japanese former AV actress from Shizuoka Prefecture, born February 7, 1998, who debuted with IdeaPocket on January 13, 2019 under the tagline 'the school madonna everyone admired.' She worked as a 企画単体 (multi-maker freelance) actress with no exclusive studio contract, appearing across a wide range of labels including MOODYZ, IdeaPocket, Dogma, Attackers, kira☆kira, SOD Create, and Baltan, accumulating one of the larger multi-label catalogs among her generation. She rose quickly to prominence — ranking in FANZA's top-10 annual actress lists in 2020 and consistently placing in industry polls through 2023 — and became known for versatility across schoolgirl, cosplay, fetish, and SM genres as well as a notable Demon Slayer parody series. On January 18, 2023, she announced her AV retirement effective January 13, 2024, citing marriage-seeking as her reason; she formally retired at a fan event on that date. She subsequently announced complete retirement from her agency Bambi Promotion effective August 2025."
  primary_studios: null
  awards: null
  legacy: "Mitsuki Nagisa was one of the most prolific 企画単体 actresses of the 2019–2024 era, distinguished by an unusually broad multi-label catalog and consistent top-10 FANZA rankings across four consecutive years. Her Kimetsu no Yaiba parody series (鬼詰のオメコ) attracted international media coverage and became one of the most-discussed franchise-parody AV works of the 2020s."

