  biography: "Natsuki Minami (夏希みなみ) debuted on June 20, 2014 as a Prestige exclusive actress, entering the industry to repay student loans. A former licensed nurse, public health nurse, and midwife, she was known for promoting her figure — particularly her hips. She worked as a Prestige exclusive for approximately two years before going free and appearing across a wide range of labels including Attackers, SOD Create, MOODYZ, Natural High, and many others. On December 31, 2017, she announced via Twitter that she was retiring from AV and leaving her talent agency. She subsequently transitioned to a gravure idol career under the shortened name 夏希, and has since described herself as a model and entrepreneur."
