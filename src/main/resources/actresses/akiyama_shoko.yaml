  biography: "Shoko Akiyama (秋山祥子) is a retired Japanese AV actress from Kanagawa Prefecture who debuted in October 2009 as an exclusive at h.m.p, having previously worked at a florist before entering the industry. She announced her first retirement at the end of 2010 and activity halted through early 2011, but she made a comeback in September 2012 under the name ゆきこ before reverting to her original name and joining S1 No.1 Style in November 2013. In March 2014 she transferred to MOODYZ, where she remained as a primary exclusive for several years; in February 2018 she was briefly loaned on a limited basis to ATTACKERS. Her final retirement work, '引退 秋山祥子', was released by MOODYZ on 6 October 2019."
