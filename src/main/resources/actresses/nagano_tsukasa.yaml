  biography: Tsukasa Nagano (born May 16, 1987 in Fukuoka) is a Japanese AV actress
    who debuted in July 2017 under the name Manami Kudo (工藤まなみ) as an exclusive for
    SODクリエイト's housewife label, then moved to マドンナ as an exclusive in April 2018 before
    becoming a freelancer later that year. On September 19, 2019 she announced a name
    change to 永野つかさ (Tsukasa Nagano) and signed with バンビプロモーション, simultaneously expanding
    into pachinko and slot machine presenter work. She left バンビプロモーション in July 2024,
    and from December 14, 2024 operates under yet another AV stage name, 響つかさ (Hibiki
    Tsukasa), at ボディコーポレーション, while retaining the Tsukasa Nagano name for pachinko/slot
    media appearances.
