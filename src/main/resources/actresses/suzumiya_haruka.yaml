  biography: "Haruka Suzumiya is a Japanese AV actress from Tokyo who debuted on 13 December 2016 under the name 佐々波綾 (Aya Sazanami) through the Crystal-eizou e-kiss label, with agency Curuse Group. She performed under that name until late 2018, releasing titles across a wide range of labels as a non-exclusive guest actress. After an approximately three-year hiatus she resumed activity in October 2021, initially under the shooting-model alias おなみちゃん and subsequently as 小那海あや (Aya Onami). She has since released prolifically across major labels including MAX-A (MXGS), SOD (SORA), KMP (MKMP, MMUS), Real Works (REAL), and many others. The stage name 涼宮遙香 (Suzumiya Haruka) is used specifically for ラグジュTV (Luxury TV) branded appearances. Her measurements were updated from D-cup at debut to E-cup following her career resumption."
