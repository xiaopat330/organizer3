  biography: "China Miyu (美優千奈) is a retired Japanese AV actress from Osaka Prefecture, born 17 May 1987. She debuted in February 2007 with S1 No.1 Style (エスワン) in the girigiri-mosaic series and was a featured actress on the label throughout 2007 and into 2008, appearing in over a dozen solo and ensemble titles. In mid-2008 she also appeared in two Das! (ダスッ!) titles featuring harder gangbang scenarios. Her last known new release was in September 2008, after which her blog went silent in October 2008, marking an effective retirement. In December 2007 she placed 7th in the MOODYZ Year-End Actress Award at the MOODYZ 2007 year-end festival. Her measurements (B90-G cup / W56 / H84, 167 cm) and paipan styling were notable features of her S1 appearances."
