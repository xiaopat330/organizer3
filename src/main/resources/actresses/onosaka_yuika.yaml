  biography: "Yuika Onosaka (小野坂ゆいか) is a Japanese AV actress born February 9, 2002. She debuted in June 2024 with FIRST IMPRESSION 174 under an exclusive contract with Idea Pocket, where her debut catchphrase was 'sensual heroine.' Her interest in AV stemmed from reading adult manga in high school; she has cited a preference for more extreme content and had never watched solo-actress work before her own debut. After graduating her Idea Pocket exclusive at the end of 2024, she transitioned to general-contract (企画単体) work from 2025, greatly expanding the variety of roles she takes on. She has been active in FANZA rental and sales rankings throughout 2025–2026 and transferred agency management from Bambi Promotion to T-Powers in May 2026."
