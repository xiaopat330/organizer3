  biography: "Sakura Kirishima (霧島さくら) is a Japanese AV actress and stage actress from Kanagawa Prefecture, born March 3, 1995. She encountered theater in high school and enrolled in an acting school, funding her studies by debuting exclusively with E-BODY on October 13, 2014. Her AV career spanned three active periods (2014–2016, 2017–2018, and 2019–2020), during which she worked across numerous labels including E-BODY, Attackers, Madonna, OPPAI, and KMP, among others. In 2017, she formed the unit \"ルルディ\" (Lurdi) with label-mate Noa Eikawa (栄川乃亜), serving as its leader. She received the New Actress Award at the 30th Pink Grand Prix (ピンク大賞) and has also pursued work as a mainstream stage actress and in pink films."
