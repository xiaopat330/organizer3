  biography: "Sae Aihara (愛原さえ) is a Japanese AV actress born November 9, 1989 in Hiroshima Prefecture. She debuted in November 2010 and worked actively through 2012 before a hiatus, then returned for a second stint from 2015 to 2016. During her career she appeared across multiple major labels including Prestige (SAMA/S-Class Amateur), PREMIUM (PGD/Glamorous), and WILL (WNZ), developing a reputation for a dynamite figure rated highly by fans on both looks and appeal. She was affiliated with Empress Promotion (Lotus Group) and also worked under the aliases Kashiwagi Rie and Shirai Miu for the Maiwoife series."
