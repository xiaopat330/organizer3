  legacy: "Ai Sayama is regarded as one of the defining busty (Hカップ) AV actresses of the Heisei and Reiwa eras, celebrated for her longevity — an 18-year career spanning debut to retirement — and her distinctive combination of an H-cup figure with a high-energy, femdom-adjacent persona. Her nickname 'LOVEちゃん' and the debut tagline '平成生まれのHカップ' became strongly associated with her brand, and she was regularly cited as a representative 'Heisei-era AV actress' in industry media."

