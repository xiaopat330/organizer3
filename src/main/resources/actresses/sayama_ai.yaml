  biography: "Ai Sayama (佐山愛) is a Japanese AV actress, singer, and talent from Tokyo who debuted on April 27, 2007, as an Alice Japan exclusive under the debut concept '平成生まれのHカップ' (H-cup born in the Heisei era), building an 18-year career as one of the most prolific and recognizable busty actresses in the industry. After her Alice Japan period she worked concurrently with multiple top studios including MAXING, S1 No.1 Style, Moodyz, OPPAI, and Premium before becoming an exclusive for 溜池ゴロー in May 2018, then expanding again to Madonna, Fitch, and Ones Factory. Alongside her AV career she was an original member of the Ebisu Muscats idol group from 2008, appearing across multiple TV Tokyo seasons of the group's variety program, and in March 2023 co-founded the dance-vocal unit BLACK DIAMOND with fellow performers including 沖田杏梨 and 橘メアリー, performing under the stage name L.V. She also appeared in the 2023 Sega game 龍が如く7外伝 名を消した男 after winning a live hostess character audition. On January 1, 2025, she announced her AV retirement effective September 2025, while continuing her music activities with BLACK DIAMOND."
