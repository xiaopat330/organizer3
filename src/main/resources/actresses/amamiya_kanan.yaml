  legacy: "Kanan Amamiya is one of the most commercially successful SOD-era actresses of the 2020s, known for a girl-next-door image and strong acting praised within the industry. Her early titles built a dedicated following through organic word-of-mouth before she transitioned to MOODYZ in 2025 as a marquee exclusive, and her international recognition at ADULTOPIA 2026 reflected growing regional popularity."

