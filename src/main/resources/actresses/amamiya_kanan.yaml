  biography: "Kanan Amamiya (天宮花南), born May 8, 1996 in Kumamoto Prefecture, is a Japanese AV actress and former gravure idol affiliated with T-POWERS talent agency. She debuted in October 2018 as gravure idol Nakagawa Moko (那珂川もこ) under Office VISH, reaching the finals of the Miss Young Champion contest in 2019 and achieving the #1 rank on DMM's idol video chart with her 2020 image video 'もこっとラブ'. In May 2021 she renamed herself Kanan Amamiya and, following a first nude spread in Friday magazine, announced her transition to AV and enrollment with T-POWERS and SODstar in June 2021, making her AV debut on July 22, 2021. She was a SOD exclusive actress until December 31, 2024, becoming notable for slow-burn titles whose sales climbed via word-of-mouth, with one 2023 title reaching #1 on FANZA's weekly video floor ranking multiple times; AV writer Shibata Kazu cited her acting ability as a key factor. From January 2025 she is an exclusive actress at MOODYZ, and in September 2025 made her terrestrial television debut in the TOKYO MX drama 'ももの唄'. In March 2026 she received the BEST BREAKAWAY AWARD at the ADULTOPIA adult entertainment expo in Taiwan."
