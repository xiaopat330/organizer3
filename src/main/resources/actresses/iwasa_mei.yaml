  biography: "Hikari Kisaki (妃ひかり), born May 29, 1989 in Chiba Prefecture, debuted in April 2007 under the name 岩佐めい (Mei Iwasa) at S1 NO.1 STYLE. She adopted the name 彩月あかり (Akari Satsuki) in 2008 after joining Prestige, then 仲夏ゆかり (Yukari Nakanatsu) in 2012, before effectively retiring in 2013. After a six-year hiatus, she made a high-profile comeback in August 2019 as 妃ひかり (Hikari Kisaki) with a Madonna exclusive contract. Since her return she has been one of the most prolific and sought-after mature actresses in the industry, with an extensive catalogue spanning Attackers (ADN/SAME), Das!, Planet Plus, Glory Quest, and many others."
