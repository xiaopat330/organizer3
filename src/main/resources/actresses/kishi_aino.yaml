  biography: "Aino Kishi (希志あいの) is a Japanese talent and retired AV actress and gravure idol, one of the marquee Idea Pocket performers of the late-2000s/early-2010s. She debuted as a gravure model in March 2007 (Young Gangan) and, unusually quickly, moved to adult video less than a year later — debuting on 22 February 2008 as a dual-exclusive actress for Japan Home Video and MAX-A (released through Alice JAPAN), billed around her membership in the idol unit Half Moon. From February 2010 she became an Idea Pocket cell-debut exclusive and remained their flagship actress through retirement, while also appearing in S1 crossover specials. A regular on TV Tokyo's Onee-Mas / Ebisu Muscats franchise, she served as the third-generation leader of the Ebisu Muscats from 2012. Born 1 February 1988 in Tokyo (AB blood type, 157 cm, C-cup), she announced her retirement at the May 2015 DMM Adult Award and retired in December 2015, receiving the DMM Adult Award 2015 Special Award."
