  biography: "Ruka Kanae (佳苗るか) is a Japanese AV actress and talent born on March 4, 1993 in Nagano Prefecture. She made her AV debut in May 2012 with the Idea Pocket label, going on to hold exclusive contracts with Idea Pocket, MOODYZ, Prestige, and Attackers over the course of her career. In 2013 she joined the live idol group me-me* alongside actresses Kokomi Fujikita and Yui Hatano. She received the SOD Adult Awards Best Actress award in 2018 and was nominated for the DMM.R18 Adult Award in 2016. She announced the end of her AV activities on June 3, 2018, subsequently transitioning to work as a screenwriter under the pen name Fairy Kanae (フェアリー佳苗), and has operated entertainment venues in Tokyo from 2024."
