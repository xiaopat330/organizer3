  biography: "Yu Tano (田野憂) is a Japanese AV actress and former gravure idol born on December 24, 2003 in Kanagawa Prefecture. She debuted in gravure in the February 2024 issue of Shukan Post, billed as the greatest new gravure idol of the Reiwa era, and announced her transition to AV in the May 2024 issue of the same magazine. Her debut AV title for S1 NO.1 STYLE (June 2024) became the best-selling S1 release of 2024, reaching #1 on the FANZA sales chart. Known for her L-cup measurements (110-56-89) on a slim 158 cm frame — dubbed a '2D body miracle' by critics — she has consistently charted top-5 on monthly FANZA actress rankings throughout her debut year. She is represented by talent agency Mines (マインズ) and has ambitions to launch a custom-fit bra brand for large-busted women. Her stage name was coined by her manager after Ahsoka Tano from Star Wars; she is also an accomplished violinist of 18 years."
