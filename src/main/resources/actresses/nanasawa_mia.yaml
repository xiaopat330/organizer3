  biography: "Mia Nanasawa (七沢みあ) is a Japanese AV actress born on December 13, 1998 in Tokyo. She made her exclusive debut with MOODYZ on November 25, 2017, at age 18, billed as a current college student with the catchphrase 'little sister to all AV fans.' She has maintained an exclusive contract with MOODYZ throughout her career, releasing titles primarily under the MIDE, MIDV, and MIDA labels. In July 2020 she ranked first in the FANZA video floor monthly actress ranking, and in 2024 she ranked 13th in the Shukan Asahi Geino active AV actress sexy election. As of 2025 she is still active, marking her seventh anniversary with MOODYZ with a 82-work complete-box release. Beyond AV, she participates in gravure swimsuit events and has cultivated a female fanbase through swimwear modeling work."
