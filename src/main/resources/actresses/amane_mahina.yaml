  biography: "Amane Mahina debuted in June 2020 as an exclusive actress at S1 NO.1 STYLE, represented by Forty Four Management (フォーティーフォーマネジメント). Her debut work entered the FANZA 2020 annual sales ranking at #15 — an exceptional result for a newcomer — and through 2021 she released six titles each exceeding 10,000 FANZA favorites registrations, establishing her as one of S1's top earners. On July 31, 2022, she announced her departure from Forty Four Management, adopted the new stage name 星まりあ (Hoshi Maria), and transferred to エイトマン (8MAN) agency; subsequent releases appeared on Outervision, an S1-group sub-label. Activity slowed through 2023 and she deleted all social media accounts, a period later attributed in part to tax and management problems at Forty Four Management that affected multiple actresses including Eimi Fukada. She staged a comeback in September 2024, confirmed by a SODLAND event appearance, indicating she continued under the 星まりあ name with SOD-group studios."
