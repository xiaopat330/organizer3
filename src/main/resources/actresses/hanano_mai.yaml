  biography: "Hanano Mai debuted in December 2004 with the title 『艶色BODY 悩殺く・び・れ』 under an exclusive contract with h.m.p. In May 2005 she moved to S1 No.1 Style, debuting there with 『セル初×ギリギリモザイク』 as an exclusive actress. She transitioned to freelance status in 2007, working across multiple studios under both the Hanano Mai and SHIHO names. In October 2009 she adopted the final stage name 黒木麻衣 (Kuroki Mai). On July 31, 2010, she announced her retirement on her official blog, effective end of 2010; the blog was subsequently closed. Her career spanned approximately six years across all three names."
