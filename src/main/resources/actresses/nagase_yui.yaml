  biography: "Yui Nagase (永瀬ゆい) is a former Japanese AV actress of mixed heritage, born October 15, 1999 in Tokyo. She briefly pursued an idol career at age 16 under the name 飯島里奈 with the group バクステ外神田一丁目, but retired from idol work within a year after disillusionment with the industry. She debuted in AV in May 2019 with MOODYZ, planning to appear in only a handful of titles but continuing after finding the work unexpectedly clean and fulfilling. In December 2019 she appeared in the first AV to use the 'ceiling angle' (天井特化アングル) camera technique, becoming its inaugural performer. She announced retirement on September 7, 2021, citing a new goal of focusing on soccer, and formally retired in December 2021 after a roughly two-and-a-half-year career."
