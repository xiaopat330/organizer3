  biography: "Yu Konishi (小西悠, born May 9, 1990 in Tokyo) is a Japanese AV actress affiliated with T-Powers talent agency. She debuted in August 2010 as an exclusive actress for Prestige, initially through limited retail-shop releases, and built a following through her E-cup figure and enthusiastic on-screen performances. She retired in 2011 but made a comeback in May 2013, again as a Prestige exclusive, before cycling through exclusive contracts with MOODYZ (May 2014–February 2015), MAXING (March–November 2015), and Attackers (March 2016–March 2017). From April 2017 she became a freelance actress (企画単体), contributing to a wide range of studios and compilation releases. She is known for her energetic performances and has noted that co-starring with Yui Hatano on a lesbian production was a transformative professional experience."
