  legacy: "Yu Konishi is notable for her sustained output across multiple major studios over more than a decade, including exclusive contracts at four major labels. Her willingness to explore a wide range of content genres, combined with her distinctive physical presence, made her a consistent performer across the MAXING, MOODYZ, Attackers, and Prestige labels."

