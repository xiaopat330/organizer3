  biography: "An Mita (三田杏) was born on February 16, 1999, in the Tohoku region of Japan, the seventh of eight siblings. Her parents divorced when she was three years old, and her mother worked four jobs to support the family, eventually developing depression. Mita enrolled in a welfare-track high school intending to become a care worker, but withdrew within three days when the family could not pay tuition; she then moved out and began working at a care facility without qualifications. Determined to support her family and repay debts, she entered the AV industry at eighteen, debuting on November 2, 2017 under SOD Create's SOD star label. She quickly gained recognition, receiving a nomination for the DMM Adult Award Best New Actress and winning the SOD AWARD 2018 Best New Actress prize. After graduating from SOD star in May 2018, she announced her retirement as An Mita on January 31, 2019; she returned to the industry on May 13, 2019 under the name Kawata Miharu (川田みはる) with Body Corporation before announcing a final retirement on September 9, 2020. She paid off her family's debts in full by 2019."
