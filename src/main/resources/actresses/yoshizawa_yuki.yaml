  biography: "Yuki Yoshizawa (吉澤友貴) is a Japanese AV actress of partial Thai descent, born May 6, 1992, in Kanagawa Prefecture. She made her AV debut in September 2015 via the Idea Pocket (IPZ) label, transitioning from a career as a gravure idol and member of the entertainment unit Ebisu Muscats. Her early career centered on Idea Pocket's premium releases, where she was marketed as a former gravure idol with an E-cup figure. Over time she expanded into married-woman (hitozuma/jukujo) productions and became a regular performer for Madonna and related labels (JUQ/JUR) in the 2020s. As of 2026 she remains active, signed to Fourty Four Management, and continues to appear across a wide range of labels including Madonna, Glory Quest, and various VR producers."
