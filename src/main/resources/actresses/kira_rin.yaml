  biography: "Rin Kira (吉良りん, born March 20, 1998) is a Japanese AV actress from Saitama Prefecture who debuted in October 2019 as an exclusive actress at S1 No.1 Style (エスワン), releasing nine solo titles under the SSNI label through June 2020. She departed S1 exclusivity in June 2020 and transitioned to freelance (企画単体) activity, appearing across a wide range of labels including MOODYZ, Madonna, kawaii*, PREMIUM, Glory Quest, Attackers, and many others. Known for her slender, 148 cm petite figure, she was described in Sports Nippon as having a 'fragile, delicate body' and 'ephemeral looks'. Her stage name 吉良りん was coined by S1's publicity coordinator 'Korin'. She was affiliated with talent agency LIGHT during her S1 period."
