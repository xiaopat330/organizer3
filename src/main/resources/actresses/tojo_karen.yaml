  biography: "Karen Tojo (東条かれん) is a Japanese AV actress born on April 10, 1987 in Miyagi Prefecture. She debuted in August 2008 under the stage name 東条かれん and quickly became affiliated with Idea Pocket, appearing in numerous titles for the label. In July 2009 she renamed to 黒木いちか (Ichika Kuroki) and continued an active career, becoming known for her lolita-style looks and notably shapely figure — earning the nickname 'お尻姫' (Ass Princess). Under the Ichika Kuroki name she was a prominent Idea Pocket exclusive actress from 2009 through 2011, then expanded to multiple studios including Attackers, SOD Create, and Madonna. She is managed by Lotus Group."
