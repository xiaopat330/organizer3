  biography: "Hono Watanabe (渡部ほの) is a Japanese AV actress born on October 4, 2004, in Tokyo. She made her media debut in July 2025 with a gravure spread in Shogakukan's Weekly Post magazine, followed by her AV debut on October 14, 2025, under S1 NO.1 STYLE with whom she holds an exclusive contract. Standing 170 cm tall with a J-cup figure, she gained attention as an unusually tall and well-endowed newcomer. She grew up in a wealthy family, received intensive music education from an early age studying piano, violin, opera, and solfège, and briefly attended a music university before leaving after three months. In middle school she trained at the junior school of the Yomiuri Giants cheerleading team Venus, and she speaks English, Korean, and Italian. She is managed by the talent agency Minds (マインズ)."
