  biography: "Masami Ichikawa (市川まさみ, born July 10, 1991, Tokyo) is a Japanese actress, talent, and singer, known for her unconventional path into AV. She joined Soft on Demand (SOD) as a company employee in 2014, assigned to the public relations department, and became briefly famous when she declared on-camera during a TV Tokyo program (Godtan) that she would 'absolutely never appear in AV.' She made her AV debut on January 8, 2015 with SODクリエイト under the title crediting her as a first-year PR staffer, then left SOD's employee rolls and relaunched as an exclusive SODstar actress in March 2015. From April 2015 she was a member of idol unit Ebisu Muscats, eventually becoming its 5th-generation leader in August 2018. She won the DMM.R18 Adult Award 話題賞 (Buzz Award) in 2016 and SOD AWARD 2019's Best Exclusive Actress award; she was also nominated for FANZA Adult Award 2019 Best Actress. She announced her AV retirement on April 11, 2022 citing ongoing lower-back issues (lumbar disc herniation diagnosed in her teens), with her final compilation release in May 2022. She continues as a talent and PR professional after retirement."
