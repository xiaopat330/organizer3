  biography: "Maeshima Miho debuted in June 2006 with h.m.p.'s Hoyusha label just before her 20th birthday, and was managed throughout her career by T-Powers (ティーパワーズ). Her debut was followed by an image video 'The Naked' (August 2006, h.m.p.) and a cosplay title 'Crazy Angel' (May 2007) in which she plays an angel visiting Earth in various costume scenarios. Through 2007 she expanded her studio affiliations: she worked with MAX-A/MAXING in April 2007, then made a formal 'sell debut' (セルデビュー) with Premium's Glamorous label in June 2007, indicating a new commercial partnership. She was also known for her bust, consistently marketed under the 超セクシー美巨乳 (super-sexy beautiful big breasts) category. Her final confirmed work was an uncensored title for Kamikaze (Kamikaze Girls Vol. 55, July 2008), produced for the international market. No formal retirement announcement has been located; she appears to have simply ceased releasing new material after mid-2008. Alongside her AV work she released multiple digital gravure collections including 'ギリ写,' 'VANILLA,' and 'COLOR,' and appeared at the Shinjuku Face wrestling entertainment event 'PLAYBOY CHANNEL NIGHT 2008' in February 2008."
