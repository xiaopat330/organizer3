  biography: "Yuna Mitake (三岳ゆうな) is a Japanese AV actress born on March 30, 1990 in Kanagawa Prefecture. She debuted simultaneously across multiple studios in August 2020, with her debut releases appearing on the same day at 溜池ゴロー, E-BODY, マドンナ, and 本中, an unusually broad multi-label entry. She is represented by ARM Promotion (ARMプロモーション) and is known for her tall, athletic build at 165 cm with an F-cup figure. Her career has expanded rapidly across a wide range of studios and labels, including Attackers, MOODYZ, Prestige, Dogma, and many others. In December 2023 a compilation release (素人ホイホイ/妄想族) featuring her work topped the weekly FANZA streaming floor ranking."
