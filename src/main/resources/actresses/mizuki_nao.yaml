  biography: "Nao Mizuki (水城奈緒) is a Japanese AV actress and gravure idol born 18 September 1984 in Tokyo. She began her career as a gravure idol in 2005 and won the DMG Best Work Award in 2007 before making her AV debut in July 2007 with S1 NO.1 STYLE under the ギリギリモザイク series. She was an exclusive contract actress at S1 NO.1 STYLE until September 2008, then transferred to MOODYZ from October 2008 where she appeared in their flagship Moody's Diva line among other series. Known for her exceptional H-cup figure (90-65-95 cm at 160 cm tall), she received the スカパー! Adult Broadcasting Grand Prix 2019 On-Demand Award and was evaluated by veteran director Company Matsuo as a 'perfect AV actress.' On 1 January 2020 she announced an indefinite hiatus effective end of January 2020."
