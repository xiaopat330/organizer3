  biography: "Ayumi Kimito (きみと歩実, born March 7, 1994 in Chiba Prefecture) debuted in November 2012 as an S1 exclusive actress under the name きみの歩美 (Kimino Ayumi), following a nationwide PR tour announced in August 2012. In 2015 she moved her agency affiliation to Mines (マインズ) and renamed herself きみと歩実. From April to December 2016 she held an exclusive contract with Attackers. She also appeared in pink films and V-cinema productions, won the 27th Pink Award New Actress Prize in April 2015, and received the SKY! Adult Broadcast Award 2019 On-Demand Prize and the GEO TV × Mensaizō ADULT AWARD 2019 Cowgirl Master Grand Prix. She was a member of AV actress idol group SEXY-J (2015–2017) and from 2019 served as the 4th mascot girl of Ueno Okura Theater. She has worked across a wide range of labels including S1, Attackers, Idea Pocket, Madonna, SOD, MOODYZ, Prestige, and many others. Her nickname is あゆみん."
