  biography: "Mayu Nozomi (希美まゆ) debuted in November 2009 as an exclusive contract actress for IdeaPocket, quickly gaining popularity as a loli-type performer marketed with the catchphrase 'born in Heisei Year 1, age 19.' She maintained a prolific solo career at IdeaPocket for over six years, releasing a new title nearly every month from 2009 through 2016. In March 2016 she transitioned to an Attackers exclusive contract, shifting her image toward harder SM and violation scenarios, before also releasing titles through Madonna in 2017. She ranked 34th in the AV 30th Anniversary all-time popularity vote held in 2012. Her last new AV title was released in October 2017; she has not formally announced retirement and has continued as a singer and content creator since then."
