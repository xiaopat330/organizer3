  biography: "Rie Miyagi (宮城りえ) is a Japanese AV actress born July 31, 2002, and managed by the LIGHT talent agency. She made her AV debut on November 8, 2022, as an exclusive contract actress with S1 NO.1 STYLE under the title 'Shinjin No.1 Style: Miyagi Rie AV Debut' (SSIS-553). In June 2024 she transferred her exclusive contract to Honnaka, then in October 2024 stepped away from studio exclusivity to work as an independent freelance actress across multiple labels. She gained mainstream attention when FLASH magazine dubbed her the 'AV-world Miyazawa Rie' and her work has charted multiple times in FANZA weekly and monthly sales rankings."
