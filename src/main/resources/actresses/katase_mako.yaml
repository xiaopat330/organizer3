  biography: "Mako Katase (片瀬まこ) is a Japanese retired AV actress born on 22 August 1983 in Tokyo. She debuted in September 2005 under Media Station (宇宙企画) with her first title 'Virgin Love', quickly establishing herself as a prominent performer for that label. In December 2006 she made her S1 No.1 Style (エスワン) cell debut with 'ギリギリモザイク', going on to release a prolific run of ONED-coded titles through 2008. She also worked with Idea Pocket (アイデアポケット) and Premium (プレミアム) during her peak years. On 7 July 2008 she announced her retirement via her official blog; a brief comeback credit appeared in a 2017 コンマビジョン compilation."
