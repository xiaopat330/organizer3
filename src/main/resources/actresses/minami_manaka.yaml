  biography: "Manaka Minami (南真菜果, born November 5, 1994 in Tokyo) debuted in the
    adult industry in December 2015 as an exclusive SOD Create actress, having previously
    built a following as a race queen and gravure idol under the name 喜多愛 (Kita Ai)
    from 2013, and as swimsuit model and photo idol from 2014. During high school she
    studied abroad in New Zealand for one year. Her H-cup bust and refined body proportions
    (95-62-91) made her one of SOD's headline exclusive talents, releasing twelve censored
    titles for the STAR label between December 2015 and January 2017. Following the
    end of her SOD exclusive contract she transitioned to uncensored work in late 2017
    under the shortened stage name 真菜果. She is represented by the talent agency
    Mine's (マインズ)."
