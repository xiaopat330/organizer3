  biography: "Emiri Okazaki (丘咲エミリ) was born January 11, 1989 in Tokyo. She began her entertainment career in 2005 as a model in gyaru magazine Ranzuki, later becoming a dedicated model for 小悪魔ageha (2007–2009). She made her AV debut in November 2011 under the celebrity label MUTEKI, transitioning to an exclusive contract with Idea Pocket shortly after, where she produced over a dozen titles through 2013. In 2014 she moved to MOODYZ, then signed a new exclusive with kira☆kira in November 2014 under the alternate name EMIRI, performing as a 黒ギャル (tan gyaru) persona. She retired from the AV industry in November 2016 after self-producing her final title for Idea Pocket. Post-retirement she founded a company (株式会社THE ONE, 2017), launched a cosmetics brand (Emaje, 2018), and debuted as a solo singer in January 2020. She was also a member of the idol unit PINKEY (produced by photographer Kishin Shinoyama)."
