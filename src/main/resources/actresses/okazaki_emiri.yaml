  legacy: "One of the relatively few crossover actress-entertainers of the early 2010s, Okazaki had mainstream television credits (日本テレビ drama 美咲ナンバーワン!!, テレビ東京 LOVE理論) running in parallel with her AV career. Her post-retirement pivot to entrepreneurship and music is well-documented; she continues to be active as of 2025 (announced pregnancy via X, May 2025)."

