  biography: "Kimijima Mio (born April 25, 1988 in Tochigi Prefecture) is a Japanese AV actress and stripper with an unusually long multi-phase career. She first debuted in 2005 under the name Kyomoto Kaede, worked briefly in 2014–2015 as Hitomi Yura, then relaunched as Kimijima Mio in September 2017 — building the rebrand around her backstory as a legendary soap girl in Nakasu (Fukuoka) with a one-year waiting list. Under the Kimijima name she became one of the industry's most prolific freelance actresses, reportedly accumulating around 800 titles in her first four years and earning the distinction of AV sales volume #1 for 2018. She works across an exceptionally wide range of studios with no exclusive contract, with OPPAI, Moodyz, Venus, Honnaka, and Chijo Heaven among her most frequent partners. She is affiliated with T-Powers agency and remains active as of 2024."
