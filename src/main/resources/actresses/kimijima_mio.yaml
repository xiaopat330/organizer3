  legacy: "Kimijima Mio holds the rare distinction of AV sales volume #1 for 2018, achieved entirely as a freelancer through sheer release volume across dozens of simultaneous studio partnerships. Her triple-era career — Kyomoto Kaede (2005), Hitomi Yura (2014), Kimijima Mio (2017) — makes her one of the few actresses with separate identifiable careers under different names spanning nearly two decades."

