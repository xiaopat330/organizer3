  biography: "Mina Kitano (北野未奈) is a Japanese AV actress born on May 20, 2000, who debuted on April 13, 2021, with E-BODY under the concept of a Ginza number-one hostess, billed as 'H-cup hostess of a famous high-class club.' She quickly established herself as one of the industry's most prominent figures, ranking first in FANZA's AV actress rankings in September 2021 and winning the 週プレアダルトアワード (Shukan Playboy Adult Award) Best New Actress of 2021. In May 2022 she announced a dual exclusive contract with 本中 (Honchu) and Fitch, later adding MOODYZ (December 2023) and ワンズファクトリー (January 2024), maintaining a release pace of approximately two titles per month. Following contract expiration with all studios, she transitioned to freelance (企画単体) from June 2025, continuing to release prolifically across numerous labels. She is widely known for her voluptuous G-cup figure and has been nicknamed 'きたみな' by fans."
