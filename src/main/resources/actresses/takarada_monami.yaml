  legacy: "Monami Takarada established herself as one of the most prolific non-exclusive performers of the 2018–2023 period, accumulating a large cross-label catalog driven by her distinctive physical attributes and energetic screen presence. Her parallel pursuit of contemporary art and an active YouTube channel differentiated her from peers, and her overseas popularity — particularly for her puffy areolae — gave her an unusually international fanbase for a domestic Japanese AV actress."

