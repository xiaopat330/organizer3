  biography: "Monami Takarada is a Japanese AV actress and contemporary artist from Tokyo, known for her I-cup bust (100 cm) and distinctive puffy areolae, which earned her the nickname 'pukkuri nyuurin' and made her especially popular with international audiences. She debuted on March 7, 2018 as an exclusive for OPPAI under the 'active teacher' concept — she holds a junior/senior high school art teaching license and completed a teaching practicum, though she clarified later that the classroom setting in her debut was fictional. After leaving OPPAI exclusivity in July 2018 she transitioned to independent planning titles, working prolifically across dozens of labels including Fitch (exclusive from November 2023), E-BODY, MOODYZ, SODCreate, Naturalhigh, Madonna, and many others. In parallel she pursues a career as a contemporary artist and occult activist under the name 桃永ぱいん (Momoe Pain), with a focus on using erotic power to challenge authority and taboo; she has appeared with the idol group 'mumk' (formed December 2022) alongside fellow B-Dash Promotion actresses. She publicly announced a temporary departure to study language and occultism in the UK in July 2024, stating she would not retire."
