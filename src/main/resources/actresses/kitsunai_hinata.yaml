  biography: "Hinata Kitsunai (橘内ひなた, born August 12, 1990 in Tokyo) is a Japanese AV actress who debuted in November 2009 under the abbreviated name 橘ひなた at age 19, appearing first in the amateur-style 'Can College' series. She was active from 2009 through approximately 2016, working across a range of labels including Tokyo-热 (東京熱) and Caribbean (カリビアン), before taking an extended hiatus. She returned to the industry in 2024 and resumed releasing titles, including work for Silk Labo and Prestige. Throughout her career she has also worked under the aliases 牧瀬美央 (for Maiwife productions) and 三戸ゆう (for Venus). She is represented by the talent agency LINX."
