  biography: "Nene Yoshitaka (吉高寧々) began as a gravure idol before making her AV debut on September 1, 2017 as an S1 NO.1 STYLE exclusive actress; her transition attracted industry attention due to her established mainstream following. After completing her S1 exclusive run — her final S1 title releasing in January 2020 — she was recruited by the newly launched FALENO star imprint and joined as an exclusive actress from February 2020, becoming one of the studio's founding-generation performers. She has remained a flagship FALENO exclusive throughout the 2020s, participating in the studio's showcase events and consistently appearing in top-ten rankings of FLASH magazine's annual sexy actress polls through 2025. Her decade-spanning exclusive career across two of the most prominent Japanese AV labels marks her as one of the defining performers of her era."
