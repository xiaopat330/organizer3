  biography: "Yuri Honma (本真ゆり) is a Japanese AV actress born on January 28, 1993 in Tokyo, affiliated with Benes Promotion (ベネスプロモーション). She debuted in November 2011 and quickly became known as a busty (巨乳) actress with an H-cup 100cm bust. In March 2013 she temporarily adopted the stage name Tsukasa Aiuchi (相内つかさ) during an exclusive contract period with Fitch, appearing in seven titles under that name, then reverted to the Honma Yuri name from 2014 onward. She has remained active into the mid-2020s, appearing across a wide range of labels including MIAA, JUFE, GVH, Attackers, and Prestige. Her hobbies and special skills include cooking and Korean language study."
