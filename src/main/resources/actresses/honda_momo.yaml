  biography: "Momo Honda (本田もも) is a Japanese AV actress born on May 8, 1997 in Tokyo. She debuted in March 2021 as an exclusive actress under FALENO's FALENOstar label, a streaming-focused next-generation AV maker. In April 2022 she transferred to FALENO's sister label DAHLIA, and in October 2022 she transitioned to freelance (企画単体) status, which expanded her output significantly across multiple studios. In April 2024 she was ranked 15th in Asahi Geino magazine's annual AV actress popularity poll, with the magazine noting that her shift to freelance work triggered a major career breakthrough. She is represented by Bambi Promotion (バンビプロモーション)."
