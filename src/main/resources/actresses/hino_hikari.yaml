  biography: "Hikari Hino (妃乃ひかり) debuted in July 2005 via Crystal Eizou (クリスタル映像), quickly releasing multiple titles for that label through 2006. In July 2006 she expanded to MOODYZ for her commercial sell-through debut, becoming active across a wide range of studios including Attackers, Prestige, SOD Create, E-BODY, Dogma, and many others. She was also a stripper, making her strip stage debut on 11 September 2005, and was affiliated with the talent agency ビュースタイルズエンターテイメント. In 2012 she ranked 43rd in the DMM AV30 anniversary actress popularity poll. On 5 October 2013 she announced her retirement on her blog. Her hobbies included travel, driving, hula hoop, and cooking."
