  biography: "Fuua Kaede (楓ふうあ, born April 20, 2001) is a Japanese AV actress who debuted in August 2021 as an exclusive contract actress for S1 NO.1 STYLE. Standing 170 cm tall with an athletic background in high-school basketball, she quickly gained recognition for her long legs and statuesque figure. By 2022 she ranked 21st in Asahi Geino's annual AV actress popularity poll and climbed to 16th in 2023, placing 9th among Kansai-region voters that year. She transitioned her talent agency affiliation to c-more ENTERTAINMENT in April 2023 while maintaining her S1 exclusive contract. In November 2024 the S1 all-star compilation featuring her debuted at No. 1 on the FANZA weekly physical-media chart."
