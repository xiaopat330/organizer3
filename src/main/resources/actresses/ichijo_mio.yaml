  biography: "Mio Ichijo is a Japanese AV actress born November 30, 1996 in Yamagata Prefecture. Before entering the industry she worked as a gym instructor and part-time at Seicomart convenience stores. She first joined the Sapporo-based idol group 'Sapporo Zero Dollar Zukan' in October 2017, then made her AV debut in April 2018 as an exclusive contract actress at Idea Pocket. She left the Idea Pocket exclusive in July 2018 to become a free agent (kikaku single actress), while continuing her Sapporo Zero Dollar Zukan activities. Known for her petite frame (147 cm) and half-Japanese appearance, she remained based in Sapporo throughout her career, commuting to Tokyo for work rather than relocating. She has been active across numerous labels including MILK, REAL, TIKB, and IPX, and gained attention in 2023 when an anthology work featuring her reached the #1 spot on the FANZA weekly video floor ranking."
