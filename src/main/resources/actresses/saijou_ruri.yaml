  biography: "Ruri Saijou (西條るり) is a Japanese AV actress and gravure idol from Tokyo, born March 1, 1990. She debuted in gravure in April 2010 with a FamilyMart-campaign image video before making her AV debut in September 2010 as an exclusive actress at S1 NO.1 STYLE, where she became known for her 111 cm M-cup figure and was cited by producer Kaoruto Suenaga as one of the key actresses who defined S1 in the 2010s alongside Yuma Asami and Akiho Yoshizawa. After leaving S1 exclusivity in September 2012 she continued working across various labels including 溜池ゴロー and mature/married-woman themed productions from 2013 onward, before fading from the industry after 2016. She returned in January 2022 after approximately six years away, then made a full comeback in April 2024, and became an exclusive actress at Attackers (アタッカーズ) in January 2025. She is affiliated with talent agency LiStarPRO (formerly GRANZPRO / AllPro)."
