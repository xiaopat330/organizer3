  legacy: "A defining figure in the 痴女 genre across a 10-year career, known for popularising the 'spider cowgirl' (スパイダー杭打ち騎乗位) technique and accumulating an estimated 1,500 titles. Ranked #11 in Asahi Geino's 2021 AV Actress SEXY General Election and #15 in FLASH's 2021 Sexy Actress Ranking. Her decade-spanning career, side activities as a venue operator, and high-profile comeback after medical retirement distinguish her as one of the most commercially durable actresses of her era."

