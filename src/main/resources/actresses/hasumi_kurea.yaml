  biography: "Hasumi Kurea entered the industry on March 2, 2012 under the name 安達亜美 (Adachi Ami), pivoting to her permanent stage name 蓮実クレア with a headline re-debut on September 25, 2012, under the Bi (美) label with the title 『今世紀最大の極上痴女デビュー 蓮実クレア 美』. Her debut catchphrase — 「今世紀最大の極上痴女」(The Ultimate Finest Pervert of This Century) — established a career identity centred on the 痴女 (aggressive femme fatale) archetype. She held an exclusive contract with Wanz Factory from January to August 2014, then transitioned to enterprise/freelance status across dozens of studios including SOD Create, accumulating an estimated 1,500+ titles over a decade. She won a title award at the スカパー！アダルト放送大賞 2018. Outside AV she performed as a member of the sexy idol units KÜHN (from February 2015) and SEXY-J (December 2015 – December 2017, disbanding at Kawasaki CLUB CITTA'). She also launched two food-and-drink venues — ラウンジ蓮実クレア and BAR 蓮実クレアB — in Kabukicho, Shinjuku. On her tenth anniversary (September 25, 2022) she announced retirement, which she later disclosed was due to a uterine tumour requiring treatment. In May 2025 she announced a comeback, signing with GIRLULEPRO, and released her comeback title through MOODYZ on February 3, 2026."
