  legacy: "One of the most prominent idol-to-AV transitions of the 2020s: as 井上理香子 she spent nine years in Fairies, one of Japan's leading idol groups under Rising Production. Her debut title under SOD Create immediately topped FANZA retail rankings and she sustained top-10 placements across 2022–2025. She is unusual in that she actively maintains a parallel music and stage-acting career under her AV stage name, performing solo live concerts and appearing in television programmes."

