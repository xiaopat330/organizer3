  biography: "Yotsuha Kominato (小湊よつ葉), born May 29, 1996 in Nagasaki Prefecture, is a Japanese AV actress, singer, lyricist, and stage actress affiliated with talent agency T-Powers (ティーパワーズ). She is a former member of the female dance-and-vocal idol group Fairies (フェアリーズ), where she performed under her birth name Rikako Inoue (井上理香子). She debuted with Fairies in 2011 under Rising Production and released music on the SONIC GROOVE label until the group's disbandment and her retirement from the entertainment industry in June 2020. After two years working at a cosmetics clinic, she relaunched under the stage name Yotsuha Kominato in March 2022 and announced her AV debut on Twitter in May 2022. Her debut title as a SOD Create exclusive actress topped the FANZA retail floor weekly ranking for two consecutive weeks in late June and early July 2022, and the video floor ranking in August 2022. She was named best new actress at the Asa-Gei AV Awards 2022 and placed 6th in the FANZA annual actress ranking for 2023. She continues to perform onstage, release music under SOD Records, and appear in television variety programmes alongside her AV career."
