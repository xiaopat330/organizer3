  biography: "MARINA is a Japanese AV actress who debuted in 2007 under the name 真理絵 in the amateur-style series 若妻の匂い, before emerging as a single-name actress in late 2007. Born 20 July 1988 in Kyoto and raised in Tokyo, she is 158 cm tall with an E-cup figure (88-56-88). She worked across numerous labels in 2007-2008, including early appearances under various aliases in amateur-style and planning productions, before signing with ケイエムプロデュース (KM Produce) for a formal single-actress debut on the Million label in January 2008. Known as a ギャル-type actress, she appeared in titles for Prestige, KiraKira, Gloria Quest, SOD, h.m.p, and others during her roughly one-year active period, releasing approximately 30+ individual titles. She released multiple retirement works in early-to-mid 2008, with isolated appearances continuing under the name まほ into 2010."
