  biography: "Rika Mari (麻里梨夏) is a Japanese former AV actress from Chiba Prefecture who debuted in March 2014 under the name Narumi Urumi as an exclusive for S1 No.1 Style, where she established herself in a petite loli-type niche often playing high-school or younger-sister characters. She changed her stage name three times before settling on Rika Mari in January 2016, by which point she had broadened into freelance work across a wide range of studios including MOODYZ, Honnaka, KMP, and dozens of others. After announcing her first retirement in September 2019 — with final shooting in October 2019 and final release in February 2020 — she returned in January 2021 as a Honnaka exclusive. She made her final retirement announcement on September 14, 2021. Alongside her AV career she released several image DVDs and photo books under the REbecca label and appeared in a small number of pink films and indie video game projects."
