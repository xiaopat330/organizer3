  biography: "JULIA was born on May 25, 1987 in Saitama Prefecture, Japan, and made her AV debut in April 2010 as an exclusive actress for E-BODY, with her debut work famously using her three measurements (B100-W55-H84) as its title. After a brief freelance period she signed dual exclusive contracts with MOODYZ and Tameike Goro in February 2012, later moving to OPPAI exclusivity in November 2013, then to Wanz Factory and affiliated labels (PREMIUM, Honnaka) from May 2018 onward. She became one of the most prolific JAV actresses of her era, accumulating over 800 titles and holding a record for the most consecutive Best Actress nominations at the DMM Adult Awards."
