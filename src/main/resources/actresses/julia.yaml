  legacy: "JULIA is regarded as one of the definitive JAV actresses of the 2010s, celebrated for combining an extraordinarily curvaceous physique (particularly her J-cup bust) with a wide range of performance styles from the sensual to the dramatic. Her decade-plus career spanning multiple major studios, her record-setting DMM award nominations, and her continued relevance into the mid-2020s place her among a very small group of actresses who achieved both mainstream industry recognition and enduring fan loyalty. She is frequently cited in Japanese and international fan communities as one of the most iconic figures of the busty-actress (巨乳) genre."

