  biography: "Rina Ishihara (石原莉奈) is a Japanese AV actress born on August 29, 1987 in Kanagawa Prefecture. She made her debut in April 2008 with h.m.p in the title 「恥じらいチェリーナ」, releasing six solo works before announcing her retirement on her official blog in August 2008 after only a few months. She made a celebrated comeback in December 2012 with Idea Pocket under the title 「伝説美女復活」 (Legend Beauty Returns), going on to produce a prolific run of monthly releases throughout 2013. From 2014 she expanded to Attackers, where she became one of that label's most prominent actresses, specialising in dramatic and SM-themed productions. Her last new release appeared in June 2017; she is represented by Peace Promotion (ピースプロモーション). Post-career compilation releases from Attackers continued through 2021, reflecting her lasting popularity."
