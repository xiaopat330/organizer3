  biography: "Yumi Nijimura (虹村ゆみ) was born July 10, 2003 in Hokkaido, Japan. She debuted on August 6, 2024 under MOODYZ as an exclusive actress with the title '新人アオハル美少女 日本中の男子が彼女に恋する。 虹村ゆみ'. After releasing five titles and one VR title for MOODYZ, she transitioned to 本中 (Honchu) as an exclusive from January 2025. She graduated from that exclusive contract in March 2025 and subsequently became a free-agent (企画単体／キカタン) actress, working across multiple labels including S-Cute, 無垢, Attackers, SOD, and others. She is affiliated with the talent agency T-POWERS (ティーパワーズ). Her nickname is にじむー. Notable for rapid growth as a free actress, with a heavily packed shoot schedule in mid-2025."
