  biography: "Chiharu Mitsuha (三葉ちはる), born July 24, 1997 in Kanagawa Prefecture, is a Japanese AV actress affiliated with SKY Promotion. Prior to her AV career she was active as an idol under the names 月野ちはる and るんるん月野, and also performed with the idol unit 始発待ちアンダーグラウンド as ツキノ・チハル. She made her AV debut in October 2022 as a FALENO star exclusive actress. In March 2025 she announced a move to FALENO's sister label DAHLIA, where she has remained active."
