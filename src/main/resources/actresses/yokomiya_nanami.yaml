  biography: "Nanami Yokomiya (横宮七海, よこみや ななみ; 2002-02-17 – 2023-12-10) was a Japanese AV actress affiliated with the Krone talent agency (クローネ). She debuted on April 10, 2021 and was known as a petite loli-type performer standing 149.5 cm tall with an E-cup figure. She worked prolifically across dozens of labels in her short career, including MOODYZ, アイエナジー, ナチュラルハイ, Prestige, 溜池ゴロー, and many others; in early 2022 a VR title she appeared in was ranked #1 in a half-year ranking. She passed away on December 10, 2023 at the age of 21; her death was announced by a friend via social media and was reported widely in Asia, particularly in Taiwan, though not covered by Japanese mainstream media. Posthumous compilation releases continued to appear into 2024."
