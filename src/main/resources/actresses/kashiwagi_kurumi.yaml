  biography: "Maria Nagai (born Kurumi Kashiwagi) is a Japanese AV actress from Aichi Prefecture who debuted in October 2014 under the name 柏木胡桃 (Kurumi Kashiwagi) after finishing high school, going on to perform under several aliases including 小野瀬ミウ and 井川菜乃花 before going on hiatus. During her break she discovered competitive fitness training and reached the finals of a fitness competition's hip category in 2017. She returned to the industry in May 2019 under the name 永井マリア (Maria Nagai), rapidly establishing herself as a prominent busty actress across labels including Fitch, MOODYZ, E-BODY, and MIAA. In 2021 she ranked first in Geo TV adult media MANGO's busty AV actress ranking, and in late 2025 she announced her first pregnancy, declaring her intention to remain active in the industry for life. Her first son was born in early March 2026."
