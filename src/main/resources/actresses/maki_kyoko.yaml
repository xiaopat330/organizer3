  biography: "Kyoko Maki (真木今日子, born September 3, 1990, Kanagawa Prefecture) is a Japanese AV actress who debuted in January 2011 as an exclusive with MAX-A. She subsequently moved to OPPAI as an exclusive from May through August 2011, then transitioned to a prolific freelance career spanning dozens of labels including Prestige, OPPAI, Chijo Heaven, Aurora Project, and many others. Before entering the AV industry she worked as a patissier at a multinational company, continuing that work part-time for around six months after her debut. In 2015 she joined the idol unit Gingin Girls (ギンギン♂ガールズ) formed by adult broadcasting channel NukiMIX, and the unit made a CD debut in August 2016. In May 2026 she announced she would become an exclusive actress for Madonna starting June 2026."
