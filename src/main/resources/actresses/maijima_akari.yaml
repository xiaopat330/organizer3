  biography: "Akari Maijima (舞島あかり) is a retired Japanese adult video actress from Hyogo Prefecture who speaks with a Kansai dialect. She made her AV debut in March 2016 under Idea Pocket's FIRST IMPRESSION series (IPZ-710, titled as a currently enrolled college student's secret debut), going on to release six solo titles on the IPZ label through April 2017. Her Idea Pocket work was known for spotlighting her voluptuous figure, particularly her large backside. She subsequently appeared on Wanz Factory (WANZ-650, August 2017) and Chijo Heaven (CJOD-088, July 2017) before transitioning to independent and multi-label work from late 2018 onward with studios including Prestige, Glory Quest, and smaller indie labels. Her final indexed appearance on minnano-av is from June 2020, suggesting retirement around that time."
