  biography: "Tsubaki Sannomiya (三宮つばき) is a Japanese AV actress born on May 4, 1998. She debuted on August 7, 2020 as an exclusive actress for S1 No.1 Style, where she was marketed for her mysterious aura, refined looks, and G-cup figure. Prior to her AV career, she worked as a patissier at a hotel pastry department, leaving after about a year and a half due to tendinitis. In January 2022 she announced her transfer to Attackers, with whom she became exclusively contracted from February 2022 onward. Beyond adult work she is active as an amateur singer performing Showa-era kayokyoku at live events, and is affiliated with talent agency C-more Entertainment."
