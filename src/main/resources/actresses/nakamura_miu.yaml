  biography: "Miu Nakamura (仲村みう), born 1991 in Iwate Prefecture, Japan, debuted as a gravure idol in 2005 after responding to a talent agency audition, quickly becoming a well-known お菓子系 (sweet-idol) gravure model before transitioning to mainstream gravure. In 2006 she was selected as Miss Young Magazine in the prestigious Mis Magazine 2006 contest (講談社). After several years of gravure work and a formal gravure retirement in 2009, followed by a comeback and second retirement in 2011, she was largely inactive from entertainment until 2017 when she entered AV with an exclusive contract at MOODYZ. She subsequently became a prominent exclusive actress at Idea Pocket (アイデアポケット), where the bulk of her AV catalog was produced under the IPZZ flagship label. As of 2026 she remains active, releasing titles across MOODYZ, Idea Pocket, and Madonna."
