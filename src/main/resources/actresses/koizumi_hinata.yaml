  biography: "Hinata Koizumi (小泉ひなた) is a Japanese former AV actress and gravure model born 16 May 1999 in Niigata City, Niigata Prefecture. She debuted on 25 October 2018 under the SOD Create KimiHore (君に惚れた) sub-label while enrolled as a first-year nursing student, citing a desire to fund her and her younger sister's tuition fees as the stated reason. In February 2019 she was promoted to the SOD Star flagship label and released a string of titles before graduating from SOD Star in December 2019. From February 2020 she held dual exclusive contracts with Attackers and Honnaka, working in drama and NTR-themed productions. On 8 December 2020 she announced her retirement from AV on Twitter; her retirement commemorative work was released by Attackers in January 2021. She subsequently appeared in the mainstream film 'あ・く・あ～ふたりだけの部屋～' (May 2021) before withdrawing from public life."
