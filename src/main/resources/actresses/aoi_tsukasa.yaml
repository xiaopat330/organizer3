  legacy: "Tsukasa Aoi is widely regarded as one of the defining AV actresses of the 2010s, known for her girl-next-door appeal, versatility across genres, and unusually long exclusive career spanning two of Japan's top studios. Her mainstream crossover work — TV appearances, mainstream film roles, and the Ebisu Muscats group — made her one of the most recognizable faces in Japanese entertainment beyond the AV industry."

