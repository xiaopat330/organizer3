  biography: "Tsukasa Aoi is a Japanese AV actress and former gravure idol from Osaka Prefecture who became one of the most prominent figures in the Japanese adult video industry over a 15-year career. She debuted as an idol in 2008 at age 18, appearing in TV programs and gravure work, before crossing over to AV in October 2010 with Alice Japan under the concept of 'Japan's most school-uniform-wearing girl.' After five years and over 60 titles with Alice Japan, she moved to S1 as an exclusive in June 2015, where she remained active for a decade. Alongside her AV career she gained mainstream recognition as a member of the Ebisu Muscats idol group (2015–2018), appeared in mainstream films and on television, and was consistently ranked among Japan's most popular AV actresses in annual polls. She announced her retirement on July 20, 2025, with her final activity being a photography exhibition titled 'Aoi Tsukasa: Living' held August 5–17, 2025."
