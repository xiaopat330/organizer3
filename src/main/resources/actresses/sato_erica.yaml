  biography: "Erica Sato (佐藤江梨花, さとう えりか) was born on June 8, 1986, and is a former Japanese gravure idol and AV actress. She made her AV debut in September 2006 as an exclusive actress with Momotaro Video (桃太郎映像出版), releasing her debut title 'B-Gene Super Mosaic Sato Erika' (ビージーン スーパーモザイク 佐藤江梨花). In September 2007 she transitioned to a freelance arrangement and began appearing across multiple studios and labels, including Idea Pocket, among others. Her final retirement date has not been established in available public sources."
