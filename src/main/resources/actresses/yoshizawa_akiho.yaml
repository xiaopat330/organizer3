  legacy: "Akiho Yoshizawa holds the all-time record for single-actress exclusive title count (351), a figure unlikely to be surpassed given the industry's shift toward shorter exclusive contracts. Her 16-year career across four studios defined an era of high-volume, high-production-value AV, and her post-career presence — books, YouTube, Weibo with 1.34 million followers — established a template for AV-to-mainstream-talent transitions."

