  biography: "Akiho Yoshizawa is one of the most prolific and longest-running solo AV actresses in Japanese AV history, debuting in March 2003 with Alice Japan after earlier gravure work and retiring in March 2019 with 351 career titles — a record for exclusive single-actress contracts. She held dual exclusive contracts throughout: initially with Alice Japan and Max-A, then from October 2006 onward with S1 and Maxing, releasing two new titles per month at her peak. A pioneer of intellectual engagement with the industry, she was among the first AV actresses to write regular columns and publish books on the subject of sexuality. She achieved mainstream crossover through the Ebisu Mascats idol group and later through a YouTube channel with over 130,000 subscribers. She announced her retirement in October 2018 citing a sense of completion after 15 years, with 1,000+ events attended and estimated 10 million+ units sold across her career."
