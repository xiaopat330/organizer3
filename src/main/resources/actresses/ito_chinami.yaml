  biography: "Chinami Ito (伊東ちなみ) was born on December 1, 1996, in Shizuoka Prefecture and debuted with MOODYZ on September 10, 2015, while an active university student attending a private institution in Tokyo. Her debut title MIDE-264, 'サワカワ18歳AVデビュー！！', emphasized her fresh, youthful appearance and she was described by media as 'Japan's cutest naked female college student', earning coverage in Kodansha's FRIDAY and Weekly Gendai. She released a photo book through Kodansha in October 2016. She is widely noted for her bust having grown from a C-cup at debut to an F-cup by 2017, which she attributed publicly to soy milk consumption and self-massage and expressly denied was the result of surgery. Her final titles were recalled by MOODYZ in December 2018, and all her works were removed from retail and streaming platforms in July 2019 under circumstances that were never publicly explained by the studio or actress."
