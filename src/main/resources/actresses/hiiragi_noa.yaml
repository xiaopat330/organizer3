  biography: "Noa Hiiragi (柊木のあ) is a Japanese AV actress from Tokyo, born in 1994. She debuted at S1 NO.1 STYLE in December 2013 under the stage name Yui Aoba (あおば結衣), signed with agency DIVA, and released several titles for the label through 2014. After a period under multiple intermediate stage names (夏芽ひなた, 佐伯瑠衣, 成田りな), she resumed activity in 2018 under the current name Noa Hiiragi (柊木のあ) via agency ALL Promotion, appearing across a variety of independent and major studio productions. Her measurements are 88-56-84 cm with an E cup at 158 cm tall."
