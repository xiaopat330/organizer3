  biography: "Riko Honda, born August 6, 1991, is a Japanese AV actress who debuted in 2012 under the name 仲里紗羽 (Nakazato Sawa) and later renamed to 本田莉子 (Honda Riko) upon joining S1 No.1 Style / SOD. She publicly explained the name change as a desire to shed an exaggerated on-screen persona and present a more authentic character. Her 60-title catalog in the library spans labels including SOE (S1 No.1 Style), MIDE (MOODYZ), BF, TOMN, WANZ, and SHKD, indicating activity across multiple major studios in the mid-2010s. After retiring from AV work she worked at the Yoshiwara soapland Etoile (エトワール), previously Rotenburg Anbau."
