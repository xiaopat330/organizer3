  biography: "Kudo Rara (工藤ララ) is a Japanese AV actress born on March 9, 2001 in Osaka Prefecture. She debuted in June 2020 under SODクリエイト's distribution label 'エモい女の子。' using the name Ito Haru (伊藤はる), while enrolled as a music student at Tokyo University of the Arts (東京藝術大学音楽学部). After a brief hiatus she transferred to Zeal Group and relaunched in 2021 under her current stage name 工藤ララ. Known for her petite frame (142 cm) and wide cross-label output, she was ranked first in FANZA's 'Best AV Actress Summer 2022' poll and has appeared across dozens of studios as a highly sought-after planning/ensemble actress. She has played piano since age three and received a grand piano from her parents at age twelve."
