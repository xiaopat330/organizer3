  legacy: "One of the most prolific petite/loli-archetype actresses to emerge in the early 2020s, Kudo Rara built a reputation as a cross-label planning actress in demand across virtually every major JAV studio. Her FANZA Summer 2022 number-one ranking cemented her status as a leading figure in her niche."

