  biography: "Touka Rinne is a Japanese former AV actress from Chiba Prefecture who debuted on February 19, 2018 with S1 NO.1 STYLE (SSNI-140), marketed as a 27-year-old newlywed with an I-cup figure. She held the S1 exclusive contract for approximately six months before transitioning to freelance (企画単体) work from August 2018, going on to appear across a wide range of studios including PREMIUM, MOODYZ, Madonna, Attackers, Fitch, E-BODY, and many others. Signed to the talent agency LINX, she announced her departure from the agency on June 8, 2020, with the effective date of July 9, 2020, noting a temporary hiatus while clarifying she was not retiring. She resumed active release activity from approximately July 2021. On March 15, 2022, she released her formal retirement title (PRED-380), marking the end of her approximately four-year career."
