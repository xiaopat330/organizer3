  biography: "Yuria Kiritani (桐谷ユリア) is a Japanese AV actress of mixed heritage, born May 10, 1990 in Kanagawa Prefecture, who made her debut in January 2011 with Idea Pocket (FIRST IMPRESSION 48). Signed to Diva Promotion, she became an exclusive Idea Pocket actress for her first full year, releasing monthly titles on the IPTD label throughout 2011 and accumulating nearly 50 titles under the IP imprint over her career. From 2012 onward she expanded to a wide range of labels including Prestige, Kiryu Productions, VENUS, and KMP, collaborating with many top-tier co-stars of the era. She was also a founding member of the BRW108 idol unit PINKEY in 2012, an affiliate group linking AV and music activities, though she departed by 2013. Her hobbies include piano and dance, and she is known as a proficient masseur."
