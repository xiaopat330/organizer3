  biography: "Rima Arai (ж–°дә•гғӘгғһ) is a Japanese AV actress from Hyogo Prefecture, born October 3, 2000 (AB blood type, 157 cm, F-cup). She debuted in June 2021 as an exclusive actress under SODгӮҜгғӘгӮЁгӮӨгғҲ's KMHR (гӮӯгғҹгғӣгғ¬) label, quickly gaining attention for her 'гҒЎгӮҮгҒ„гӮ®гғЈгғ«' (casual gyaru) persona and was featured in a May 2022 issue of Weekly Playboy as a pioneer of the gyaru boom in adult video. After leaving KMHR exclusive status in November 2021 she became a single-title freelancer, appearing across numerous labels and achieving multiple FANZA rental and sales chart number-one titles. In December 2024 she made her mainstream film debut in 'Netoware, Junai.' (directed by Keita Donmoto). From June 2025 she holds a triple exclusive contract with MOODYZ, kiraвҳҶkira, and Ones Factory."
