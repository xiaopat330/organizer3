  biography: "Rena Kodama (児玉れな) is a Japanese AV actress born December 12, 1999, who debuted in February 2020 as an exclusive actress at S1 NO.1 STYLE under talent agency NAXプロモーション. Tall at 168 cm with a distinctive gap between her reserved off-screen demeanor and intense on-screen performance, she quickly built a strong following; a volleyball player through her school years, she cited wanting to overcome shyness around men as her motivation for entering the industry. In June 2021 she became an exclusive actress at Madonna, then shifted to non-exclusive work from January 2022. She announced her departure from NAX Promotion in December 2023 and subsequently worked as a photo-session model under the names 富塚あき and あき from early 2024. In March 2026 she returned to AV work under a new stage name, 三枝れい (Rei Saegusa), signed to Jun Promotion."
