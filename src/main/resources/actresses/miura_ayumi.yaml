  biography: "Ayumi Miura (三浦歩美) debuted on January 24, 2019 as a SOD Create exclusive under their 'honmono hitozuma' (real married woman) label, aged 36. She was affiliated with talent agency ARROWS at debut. After six SOD exclusive titles she transferred to Madonna in July 2019 and remained a Madonna exclusive under the Miura Ayumi name through mid-2021. On May 7, 2021 she announced a stage name change to Ryo Ayumi (愛弓りょう, あゆみ りょう), transitioning her agency affiliation to ACT ENTERTAINMENT. She has remained a Madonna exclusive under the Ryo Ayumi name since, building a prolific library of drama-heavy NTR and married-woman titles. She reached FANZA rental floor ranking #1 in August 2022, was ranked #12 in the FANZA 2024 first-half actress ranking, and received a solo anniversary best series from Madonna (1st, 2nd, 3rd, and 4th anniversary editions). She is noted for a tall, slender figure with a large bust, and her mature married-woman (hitozuma/juku-onna) persona."
