  biography: "Nanami Matsumoto (松本菜奈実) is a Japanese AV actress and former gravure
    idol from Hiroshima Prefecture, born August 23, 1994. She debuted as a gravure
    idol in 2015 with a 100 cm bust, earning the nickname 乳神様 (Breast Goddess),
    and won the Gravuran Tamashii Award 2016 Renoir Painting Prize. In March 2017
    she made her AV debut with MUTEKI, then became an exclusive actress at S1 NO.1
    STYLE from June 2017 through January 2019, amassing numerous high-charting FANZA
    titles in the big-bust genre. After leaving S1 she worked as a freelance actress
    across many labels including PPPD, HND, and others before signing as a Materiall
    exclusive in March 2024, then a Fitch exclusive from January 2025. In January
    2026 she announced her departure from regulated AV production while continuing
    her strip performer career at Asakusa Rock-za."
