  legacy: "Kurumi debuted in early 2022 and rapidly built a prolific multi-label catalog spanning Royal, Lunatics, Das!, Glory Quest, and many others. Her distinctively sweet voice became a defining characteristic singled out in rankings and fan reception, earning her a FANZA video floor ranking top-10 placement in April 2024 and subsequent chart appearances through early 2026."

