  biography: "Sakura Kurumi (胡桃さくら) is a Japanese AV actress born October 29, 2002 in Fukui Prefecture. She debuted on February 23, 2022 as an exclusive actress for the DOGITATE (もぎたて) label under SOD Create, with her debut work attracting immediate attention. She originally moved to Tokyo to attend a voice-acting vocational school, and initially planned to appear in only three AV titles to gain experience relevant to her voice-acting ambitions. She quickly expanded beyond that early plan and became active across numerous labels, placing 3rd in FANZA's 'Best New AV Actress Summer 2022' ranking. She is known for her sweet, anime-character-like voice, which distinguishes her work across NTR, drama, and planning-genre productions. She is represented by the talent agency T-Powers (ティーパワーズ)."
