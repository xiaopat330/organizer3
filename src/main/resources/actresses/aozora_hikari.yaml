  biography: "Hikari Aozora (青空ひかり) is a Japanese AV actress and YouTuber from Yamagata Prefecture, born January 8, 1999. She was a nursing student before contacting an AV agency on her own initiative after struggling with her studies and seeking a new path. She debuted in October 2019 as an exclusive actress under SODクリエイト's SODstar label, with her debut cover chosen via fan contest. A 2nd-dan karate black belt (全空連 system, 9 years of training) who also competed in cheerleading in high school, she is known for her energetic personality and strong physicality, with cowgirl position as a signature strength. She is managed by C-more ENTERTAINMENT and remains active as of 2026, consistently ranking in FANZA monthly actress charts."
