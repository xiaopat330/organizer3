    year: 2022
    category: Valuable Actress of Midnight blue
  legacy: "Aozora Hikari is one of the most consistent mid-to-upper tier performers in the SODstar stable, maintaining steady FANZA chart presence across her six-year career. Her karate background and athletic physique have been recurring talking points, and her cheerful, approachable image has earned her a loyal fanbase with the nickname ぴかキン."

