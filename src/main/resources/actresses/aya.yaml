  biography: "AYA (牧野田彩, born Makinoda Aya, 1980-02-17) was a Japanese entertainer
    and AV actress from Hirakata, Osaka Prefecture, with a prior career spanning over
    a decade before her adult film debut. She first gained public attention in 1996
    as a contestant on the television audition program ASAYAN, where a judge compared
    her looks to actress Kumiko Goto; she subsequently debuted as a singer as a member
    of the limited-run idol unit L IS with the single Running On, and after the unit
    disbanded that same year she worked as a talent and race queen for several years,
    including as an image girl for motorcycle gear brand Yellow Corn in 2003. In December
    2008 she posed nude for the weekly magazine FLASH, and in May 2009 she made her
    AV debut under the mononym AYA with First Impression 42 (IPTD-452) at Idea Pocket.
    She was active primarily at Idea Pocket through 2009, later appearing at Prestige,
    SOD Create, and other labels in 2010. She died on October 23, 2010 at the age
    of 30."
