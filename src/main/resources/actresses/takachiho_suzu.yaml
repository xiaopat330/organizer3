  biography: "Takachiho Suzu (高千穂すず) is a Japanese AV actress who debuted on 7 December 2015 as an S1 No.1 Style exclusive with the newcomer title 「新人NO.1STYLE 高千穂すずAVデビュー」 (SNIS). At a rare 172 cm she was unusually tall for an S1 debut actress, and her debut drew notable attention. Her S1 run was brief, after which her work appears in S1 omnibus releases (OFJE) and later under the FALENO label (REBDB) in the local collection. No Japanese Wikipedia article exists for her, so several profile fields remain unverified."
