  biography: "Suzu Takachiho (born March 19, 1996) debuted as an S1 No.1 Style exclusive actress on December 7, 2015 with the newcomer debut title 新人NO.1STYLE 高千穂すずAVデビュー (SNIS code). Standing at a rare 172 cm, she was unusually tall for an S1 debut actress. Despite the significant attention her debut generated, she filmed only three works before leaving the industry. Her career, while brief, is remembered as an early promise cut short, and her debut title has since achieved significant collector value."
