  biography: "Miu Arioka (有岡みう, born August 17, 1995, Tokyo) is a Japanese AV actress
    known for her large-bust (I-cup) figure. She debuted in February 2018 under OPPAI
    as Shiiba Mikuru (椎葉みくる), marketed with the catchphrase 'OPPAI's best nipple
    newcomer ever.' She announced retirement in October 2019 via Twitter, then returned
    on September 4, 2020 under her current name Miu Arioka, signing with talent agency
    T-Powers. Her comeback saw wide multi-label activity across MOODYZ group labels,
    E-BODY, Fitch, and many others. Multiple titles reached #1 on FANZA weekly video
    rankings in 2023. Her hobbies include anime watching and cosplay; she lists badminton
    as a special skill."
