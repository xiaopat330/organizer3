  biography: "Saika Kawakita (河北彩花) is a Japanese AV actress and singer born on April 24, 1999 in Sosa, Chiba Prefecture. She debuted in April 2018 under S1 NO.1 STYLE with her debut title topping the FANZA annual video ranking for 2018 and winning the FANZAアダルトアワード2019 best work award in both video and rental categories. She quietly retired around mid-2019 before making a highly anticipated comeback in July 2021, with her return title becoming S1's top-selling work of that year and sweeping major actress-of-the-year polls. After a 2024 name change (花 to 伽), she remains one of the top-selling AV actresses in Japan and holds an S1 exclusive contract under the agency Minds (マインズ). She also pursues a parallel music career under the name 萌名."
