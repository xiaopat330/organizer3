  legacy: "Kawakita is regarded as one of S1's most commercially dominant actresses of the 2020s, achieving repeated #1 rankings on FANZA across multiple consecutive half-year periods after her 2021 comeback. Her debut title and multiple subsequent works have topped annual sales charts, and she is consistently ranked in the top tier of reader polls by major Japanese men's weeklies."

