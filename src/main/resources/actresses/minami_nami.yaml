  biography: "Nami Minami (美波なみ) is a Japanese AV actress born on May 11, 1994, in Nagano Prefecture. She made her debut in March 2014 with Idea Pocket's signature FIRST IMPRESSION series (IPZ-330), quickly becoming a contract actress for the label under Diva Promotion management. During her active period with Idea Pocket (2014–2016), she appeared in solo features across the label's TISSUE and SUPREME sub-labels as well as the IDBD compilation series, noted for her slender figure, natural appeal, and energetic performance style. She accumulated approximately 25 titles in her career before fading from active release schedules after 2016."
