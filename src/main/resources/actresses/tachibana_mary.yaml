  legacy: "Mary Tachibana is notable as a late-bloomer success story — she spent eight years as a minor presence before emerging as one of the leading FANZA-charting actresses of the mid-2020s, combining a striking half-Russian appearance with prolific output across Madonna and DASS!. Her announced retirement at the height of her commercial peak in 2025 made her graduation title a major industry event."

