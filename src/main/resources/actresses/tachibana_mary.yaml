  biography: "Mary Tachibana (橘メアリー; born 7 July 1993) is a Japanese AV actress, singer, and entertainer of Russian-Japanese mixed heritage who debuted in May 2014 while a third-year university student. After graduating university with top honors and spending a year working as a dental hygienist, she committed fully to an AV career, though she spent approximately eight years in relative obscurity before a breakout with an Alice Japan title in October 2022. From around 2023 her output accelerated dramatically and she became one of FANZA's most-charted actresses, ranking 7th in FANZA's 2024 first-half actress rankings. She held dual exclusive contracts with Madonna and DASS!, debuting formally as a Madonna exclusive in September 2024. Outside AV she has been active as a DJ (under the name DJ MARY), as a member of the dance-vocal idol group BLACK DIAMOND (2023–2025) under the name MARY, and as a participant in the AV Asia outreach project AVA888. On 15 May 2025 she announced her retirement from AV, effective with her graduation title released 26 May 2026, with plans to continue music and entertainment activities thereafter."
