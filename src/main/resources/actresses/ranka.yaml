  biography: "Ranka (蘭華, らんか) is a Japanese AV actress who debuted on December 16, 2015 under the name Sakino Kanna (咲乃柑菜) with agency FUNIT! Entertainment, with measurements of 157 cm / 82 cm B (C-cup) / 58 cm W / 84 cm H as listed by her early-career studios. In August 2020 she renamed herself to Ranka (蘭華) and moved to Aloha Promotion, simultaneously updating her public profile via Twitter to reflect her actual date of birth (1994-11-29) and revised measurements (160 cm / 85 cm B (F-cup) / 57 cm W / 85 cm H — the bust increase is widely attributed to augmentation). Known for a gyaru / kurogal aesthetic with a tanned complexion, she has been prolific across a wide range of labels including Wands (WILL Co.), AVS Collector's, and MOODYZ's Moody's Acid sub-label. As of 2026 she remains active with an extensive catalog exceeding 390 titles across domestic studios."
