  legacy: "あべみかこ is credited with popularizing the 'ちっぱいブーム' (flat-chest boom) in the JAV industry — her distinctive figure turned a longtime insecurity into a demand signal and influenced casting trends throughout the 2010s. She was among the most prolific freelance actresses of her era, appearing for nearly every major studio, and built a lasting post-AV career as a YouTuber and stage actress."

