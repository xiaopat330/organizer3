  biography: "あべみかこ (Mikako Abe, legal kanji 安部未華子) is a Japanese actress, YouTuber, and entertainer from Tokyo who debuted in June 2012 under Peters MAX, quickly selling approximately 10,000 copies of her debut title. Following two brief early retirements (March 2013 and September 2013), she made a sustained comeback in November 2014 and became one of the most prolific and recognizable freelance AV actresses of the 2010s, appearing across MOODYZ, Wanz Factory, Peters MAX, and dozens of other labels. She is particularly known for her slim, small-busted figure — trading under the 'ちっぱい (flat-chest)' concept — which she credited with creating a broader industry demand for similar performers. In 2016 she received both the MOODYZ Most Appearances Award and the Best Wanz Factory Award, and in 2017 won the DMM.R18 Adult Awards Special Prize. She expanded into mainstream entertainment via YouTube (10.4万 subscribers), music (CD debut February 2021), stage acting, and pink film, winning the Pink Film Best Ten 2020 Lead Actress Award. She formally announced her AV retirement in June 2021 and retired on 2022-06-20 at her 10th-anniversary event."
