    role: Exclusive contract actress
  awards:
  - event: FANZAアダルトアワード (FANZA Adult Awards)
    year: 2019
    category: 優秀新人女優賞 (Excellent New Actress Award)
  legacy: "Miru Sakamichi is regarded as one of the most technically accomplished
    actresses to emerge from S1 in the 2018 debut class, earning the nickname 'Technical
    Emperor' for a riding-position proficiency that drew comparisons to veteran performers
    from her very first releases. Her rapid chart dominance — a FANZA No. 1 ranking
    with only her fourth title — and smooth rebrand to the miru persona in 2021 demonstrated
    a career longevity uncommon among her debut contemporaries."

