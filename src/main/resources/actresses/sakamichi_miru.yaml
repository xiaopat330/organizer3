  biography: "Miru Sakamichi (坂道みる, born November 29, 1999, in Gifu Prefecture)
    is a Japanese AV actress who debuted as an exclusive for S1 NO.1 STYLE on August
    19, 2018, under the representation of agency T-Powers. She gained rapid recognition
    for her natural composure on camera, which she has attributed to a background in
    gymnastics, and with only her fourth release topped the FANZA sales chart in 2018.
    She won the Excellent New Actress Award at the FANZA Adult Awards in May 2019,
    cementing her standing as one of the most notable debuts of her generation. In
    May 2021 she transferred management from T-Powers to C-more ENTERTAINMENT and
    rebranded under the single-word stage name miru, continuing to release titles
    through S1 and later other labels. As of 2025 she remains active, with scheduled
    fan events in Japan, South Korea, and Southeast Asia, and has accumulated over
    120 works across her career."
  primary_studios:
