  biography: "Kokomi Naruse (成瀬心美) is a Japanese actress, talent, and singer born August 10, 1989 in Fukuoka Prefecture. She debuted in AV in January 2009 under the agency T-POWERS, initially working across numerous labels including Kira☆kira, SOD, Aroma, Rocket, and many others. She signed an exclusive contract with 宇宙企画 (Uchu Kikaku) from 2012 to 2013, and retired from AV in February 2013. Her early public profile listed a fictitious birthdate of 1989-03-03 and birthplace of Niigata Prefecture; her actual birth details (August 10, 1989, Fukuoka) were disclosed on her blog during her career and officially corrected after retirement in 2014. She won the Sky PerfecTV! Adult Broadcasting Awards Best Actress Award and Nikkan Gendai Award in 2012, as well as SOD Grand Prix Best Actress in 2011 and 2012. After retiring from AV she pursued a career as a singer and talent; she formed the band Mezcolanza (mezcolanza) in April 2014 and launched a YouTube channel (成瀬心美のここチャンネル) in 2020."
