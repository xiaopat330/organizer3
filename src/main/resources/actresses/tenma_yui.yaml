  biography: "Yui Tenma (天馬ゆい) is a Japanese AV actress from Aomori Prefecture, born February 14, 1998. She attended a voice-acting school as a teenager, drawn by her love of anime, where she discovered a passion for performance. She made her first AV debut in April 2018 under the name 上川星空 (Kamikawa Sora) with ジールグループ (Zeal Group) agency after a breakup triggered a self-described impulsive decision to apply; she retired under that name on June 8, 2020. After a hiatus she relaunched under the name 天馬ゆい on March 18, 2021, joining the Krone agency, and quickly built a prolific second career across major labels. She became widely known for her athletic physique — which she attributes entirely to what she calls 'AV筋' (muscles developed through filming) — her range from schoolgirl to villainess roles, and a breakout 2022 Alice Japan title that sold 10,000 copies in its first week. She has also appeared in tokusatsu web drama productions by GIGA, written screenplays, and appeared in a Netflix drama in 2025."
