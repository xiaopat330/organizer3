    role: "Non-exclusive freelance actress active across multiple labels including Moodyz (MIAA/MIAB), Attackers (SORA), Alice Japan (DVAJ/CEMD), and many others"
  awards: []
  legacy: "Yui Tenma is notable for successfully reinventing herself after an initial career under a different name, building a prolific second career as a top-tier freelance performer across Japan's major AV labels. Her combination of dramatic range — from innocent schoolgirl to action villainess — with strong commercial results (FANZA monthly rankings, convention appearances in Taiwan) and mainstream crossover work (Netflix drama, tokusatsu screenwriting) distinguishes her among GODDESS-tier performers of the 2020s."

