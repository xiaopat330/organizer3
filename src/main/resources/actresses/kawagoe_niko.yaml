  biography: "Niko Kawagoe (川越にこ) is a Japanese AV actress, licensed chef, idol, and gravure idol born on April 23, 2003, on Hachijojima island (八丈島), Tokyo. She grew up on the island and moved to Tokyo at age 18 to pursue a culinary career, enrolling in cooking school and subsequently working professionally as a chef — as of 2024 simultaneously at a hotel Italian restaurant and a city cafe & bar. Working in male-dominated kitchens, she was scouted and decided to enter the adult video industry; she was originally approached by a different agency but ultimately signed with GG (formerly Prime Agency). She debuted on February 13, 2024, as an exclusive actress for S1 NO.1 STYLE (エスワン), with her debut title reaching #2 on the FANZA weekly retail AV ranking and #1 on the FANZA weekly video-streaming ranking. She is also a member of the idol unit ねこまんまっ‼︎fromお月ちゃんのうた."
