  legacy: "Ayaka Tomoda is one of the longest-continuously-active GODDESS-tier actresses in the contemporary JAV industry, with a career spanning kawaii*, MOODYZ, KMP, Attackers, MARRION, MAX-A, FALENO, and DAHLIA before transitioning to freelance work in 2024 at age 35. She is notable for combining mainstream credibility — idol group membership, pink-film award recognition, film appearances, and a strong live-event following in Taiwan and Hong Kong — with uninterrupted output across specialist genres including femdom, bondage, and NTR."

