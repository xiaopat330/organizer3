  biography: "Ayaka Tomoda is a Japanese AV actress, singer, and former idol group member born September 14, 1988 in Tokyo. She debuted with kawaii* in October 2009 and moved to MOODYZ in March 2010 before cycling through a series of exclusive contracts over a 15-plus-year career: Million (KMP, 2015–2016), Attackers (2017), MARRION (2017–2018), MAX-A (2018–2019), FALENO star (2020–2021), and DAHLIA — the FALENO mature-woman sub-label — from March 2021 until she ended her exclusive in January 2024. Alongside her AV work she participated in multiple idol and music units including PINKEY (CD debut 2012) and Ebisu Muscats 1.5 (2018–2021), appeared in mainstream films including Nakashima Tetsuya's 渇き。 (2014) and the Sega game 龍が如く0 (2015), and built a loyal following across East and Southeast Asia, where she earned the Hong Kong nickname 'AV謝安琪.' Since January 2024 she has worked as a non-exclusive freelance actress and remains active as of 2026."
