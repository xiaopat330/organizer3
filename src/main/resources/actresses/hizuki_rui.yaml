  legacy: "Rui Hizuki is notable for a high-volume, genre-spanning freelance career following her three exclusive stints, and for a mid-career reinvention under a new kanji name (音琴るい) that allowed her to build a second distinct wave of recognition. Her GIGA tokusatsu work and competitive lesbian (レズ) catalog give her an unusually broad appeal."

