  biography: "Rui Hizuki (妃月るい, later 音琴るい) is a Japanese AV actress and talent born on January 16, 1994 in Yamanashi Prefecture. She debuted in May 2016 as an exclusive actress for S1 NO.1 STYLE (エスワン), where she filmed twelve titles before moving to Idea Pocket and then Attackers in 2017. After leaving exclusivity in 2018 she became a prolific freelance performer across dozens of labels, placing 62nd in FANZA's 2018 annual actress ranking. In June 2021 she announced retirement from the 妃月るい persona and briefly adopted the entertainment name ぺち, but returned to AV work in December 2021 under the new stage name 音琴るい (ねごと るい), signing with management office DINO. Under both names she has amassed a substantial catalog spanning vanilla, anal, BDSM, yuri/lesbian, and tokusatsu-heroine (GIGA) genres, and remains active as of 2026."
