  biography: "Small-framed Tokyo-born actress who debuted in September 2020 under SOD Create's 青春時代 label as 百瀬あすか (Asuka Momose), quickly becoming one of the label's most prominent faces. She left exclusive status in February 2021 and spent two prolific freelance years working across MOODYZ, 本中, ダスッ!, ROYAL, and dozens of other labels. She announced retirement on 18 February 2023 and officially retired on 31 December 2023. In May 2025 she returned under the new stage name 小栗操 (Misao Oguri), signing a simultaneous exclusive contract with 本中, ダスッ!, and ROYAL. Reviewers have noted her naturally high hair density and sharp comedic personality as signature traits that carry across both career eras."
