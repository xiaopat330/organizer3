  legacy: "One of the most prolific freelance actresses of the early 2020s, 百瀬あすか accumulated a catalog spanning well over 200 titles across nearly every major label in under three years. Her career hiatus and rebranded return as 小栗操 in 2025 — immediately as a three-label exclusive — marks one of the higher-profile comebacks of the mid-2020s JAV industry."

