  biography: "An Namba (難波あん) was born March 7, 1984 in Tokyo. She entered the AV industry after being robbed and needing money, later describing herself as having been outgoing in high school and appearing older than her age. Her debut video Number.1! was released in October 2002 by Moodyz when she was 18. She became the most celebrated exclusive actress at Moodyz, winning their Best Actress Award three years running in 2003, 2004, and 2005, and received a Best Actress Award for Excellence at the 2006 AV Actress Grand Prix. Described as 'Japan's geekiest adult video actress' for her ardent love of video games and ownership of multiple consoles, she mounted an elaborate retirement in the form of the 'Ann-Project' — a series of 8 farewell videos filmed for 8 different studios over several weeks beginning at the end of 2007. By early 2009 DMM and Amazon each listed more than 250 DVDs under her name. In 2012 she ranked 11th in a DMM customer poll of the 100 all-time best AV actresses, held to mark the 30th anniversary of Japanese adult video."
