  legacy: "An Namba was among the most decorated Moodyz exclusive actresses of the mid-2000s, winning their top prize three consecutive years, and remains a canonical figure of the classic JAV era — ranked 11th in DMM's 2012 all-time customer poll of 100 actresses. Her elaborate eight-studio retirement arc 'Ann-Project' set a benchmark for farewell productions in the industry."

