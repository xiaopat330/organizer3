  biography: "Yua Kisaki (妃悠愛) is a Japanese retired AV actress born on 1 December 1980 in Tokyo. She made her debut in April 2009 across multiple labels under various pseudonyms before settling on her primary stage name 妃悠愛 later that year. From September 2010 she held an exclusive contract with TMA (Total Media Agency / トータル・メディア・エージェンシー), for whom she produced a concentrated body of work in 2010–2011 including cosplay, creampie, and housewife-themed titles. She announced her retirement on her official blog on 1 August 2011, with her final regular release — 「麗しのパンスト人妻の誘惑 妃悠愛」 — issued on 23 September 2011; the blog was closed on 5 November 2011. In the AV30 anniversary popularity poll (January–February 2012) she ranked 71st. A compilation best was released posthumously by TMA in September 2013."
