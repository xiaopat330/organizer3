  biography: "China Matsuoka was born April 16, 1994 in Fukuoka Prefecture. She first appeared publicly as 'China' in the July 28, 2014 issue of Weekly Playboy, featured in a spread titled 'History's Strongest Amateur Nude.' She made her AV debut with SOD Create in December 2014. Within eighteen months she had risen to award-winning status, winning both the Newcomer Actress Award and the FLASH Award at the Skyperfect Adult Broadcast Awards 2016 in March 2016. On May 31, 2016, she was seriously injured in a hit-and-run traffic accident, and was subsequently hospitalized in July 2016 for an internal organ disease. She announced her retirement from AV in August 2016. She has remained out of public life since."
