  legacy: "China Matsuoka's eighteen-month career illustrated how quickly a performer could rise from anonymous gravure newcomer to award winner in the SOD system. Her retirement due to injury and illness cut short what appeared to be a trajectory toward sustained popularity. She has been remembered in fan communities for both her rapid ascent and the abrupt circumstances of her retirement."

