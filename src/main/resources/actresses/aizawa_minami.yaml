  legacy: "Minami Aizawa was one of IdeaPocket's defining exclusive actresses of the late 2010s and early 2020s, earning the industry's top Best Actress honor at the 2019 FANZA Adult Awards and sustaining a seven-year career that bridged gravure, mainstream print media, and international fan engagement in Hong Kong, Taiwan, and Southeast Asia. Her post-AV trajectory — transitioning to DJ work, mainstream celebrity management, and a high-profile marriage into the Burning Group — made her one of the most prominent examples of an AV actress successfully crossing into mainstream Japanese entertainment."

