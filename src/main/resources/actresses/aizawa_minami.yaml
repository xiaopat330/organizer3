  biography: "Minami Aizawa (相沢みなみ) was born on June 14, 1996, in Hong Kong while her father was conducting business there, and spent approximately seven years of her childhood in Los Angeles, giving her fluency in English. A returnee (帰国子女), she later graduated from Seisen University (清泉女子大学) in Tokyo before entering the adult video industry. She debuted on September 1, 2016, under IdeaPocket with the title AVOP-201, quickly rising to become one of the studio's top exclusive actresses. In 2019 she was awarded the Best Actress prize at the FANZA Adult Awards, cementing her recognition as a leading figure in the industry. She announced her retirement at a Taiwan fan event on June 2, 2023, citing the death from leukemia of the agency president who had scouted her — a man she described as her closest confidant — alongside the emotional clarity she found during the COVID-19 pandemic years. After stepping back from AV she pursued entertainment activities in Hong Kong and Taiwan, graduated from the 相沢みなみ stage name in August 2024, and in November 2024 debuted as DJ pixeL, subsequently marrying Shogo Suho and becoming vice president of Burning Production in December 2024."
