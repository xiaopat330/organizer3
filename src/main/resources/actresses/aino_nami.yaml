  legacy: "Aino Nami was a high-output actress across the mid-2010s, working with
    virtually every major label during a concentrated three-year run before retiring.
    Her multi-alias career across both uncensored and coded markets, and her prolific
    studio output with the industry's largest labels, made her one of the more broadly
    distributed performers of the 2013–2015 cohort."

