  biography: "愛乃なみ (Aino Nami), also romanized as Nami Itoshino, is a Japanese
    former AV actress born January 3, 1994, in Kanagawa Prefecture. She entered the
    AV industry in October 2012 under the alias Mako Nagase with an uncensored Tokyo
    Hot release, then transitioned to mosaic-coded mainstream AV in December 2012
    as Aino Nami with Prestige. Her most prolific period was 2013–2015, during which
    she worked extensively with MOODYZ, OPPAI, E-BODY, BeFree, and Wanz Factory among
    other major labels. She retired from new productions around 2015. Her G-cup figure
    at 163 cm contributed to consistent bookings across studios throughout her active
    years."
