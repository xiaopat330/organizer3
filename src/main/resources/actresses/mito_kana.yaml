  legacy: "Kana Mito holds the distinction of being Madonna's longest-serving exclusive actress, maintaining her exclusive contract from her debut in November 2017 through the present. Her steady output of mature-woman (熟女) drama titles and her ranking in FANZA's top 15 actresses in 2024 reflect a durable appeal that has grown stronger over her career."

