  biography: "Kana Mito (水戸かな) is a Japanese AV actress born on November 1, 1984, who debuted as a Madonna exclusive on November 1, 2017, at the age of 32. Before entering AV, she worked as a dance instructor and had aspired to become a professional dancer. She made her debut title with JUY-285, introduced as a top-tier Madonna exclusive, and has maintained that exclusive relationship continuously since. In 2019 she joined the BStar Production talent agency (affiliated with Bambi Promotion). By early 2024 she became the longest-serving exclusive actress in Madonna's history. She was ranked 13th in the FANZA 2024 first-half actress rankings and has also performed as a stripper at Asakusa Rock-za (November–December 2021) and runs an active YouTube channel (Mi_channel, 2020–present)."
