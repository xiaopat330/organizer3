  biography: "Saki Ninomiya (二宮沙樹) is a Japanese AV actress and gravure idol from Tokyo who debuted in December 2004 with Max-A (マックス・エー), initially holding a dual exclusive contract with Max-A and Tri Heart Corporation (セクシア). She moved to Media Station (宇宙企画) in 2005, then to Momotaro Eizou Shuppan (桃太郎映像出版) in October 2006 for her sell-through debut. She subsequently became an exclusive actress at Premium (プレミアム) under the Autovision/Kitō umbrella, releasing prolifically through 2011; she also appeared on Idea Pocket titles and moved to MOODYZ in June 2012. Outside AV she was active as a kickboxing round girl and race queen at the Suzuka 8-Hour Endurance Race, and released a CD single in 2008. No new releases have appeared since 2015, placing her in effective retirement."
