  biography: "Shou Nishino (西野翔) debuted in September 2004 as a KUKI exclusive actress, then moved to アイエナジー in mid-2005. She held successive exclusive contracts with S1 NO.1 STYLE (June 2006–November 2007), PREMIUM (December 2007–February 2008), and MOODYZ (from March 2008), during which she joined the 恵比寿マスカッツ idol unit. In August 2014 she became an ATTACKERS exclusive, and in August 2017 moved to 痴女ヘブン. In June 2019 she announced a transfer to SOD Star and retirement within the year. Her final AV title was shot on 27 December 2019 and released 26 March 2020. She won the ピンキーリボン賞 2011 最優秀主演女優賞. Outside AV she appeared in Thai and Taiwan/Singapore co-productions as an actress, gained popularity across Asia as a 'national housewife' figure, and has maintained activity as a DJ and live-streaming performer."
