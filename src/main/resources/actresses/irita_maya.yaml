  biography: Maya Irita (入田真綾) is a Japanese AV actress born November 15, 1990 in
    Tokyo, represented by agency Mines (マインズ). A former swimsuit model and contest
    winner, she debuted on February 23, 2023 as a FALENO star exclusive actress; her
    debut title reached number one on FANZA's rental chart for four consecutive weeks.
    In April 2023 she transferred within the FALENO group to the DAHLIA label, where
    she remained as an exclusive through 2025. Drawing on her dance background, she
    also debuted as a burlesque dancer at Asakusa Rockza in September 2024. In November
    2025 she announced the end of her exclusive contract and transitioned to freelance
    (企画単体) work.
