  biography: "Riho Shishido is a Japanese AV actress from Tokyo who debuted on March 1, 2022 as an exclusive with MOODYZ under the concept of a university student making her AV debut at age 20. Her debut year earned recognition in the FANZA 'この AV 女優がすごい! 2022夏' new actress rankings (1st place) and she was ranked 41st in the Asahi Geino 2022 AV actress election. She graduated from university in March 2024 and in December 2024 announced she was leaving her MOODYZ exclusive contract to work as a freelance planning-single actress in order to appear in a wider range of productions. She is affiliated with the Mines talent agency and is known for her G-cup figure and literary interests; she cites François Truffaut as a favorite director and Anthony Burgess and Yumeno Kyusaku as favorite authors."
