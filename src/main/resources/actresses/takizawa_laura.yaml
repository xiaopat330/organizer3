  biography: "Laura Takizawa (水咲ローラ, みさきローラ) is a Japanese AV actress of Russian-Japanese mixed heritage, born June 1, 1992 in Tokyo. She made her AV debut in July 2012 under the name 滝澤ローラ (Takizawa Rola) as an exclusive actress with PRESTIGE, releasing four titles under that name before a brief announced retirement in November 2012. She returned in early 2013 under her new stage name 水咲ローラ (Mizusaki/Misaki Rola), continuing with PRESTIGE before signing an additional exclusive contract with IDEA POCKET in December 2013, where she became a prominent actress known for her tall frame, exotic mixed appearance, and passionate screen presence. Her career with IDEA POCKET spanned through 2017, during which she appeared in numerous solo works as well as high-profile compilation titles featuring the label's top actresses. She later became active on YouTube under the channel name 芳沢ローラ."
