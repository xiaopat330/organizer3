  biography: "Nozomi Ishihara (石原希望) is a Japanese AV actress and YouTuber born on July 25, 2000, in the Shikoku region of Japan. She debuted in June 2020, simultaneously releasing works across five makers, and her debut title immediately topped the FANZA daily ranking on May 3, 2020, making her one of the most explosive new-actress debuts in recent memory. She became an exclusive MOODYZ actress from November 2020, after previously shot works from other studios continued to release. Her name 'Ishihara Nozomi' was ranked 4th in Weekly Playboy's 2020 AV Buzzword of the Year — the only individual name to rank. She received the Miss iD 2021 New Generation Pornstar Award and won the Asahi Geino AV Grand Prix for 2021, cementing her as one of the defining new stars of the MOODYZ era. She maintains an active YouTube channel and has branched into music performance and live events."
