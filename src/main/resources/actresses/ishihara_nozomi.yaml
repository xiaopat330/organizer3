  legacy: "Ishihara Nozomi is regarded as one of MOODYZ's defining stars of the 2020s, notable for her instant commercial impact upon debut and sustained popularity across rankings. Her natural charm, dialect, and variety-show personality earned her the nickname 'バラエティー女王' (Variety Queen) and enabled her to cross into mainstream entertainment visibility through YouTube, live music events, and magazine features."

