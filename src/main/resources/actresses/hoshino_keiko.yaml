  biography: "Keiko Hoshino (stage name ほしの景子) was born on April 11, 1988, in Kanagawa Prefecture, Japan, and had a background in gravure modeling before transitioning to adult video. She debuted in August 2015 as a headline exclusive signing for E-BODY (the large-bust label of Ruby), with her first title EYAN-030 marketed around her identity as a 27-year-old married woman making her AV debut. During her approximately seven-month exclusive contract she released roughly five original titles in the EYAN series. A full-career compilation (MKCK-159, released March 13, 2016) marked the end of her known releases, indicating she retired from the industry around early 2016 with no formal retirement announcement."
