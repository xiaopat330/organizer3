  legacy: "Hoshino Keiko's career was brief but she was positioned as one of E-BODY's headline exclusive signings in the latter half of 2015, reflecting the label's ongoing strategy of debuting busty married-woman personas. Her debut title's marketing — emphasizing a 27-year-old wife making her AV debut — exemplifies the niche E-BODY cultivated during that period. She remains known primarily within E-BODY collector circles for her concentrated run of EYAN-series releases in 2015–2016."

