  biography: "Rion (born March 1, 1994, Kyoto Prefecture) is a Japanese AV actress celebrated for her J-cup bust, nicknamed \"神の乳\" (God's breasts) by fans and media. She debuted on September 7, 2013 as 宇都宮しをん under S1 NO.1 STYLE, affiliated with the Eightman talent agency, and quickly became one of the studio's most popular exclusive actresses. After a hiatus in 2014-2015, she re-debuted in October 2015 under the mononym RION at S1, establishing herself as a flagship exclusive until a second hiatus in September 2018. She returned in December 2019 under the name 安齋らら (her gravure name used since a 2014 Weekly Playboy spread), signing again with S1 for a third contract period. New shoot work stopped around March 2022. Throughout her career she maintained an exclusive relationship with S1 NO.1 STYLE, appearing across the SNIS, SSNI, and SSIS label lines."
