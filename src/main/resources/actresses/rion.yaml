  legacy: "Rion is widely regarded as one of the defining S1 exclusive actresses of the 2010s, recognized for a unique physical figure—nicknamed \"God's breasts\"—that made her a fixture in Weekly Playboy and FLASH cover features. Her three-name career arc (宇都宮しをん → RION → 安齋らら) across multiple S1 contract periods spanning 2013-2022 is unusual in the industry and reflects sustained commercial appeal over nearly a decade."

