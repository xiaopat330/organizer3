  biography: "Reiko Sawamura (澤村レイコ), born November 24, 1974 in Tokyo, debuted in AV in 2008 under the name Honami Takasaka (高坂保奈美) with HY Production, specialising in milf and married-woman roles. She announced retirement on her blog in August 2009, taking effect in September of that year. In 2010 she returned under her current stage name 澤村レイコ, affiliating with Capsule Agency (カプセルエージェンシー), and built one of the most prolific freelance careers of the 2010s across dozens of studios including Madonna, Attackers, Dogma, Tameike Gorō, CentreVillage, and VENUS. She retired a second time in February 2017, returned again in May 2018, and had largely ceased releasing new solo titles by 2022; as of 2024 she remains nominally on the Capsule Agency roster without a formal retirement announcement."
