  biography: "Shihori Inamori (born July 14, 1986, in Niigata Prefecture) is a Japanese AV actress who made her strip debut on February 1, 2005, affiliated with Tokyo's Toyo Show Theater, and her AV debut in July 2005 via MAX-A with the title Kimoe. She built her career across multiple labels including Uchukikaku, MAXING, and Idea Pocket, where she became known for her G-cup figure and was a frequent solo-feature subject through the late 2000s. Her last major new release under the Inamori Shihori name was in 2009, followed by compilation and best-of releases into 2012. In July 2010 she re-debuted under the name Ashina Miho (芦名未帆) via MOODYZ, subsequently working with Attackers, Prestige, VENUS, and other major studios in that persona. She also appeared at times under the alias Minefuji Kou."
