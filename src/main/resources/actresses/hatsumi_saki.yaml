  biography: "Saki Hatsumi (初美沙希) is a Japanese AV actress born October 15, 1989, who debuted in January 2010 under the name Shizuku (しずく) after publicly announcing her intent to enter AV on a popular net-idol blog. She renamed herself Hatsumi Saki in October 2011 after a brief hiatus, and spent years as an independent planning actress before becoming h.m.p exclusive in November 2016 — a seven-year grassroots rise described as extremely unusual in the industry. She achieved historic dominance at the Skyperfect Adult Broadcasting Awards, winning a record four prizes in a single year in 2016 (actress of the year, best work, on-demand award, and Yukan Fuji award), earning the nickname 'Child of Skyperfect Adult'. She retired on April 30, 2017, and later returned to public life as a talent and h.m.p PR representative."
