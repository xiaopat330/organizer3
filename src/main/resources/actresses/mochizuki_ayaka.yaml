  biography: "Ayaka Mochizuki (望月あやか) is a Japanese AV actress born on November 30, 1995, in Noheji-cho, Aomori Prefecture. She trained in karate throughout elementary, middle, and high school, reaching black belt and competing at the national level. After graduating high school she enrolled in nursing school and later worked as a nurse; at age 23 she applied of her own accord to her agency and made her AV debut in May 2019. Within her first year she appeared in approximately 80 titles, quickly establishing herself as a prolific planning/solo actress known especially for her energetic squirting scenes. She was affiliated with Prime Agency and later GG before transferring to Reaster Pro in June 2022. As of mid-2025 her social media accounts were deleted and new releases had ceased, leaving her status uncertain."
