  legacy: "Misaki was among IDEA POCKET's popular exclusive actresses of the late 2010s, placing 31st in Asahi Geino magazine's 2022 active AV actress popularity poll. Her career arc — debuting as a fresh-faced romantic lead at IDEA POCKET and maturing into heavier NTR-drama roles at Attackers — is representative of the trajectory of many top-tier exclusive actresses of her generation."

