  biography: "Nanami Misaki (岬ななみ) is a retired Japanese AV actress born on June 9, 1996 in Shizuoka Prefecture. She debuted in November 2017 under exclusive contract with IDEA POCKET (アイデアポケット), quickly establishing a reputation for intimate, story-driven works and was noted for her resemblance to former Nogizaka46 idol Nanami Hashimoto. She was managed by talent agency T-Powers throughout her career. In 2020 she began making appearances on the Attackers label alongside her IDEA POCKET exclusivity, and in July 2022 she transitioned to a full exclusive contract with Attackers, primarily working on the ADN NTR-drama series. Her final release appeared in August 2023, after which she entered an inactive status with her social media accounts deleted and her agency profile removed."
