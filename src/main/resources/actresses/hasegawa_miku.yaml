  biography: "Miku Hasegawa (長谷川ミク) made her AV debut in February 2012 with SOD Create's STAR-328, a 200-minute debut release. She quickly transitioned to Idea Pocket, appearing across the IPTD and IPZ series throughout 2012 and into 2013, with titles including her facial specialty release IPTD-975 and a role-play feature IPZ-086 (Secret Female Investigation). Her output also extended to Prestige (CHN-002), Ranmaru (TYOD-195), and Mitsu Getsu (SMT-011), suggesting she worked across multiple labels during her short but active career. She appears to have retired around late 2013 after roughly a dozen solo releases."
