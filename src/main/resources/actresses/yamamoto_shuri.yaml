  biography: "Riho Fujimori (legal or birth name unknown; DB canonical: Shuri Yamamoto / 山本しゅり) is a Japanese AV actress born December 3, 1994 in Tokyo. She began performing under the name 前田由美 (Yumi Maeda) in January 2014, then moved through the names 山本しゅり (Shuri Yamamoto, approx. 2017–2018) and はるかみらい / 未来春香 (Haruka Mirai, approx. 2019) before adopting the name 藤森里穂 (Riho Fujimori) around 2020, under which she achieved widespread recognition. As Riho Fujimori she became an exclusive at SOD Create and SOD麗 from May 2022, moved to dual exclusives 本中 and OPPAI under NAX Promotion from September 2023, transitioned to ダスッ! and マドンナ dual exclusives in 2024, and left exclusive status in August 2025 to become a freelance actress. She won the スカパー! アダルト放送大賞 Valuable Actress of AV King award in November 2021, and amassed over one million X (Twitter) followers by May 2025."
