  legacy: "Riho Fujimori is one of the most prominent Japanese AV actresses of the early 2020s, notable for a career revival under her current stage name after several years under lesser-known identities. Her combination of a slender frame with a natural G-cup bust, her prolific output across major studios including MOODYZ, Attackers, SOD, 本中, OPPAI, ダスッ!, and Madonna, and her social media reach of over one million X followers have made her a defining figure of the era."

