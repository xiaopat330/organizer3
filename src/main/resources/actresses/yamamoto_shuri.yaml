  confidence: "Profile data (birthplace, blood type, height, measurements, cup) sourced from Japanese Wikipedia infobox (https://ja.wikipedia.org/wiki/藤森里穂), cross-confirmed by Chinese Wikipedia. DOB discrepancy: Japanese and Chinese Wikipedia both state 1996-12-03 (as 藤森里穂); seesaawiki.jp lists 1994-12-03. 1994 is used here because the first confirmed title (前田由美 era, 2014-01-15 per seesaawiki filmography) would make the actress 17 at debut if born 1996 — legally impossible for the JA industry. Born 1994 yields age 19 at debut (clean). The 1996 figure in Wikipedia almost certainly reflects a persona-adjusted public age adopted for the 藤森里穂 relaunch; it is not the actress's true birth year. Bust discrepancy: Wikipedia states 86cm; seesaawiki states 89cm. Wikipedia value used. Height discrepancy: Wikipedia states 160cm; seesaawiki states 159cm. Wikipedia value used. Name timeline sourced from seesaawiki.jp AV actress database (https://seesaawiki.jp/avavavav/d/藤森里穂 and individual redirect pages), which documents the chain 前田由美 → 山本しゅり → はるかみらい → 藤森里穂 with per-title name attribution. Exact transition dates between 山本しゅり and はるかみらい, and between はるかみらい and 藤森里穂, not confirmed; approximate ranges only. Studio history from Japanese Wikipedia infobox 専属契約 field and career section. active_from 2014-01-15 is the first title date shown on seesaawiki filmography (前田由美 era); Chinese Wikipedia states debut was 2013 but no title or date given."
