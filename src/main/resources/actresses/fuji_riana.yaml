  biography: "Riana Fuji (藤井リアナ) is a Japanese adult video actress born in 1993. She made her industry debut in August 2016 under the stage name Urumi Yurisaki (百合咲うるみ), signed with agency T-POWERS and working exclusively for Idea Pocket's Tissue sublabel. Over roughly a year she released approximately thirteen solo titles in the Tissue series before announcing retirement in October 2017 with a farewell title. In April 2022 she returned to the industry under the new stage name Riana Fuji, signing with agency ACT and resuming work with Idea Pocket — debuting under the new name via the label's \"Aipoke Outstanding Discovery Project\" (IPIT-028, May 2022). Her return featured breast augmentation. She has since appeared in compilation best-of releases for Idea Pocket alongside solo and amateur-style productions."
