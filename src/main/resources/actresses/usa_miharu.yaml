  biography: "Miharu Usa (羽咲みはる) is a Japanese talent, gravure/nude model, YouTuber and retired AV actress, managed by T-Powers. She debuted in April 2016 with MUTEKI (「Discovery 羽咲みはる」) and became an S1 No.1 Style exclusive from June 2016, remaining one of S1's signature petite-but-busty actresses for her whole AV career. From December 2016 she was a third-generation member of the Ebisu Muscats idol unit. She won Best New Actress at the 2017 DMM R-18 Adult Award. She retired from AV in 2022 (announced July, final release October) alongside the Ebisu Muscats' group-wide graduation, and has since built a substantial second career as a YouTuber/Twitch streamer and singer. Born 3 March 1992 (A blood type, 151 cm, F-cup)."
