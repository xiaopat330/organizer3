  biography: "Mei Miyajima (宮島めい) is a Japanese AV actress born October 17, 2000 in Matsuyama, Ehime. She originally enrolled in a university early-childhood education program with plans to become a kindergarten teacher, and applied to SOD Create's actress recruitment to fund a study-abroad trip, beating approximately 1,000 applicants. She debuted in July 2020 billed as a '100-day-only AV actress,' but the COVID-19 pandemic cancelled her overseas plans; she announced her return in October 2020 and has remained an exclusive SOD Create actress ever since. Her debut work reached #4 on the FANZA weekly sales chart, and her planned retirement work hit #1; critics have singled out her acting ability and emotionally authentic performances in drama-format productions."
