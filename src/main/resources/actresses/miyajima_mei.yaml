  legacy: "Miyajima is notable for an unconventional debut arc — originally recruited as a one-time participant, the cancellation of her study-abroad plan due to COVID-19 led to a permanent career change. Her natural screen presence and strong dramatic instincts have been praised by AV journalists, and she has remained one of SOD Create's flagship exclusive actresses since 2020."

