  biography: "Ema Futaba (二葉エマ) is a Japanese AV actress and talent born on August 7, 1998, in Yokosuka, Kanagawa. She debuted as an image video model in December 2018, then made her AV debut with IdeaPocket on August 13, 2020, with the FIRST IMPRESSION 143 series. She became an exclusive actress at IdeaPocket and was selected as campaign girl for IdeaPocket campaigns in 2021 and 2023. In July 2023 she transferred exclusively to Attackers, and from November 2023 she became a freelance planning/solo actress. She maintains an active YouTube channel since 2021 and has experience in theatrical performance since 2023. In March 2026, she was awarded Best Performance Actress at the ADULTOPIA adult expo in Taiwan."
