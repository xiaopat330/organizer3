  biography: "Hina Nanase (七海ひな, debut name 七瀬ひな) was born November 30, 1993 in Hiroshima City. Her mother passed away from cervical cancer after a five-year illness, motivating her to pursue her ambitions; she subsequently worked as a hostess at a cabaret club where she ranked first in sales and built a TikTok following of 90,000. After a customer told her she resembled AV actress Akira Asahina, she decided to enter the industry, debuting in April 2019 under the agency Ciero under the name 七瀬ひな. She won double awards in the Monthly FANZA 'Amazing AV Actresses of Summer 2019' competition (both overall and newcomer categories) and ranked first in MGS Video's actress search in September 2019. She changed her stage name to 七海ひな and agency to Life Promotion in May 2020, moved to T-Powers in October 2020, and became independent in August 2022."
