  biography: "Hanon Hihana (日菜々はのん, reading: ひなな はのん) is a Japanese AV actress who debuted in June 2017 as an S1 No.1 Style exclusive. She was affiliated with the talent agency Guilife at debut before transferring to Mines in July 2018. In June 2018 she joined the entertainment variety group Ebisu Muscats 1.5 as a trainee, becoming a full member in August 2018 when the group was renamed Ebisu Muscats. Following a health-related hiatus, she graduated from the group on 2 April 2019, marking the end of her active AV career. Her hobbies and special skills include dance, walking, and cheerleading."
