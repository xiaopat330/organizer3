  biography: "Mihina Nagai (永井みひな) is a Japanese AV actress from Kanagawa Prefecture who debuted in June 2017 under the name 永井みひな with SOD Create, quickly gaining popularity as a high-volume freelance actress across multiple labels. In October 2018 she transferred from NAX Promotion to Mines talent agency and changed her name to あず みひな; in June 2019 she simplified further to みひな. She pursued acting in film from 2020 and stage work from 2021 alongside her AV career. In 2025 she debuted as a Madonna exclusive actress under the name 三比菜々美. Known for her round-face look and acting ability spanning schoolgirl-to-housewife roles, and praised by industry commentators for emotional expressiveness."
