  biography: "Hirono Imai (今井ひろの, born 1989, Niigata Prefecture) is a petite AV actress who debuted with Idea Pocket in April 2009. Standing just 147 cm tall with a slender yet proportional figure (83-58-85, D-cup), she was positioned as a youthful, girl-next-door type throughout her Idea Pocket run, releasing seven titles under the IPTD label between 2009 and approximately 2011. After her initial Idea Pocket exclusive period she continued to appear in releases from other labels including Dream Ticket and Alice Japan, building a long-tail catalog that has grown to over 100 titles. She has remained intermittently active into the mid-2020s, with AI-remastered re-releases of her classic Idea Pocket material issued by SOD Create as recently as 2026."
