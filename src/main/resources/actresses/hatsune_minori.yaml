  legacy: "Minori Hatsune is remembered as one of the most popular S1 No.1 Style exclusive actresses of the late 2000s, distinguished by her H-cup figure and natural appeal. Her participation in Ebisu Muscats bridged mainstream variety television with AV in the golden idol-AV crossover era, and her successful 2019 comeback after a three-year hiatus demonstrated lasting audience loyalty."

