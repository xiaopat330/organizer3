  biography: "Minori Hatsune is a Japanese AV actress and talent born on December 10, 1987, in Toyama Prefecture. She made her AV debut on October 19, 2007, with 'Shinjin x Girigiri Mosaic AV Ryokai' as an exclusive actress for S1 No.1 Style, where she remained until early 2016. In February 2016 she transferred to Moodyz, but stepped back from activities following her last release in September 2016. She returned to performing in November 2019 through Idea Pocket with a widely noted comeback title. Outside AV, she was a founding member of variety idol group Ebisu Muscats (恵比寿マスカッツ), formed in April 2008 on TV Tokyo, participating through its original run until 2013. As of her Wikipedia page's last update in early 2026, she is affiliated with the talent agency Krone (クローネ)."
