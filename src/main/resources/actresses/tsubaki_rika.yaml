  biography: "Rika Tsubaki is a Japanese AV actress born June 5, 1999 in Yokohama, Kanagawa Prefecture. She made her first AV debut on April 1, 2017 under the name Hina Oshima (大島ひな) with E-BODY, releasing two titles before stepping away from the industry to work at a soapland in Kawasaki, where she achieved top regional rankings in a national soapland popularity survey. She re-debuted on June 13, 2020 under her current stage name Rika Tsubaki (椿りか) with MOODYZ, disclosing her career as a former soapland worker as part of her relaunch concept. Working as a non-exclusive freelance actress, she rapidly built a prolific multi-label catalog spanning over 1,000 titles by 2022, spanning studios including GENM, MILK, WAAA, MKMP, REAL, and dozens of others. She simultaneously developed a parallel career as a pachinko venue performer under the nickname 'りかしゃふちゃん' from around 2021, and gained further mainstream visibility through FANZA chart appearances and international events including the 2026 Taiwan TOP Goddess festival."
  primary_studios: null
  awards: null
  legacy: "Rika Tsubaki is notable among contemporary Japanese AV actresses for her distinctive dual-track career spanning both AV and pachinko entertainment, and for her unusual trajectory: a brief early debut under a different name, a gap working in the sex industry, and then a highly productive second career. Her prolific non-exclusive output — more than 1,000 titles across a very wide range of studios within a few years — places her among the highest-volume freelance actresses of her generation."

