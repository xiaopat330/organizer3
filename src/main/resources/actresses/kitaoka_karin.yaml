  biography: "Karin Kitaoka (北岡果林) is a Japanese AV actress born on September 19, 2003 in Tokyo, affiliated with the talent agency Mines (マインズ). She debuted in April 2024 as an exclusive actress at IdeaPocket with 'FIRST IMPRESSION 171-恋心-', marketed as a current university student at a prestigious institution with modeling experience. After her exclusive contract period, she transitioned to non-exclusive variety productions from September 2024, quickly finding her signature niche in cosplay-themed content following a breakout hit for Muku. She has consistently ranked in the top 10–15 on FANZA's monthly actress charts, placing 6th in the FANZA 2025 second-half actress rankings (3rd among variety actresses), cementing her position as a top-tier active actress."
