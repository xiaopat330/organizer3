  biography: "Rina Rukawa (瑠川リナ) is a Japanese actress, idol, singer, and gravure model born on February 23, 1991 in Chiba Prefecture. She made her AV debut in May 2010 as an exclusive actress for S1 NO.1 STYLE, where she became known for her anime-like voice and idol persona. During her S1 tenure she was a member of the Ebisu Muscats (恵比寿マスカッツ) idol group as a 4th-generation member, appearing across multiple TV shows and variety programs. In December 2014 she transferred to Soft On Demand, and in June 2015 announced her retirement from AV work effective with her August 2015 releases. After retiring from AV she continued entertainment activities as a singer and TV personality, and formally announced her complete retirement on October 24, 2016, effective February 23, 2017."
