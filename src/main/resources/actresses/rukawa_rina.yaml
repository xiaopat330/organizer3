  legacy: "Rukawa was notable during her S1 years for combining an idol career with AV work, participating in the mainstream variety program presence of the Ebisu Muscats group and appearing on major television channels alongside fellow S1 actresses. Her anime-inflected voice and idol aesthetic made her distinctive within the S1 roster of the early 2010s."
