  legacy: "Tina Nanami is notable for entering AV at age 25 with a distinctively athletic, muscular physique built through years of idol activity, boxing, and bodybuilding — a rarity in the industry — before deliberately transitioning to a more voluptuous figure for her post-hiatus work. Her career narrative of overcoming eating disorders and personal health crises, combined with consistent high-profile exclusive contracts at SOD, FALENO/DAHLIA, and eventually Madonna, established her as a resilient and adaptable performer across nearly a decade of adult entertainment."

