  biography: "Tina Nanami (七海ティナ) was born on December 8, 1993, in Toyohashi, Aichi Prefecture. Her given name Tina is her real name, chosen by her mother who admired Tina Turner and wished her daughter to spread her wings to the world. After working as a live idol in Nagoya under the name Nanaao Tina (七碧ティナ), she renamed herself Nanami Tina in April 2018, debuting as a gravure talent and joining idol group Ebisu Muscats in August 2018. She made her AV debut on January 10, 2019, as a SOD Star exclusive, distinguishing herself with an exceptionally muscular physique and promoting her signature muscle-themed performances. She transferred to FALENOstar in July 2020, then to DAHLIA in February 2021, before going on hiatus from October 2021 due to recurring eating disorder, surgery, and panic disorder. She returned to AV work in July 2023, subsequently appearing for Attackers, then becoming a Madonna exclusive from August 2025, transitioning to a more glamorous, fuller-figured image that expanded her dramatic range."
