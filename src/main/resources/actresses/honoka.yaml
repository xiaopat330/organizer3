  biography: "Honoka (穂花), real name Ai Shimomura (下村愛), was born on September 2, 1982 in Tarumizu, Kagoshima Prefecture. She debuted as a gravure model in December 2003 under her real name before adopting the stage name 穂花 in April 2004, making her AV debut that August via Sexia (Tryheart Corporation). Over a four-year career she became a top-tier exclusive actress, primarily at PREMIUM and S1 No.1 Style, winning the Japan Adult Broadcasting Grand Prix Actress Award in 2007. She announced her AV retirement in December 2008, subsequently publishing a candid autobiography 『籠』 in January 2010 detailing her difficult upbringing and path into the industry. After retiring from AV she transitioned to mainstream acting under her real name, appearing in television dramas and films. In June 2015 she formally changed her stage name to Ai Shimomura, retiring the 穂花 persona entirely."
