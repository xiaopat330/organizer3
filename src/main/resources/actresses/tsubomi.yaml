  legacy: "Tsubomi's sixteen-year exclusive tenure with S1 No.1 Style is among the
    longest unbroken label relationships in modern AV history. Debuting in the early
    S1 era alongside contemporaries such as Yua Aida, she became a defining face of
    the label's long-form catalogue strategy and accumulated one of the largest single-label
    filmographies of any actress. Her music side project and measured post-retirement
    media presence reflect a career managed with unusual longevity and self-awareness."

