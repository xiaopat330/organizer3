  biography: "Tsubomi (つぼみ; born December 25, 1987 in Yamaguchi Prefecture) is one
    of the longest-tenured AV actresses in Japanese adult video history, maintaining
    an exclusive contract with S1 No.1 Style from her debut in April 2006 through
    her retirement in April 2022 — a span of approximately sixteen years. She debuted
    at age 18 with the film 'Barely Pixelated Newcomer Tsubomi' and over the following
    years built a catalogue exceeding 1,300 titles by May 2014 (including compilations),
    working almost entirely within the S1 ecosystem. She expanded beyond adult video
    in December 2010, releasing the internet single '夢花火' under the artist name
    TSUBOMI. In February 2022 she announced she would conclude her activities at the
    end of April 2022, filming her final work on April 26, 2022. Post-retirement she
    has spoken candidly about her career, noting that neither money alone nor passion
    alone could explain sixteen years of sustained commitment."
