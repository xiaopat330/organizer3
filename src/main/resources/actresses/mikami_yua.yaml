  biography: "Yua Mikami (born Momona Kito, August 16, 1993) is a former AV actress,
    YouTuber, and talent from Nagoya, Aichi Prefecture. A former member of idol group
    SKE48 (2009–2014), she made her AV debut on June 1, 2015, with MUTEKI in the landmark
    release Princess Peach, which topped the DMM annual rankings across all formats and
    earned her four awards at the 2016 DMM.R18 Adult Awards including Best New Actress.
    She transferred to S1 No.1 Style in November 2016 and became one of the label's most
    prominent exclusives, winning Best Actress at the 2017 DMM.R18 Adult Awards and
    consistently ranking at the top of annual sales charts throughout her career. She
    announced her retirement on March 13, 2023, citing a personal goal to complete her
    AV career before age 30; her final release coincided with her 30th birthday on
    August 15, 2023. After retirement she has continued as a talent, YouTuber (over
    1.1 million subscribers), and apparel brand director."
