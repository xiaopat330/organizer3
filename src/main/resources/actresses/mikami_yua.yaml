  legacy: "One of the defining AV actresses of the late 2010s, Mikami made the
    celebrity-crossover transition from idol stardom to top-tier exclusive in a way
    that set an industry template. Her debut TEK-067 Princess Peach remains among
    the highest-selling JAV releases of all time, and her 8-year career at S1 — the
    longest run of any top exclusive of her generation — saw her dominate annual
    sales rankings from 2016 through retirement in 2023."

