  biography: "Eri Arai (新井エリー), born December 22, 1986 in Tokyo, is a Japanese AV actress of mixed Japanese–Syrian (Arab) heritage whose legal name is Teruma Fariza (照沼ファリーザ). She debuted in 2005 under the stage name Yuka Osawa (大沢佑香) with Bambi Promotion, holding exclusive contracts at KUKI (July 2005–March 2006) and S1 (April–September 2006) before transitioning to free-agent work. She subsequently adopted the stage name Akira Eri (晶エリー) working through her own individual office fanfan PARLOR, then later performed under the name Eri Arai (新井エリー) under the Prime Agency management. She retired in 2016. She made a comeback in September 2019, reverting to the stage name Akira Eri (晶エリー) under T-POWERS management, and has remained active since. She is known for full-body permanent hair removal. She received the 20th Pink Taisho Best New Actress Award."
