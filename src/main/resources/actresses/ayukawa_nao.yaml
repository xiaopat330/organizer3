  biography: "Nao Ayukawa (鮎川なお) is a Japanese retired AV actress born on 25 October 1983 in Osaka Prefecture. She debuted in January 2007 under the name 直美 (Naomi) through Aurora Project, releasing five titles before switching to the stage name 鮎川なお and embarking on an exceptionally prolific multi-label career. Between mid-2007 and early 2010, she appeared across dozens of labels including MOODYZ, アイエナジー (I Energy), マルクス兄弟, YeLLOW, サディスティックヴィレッジ, and many others, becoming one of the most active performers of her era. On 11 February 2010, at an event for Ellie Akira (formerly Yuka Osawa), she announced her retirement scheduled for March; her final credited solo title, 引退。, was released on 13 April 2010 through MOODYZ. She was known for her E-cup figure (88-59-85 cm, 153 cm tall) and high-volume output across a wide range of content styles."
