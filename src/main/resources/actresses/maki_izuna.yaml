  biography: "Izuna Maki (槙いずな) is a Japanese retired AV actress from Saitama Prefecture, born 27 January 2001. She debuted on 19 March 2020 as an exclusive actress for S1 NO.1 STYLE, distinguished by her slender, petite (148 cm) figure and high-sensitivity performance style. Over roughly two years she released approximately 20 solo titles for S1, earning a reputation for intense climax scenes and an authentic, reactive on-screen presence. On 28 December 2021 she announced her retirement via Twitter, citing personal reasons, and her final AV title was released on 25 January 2022. After retiring from AV she joined CLUB 虎の穴 (Toranohana Aoyama) in August 2022, and departed her talent agency ティーパワーズ in September 2023. Her stage name was self-coined, inspired by an admiration for classical Japanese names rooted in her love of 源氏物語 (The Tale of Genji)."
