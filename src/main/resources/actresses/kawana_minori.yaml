  biography: "Minori Kawana (河南実里) was born September 18, 1997 and made her AV debut with MOODYZ in March 2017. After debuting she briefly worked as a freelancer releasing titles through Kikatan, before announcing in July 2018 via Twitter that she had become an exclusive actress for Honnaka. She remained active at Honnaka and its parent Cruise Group for several years, building a notable filmography in the process. On November 20, 2022 she announced a stage name change to 河東実里 (Kawato Minori) and a transfer to the talent agency ARROWS, marking a deliberate rebrand. Around May 2024 her social media accounts were deleted, which observers interpreted as a silent retirement from the industry."
