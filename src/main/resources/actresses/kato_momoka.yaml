  biography: "Momoka Kato (currently performing as あきばもも / Momo Akiba) is a Japanese AV actress born March 12, 1996 in Tokyo. She joined Soft On Demand (SOD) as a new graduate in April 2016, assigned to the PR department, before volunteering to appear on camera and debuting as 加藤ももか on March 2, 2017 under the SOD female employee series. She left SOD in 2018 to become an exclusive under SODstar, then transitioned to freelance work as 佐藤ののか from February 2021 under Bambi Promotion, earning a 週刊プレイボーイ Erodemy Award that year. In April 2025 she rebranded again to あきばもも and joined Arche management, subsequently announcing an exclusive contract with 溜池ゴロー starting November 2025. She is also known for a special-effects web series appearance in 救星戦隊ワクセイバー (2021) and stage live performance activity."
