<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAV Helper</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <h1 id="app-name">jav helper</h1>
  <div class="header-right">
    <a class="nav-link" href="/company">Company</a>
    <div class="nav-divider"></div>
    <a class="nav-link" href="/titles">Titles</a>
    <div class="nav-divider"></div>
    <div class="actress-nav-wrap">
      <button class="nav-link" id="actresses-btn">Actresses</button>
      <div class="prefix-dropdown" id="prefix-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <div class="queues-nav-wrap">
      <button class="nav-link" id="queues-btn">Queues</button>
      <div class="prefix-dropdown" id="queues-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <input class="search-input" type="search" placeholder="search…" id="search-input">
  </div>
</header>

<!-- Title home grid -->
<div class="grid" id="grid"></div>

<!-- Actress browse grid -->
<div id="actress-grid" class="grid" style="display:none"></div>

<!-- Actress detail view -->
<div id="actress-detail">
  <div class="actress-detail-panel" id="detail-panel">
    <div class="detail-cover-col" id="detail-cover"></div>
    <div class="detail-info-col" id="detail-info"></div>
  </div>
  <div class="grid" id="detail-title-grid"></div>
</div>

<!-- Queue browse header + grid -->
<div id="queue-header" style="display:none; padding: 10px 20px 0; font-size: 0.78rem; color: #555; font-family: ui-monospace, monospace; letter-spacing: 0.03em;"></div>
<div id="queue-grid" class="grid" style="display:none"></div>

<div id="status">loading</div>
<div id="sentinel"></div>

<script src="/app.js"></script>
</body>
</html>
