<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAV Helper</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <h1 id="app-name">jav helper</h1>
  <div class="header-right">
    <button class="nav-link" id="actresses-btn">Actresses</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="collections-btn">Collections</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="titles-browse-btn">Titles</button>
    <div class="nav-divider"></div>
    <div class="archives-nav-wrap">
      <button class="nav-link" id="archives-btn">Archives</button>
      <div class="prefix-dropdown" id="archives-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <div class="queues-nav-wrap">
      <button class="nav-link" id="queues-btn">Queues</button>
      <div class="prefix-dropdown" id="queues-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <button class="nav-link" id="action-btn">Action!</button>
    <div class="nav-divider"></div>
    <input class="search-input" type="search" placeholder="search…" id="search-input">
  </div>
  <div id="breadcrumb"></div>
</header>

<!-- Home tab island (only shown on home view) -->
<div id="home-tabs" style="display:none">
  <button class="home-tab active" data-tab="latest">latest</button>
  <button class="home-tab" data-tab="random-titles">random titles</button>
  <button class="home-tab" data-tab="random-actresses">actresses</button>
</div>

<!-- Title home grid (latest tab) -->
<div class="grid" id="grid"></div>

<!-- Random titles grid -->
<div class="grid" id="random-titles-grid" style="display:none"></div>

<!-- Random actresses home grid -->
<div class="grid" id="random-actress-home-grid" style="display:none"></div>

<!-- Actress landing island (search + favorites/bookmarks + tiers) -->
<div id="actress-landing" class="actress-landing" style="display:none">
  <div class="actress-landing-row actress-landing-search-row">
    <input type="search" id="actress-search-input" class="actress-search-input" placeholder="type to search (2+ chars)…" autocomplete="off">
    <button type="button" id="actress-search-clear" class="actress-search-clear">clear</button>
  </div>
  <div class="actress-landing-divider"></div>
  <div class="actress-landing-row actress-landing-special-row">
    <button type="button" id="actress-favorites-btn" class="actress-landing-special actress-landing-favorites">
      <svg class="actress-landing-star" viewBox="0 0 24 24" width="14" height="14"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Favorites
    </button>
    <button type="button" id="actress-bookmarks-btn" class="actress-landing-special actress-landing-bookmarks">
      <svg class="actress-landing-bm" viewBox="0 0 24 24" width="14" height="14"><path d="M6 2h12a1 1 0 0 1 1 1v18.5a.5.5 0 0 1-.8.4L12 17.5 5.8 21.9a.5.5 0 0 1-.8-.4V3a1 1 0 0 1 1-1z"/></svg>
      Bookmarks
    </button>
  </div>
  <div class="actress-landing-divider"></div>
  <div class="actress-landing-row actress-landing-tier-row" id="actress-landing-tier-row"></div>
</div>

<!-- Actress browse grid -->
<div id="actress-grid" class="grid" style="display:none"></div>

<!-- Titles browse sub-nav -->
<div id="titles-sub-nav" class="actress-sub-nav" style="display:none"></div>
<!-- Titles browse grid -->
<div id="titles-browse-grid" class="grid" style="display:none"></div>

<!-- Title detail view -->
<div id="title-detail" style="display:none">
  <div class="title-detail-panel" id="title-detail-panel">
    <div class="title-detail-left">
      <div id="title-detail-cover"></div>
      <div id="title-detail-info"></div>
    </div>
    <div class="title-detail-right" id="title-detail-right"></div>
  </div>
</div>

<!-- Actress detail view -->
<div id="actress-detail">
  <div class="actress-detail-panel" id="detail-panel">
    <div class="detail-cover-col" id="detail-cover"></div>
    <div class="detail-info-col" id="detail-info"></div>
    <div class="detail-profile-col" id="detail-profile"></div>
    <div class="detail-bio-col" id="detail-bio"></div>
  </div>
  <div class="detail-nav-bar" id="detail-nav-bar"></div>
  <div class="grid" id="detail-title-grid"></div>
</div>

<!-- Queue browse header + grid -->
<div id="queue-header" style="display:none; padding: 10px 20px 0; font-size: 0.78rem; color: #555; font-family: ui-monospace, monospace; letter-spacing: 0.03em;"></div>
<div id="queue-grid" class="grid" style="display:none"></div>

<!-- Pool browse header + grid -->
<div id="pool-header" style="display:none; padding: 10px 20px 0; font-size: 0.78rem; color: #555; font-family: ui-monospace, monospace; letter-spacing: 0.03em;"></div>
<div id="pool-grid" class="grid" style="display:none"></div>

<!-- Collections browse grid -->
<div id="collections-grid" class="grid" style="display:none"></div>

<div id="status">loading</div>
<div id="sentinel"></div>

<script src="/app.js"></script>
</body>
</html>
