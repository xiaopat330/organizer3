<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAV Helper</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <h1 id="app-name">jav helper</h1>
  <div class="header-right">
    <button class="nav-link" id="actresses-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Actresses</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="titles-browse-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>Titles</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="av-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>AV</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="action-btn"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>Tools</button>
    <div class="nav-divider"></div>
    <button class="nav-link" id="terminal-toggle-btn" title="Terminal">⌨</button>
  </div>
  <div id="breadcrumb"></div>
</header>

<!-- Persistent search bar — visible on all views except home portal -->
<div id="sub-nav-search-bar" style="display:none">
  <div class="sub-nav-search-wrap">
    <div class="sub-nav-search-input-wrap">
      <input class="search-input sub-nav-search-input" type="search" placeholder="search…" id="search-input" autocomplete="off" spellcheck="false">
      <button type="button" id="search-clear" class="search-clear" style="display:none" aria-label="Clear search">✕</button>
      <div id="search-overlay" class="search-overlay" style="display:none"></div>
    </div>
    <div class="sub-nav-search-filters" id="sub-nav-search-filters">
      <label class="portal-filter-toggle" data-category="actresses">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Actresses</span>
      </label>
      <label class="portal-filter-toggle" data-category="titles">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Titles</span>
      </label>
      <label class="portal-filter-toggle" data-category="labels">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Labels</span>
      </label>
      <label class="portal-filter-toggle" data-category="studios">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Studios</span>
      </label>
      <label class="portal-filter-toggle" data-category="av-actresses">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">AV Actresses</span>
      </label>
    </div>
  </div>
</div>

<!-- Home portal (default landing page) -->
<div id="home-portal" style="display:none">
  <div class="home-portal-search-panel">
    <div class="home-portal-search-heading">Search everything</div>
    <p class="home-portal-search-sub">titles, actresses, labels, studios — search for almost anything</p>
    <div class="home-portal-search-wrap">
      <input type="search" id="portal-search-input" class="portal-search-input" placeholder="type to search…" autocomplete="off" spellcheck="false">
      <button type="button" id="portal-search-clear" class="portal-search-clear" style="display:none" aria-label="Clear search">✕</button>
      <div id="portal-search-overlay" class="search-overlay portal-search-overlay" style="display:none"></div>
    </div>
    <div class="portal-search-filters" id="portal-search-filters">
      <label class="portal-filter-toggle" data-category="actresses">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Actresses</span>
      </label>
      <label class="portal-filter-toggle" data-category="titles">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Titles</span>
      </label>
      <label class="portal-filter-toggle" data-category="labels">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Labels</span>
      </label>
      <label class="portal-filter-toggle" data-category="studios">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">Studios</span>
      </label>
      <label class="portal-filter-toggle" data-category="av-actresses">
        <input type="checkbox" checked>
        <span class="portal-filter-track"></span>
        <span class="portal-filter-label">AV Actresses</span>
      </label>
    </div>
  </div>
</div>

<!-- Actress landing island (search + favorites/bookmarks + tiers) -->
<div id="actress-landing" class="actress-landing" style="display:none">
  <div class="actress-landing-row actress-landing-special-row">
    <button type="button" id="actress-dashboard-btn" class="actress-landing-special actress-landing-dashboard">
      <svg class="actress-landing-activity" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Dashboard
    </button>
    <button type="button" id="actress-favorites-btn" class="actress-landing-special actress-landing-favorites">
      <svg class="actress-landing-star" viewBox="0 0 24 24" width="14" height="14"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Favorites
    </button>
    <button type="button" id="actress-bookmarks-btn" class="actress-landing-special actress-landing-bookmarks">
      <svg class="actress-landing-bm" viewBox="0 0 24 24" width="14" height="14"><path d="M6 2h12a1 1 0 0 1 1 1v18.5a.5.5 0 0 1-.8.4L12 17.5 5.8 21.9a.5.5 0 0 1-.8-.4V3a1 1 0 0 1 1-1z"/></svg>
      Bookmarks
    </button>
    <button type="button" id="actress-exhibition-btn" class="actress-landing-special actress-landing-exhibition">
      <svg class="actress-landing-exhibit" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Exhibition
    </button>
    <button type="button" id="actress-archives-btn" class="actress-landing-special actress-landing-archives">
      <svg class="actress-landing-archive" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      Archives
    </button>
    <button type="button" id="actress-studio-btn" class="actress-landing-special actress-landing-studio">
      <svg class="actress-landing-film" viewBox="0 0 24 24" width="14" height="14"><path d="M4 3h16v18H4V3zm1.5 1.5v1.5h1.5V4.5H5.5zm11.5 0v1.5h1.5V4.5H17zm-11.5 3v1.5h1.5V7.5H5.5zm11.5 0v1.5h1.5V7.5H17zm-11.5 3v1.5h1.5v-1.5H5.5zm11.5 0v1.5h1.5v-1.5H17zm-11.5 3v1.5h1.5v-1.5H5.5zm11.5 0v1.5h1.5v-1.5H17zm-11.5 3v1.5h1.5V18H5.5zm11.5 0v1.5h1.5V18H17zM8.5 4.5v15h7v-15h-7z"/></svg>
      Studio
    </button>
    <button type="button" id="actress-tier-btn" class="actress-landing-special actress-landing-tier-btn">
      <svg class="actress-landing-levels" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="16" width="4" height="6"/><rect x="10" y="10" width="4" height="12"/><rect x="18" y="4" width="4" height="16"/></svg>
      Tier
    </button>
  </div>
  <div class="actress-landing-divider" id="actress-exhibition-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-exhibition-row" id="actress-exhibition-row" style="display:none">
    <select id="actress-exhibition-company-select" class="actress-exhibition-company-select">
      <option value="">All Companies</option>
    </select>
    <div class="company-marquee" id="actress-exhibition-marquee" style="display:none"><span class="company-marquee-inner"></span></div>
  </div>
  <div class="actress-landing-divider" id="actress-archives-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-archives-row" id="actress-archives-row" style="display:none">
    <select id="actress-archives-company-select" class="actress-archives-company-select">
      <option value="">All Companies</option>
    </select>
    <div class="company-marquee" id="actress-archives-marquee" style="display:none"><span class="company-marquee-inner"></span></div>
  </div>
  <div class="actress-landing-divider" id="actress-studio-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-tier-row" id="actress-studio-group-row" style="display:none"></div>
  <div class="actress-landing-divider" id="actress-tier-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-tier-row" id="actress-landing-tier-row" style="display:none"></div>
  <div class="actress-landing-divider actress-tier-company-divider" id="actress-tier-company-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-tier-company-row" id="actress-tier-company-row" style="display:none">
    <select id="actress-tier-company-select" class="actress-tier-company-select">
      <option value="">All Companies</option>
    </select>
    <div class="company-marquee" id="actress-tier-company-marquee" style="display:none"><span class="company-marquee-inner"></span></div>
  </div>
</div>

<!-- Actress studio two-panel browser -->
<div id="actress-studio-group-header" class="studio-group-header" style="display:none"></div>
<div id="actress-studio-labels" style="display:none"></div>
<!-- Actress browse grid -->
<div id="actress-browse-filter-bar" class="detail-filter-bar" style="display:none"></div>
<div id="actress-grid-header" class="grid-header" style="display:none"></div>
<div id="actress-grid" class="grid" style="display:none"></div>
<!-- Actress dashboard (default landing) -->
<div id="actress-dashboard" style="display:none"></div>

<!-- Title landing island (product-number search + favorites/bookmarks) -->
<div id="title-landing" class="actress-landing title-landing" style="display:none">
  <div class="actress-landing-row actress-landing-special-row">
    <button type="button" id="title-dashboard-btn" class="actress-landing-special actress-landing-dashboard">
      <svg class="actress-landing-activity" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Dashboard
    </button>
    <button type="button" id="title-favorites-btn" class="actress-landing-special actress-landing-favorites">
      <svg class="actress-landing-star" viewBox="0 0 24 24" width="14" height="14"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Favorites
    </button>
    <button type="button" id="title-bookmarks-btn" class="actress-landing-special actress-landing-bookmarks">
      <svg class="actress-landing-bm" viewBox="0 0 24 24" width="14" height="14"><path d="M6 2h12a1 1 0 0 1 1 1v18.5a.5.5 0 0 1-.8.4L12 17.5 5.8 21.9a.5.5 0 0 1-.8-.4V3a1 1 0 0 1 1-1z"/></svg>
      Bookmarks
    </button>
    <button type="button" id="title-studio-btn" class="actress-landing-special actress-landing-studio">
      <svg class="actress-landing-film" viewBox="0 0 24 24" width="14" height="14"><path d="M4 3h16v18H4V3zm1.5 1.5v1.5h1.5V4.5H5.5zm11.5 0v1.5h1.5V4.5H17zm-11.5 3v1.5h1.5V7.5H5.5zm11.5 0v1.5h1.5V7.5H17zm-11.5 3v1.5h1.5v-1.5H5.5zm11.5 0v1.5h1.5v-1.5H17zm-11.5 3v1.5h1.5v-1.5H5.5zm11.5 0v1.5h1.5v-1.5H17zm-11.5 3v1.5h1.5V18H5.5zm11.5 0v1.5h1.5V18H17zM8.5 4.5v15h7v-15h-7z"/></svg>
      Studio
    </button>
    <button type="button" id="title-collections-btn" class="actress-landing-special actress-landing-collections">
      <svg class="actress-landing-coll" viewBox="0 0 24 24" width="14" height="14"><path d="M3 3h8v8H3zM13 3h8v8h-8zM3 13h8v8H3zM13 13h8v8h-8z"/></svg>
      Collections
    </button>
    <button type="button" id="title-unsorted-btn" class="actress-landing-special actress-landing-unsorted">
      <svg class="actress-landing-shuffle" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Unsorted
    </button>
    <button type="button" id="title-archives-btn" class="actress-landing-special actress-landing-archives">
      <svg class="actress-landing-archive" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      Archives
    </button>
    <button type="button" id="title-tags-btn" class="actress-landing-special actress-landing-tags">
      <svg class="actress-landing-tag" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Tags
    </button>
  </div>
  <div class="actress-landing-divider" id="title-studio-divider" style="display:none"></div>
  <div class="actress-landing-row actress-landing-tier-row" id="title-studio-group-row" style="display:none"></div>
</div>
<!-- Studio label list (shown in studio browse mode) -->
<div id="title-studio-labels" style="display:none"></div>
<!-- Tags filter panel (shown in tags browse mode) -->
<div id="title-tags-panel" style="display:none"></div>
<!-- Filter bar + tags panel for Collections / Unsorted / Archives modes -->
<div id="title-browse-filter-bar" class="detail-filter-bar" style="display:none"></div>
<div id="title-browse-tags-panel" class="detail-actress-tags-panel" style="display:none"></div>
<!-- Titles browse grid -->
<div id="titles-browse-grid" class="grid" style="display:none"></div>
<!-- Title dashboard (default landing) -->
<div id="title-dashboard" style="display:none"></div>

<!-- Tools landing sub-nav -->
<div id="action-landing" class="action-landing" style="display:none">
  <div class="action-landing-row" id="action-landing-tools-row">
    <button type="button" id="tools-duplicates-btn" class="action-tool-btn tools-duplicates-btn">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M16 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h3"/></svg>
      Duplicates
    </button>
  </div>
</div>

<!-- Duplicates tool filter bar -->
<div id="tools-duplicates-filters" class="tools-subnav" style="display:none">
  <label class="dup-filter-label" for="dup-volume-select">Volume</label>
  <select id="dup-volume-select" class="dup-filter-select">
    <option value="">&lt;all&gt;</option>
  </select>
</div>

<!-- Duplicates tool content -->
<div id="tools-duplicates-view" style="display:none">
  <div id="tools-duplicates-status" class="tools-duplicates-status"></div>
  <div id="tools-duplicates-list" class="tools-duplicates-list"></div>
  <div id="tools-duplicates-sentinel"></div>
</div>

<!-- Duplicate detail modal -->
<div id="dup-detail-overlay" class="dup-detail-overlay" style="display:none">
  <div class="dup-detail-modal">
    <div class="dup-detail-header">
      <div id="dup-detail-heading" class="dup-detail-heading"></div>
      <button class="dup-detail-close" id="dup-detail-close" aria-label="Close">✕</button>
    </div>
    <div id="dup-detail-body" class="dup-detail-body"></div>
  </div>
</div>

<!-- AV landing island -->
<div id="av-landing" class="actress-landing av-landing" style="display:none">
  <div class="actress-landing-row actress-landing-special-row">
    <button type="button" id="av-dashboard-btn" class="actress-landing-special av-landing-dashboard">
      <svg class="av-landing-activity" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Dashboard
    </button>
    <button type="button" id="av-favorites-btn" class="actress-landing-special av-landing-favorites">
      <svg class="av-landing-star" viewBox="0 0 24 24" width="14" height="14"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Favorites
    </button>
    <button type="button" id="av-bookmarks-btn" class="actress-landing-special av-landing-bookmarks">
      <svg class="av-landing-bm" viewBox="0 0 24 24" width="14" height="14"><path d="M6 2h12a1 1 0 0 1 1 1v18.5a.5.5 0 0 1-.8.4L12 17.5 5.8 21.9a.5.5 0 0 1-.8-.4V3a1 1 0 0 1 1-1z"/></svg>
      Bookmarks
    </button>
    <button type="button" id="av-index-btn" class="actress-landing-special av-landing-index">
      <svg class="av-landing-index-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Index
    </button>
  </div>
</div>
<!-- AV dashboard (blank slate) -->
<div id="av-dashboard" style="display:none">
  <div class="av-dashboard-empty">AV Dashboard coming soon.</div>
</div>
<!-- AV actress index grid -->
<div id="av-grid" class="grid" style="display:none"></div>
<!-- AV actress detail page -->
<div id="av-actress-detail" class="av-detail-layout" style="display:none"></div>

<!-- Title detail view -->
<div id="title-detail" style="display:none">
  <div class="title-detail-panel" id="title-detail-panel">
    <div class="title-detail-left">
      <div id="title-detail-cover"></div>
      <div id="title-detail-info"></div>
    </div>
    <div class="title-detail-right" id="title-detail-right"></div>
  </div>
</div>

<!-- Actress detail view -->
<div id="actress-detail">
  <div class="actress-detail-panel">
    <div class="actress-detail-left">
      <div class="detail-cover-col" id="detail-cover"></div>
      <div class="detail-sidebar" id="detail-sidebar"></div>
    </div>
    <div class="actress-detail-right" id="actress-detail-right">
      <div class="detail-filter-bar" id="detail-filter-bar"></div>
      <div class="detail-actress-tags-panel" id="detail-actress-tags-panel" style="display:none"></div>
      <div class="grid" id="detail-title-grid"></div>
    </div>
  </div>
</div>

<!-- Collections browse grid -->
<div id="collections-grid" class="grid" style="display:none"></div>

<div id="status">loading</div>
<div id="sentinel"></div>

<!-- Web terminal slide-out panel -->
<div id="terminal-panel" class="terminal-panel">
  <div id="terminal-drag-handle" class="terminal-drag-handle"></div>
  <div id="terminal-output" class="terminal-output"></div>
  <div id="terminal-status" class="terminal-status"></div>
  <div class="terminal-input-line">
    <span id="terminal-prompt" class="terminal-prompt">[UNMOUNTED] ▶</span>
    <input id="terminal-input" class="terminal-input" type="text"
           autocomplete="off" spellcheck="false" placeholder="type a command…" disabled>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
