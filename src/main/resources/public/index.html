<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAV Helper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #d8d8d8;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: #0d0d0d;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      flex-shrink: 0;
      cursor: pointer;
    }

    header h1:hover {
      color: #888;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      letter-spacing: 0.04em;
      padding: 5px 10px;
      border-radius: 4px;
      transition: color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .nav-link:hover, .nav-link.active {
      color: #aaa;
      background: #1a1a1a;
    }

    .nav-divider {
      width: 1px;
      height: 14px;
      background: #2a2a2a;
    }

    .search-input {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #c8c8c8;
      font-size: 0.8rem;
      padding: 5px 10px;
      width: 200px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .search-input::placeholder {
      color: #3a3a3a;
    }

    .search-input:focus {
      border-color: #444;
    }

    /* Actress prefix dropdown */
    .actress-nav-wrap, .queues-nav-wrap {
      position: relative;
    }

    .prefix-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 12px 14px;
      z-index: 20;
      min-width: 420px;
    }

    .prefix-dropdown.open {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    /* Left column: tiers */
    .dropdown-tier-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 96px;
      flex-shrink: 0;
    }

    /* Divider between columns */
    .dropdown-col-divider {
      width: 1px;
      background: #222;
      align-self: stretch;
      margin: 0 12px;
      flex-shrink: 0;
    }

    /* Right column: alphabet prefix chips */
    .dropdown-prefix-col {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
    }

    .dropdown-section-label {
      font-size: 0.63rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 9px 6px;
      font-weight: 500;
      width: 100%;
    }

    .prefix-chip {
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.06em;
      padding: 4px 9px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.12s ease, background 0.12s ease;
      user-select: none;
    }

    .prefix-chip:hover {
      color: #ccc;
      background: #222;
    }

    .prefix-chip.selected {
      color: #d8d8d8;
      background: #252525;
    }

    /* Grids */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px;
    }

    /* Title cards */
    .card {
      background: #161616;
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.15s ease, background 0.15s ease;
      cursor: default;
    }

    .card:hover {
      background: #1e1e1e;
      transform: translateY(-2px);
    }

    .cover-wrap {
      width: 100%;
      aspect-ratio: 17 / 12;
      overflow: hidden;
      background: #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .card-info {
      padding: 8px 10px 10px;
    }

    .actress-name {
      font-size: 0.78rem;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;
      overflow: hidden;
      margin-bottom: 2px;
    }

    .actress-name .actress-link {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .actress-name .tier-badge {
      flex-shrink: 0;
    }

    .actress-name.unknown {
      color: #3a3a3a;
    }

    .card-actress-first {
      font-size: 0.88rem;
      font-weight: 700;
      color: #ffffff;
    }

    .card-actress-last {
      font-size: 0.75rem;
      font-weight: 400;
      color: #666;
    }

    .title-code {
      font-size: 0.88rem;
      font-weight: 600;
      color: #c8c8c8;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-label-line {
      font-size: 0.7rem;
      color: #555;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .added-date {
      font-size: 0.7rem;
      color: #444;
      margin-top: 3px;
    }

    .title-location {
      font-size: 0.62rem;
      color: #363636;
      font-family: ui-monospace, monospace;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actress-link {
      color: inherit;
      text-decoration: none;
    }

    .actress-link:hover {
      color: #bbb;
      text-decoration: underline;
    }

    /* Actress cards */
    .actress-card {
      background: #161616;
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }

    .actress-card:hover {
      background: #1e1e1e;
      transform: translateY(-2px);
    }

    .actress-card .cover-img {
      transition: opacity 0.4s ease;
    }

    .actress-card-body {
      padding: 10px 12px 12px;
    }

    .actress-card-name {
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actress-first-name {
      font-size: 1rem;
      font-weight: 700;
      color: #d0d0d0;
    }

    .actress-last-name {
      font-size: 0.78rem;
      font-weight: 400;
      color: #777;
      margin-left: 5px;
    }

    .actress-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    /* Tier badges — each tier gets a distinct look */
    .tier-badge {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border-radius: 3px;
      padding: 2px 6px;
    }

    .tier-LIBRARY  { color: #484848; background: #1a1a1a; }
    .tier-MINOR    { color: #5a6a78; background: #1a2028; }
    .tier-POPULAR  { color: #4a80a0; background: #162030; }
    .tier-SUPERSTAR{ color: #9a7a30; background: #201a08; }
    .tier-GODDESS  { color: #c060a0; background: #200818;
                     box-shadow: 0 0 6px rgba(192,80,160,0.25); }

    .fav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c06060;
      flex-shrink: 0;
    }

    .actress-title-count {
      font-size: 0.7rem;
      color: #484848;
      margin-bottom: 4px;
    }

    .actress-active-dates {
      font-size: 0.68rem;
      color: #505050;
      margin-bottom: 6px;
    }

    .date-first { color: #3a8a3a; }
    .date-last-stale { color: #cc2222; font-weight: 700; }
    .date-last { color: #505050; }

    .actress-folder-paths {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .actress-folder-path {
      font-size: 0.62rem;
      color: #383838;
      font-family: ui-monospace, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Actress detail panel ─────────────────────────────────────────────── */

    #actress-detail {
      display: none;
    }

    .actress-detail-panel {
      position: sticky;
      top: 49px; /* height of header */
      z-index: 5;
      background: #0d0d0d;
      border-bottom: 1px solid #1e1e1e;
      display: grid;
      grid-template-columns: 220px 1fr;
    }

    .detail-cover-col {
      aspect-ratio: 17 / 12;
      overflow: hidden;
      background: #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-cover-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-cover-placeholder {
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .detail-info-col {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }

    .detail-name {
      line-height: 1.2;
    }

    .detail-first-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    .detail-last-name {
      display: block;
      font-size: 1rem;
      font-weight: 400;
      color: #888;
      margin-top: 2px;
    }

    .detail-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-dates {
      font-size: 0.78rem;
      color: #555;
    }

    .detail-paths {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .detail-path {
      font-size: 0.7rem;
      color: #404040;
      font-family: ui-monospace, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status {
      text-align: center;
      padding: 28px;
      color: #3a3a3a;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    #sentinel { height: 1px; }
  </style>
</head>
<body>

<header>
  <h1 id="app-name">jav helper</h1>
  <div class="header-right">
    <a class="nav-link" href="/company">Company</a>
    <div class="nav-divider"></div>
    <a class="nav-link" href="/titles">Titles</a>
    <div class="nav-divider"></div>
    <div class="actress-nav-wrap">
      <button class="nav-link" id="actresses-btn">Actresses</button>
      <div class="prefix-dropdown" id="prefix-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <div class="queues-nav-wrap">
      <button class="nav-link" id="queues-btn">Queues</button>
      <div class="prefix-dropdown" id="queues-dropdown"></div>
    </div>
    <div class="nav-divider"></div>
    <input class="search-input" type="search" placeholder="search…" id="search-input">
  </div>
</header>

<!-- Title home grid -->
<div class="grid" id="grid"></div>

<!-- Actress browse grid -->
<div id="actress-grid" class="grid" style="display:none"></div>

<!-- Actress detail view -->
<div id="actress-detail">
  <div class="actress-detail-panel" id="detail-panel">
    <div class="detail-cover-col" id="detail-cover"></div>
    <div class="detail-info-col" id="detail-info"></div>
  </div>
  <div class="grid" id="detail-title-grid"></div>
</div>

<!-- Queue browse header + grid -->
<div id="queue-header" style="display:none; padding: 10px 20px 0; font-size: 0.78rem; color: #555; font-family: ui-monospace, monospace; letter-spacing: 0.03em;"></div>
<div id="queue-grid" class="grid" style="display:none"></div>

<div id="status">loading</div>
<div id="sentinel"></div>

<script>
  // ── App name + config ─────────────────────────────────────────────────────
  let MAX_TOTAL = 500; // overwritten once /api/config resolves
  fetch('/api/config')
    .then(r => r.json())
    .then(cfg => {
      const name = cfg.appName || 'organizer3';
      document.getElementById('app-name').textContent = name.toLowerCase();
      document.title = name;
      if (cfg.maxBrowseTitles) MAX_TOTAL = cfg.maxBrowseTitles;
    })
    .catch(() => {});

  document.getElementById('app-name').addEventListener('click', showTitlesView);

  // ── Utilities ─────────────────────────────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function isStale(dateStr) {
    if (!dateStr) return false;
    const oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    return new Date(dateStr) < oneYearAgo;
  }

  // ── View state ────────────────────────────────────────────────────────────
  // mode: 'titles' | 'actresses' | 'actress-detail'
  let mode = 'titles';

  function showTitlesView() {
    mode = 'titles';
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('actress-grid').style.display = 'none';
    document.getElementById('actress-detail').style.display = 'none';
    document.getElementById('queue-grid').style.display = 'none';
    document.getElementById('queue-header').style.display = 'none';
    actressesBtn.classList.remove('active');
    closeQueuesDropdown();
    selectedPrefix = null;
    selectedTier = null;
    prefixDropdown.querySelectorAll('.prefix-chip').forEach(c => c.classList.remove('selected'));
  }

  // ── Title browse (infinite scroll) ───────────────────────────────────────
  const PAGE_SIZE = 24;
  let offset = 0;
  let loading = false;
  let exhausted = false;

  function makeTitleCard(t) {
    const card = document.createElement('div');
    card.className = 'card';

    const coverHtml = t.coverUrl
      ? `<div class="cover-wrap"><img class="cover-img" src="${esc(t.coverUrl)}" alt="${esc(t.code)}" loading="lazy"></div>`
      : `<div class="cover-wrap"><div class="cover-placeholder">${esc(t.code)}</div></div>`;

    let actressHtml;
    if (t.actressName) {
      const si = t.actressName.indexOf(' ');
      const fn = si >= 0 ? t.actressName.slice(0, si) : t.actressName;
      const ln = si >= 0 ? t.actressName.slice(si + 1) : '';
      const tierHtml = t.actressTier
        ? ` <span class="tier-badge tier-${esc(t.actressTier)}">${esc(t.actressTier.toLowerCase())}</span>`
        : '';
      const nameInner = `<span class="card-actress-first">${esc(fn)}</span>${ln ? `<span class="card-actress-last"> ${esc(ln)}</span>` : ''}`;
      const inner = `${nameInner}${tierHtml}`;
      actressHtml = t.actressId
        ? `<div class="actress-name"><a class="actress-link" href="#" data-actress-id="${t.actressId}">${nameInner}</a>${tierHtml}</div>`
        : `<div class="actress-name">${inner}</div>`;
    } else {
      actressHtml = `<div class="actress-name unknown">—</div>`;
    }

    let labelLineHtml = '';
    if (t.companyName || t.labelName) {
      const parts = [];
      if (t.companyName) parts.push(esc(t.companyName));
      if (t.labelName) parts.push(`(${esc(t.labelName)})`);
      labelLineHtml = `<div class="title-label-line">${parts.join(' ')}</div>`;
    }

    const dateHtml = t.addedDate ? `<div class="added-date">${esc(t.addedDate)}</div>` : '';
    const locationHtml = t.location ? `<div class="title-location">${esc(t.location)}</div>` : '';

    card.innerHTML = `${coverHtml}<div class="card-info">${actressHtml}<div class="title-code">${esc(t.code)}</div>${labelLineHtml}${dateHtml}${locationHtml}</div>`;

    const link = card.querySelector('.actress-link');
    if (link) {
      link.addEventListener('click', e => {
        e.preventDefault();
        openActressDetail(Number(link.dataset.actressId));
      });
    }

    return card;
  }

  async function loadMore() {
    if (loading || exhausted) return;
    loading = true;
    setStatus('loading');

    const limit = Math.min(PAGE_SIZE, MAX_TOTAL - offset);
    if (limit <= 0) { exhausted = true; setStatus(''); loading = false; return; }

    try {
      const res = await fetch(`/api/titles?offset=${offset}&limit=${limit}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const titles = await res.json();
      const grid = document.getElementById('grid');
      for (const t of titles) grid.appendChild(makeTitleCard(t));
      offset += titles.length;
      if (titles.length < limit || offset >= MAX_TOTAL) {
        exhausted = true;
        const s = document.getElementById('sentinel');
        if (s) s.remove();
        setStatus(offset === 0 ? 'no titles' : '');
      } else {
        setStatus('');
      }
    } catch (err) {
      setStatus('error loading titles');
      console.error(err);
    }
    loading = false;
  }

  function setStatus(msg) {
    const el = document.getElementById('status');
    if (el) el.textContent = msg;
  }

  const sentinel = document.getElementById('sentinel');
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      if (mode === 'titles') loadMore();
      else if (mode === 'actress-detail') loadMoreActressTitles();
      else if (mode === 'queue') loadMoreQueueTitles();
    }
  }, { rootMargin: '300px' });
  observer.observe(sentinel);
  loadMore();

  // ── Actress browse ────────────────────────────────────────────────────────
  const actressesBtn  = document.getElementById('actresses-btn');
  const prefixDropdown = document.getElementById('prefix-dropdown');
  let selectedPrefix = null;
  let selectedTier = null;

  actressesBtn.addEventListener('click', async e => {
    e.stopPropagation();
    closeQueuesDropdown();
    const isOpen = prefixDropdown.classList.contains('open');
    if (isOpen) {
      closeDropdown();
      return;
    }
    if (prefixDropdown.childElementCount === 0) {
      await populatePrefixDropdown();
    }
    prefixDropdown.classList.add('open');
    actressesBtn.classList.add('active');
  });

  document.addEventListener('click', () => closeDropdown());
  prefixDropdown.addEventListener('click', e => e.stopPropagation());

  function closeDropdown() {
    prefixDropdown.classList.remove('open');
    if (selectedPrefix === null && selectedTier === null && mode !== 'actress-detail')
      actressesBtn.classList.remove('active');
  }

  async function populatePrefixDropdown() {
    prefixDropdown.innerHTML = '';

    // ── Left: tier column ────────────────────────────────────────────────
    const tierCol = document.createElement('div');
    tierCol.className = 'dropdown-tier-col';

    const tierLabel = document.createElement('div');
    tierLabel.className = 'dropdown-section-label';
    tierLabel.textContent = 'tier';
    tierCol.appendChild(tierLabel);

    const TIERS = ['LIBRARY', 'MINOR', 'POPULAR', 'SUPERSTAR', 'GODDESS'];
    for (const tier of TIERS) {
      const chip = document.createElement('div');
      chip.className = `prefix-chip tier-${tier}`;
      chip.textContent = tier.toLowerCase();
      chip.dataset.tier = tier;
      chip.addEventListener('click', () => selectTier(tier, chip));
      tierCol.appendChild(chip);
    }
    prefixDropdown.appendChild(tierCol);

    // ── Divider ──────────────────────────────────────────────────────────
    const divider = document.createElement('div');
    divider.className = 'dropdown-col-divider';
    prefixDropdown.appendChild(divider);

    // ── Right: prefix column ─────────────────────────────────────────────
    const prefixCol = document.createElement('div');
    prefixCol.className = 'dropdown-prefix-col';

    const prefixLabel = document.createElement('div');
    prefixLabel.className = 'dropdown-section-label';
    prefixLabel.textContent = 'name';
    prefixCol.appendChild(prefixLabel);

    try {
      const res = await fetch('/api/actresses/index');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const prefixes = await res.json();
      for (const p of prefixes) {
        const chip = document.createElement('div');
        chip.className = 'prefix-chip';
        chip.textContent = p;
        chip.dataset.prefix = p;
        chip.addEventListener('click', () => selectPrefix(p, chip));
        prefixCol.appendChild(chip);
      }
    } catch (err) {
      console.error('Failed to load actress index', err);
    }
    prefixDropdown.appendChild(prefixCol);
  }

  function clearDropdownSelection() {
    prefixDropdown.querySelectorAll('.prefix-chip').forEach(c => c.classList.remove('selected'));
  }

  async function loadActressGrid(url) {
    document.getElementById('grid').style.display = 'none';
    document.getElementById('actress-detail').style.display = 'none';
    document.getElementById('queue-grid').style.display = 'none';
    document.getElementById('queue-header').style.display = 'none';
    document.getElementById('sentinel')?.remove();
    setStatus('loading');

    const actressGrid = document.getElementById('actress-grid');
    actressGrid.innerHTML = '';
    actressGrid.style.display = 'grid';

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const actresses = await res.json();
      for (const a of actresses) actressGrid.appendChild(makeActressCard(a));
      setStatus(actresses.length === 0 ? 'no actresses' : '');
    } catch (err) {
      setStatus('error loading actresses');
      console.error(err);
    }
  }

  async function selectPrefix(prefix, chip) {
    selectedPrefix = prefix;
    selectedTier = null;
    mode = 'actresses';
    closeDropdown();
    actressesBtn.classList.add('active');
    clearDropdownSelection();
    chip.classList.add('selected');
    await loadActressGrid(`/api/actresses?prefix=${encodeURIComponent(prefix)}`);
  }

  async function selectTier(tier, chip) {
    selectedTier = tier;
    selectedPrefix = null;
    mode = 'actresses';
    closeDropdown();
    actressesBtn.classList.add('active');
    clearDropdownSelection();
    chip.classList.add('selected');
    await loadActressGrid(`/api/actresses?tier=${encodeURIComponent(tier)}`);
  }

  const ROTATE_INTERVALS = [7000, 11000, 17000];

  function makeActressCard(a) {
    const card = document.createElement('div');
    card.className = 'actress-card';

    const covers = a.coverUrls || [];
    const coverWrap = document.createElement('div');
    coverWrap.className = 'cover-wrap';
    if (covers.length > 0) {
      let idx = Math.floor(Math.random() * covers.length);
      const img = document.createElement('img');
      img.className = 'cover-img';
      img.src = covers[idx];
      img.alt = a.canonicalName;
      img.loading = 'lazy';
      coverWrap.appendChild(img);
      if (covers.length > 1) {
        const ms = ROTATE_INTERVALS[Math.floor(Math.random() * ROTATE_INTERVALS.length)];
        setInterval(() => {
          idx = (idx + 1) % covers.length;
          img.style.opacity = '0';
          setTimeout(() => { img.src = covers[idx]; img.style.opacity = '1'; }, 400);
        }, ms);
      }
    } else {
      coverWrap.innerHTML = `<div class="cover-placeholder">—</div>`;
    }
    card.appendChild(coverWrap);

    const spaceIdx = a.canonicalName.indexOf(' ');
    const firstName = spaceIdx >= 0 ? a.canonicalName.slice(0, spaceIdx) : a.canonicalName;
    const lastName  = spaceIdx >= 0 ? a.canonicalName.slice(spaceIdx + 1) : '';

    const body = document.createElement('div');
    body.className = 'actress-card-body';
    body.innerHTML = `
      <div class="actress-card-name">
        <span class="actress-first-name">${esc(firstName)}</span>${lastName ? `<span class="actress-last-name">${esc(lastName)}</span>` : ''}
      </div>
      <div class="actress-card-meta">
        <span class="tier-badge tier-${esc(a.tier)}">${esc(a.tier.toLowerCase())}</span>
        ${a.favorite ? '<div class="fav-dot"></div>' : ''}
      </div>
      ${(a.firstAddedDate || a.lastAddedDate) ? (() => {
        const stale = isStale(a.lastAddedDate);
        const first = a.firstAddedDate ? `<span class="date-first">${esc(a.firstAddedDate)}</span>` : '?';
        const last  = a.lastAddedDate  ? `<span class="${stale ? 'date-last-stale' : 'date-last'}">${esc(a.lastAddedDate)}</span>` : '?';
        return `<div class="actress-active-dates">${first} → ${last}</div>`;
      })() : ''}
      <div class="actress-title-count">Titles: ${a.titleCount}</div>
      ${(a.folderPaths || []).length > 0
        ? `<div class="actress-folder-paths">${(a.folderPaths).map(p => `<div class="actress-folder-path">${esc(p)}</div>`).join('')}</div>`
        : ''}
    `;
    card.appendChild(body);

    card.addEventListener('click', () => openActressDetail(a.id));
    return card;
  }

  // ── Actress detail ────────────────────────────────────────────────────────
  let detailActressId = null;
  let detailOffset = 0;
  let detailLoading = false;
  let detailExhausted = false;

  async function openActressDetail(actressId) {
    mode = 'actress-detail';
    detailActressId = actressId;
    detailOffset = 0;
    detailLoading = false;
    detailExhausted = false;

    document.getElementById('grid').style.display = 'none';
    document.getElementById('actress-grid').style.display = 'none';
    document.getElementById('queue-grid').style.display = 'none';
    document.getElementById('queue-header').style.display = 'none';
    document.getElementById('actress-detail').style.display = 'block';
    document.getElementById('detail-title-grid').innerHTML = '';
    document.getElementById('detail-cover').innerHTML = '';
    document.getElementById('detail-info').innerHTML = '';

    // Re-attach sentinel (may have been removed)
    let s = document.getElementById('sentinel');
    if (!s) {
      s = document.createElement('div');
      s.id = 'sentinel';
      s.style.height = '1px';
      document.body.appendChild(s);
      observer.observe(s);
    }

    setStatus('loading');

    try {
      const res = await fetch(`/api/actresses/${actressId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const a = await res.json();
      renderDetailPanel(a);
    } catch (err) {
      setStatus('error loading actress');
      console.error(err);
      return;
    }

    await loadMoreActressTitles();
  }

  function renderDetailPanel(a) {
    const coverCol = document.getElementById('detail-cover');
    const covers = a.coverUrls || [];
    if (covers.length > 0) {
      const idx = Math.floor(Math.random() * covers.length);
      coverCol.innerHTML = `<img src="${esc(covers[idx])}" alt="${esc(a.canonicalName)}" loading="lazy">`;
    } else {
      coverCol.innerHTML = `<div class="detail-cover-placeholder">—</div>`;
    }

    const spaceIdx = a.canonicalName.indexOf(' ');
    const firstName = spaceIdx >= 0 ? a.canonicalName.slice(0, spaceIdx) : a.canonicalName;
    const lastName  = spaceIdx >= 0 ? a.canonicalName.slice(spaceIdx + 1) : '';

    const stale = isStale(a.lastAddedDate);
    const firstHtml = a.firstAddedDate ? `<span class="date-first">${esc(a.firstAddedDate)}</span>` : '';
    const lastHtml  = a.lastAddedDate
      ? `<span class="${stale ? 'date-last-stale' : 'date-last'}">${esc(a.lastAddedDate)}</span>` : '';
    const datesHtml = (firstHtml || lastHtml)
      ? `<div class="detail-dates">${firstHtml}${firstHtml && lastHtml ? ' → ' : ''}${lastHtml}</div>` : '';

    const pathsHtml = (a.folderPaths || []).length > 0
      ? `<div class="detail-paths">${a.folderPaths.map(p => `<div class="detail-path">${esc(p)}</div>`).join('')}</div>`
      : '';

    document.getElementById('detail-info').innerHTML = `
      <div class="detail-name">
        <span class="detail-first-name">${esc(firstName)}</span>
        ${lastName ? `<span class="detail-last-name">${esc(lastName)}</span>` : ''}
      </div>
      <div class="detail-meta-row">
        <span class="tier-badge tier-${esc(a.tier)}">${esc(a.tier.toLowerCase())}</span>
        ${a.favorite ? '<div class="fav-dot"></div>' : ''}
      </div>
      ${datesHtml}
      ${pathsHtml}
    `;
  }

  // ── Queues browse ─────────────────────────────────────────────────────────
  const queuesBtn      = document.getElementById('queues-btn');
  const queuesDropdown = document.getElementById('queues-dropdown');

  queuesBtn.addEventListener('click', async e => {
    e.stopPropagation();
    closeDropdown();
    const isOpen = queuesDropdown.classList.contains('open');
    if (isOpen) {
      closeQueuesDropdown();
      return;
    }
    if (queuesDropdown.childElementCount === 0) {
      await populateQueuesDropdown();
    }
    queuesDropdown.classList.add('open');
    queuesBtn.classList.add('active');
  });

  document.addEventListener('click', () => closeQueuesDropdown());
  queuesDropdown.addEventListener('click', e => e.stopPropagation());

  function closeQueuesDropdown() {
    queuesDropdown.classList.remove('open');
    queuesBtn.classList.remove('active');
  }

  async function populateQueuesDropdown() {
    queuesDropdown.innerHTML = '';

    let data;
    try {
      const res = await fetch('/api/queues/volumes');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (err) {
      console.error('Failed to load queues', err);
      return;
    }

    // ── Left: pool column ──────────────────────────────────────────────────
    const poolCol = document.createElement('div');
    poolCol.className = 'dropdown-tier-col';

    const poolLabel = document.createElement('div');
    poolLabel.className = 'dropdown-section-label';
    poolLabel.textContent = 'pool';
    poolCol.appendChild(poolLabel);

    if (data.pool) {
      const chip = document.createElement('div');
      chip.className = 'prefix-chip';
      chip.textContent = data.pool.id;
      chip.addEventListener('click', () => openQueueView(data.pool.id, data.pool.smbPath));
      poolCol.appendChild(chip);
    }
    queuesDropdown.appendChild(poolCol);

    // ── Divider ────────────────────────────────────────────────────────────
    const divider = document.createElement('div');
    divider.className = 'dropdown-col-divider';
    queuesDropdown.appendChild(divider);

    // ── Right: volumes column ──────────────────────────────────────────────
    const volCol = document.createElement('div');
    volCol.className = 'dropdown-prefix-col';

    const volLabel = document.createElement('div');
    volLabel.className = 'dropdown-section-label';
    volLabel.textContent = 'volumes';
    volCol.appendChild(volLabel);

    for (const v of (data.volumes || [])) {
      const chip = document.createElement('div');
      chip.className = 'prefix-chip';
      chip.textContent = v.id;
      chip.addEventListener('click', () => openQueueView(v.id, v.smbPath));
      volCol.appendChild(chip);
    }
    queuesDropdown.appendChild(volCol);
  }

  // ── Queue browse (infinite scroll) ───────────────────────────────────────
  let queueVolumeId   = null;
  let queueSmbPath    = null;
  let queueOffset     = 0;
  let queueLoading    = false;
  let queueExhausted  = false;

  async function openQueueView(volumeId, smbPath) {
    queueVolumeId  = volumeId;
    queueSmbPath   = smbPath || null;
    queueOffset    = 0;
    queueLoading   = false;
    queueExhausted = false;
    mode = 'queue';

    closeQueuesDropdown();
    queuesBtn.classList.add('active');

    document.getElementById('grid').style.display = 'none';
    document.getElementById('actress-grid').style.display = 'none';
    document.getElementById('actress-detail').style.display = 'none';

    const queueHeader = document.getElementById('queue-header');
    queueHeader.textContent = queueSmbPath ? `${queueSmbPath}/queue` : `${volumeId}/queue`;
    queueHeader.style.display = 'block';

    const queueGrid = document.getElementById('queue-grid');
    queueGrid.innerHTML = '';
    queueGrid.style.display = 'grid';

    // Re-attach sentinel if it was removed
    let s = document.getElementById('sentinel');
    if (!s) {
      s = document.createElement('div');
      s.id = 'sentinel';
      s.style.height = '1px';
      document.body.appendChild(s);
      observer.observe(s);
    }

    await loadMoreQueueTitles();
  }

  async function loadMoreQueueTitles() {
    if (queueLoading || queueExhausted || queueVolumeId === null) return;
    queueLoading = true;
    setStatus('loading');

    const limit = Math.min(PAGE_SIZE, MAX_TOTAL - queueOffset);
    if (limit <= 0) { queueExhausted = true; setStatus(''); queueLoading = false; return; }

    try {
      const res = await fetch(`/api/queues/${encodeURIComponent(queueVolumeId)}/titles?offset=${queueOffset}&limit=${limit}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const titles = await res.json();
      const grid = document.getElementById('queue-grid');
      for (const t of titles) {
        if (queueSmbPath && t.location) t.location = queueSmbPath + t.location;
        grid.appendChild(makeTitleCard(t));
      }
      queueOffset += titles.length;
      if (titles.length < limit || queueOffset >= MAX_TOTAL) {
        queueExhausted = true;
        const s = document.getElementById('sentinel');
        if (s) s.remove();
        setStatus(queueOffset === 0 ? 'no titles in queue' : '');
      } else {
        setStatus('');
      }
    } catch (err) {
      setStatus('error loading queue');
      console.error(err);
    }
    queueLoading = false;
  }

  async function loadMoreActressTitles() {
    if (detailLoading || detailExhausted || detailActressId === null) return;
    detailLoading = true;
    setStatus('loading');

    try {
      const res = await fetch(`/api/actresses/${detailActressId}/titles?offset=${detailOffset}&limit=24`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const titles = await res.json();
      const grid = document.getElementById('detail-title-grid');
      for (const t of titles) grid.appendChild(makeTitleCard(t));
      detailOffset += titles.length;
      if (titles.length < 24) {
        detailExhausted = true;
        setStatus(detailOffset === 0 ? 'no titles' : '');
      } else {
        setStatus('');
      }
    } catch (err) {
      setStatus('error loading titles');
      console.error(err);
    }
    detailLoading = false;
  }
</script>
</body>
</html>
