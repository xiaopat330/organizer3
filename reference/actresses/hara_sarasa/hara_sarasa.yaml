  biography: "Natsume Iroha (born June 20, 1984 in Tokyo) is a Japanese AV actress who debuted in March 2007 under the name Hara Sarasa, signing dual exclusive contracts with MAX-A and Alice Japan simultaneously. From mid-2008 she became the primary exclusive actress for Idea Pocket, building a devoted following for her intelligent screen presence and versatility before going on hiatus in January 2011. She returned in July 2013 under the name Natsume Iroha with MOODYZ, then signed exclusively with Attackers in August 2014, becoming one of the label's most prolific and enduring stars. Under Attackers she specializes in drama-driven NTR and infidelity narratives, releasing titles monthly with remarkable consistency across her ADN, RBD, ATID, and SHKD catalogs. As of 2026 she remains active, with a career spanning nearly two decades and one of the largest catalogs of any current exclusive actress."
