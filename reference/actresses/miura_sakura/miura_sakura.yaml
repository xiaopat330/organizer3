  biography: "Miura Sakura (born November 30, 1997 in Tokyo) debuted via an image video in April 2017 before making her AV debut with S1 NO.1 STYLE in May 2017. In February 2018 she transferred exclusively to MOODYZ, where she has remained ever since, becoming one of the label's most consistent and commercially successful actresses. She is widely noted for her 'hidden busty' archetype — her 79cm chest measurement and petite 152cm frame mean her G-cup figure is not obvious in street clothing, creating a strong reveal effect. She regularly charts on FANZA sales and rental rankings, has placed multiple titles at #1, and received the DMMアダルトアワード2018 優秀新人女優賞 and FANZAアダルトアワード2019 メディア賞. Nicknamed ミトちゃん and affiliated with ARCHE Production, she remains active as of 2026 with over 100 releases under her belt."
