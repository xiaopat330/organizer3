  biography: "Kana Seto (瀬戸環奈, born May 10, 2004 in Sagamihara, Kanagawa) is a Japanese AV actress signed exclusively to S1 NO.1 STYLE, widely known by her nickname Setokan. She played volleyball in middle school and juggled up to eight part-time jobs simultaneously during high school before friends encouraged her to pursue modeling. She made her gravure debut in October 2024 in Weekly Post (小学館) and announced her S1 exclusive AV contract in December 2024, her debut work SONE-614 releasing January 28, 2025. Pre-release, it topped the FANZA retail floor rankings for three consecutive weeks, setting the tone for a dominant first year. She achieved six consecutive monthly #1 rankings on FANZA's retail floor from April through September 2025, and by year-end her titles occupied all nine spots in a major annual AV sales chart."
