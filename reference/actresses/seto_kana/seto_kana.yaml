  legacy: "Despite debuting in January 2025, Seto became one of the most commercially dominant debut-year actresses in recent JAV history. She is frequently described as a once-in-a-millennium talent (「1000年に一人」) for her combination of exceptional physique (170cm, J-cup), natural on-camera presence, and immediate chart dominance — a reputation that spread internationally, including significant coverage in Chinese media and a sold-out 2025 Taipei adult expo appearance."

