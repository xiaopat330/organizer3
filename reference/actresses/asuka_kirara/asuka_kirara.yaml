  biography: "Kirara Asuka was born October 2, 1988 in Hokkaido and debuted with h.m.p in December 2007, moving to PRESTIGE in October 2009 and then to S1 No.1 Style in June 2013 where she became one of S1's flagship actresses. Her career extended well beyond the AV industry: she served as the fourth leader of Ebisu Muscats from 2015, starred in the Iron Girl film trilogy, released music as a solo singer, and was ranked first in a survey of 'faces women most want to look like.' Around 2018 she quietly stepped back from AV work, formally announcing her retirement on February 4, 2020, and has since worked as a talent, beauty clinic entrepreneur, and apparel brand producer."
