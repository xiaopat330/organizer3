  legacy: "One of the most multi-dimensional AV actresses of her generation, Kirara Asuka spent roughly ten years moving through h.m.p, PRESTIGE, and S1 while simultaneously building a mainstream entertainment profile through music, film, and Ebisu Muscats. Her public disclosure of cosmetic surgery and sustained post-retirement visibility — including a beauty clinic, fashion brand, and YouTube channel with over 300,000 subscribers — make her one of the few former AV actresses to achieve genuine mainstream celebrity."

