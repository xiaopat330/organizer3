  legacy: "A defining freelance workhorse of the 2010s–2020s, Otsuki demonstrated that a non-exclusive performer could win the industry's top single-actress prize (DMM 2016) by sheer volume, range, and craft. Her abrupt 2025 dual-exclusive signing with One's Factory and Dass! at year 17 was treated as an industry event in itself."

