  biography: "Hibiki Otsuki is a Japanese AV actress from Otaru, Hokkaido who debuted in October 2008 and built her career as a high-volume freelance performer rather than as a studio exclusive. She became one of the most ubiquitous mid-2010s actresses, working across virtually every major maker (Max-A, S1, Moodyz, Prestige, SOD, Madonna, Attackers, Wanz Factory, Das!, Aroma) and accumulating broad genre range from idol units to lesbian work to MILF roles. She won the DMM.R18 Adult Award 2016 Best Actress prize and a string of Pink Award and Sky PerfecTV honors, cementing her as a top-tier name. Outside AV she is a member of anime/Vocaloid idol unit T♡Project, runs the Hibiyan-channel and Hibiyan TV ASMR YouTube channels, and has appeared as a character in Sega's Yakuza 0. In November 2025, after seventeen years freelance, she announced an unprecedented dual exclusive contract with One's Factory and Dass!, marking the first studio-exclusive phase of her career."
