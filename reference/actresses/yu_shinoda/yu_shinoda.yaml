  biography: "Yu Shinoda is a Japanese former AV actress from Tokyo who debuted in December 2010 with Marks Japan after being scouted following a breakup. Across a 13-year career she became one of the era's most consistently popular performers, transitioning from petite/young roles in the early 2010s to E/F-cup centerpiece work and eventually to a mature-woman positioning. She was affiliated with the Marks Group, then Japan Total Promotion and T-Powers, and signed her only major studio exclusive with Madonna in March 2023. She received the Tokyo Sports Prize at the 2019 Sky PerfecTV! Adult Broadcasting Awards and consistently charted in FANZA's top-10 monthly and annual rankings from 2020 through her retirement. Outside AV she ran the YouTube fitness channel 'Dashino-ch' (390K subscribers, deleted 2023) and was a SPOOX EX EX-Girls ambassador in 2022. Her retirement was reported on October 31, 2023, after her agency was unable to retain her."
