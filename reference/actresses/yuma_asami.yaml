profile:
  family_name: Asami
  given_name: Yuma
  stage_name: 麻美ゆま
  reading: あさみ ゆま
  alternate_names:
    - name: Yuma Asami
      note: primary romanized name
    - name: 麻生由真
      note: early gravure name before AV debut
  date_of_birth: 1987-03-24
  birthplace: Takasaki, Gunma Prefecture, Japan
  blood_type: AB
  height_cm: 158
  measurements:
    bust: 96
    waist: 58
    hip: 88
  cup: H
  active_from: 2005-10-28
  active_to: 2013-05-24
  retirement_announced: 2015-05-20
  biography: "Yuma Asami is widely regarded as one of the most iconic and commercially successful AV actresses of all time. She debuted simultaneously at Alice Japan and S1 No.1 Style on October 28 and November 7, 2005, respectively — a dual-studio exclusive contract that was unprecedented in the industry. Her Alice Japan releases were part of the ビデ倫 market while her S1 work anchored the long-running ギリギリモザイク series. She was consistently a top seller at both studios, with her titles reaching #1 on the CDVJ POS chart five times in her first six months. She was named Best Actress at the MOODYZ year-end ceremony in 2006. A founding member and second-generation leader (2010-2012) of the idol group 恵比寿マスカッツ (Ebisu Muscats), she crossed over into mainstream entertainment through TV, music, and stage work. In February 2013 she was diagnosed with a borderline malignant ovarian tumor; she underwent surgery removing both ovaries and uterus, followed by chemotherapy. Her last original AV title was released in May 2013. On May 20, 2015, she formally announced her retirement from AV at a press conference coinciding with the release of her single Re Start〜明日へ〜. She continues as a talent, singer, stage actress, and YouTuber."
  primary_studios:
    - name: Alice Japan
      company: Alice Japan
      from: 2005-10-28
      to: 2015-08-14
      role: Exclusive contract actress, ビデ倫 series
    - name: S1 No.1 Style
      company: WILL Co., Ltd.
      from: 2005-11-07
      to: 2014-12-19
      role: Exclusive contract actress, ギリギリモザイク series
  awards:
    - event: MOODYZ年末大感謝祭
      year: 2006
      category: 最優秀女優賞 (Best Actress)
    - event: MOODYZ年末大感謝祭
      year: 2007
      category: 女優賞4位 (Actress Award 4th place)
    - event: スカパー!アダルト放送大賞
      year: 2008
      category: 最多出演女優大賞 (Most Appearances)
    - event: AV30 オールタイムベスト女優人気投票
      year: 2012
      category: 2位 (2nd place all-time)
    - event: アリスJAPANプレスカンファレンス
      year: 2012
      category: ベストアクトレス賞 (Best Actress)
  legacy: "One of the all-time greats in AV. Unique for maintaining simultaneous exclusive contracts at two major studios (Alice Japan and S1) for nearly a decade. Her dual-series career, mainstream crossover success via 恵比寿マスカッツ, and public battle with cancer made her a cultural figure well beyond the AV industry."

