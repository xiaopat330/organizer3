  biography: "Mao Hamasaki debuted in June 2012 as an exclusive actress with Prestige's video-on-demand label, transitioning to DVD releases later that year. After her Prestige contract ended in March 2013, she did a three-month limited stint as an SOD contract office-girl performer, then spent the rest of her career — over a decade — as a prolific freelance kikatan (planned-single) actress crossing virtually every major studio. She was twice nominated for Sky PerfecTV Adult Broadcasting Awards (2016 and 2019) and won the Cherry Bomb Valuable Actress award in 2022. Known for an exceptionally powerful 'jet' squirting ability and highly sensitive nipples, she ranked repeatedly in FANZA monthly top-10 charts during the early 2020s. Hamasaki announced her retirement in Taiwan on August 9, 2024 after 13 years in the industry, citing health concerns from the heavy water intake required for her squirting performances; her final title was released in February 2025. She has worked simultaneously as music DJ 'DJ Mao' since 2017, performing across Hong Kong, Macau, Singapore, and Malaysia."
