  biography: "Kanno Sayuki (born December 17, 1989 in Tokyo) debuted in March 2010 as an exclusive actress with Alice Japan, where her 95cm J-cup figure quickly established her as a top-tier busty actress. In March 2011 she transferred exclusively to MOODYZ, with OPPAI releasing titles in months without MOODYZ output; after her MOODYZ exclusive ended in July 2012, OPPAI became her primary recurring label while she also appeared widely as a freelancer across dozens of studios. Her career was characterized by prolific cross-studio activity from 2013 onward, spanning Tameike Goro, Madonna, KMP, Hibino, Glory Quest, and many others, making her one of the more widely distributed busty actresses of her era. In 2015 she made select appearances under the alias 宮野優 for the upscale 舞ワイフ series. She announced her retirement on April 16, 2017 via Twitter, concluding a seven-year career."
