  biography: "湊莉久 (Minato Riku), born August 1, 1993 in Kanagawa Prefecture, debuted in April 2013 with Candy under the short-haired persona that became her trademark, after working part-time at a mahjong parlor following high school graduation. She worked freelance across numerous labels through 2014 before taking an indefinite hiatus, then returned in late 2015 as a teamZERO exclusive and joined the idol unit 恵比寿マスカッツ. In October 2016 she moved to S1 No.1 Style as an exclusive actress, her most prominent affiliation, during which she won the DMM.R18 Adult Award for Best Actress (2015) and the SKY PerfecTV! Adult Broadcast Award in 2017. She announced retirement in February 2018, with her final complete retirement marked by a photography exhibition in January 2019; as of 2022 she works as an esthetician and part-time bar staff."
