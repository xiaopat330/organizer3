  biography: "Iori Kogawa was born September 25, 1992 in Hirakata, Osaka, and debuted with SOD Create in November 2012. She famously stated that she entered the AV industry because she 'wanted to act,' having previously worked as a talent and aspiring actress. She remained an SOD exclusive for the full ten years of her career, appearing in over 100 titles on the STAR and STARS labels. From 2015 to 2018 she was a member of Ebisu Muscats and appeared on television, winning the group's academic test two years running, and she won a cameo role in Sega's Yakuza 0. She announced her retirement in January 2022, conducted a nationwide farewell tour across seven prefectures, and fully retired on December 31, 2022."
