  legacy: "One of SOD's longest-serving exclusive actresses, with a continuous decade-long career from 2012 to 2022. Her articulate, intellectual on-screen persona and stated acting ambitions set her apart in the genre, and her involvement with Ebisu Muscats and the Yakuza video game franchise gave her a mainstream profile beyond the AV industry. Her retirement was marked by an elaborate nationwide fan tour and a crowdfunded photo book project."

